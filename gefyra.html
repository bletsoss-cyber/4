<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Νευροανατομία - Γέφυρα και Προμήκης Μυελός | MCQs</title>
  <style>
    :root {
      --bg: #eef2f6;
      --surface: #ffffff;
      --surface-2: #f7f9fb;
      --ink: #17202a;
      --muted: #647184;
      --line: #d7dee8;
      --accent: #275d8c;
      --accent-2: #7b5e2d;
      --good: #147a44;
      --good-bg: #e8f6ee;
      --bad: #b13535;
      --bad-bg: #fdecec;
      --warn: #8a651d;
      --shadow: 0 18px 45px rgba(31, 42, 55, .12);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }

    .app-shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 42px;
    }

    header {
      background: #152536;
      color: #fff;
      border-radius: 8px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.35rem, 2.4vw, 2.15rem);
      letter-spacing: 0;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: #d7e2ec;
      font-size: .98rem;
    }

    .toolbar {
      margin-top: 16px;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(220px, 1.4fr) repeat(2, minmax(132px, auto));
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: .78rem;
      color: #dbe5ef;
      font-weight: 700;
    }

    select, input[type="search"] {
      width: 100%;
      height: 42px;
      border: 1px solid rgba(255,255,255,.28);
      background: rgba(255,255,255,.1);
      color: #fff;
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
      outline: none;
    }

    select option { color: #17202a; }

    input::placeholder { color: #c4ceda; }

    .toggle {
      min-height: 42px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 6px;
      padding: 9px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      background: rgba(255,255,255,.08);
      font-size: .9rem;
      font-weight: 650;
      cursor: pointer;
    }

    .toggle input { accent-color: var(--accent-2); }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 6px;
      min-height: 42px;
      padding: 0 16px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      transition: transform .15s ease, filter .15s ease, background .15s ease;
    }

    button:hover:not(:disabled) { filter: brightness(1.05); transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: .55; }

    .secondary { background: #405164; }
    .light { background: #f4f7fa; color: #1d2b38; border: 1px solid var(--line); }
    .danger { background: #873838; }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: .76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 1.08rem;
    }

    .progress-track {
      height: 10px;
      background: #dce4ed;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 16px;
      align-items: start;
    }

    .question-card, .side-panel, .results-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .question-card { padding: 22px; }

    .q-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: .84rem;
      font-weight: 750;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 9px;
      border-radius: 999px;
      background: #edf3f8;
      color: #244760;
      border: 1px solid #d4e0ea;
    }

    .question-text {
      margin: 0 0 18px;
      font-size: clamp(1.08rem, 2vw, 1.35rem);
      line-height: 1.45;
      font-weight: 800;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      min-height: auto;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: start;
      text-align: left;
      background: var(--surface-2);
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 13px 14px;
      border-radius: 8px;
      font-weight: 650;
    }

    .option .key {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: #dfe8f1;
      color: #1b384e;
      font-weight: 850;
    }

    .option.correct {
      background: var(--good-bg);
      border-color: #9ad1b4;
      color: #0e5130;
    }

    .option.wrong {
      background: var(--bad-bg);
      border-color: #e7a0a0;
      color: #7d2222;
    }

    .feedback {
      display: none;
      margin-top: 16px;
      border-radius: 8px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: #f8fafc;
    }

    .feedback.show { display: block; }
    .feedback.good { border-color: #a7d8bd; background: var(--good-bg); }
    .feedback.bad { border-color: #ebb0b0; background: var(--bad-bg); }

    .card-actions {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .side-panel {
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .side-panel h2 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }

    th, td {
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th:last-child, td:last-child { text-align: right; }

    .results-card {
      grid-column: 1 / -1;
      padding: 22px;
      display: none;
    }

    .results-card.show { display: block; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0 18px;
    }

    .wrong-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .wrong-item {
      background: #fafbfc;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .empty-state {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .print-bank { display: none; }

    @media (max-width: 860px) {
      .toolbar { grid-template-columns: 1fr; }
      .status-grid, .results-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      main { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      .app-shell { width: min(100% - 18px, 1180px); padding-top: 10px; }
      header, .question-card, .results-card { padding: 16px; }
      .status-grid, .results-grid { grid-template-columns: 1fr; }
      .option { grid-template-columns: 32px 1fr; padding: 12px; }
      .actions button, .card-actions button { width: 100%; }
    }

    @media print {
      body { background: #fff; color: #000; }
      .app-shell { width: 100%; padding: 0; }
      header, .status-grid, .progress-track, main, .results-card, .actions { display: none !important; }
      .print-bank { display: block; }
      .print-bank h1 { color: #000; margin-bottom: 8px; }
      .print-question {
        break-inside: avoid;
        border-bottom: 1px solid #bbb;
        padding: 10px 0;
      }
      .print-question h3 { margin: 0 0 6px; font-size: 12pt; }
      .print-question ol { margin: 4px 0 6px 22px; padding: 0; }
      .print-answer { font-size: 10pt; color: #222; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Γέφυρα και Προμήκης Μυελός - MCQs Νευροανατομίας</h1>
      <p class="subtitle">Δύσκολες ερωτήσεις πολλαπλής επιλογής βασισμένες στις διαφάνειες του PDF.</p>
      <div class="toolbar" aria-label="Ρυθμίσεις quiz">
        <label>Κατηγορία
          <select id="categoryFilter"></select>
        </label>
        <label>Αναζήτηση
          <input id="searchInput" type="search" placeholder="Π.χ. ελαία, λημνίσκος, τρίδυμο">
        </label>
        <label class="toggle"><input id="shuffleQuestions" type="checkbox" checked> Ανακάτεμα ερωτήσεων</label>
        <label class="toggle"><input id="shuffleAnswers" type="checkbox" checked> Ανακάτεμα απαντήσεων</label>
      </div>
      <div class="actions">
        <button id="startBtn">Έναρξη / Εφαρμογή φίλτρων</button>
        <button id="restartBtn" class="secondary">Επανεκκίνηση</button>
        <button id="printBtn" class="secondary">Εκτύπωση</button>
        <button id="clearStorageBtn" class="danger">Καθαρισμός προόδου</button>
      </div>
    </header>

    <section class="status-grid" aria-label="Στατιστικά προόδου">
      <div class="metric"><span>Πρόοδος</span><strong id="progressText">0 / 0</strong></div>
      <div class="metric"><span>Σκορ</span><strong id="scoreText">0</strong></div>
      <div class="metric"><span>Ποσοστό</span><strong id="percentText">0%</strong></div>
      <div class="metric"><span>Κατηγορία</span><strong id="currentCategory">-</strong></div>
    </section>
    <div class="progress-track" aria-hidden="true"><div id="progressFill" class="progress-fill"></div></div>

    <main>
      <section id="quizCard" class="question-card" aria-live="polite">
        <div class="empty-state">Φόρτωση quiz...</div>
      </section>

      <aside class="side-panel">
        <section>
          <h2>Κατανομή ερωτήσεων</h2>
          <table>
            <thead><tr><th>Κατηγορία</th><th>Πλήθος</th></tr></thead>
            <tbody id="distributionBody"></tbody>
          </table>
        </section>
        <section>
          <h2>Τρέχον φίλτρο</h2>
          <p id="filterSummary" class="subtitle" style="color: var(--muted);">Όλες οι ερωτήσεις.</p>
        </section>
      </aside>

      <section id="resultsCard" class="results-card" aria-live="polite"></section>
    </main>

    <section id="printBank" class="print-bank"></section>
  </div>

  <script>

    function shuffleArray(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function placeCorrectAt(options, targetIndex) {
      const copy = [...options];
      const correctIndex = copy.findIndex(option => option.correct);
      if (correctIndex < 0 || correctIndex === targetIndex) return copy;
      const [correctOption] = copy.splice(correctIndex, 1);
      copy.splice(targetIndex, 0, correctOption);
      return copy;
    }

        q.question,
        q.explanation,

      ].map(normalizeText).join(" ");
      return haystack.includes(normalizeText(term));
    }

    function getSettingsFromControls() {
      return {
        category: el.categoryFilter.value || "all",
        search: el.searchInput.value.trim(),
        shuffleQuestions: el.shuffleQuestions.checked,
        shuffleAnswers: el.shuffleAnswers.checked
      };
    }

    function startQuiz(settings = getSettingsFromControls(), providedQuestions = null) {
      currentSettings = settings;
      activeQuestions = providedQuestions || prepareQuestions(questions, settings);
      currentIndex = 0;
      answers = {};
      el.resultsCard.classList.remove("show");
      renderDistribution(activeQuestions);
      renderFilterSummary();
      renderQuestion();
      saveState();
    }

    function renderQuestion() {
      if (!activeQuestions.length) {
        el.quizCard.innerHTML = '<div class="empty-state">Δεν βρέθηκαν ερωτήσεις με τα τρέχοντα φίλτρα.</div>';
        updateStats();
        return;
      }

      if (currentIndex >= activeQuestions.length) {
        renderResults();
        return;
      }

      const q = activeQuestions[currentIndex];
      const answer = answers[q.id];
      const answered = Boolean(answer);
      const optionButtons = q.options.map((option, index) => {
        const key = optionKeys[index];
        const selected = answer && answer.text === option.text;
        const classes = ["option"];
        if (answered && option.correct) classes.push("correct");
        if (answered && selected && !option.correct) classes.push("wrong");
        return `
          <button class="${classes.join(" ")}" data-option-index="${index}" ${answered ? "disabled" : ""}>
            <span class="key">${key}</span>
            <span>${escapeHtml(option.text)}</span>
          </button>
        `;
      }).join("");

      const feedbackClass = answered ? (answer.correct ? "show good" : "show bad") : "";
      const feedbackTitle = answered ? (answer.correct ? "Σωστό" : "Λάθος") : "";

      el.quizCard.innerHTML = `
        <div class="q-meta">
          <span class="pill">Ερώτηση ${currentIndex + 1} / ${activeQuestions.length}</span>
          <span class="pill">${escapeHtml(q.category)}</span>
          <span class="pill">${escapeHtml(q.source)}</span>
        </div>
        <h2 class="question-text">${escapeHtml(q.question)}</h2>
        <div class="options">${optionButtons}</div>
        <div class="feedback ${feedbackClass}" id="feedbackBox">
          <strong>${feedbackTitle}</strong>
          <div>${answered ? escapeHtml(q.explanation) : ""}</div>
        </div>
        <div class="card-actions">
          <button id="nextBtn" ${answered ? "" : "disabled"}>${currentIndex === activeQuestions.length - 1 ? "Αποτελέσματα" : "Επόμενη ερώτηση"}</button>
          <button id="finishBtn" class="light">Τέλος quiz</button>
        </div>
      `;

      el.quizCard.querySelectorAll(".option").forEach(btn => {
        btn.addEventListener("click", () => selectOption(Number(btn.dataset.optionIndex)));
      });
      document.getElementById("nextBtn").addEventListener("click", nextQuestion);
      document.getElementById("finishBtn").addEventListener("click", renderResults);
      updateStats();
    }

    function selectOption(index) {
      const q = activeQuestions[currentIndex];
      if (answers[q.id]) return;
      const option = q.options[index];
      answers[q.id] = {
        questionId: q.id,
        text: option.text,
        correct: option.correct,
        category: q.category
      };
      saveState();
      renderQuestion();
    }

    function nextQuestion() {
      currentIndex += 1;
      saveState();
      renderQuestion();
    }

    function updateStats() {
      const total = activeQuestions.length;
      const answeredCount = Object.keys(answers).length;
      const correctCount = Object.values(answers).filter(a => a.correct).length;
      const percent = answeredCount ? Math.round((correctCount / answeredCount) * 100) : 0;
      const progressPercent = total ? Math.round((Math.min(currentIndex + 1, total) / total) * 100) : 0;

      el.progressText.textContent = `${Math.min(currentIndex + 1, total)} / ${total}`;
      el.scoreText.textContent = `${correctCount}`;
      el.percentText.textContent = `${percent}%`;
      el.currentCategory.textContent = total && activeQuestions[currentIndex] ? activeQuestions[currentIndex].category : "-";
      el.progressFill.style.width = `${progressPercent}%`;
    }

    function renderResults() {
      const total = activeQuestions.length;
      const answeredCount = Object.keys(answers).length;
      const correctCount = Object.values(answers).filter(a => a.correct).length;
      const wrongQuestions = activeQuestions.filter(q => answers[q.id] && !answers[q.id].correct);
      const wrongCount = wrongQuestions.length;
      const percent = answeredCount ? Math.round((correctCount / answeredCount) * 100) : 0;

      const byCategory = {};
      activeQuestions.forEach(q => {
        byCategory[q.category] ||= { total: 0, correct: 0, wrong: 0 };
        byCategory[q.category].total += 1;
        if (answers[q.id]?.correct) byCategory[q.category].correct += 1;
        if (answers[q.id] && !answers[q.id].correct) byCategory[q.category].wrong += 1;
      });

      const categoryRows = Object.entries(byCategory).map(([cat, stat]) => `
        <tr><td>${escapeHtml(cat)}</td><td>${stat.correct} / ${stat.total}</td><td>${stat.wrong}</td></tr>
      `).join("");

      const wrongList = wrongQuestions.length ? wrongQuestions.map(q => {
        const correctOption = q.options.find(o => o.correct);
        const selected = answers[q.id]?.text || "-";
        return `
          <div class="wrong-item">
            <strong>${escapeHtml(q.id + ". " + q.question)}</strong>
            <p>Απάντησες: ${escapeHtml(selected)}</p>
            <p>Σωστό: ${escapeHtml(correctOption ? correctOption.text : "")}</p>
            <p>${escapeHtml(q.explanation)}</p>
          </div>
        `;
      }).join("") : '<p class="empty-state">Δεν υπάρχουν λανθασμένες απαντήσεις.</p>';

      el.resultsCard.innerHTML = `
        <h2>Τελική οθόνη αποτελεσμάτων</h2>
        <div class="results-grid">
          <div class="metric"><span>Συνολικό σκορ</span><strong>${correctCount} / ${total}</strong></div>
          <div class="metric"><span>Ποσοστό επιτυχίας</span><strong>${percent}%</strong></div>
          <div class="metric"><span>Σωστές</span><strong>${correctCount}</strong></div>
          <div class="metric"><span>Λανθασμένες</span><strong>${wrongCount}</strong></div>
        </div>
        <h3>Απόδοση ανά κατηγορία</h3>
        <table>
          <thead><tr><th>Κατηγορία</th><th>Σωστές / Σύνολο</th><th>Λάθη</th></tr></thead>
          <tbody>${categoryRows}</tbody>
        </table>
        <div class="actions" style="margin: 16px 0;">
          <button id="resultsRestart">Επανεκκίνηση</button>
          <button id="retryWrong" class="secondary" ${wrongQuestions.length ? "" : "disabled"}>Επανάληψη λανθασμένων</button>
        </div>
        <h3>Ανασκόπηση λανθασμένων</h3>
        <div class="wrong-list">${wrongList}</div>
      `;
      el.resultsCard.classList.add("show");
      el.quizCard.innerHTML = '<div class="empty-state">Το quiz ολοκληρώθηκε. Δες τα αποτελέσματα παρακάτω.</div>';
      updateStats();
      document.getElementById("resultsRestart").addEventListener("click", () => startQuiz(currentSettings));
      document.getElementById("retryWrong").addEventListener("click", () => {
        const retry = wrongQuestions.map(q => ({
          ...q,
          options: currentSettings.shuffleAnswers ? shuffleArray(questions.find(original => original.id === q.id).options) : placeCorrectAt(questions.find(original => original.id === q.id).options, (q.id - 1) % 4)
        }));
        startQuiz({ ...currentSettings, search: "", category: "all" }, retry);
      });
      saveState();
    }

    function renderDistribution(list = questions) {
      const counts = {};
      list.forEach(q => { counts[q.category] = (counts[q.category] || 0) + 1; });
      el.distributionBody.innerHTML = Object.entries(counts)
        .sort((a, b) => a[0].localeCompare(b[0], "el"))
        .map(([category, count]) => `<tr><td>${escapeHtml(category)}</td><td>${count}</td></tr>`)
        .join("");
    }

    function renderFilterSummary() {
      const parts = [];
      parts.push(currentSettings.category === "all" ? "Όλες οι κατηγορίες" : currentSettings.category);
      if (currentSettings.search) parts.push(`αναζήτηση: "${currentSettings.search}"`);
      parts.push(`${activeQuestions.length} ερωτήσεις`);
      el.filterSummary.textContent = parts.join(" · ");
    }

    function populateCategories() {
      const categories = [...new Set(questions.map(q => q.category))].sort((a, b) => a.localeCompare(b, "el"));
      el.categoryFilter.innerHTML = '<option value="all">Όλες οι κατηγορίες</option>' +
        categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
    }

    function renderPrintBank() {
      const items = questions.map(q => {
        const printOptions = placeCorrectAt(q.options, (q.id - 1) % 4);
        const correct = printOptions.find(o => o.correct);
        return `
          <article class="print-question">
            <h3>${q.id}. ${escapeHtml(q.question)} <small>(${escapeHtml(q.category)}, ${escapeHtml(q.source)})</small></h3>
            <ol type="α">
              ${printOptions.map(o => `<li>${escapeHtml(o.text)}</li>`).join("")}
            </ol>
            <div class="print-answer"><strong>Απάντηση:</strong> ${escapeHtml(correct ? correct.text : "")}<br><strong>Αιτιολόγηση:</strong> ${escapeHtml(q.explanation)}</div>
          </article>
        `;
      }).join("");
      el.printBank.innerHTML = `<h1>Γέφυρα και Προμήκης Μυελός - Ερωτήσεις και Απαντήσεις</h1>${items}`;
    }

    function saveState() {
      try {
        const state = { activeQuestions, currentIndex, answers, currentSettings };
        localStorage.setItem(storageKey, JSON.stringify(state));
      } catch (error) {
        // Η αποθήκευση προόδου είναι προαιρετική και δεν πρέπει να διακόπτει το quiz.
      }
    }

    function restoreState() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return false;
        const state = JSON.parse(raw);
        if (!state.activeQuestions || !Array.isArray(state.activeQuestions)) return false;
        activeQuestions = state.activeQuestions;
        currentIndex = Number(state.currentIndex) || 0;
        answers = state.answers || {};
        currentSettings = state.currentSettings || getSettingsFromControls();
        el.categoryFilter.value = currentSettings.category || "all";
        el.searchInput.value = currentSettings.search || "";
        el.shuffleQuestions.checked = Boolean(currentSettings.shuffleQuestions);
        el.shuffleAnswers.checked = Boolean(currentSettings.shuffleAnswers);
        renderDistribution(activeQuestions);
        renderFilterSummary();
        renderQuestion();
        return true;
      } catch (error) {
        return false;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    el.startBtn.addEventListener("click", () => startQuiz());
    el.restartBtn.addEventListener("click", () => startQuiz(currentSettings.category ? currentSettings : getSettingsFromControls()));
    el.printBtn.addEventListener("click", () => window.print());
    el.clearStorageBtn.addEventListener("click", () => {
      localStorage.removeItem(storageKey);
      startQuiz(getSettingsFromControls());
    });

    populateCategories();
    renderDistribution(questions);
    renderPrintBank();
    if (!restoreState()) startQuiz(getSettingsFromControls());
  </script>
</body>
</html>
