let currentQuestion = 0;
let score = 0;

function loadQuestion() {
    const quizArea = document.getElementById('question-area');
    const data = quizData[currentQuestion];
    
    let html = `
        <div class="question-container">
            <div class="question-text">${currentQuestion + 1}. ${data.q}</div>
            <div class="options">
                ${data.options.map((opt, i) => `
                    <button class="option-btn" onclick="checkAnswer(${i}, this)">${opt}</button>
                `).join('')}
            </div>
            <div id="feedback-${currentQuestion}" class="feedback"></div>
        </div>
    `;
    
    quizArea.innerHTML = html;
    updateProgress();
}

function checkAnswer(selected, btn) {
    const data = quizData[currentQuestion];
    const buttons = document.querySelectorAll('.option-btn');
    const feedbackDiv = document.getElementById(`feedback-${currentQuestion}`);
    
    buttons.forEach(b => b.disabled = true);
    
    if (selected === data.correct) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        buttons[data.correct].classList.add('correct');
    }
    
    feedbackDiv.innerHTML = `<strong>Ακαδημαϊκή Τεκμηρίωση:</strong> ${data.feedback}`;
    feedbackDiv.style.display = 'block';
    
    setTimeout(() => {
        if (currentQuestion < quizData.length - 1) {
            currentQuestion++;
            loadQuestion();
        } else {
            showResults();
        }
    }, 4000);
}

function updateProgress() {
    const progress = ((currentQuestion) / quizData.length) * 100;
    document.getElementById('progress-fill').style.width = `${progress}%`;
}

function showResults() {
    const quizArea = document.getElementById('quiz-app');
    const percentage = (score / quizData.length) * 100;
    quizArea.innerHTML = `
        <div style="text-align:center; padding:40px;">
            <h2>Ολοκλήρωση Αξιολόγησης</h2>
            <p style="font-size:1.5em;">Το σκορ σας: ${score} / ${quizData.length} (${percentage.toFixed(1)}%)</p>
            <button class="option-btn" style="margin-top:20px;" onclick="location.reload()">Επανεκκίνηση</button>
        </div>
    `;
}

loadQuestion();
