<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Έσω ους - Διαδραστικό Quiz Ανατομίας</title>
  <style>
    :root {
      --bg: #f4f7f8;
      --panel: #ffffff;
      --ink: #1e2a32;
      --muted: #62727d;
      --line: #d9e2e7;
      --brand: #0f6b78;
      --brand-2: #18525d;
      --accent: #b27a2c;
      --good: #16784a;
      --bad: #b43d3d;
      --good-bg: #e6f5ee;
      --bad-bg: #f9e8e8;
      --warn-bg: #fff7e4;
      --shadow: 0 14px 35px rgba(28, 48, 58, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }

    header {
      background: #12343b;
      color: #fff;
      padding: 22px 18px;
      border-bottom: 5px solid var(--accent);
    }

    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.6vw, 2.05rem);
      letter-spacing: 0;
      line-height: 1.15;
    }

    .subtitle {
      color: #cddce1;
      margin-top: 6px;
      font-size: 0.98rem;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    main {
      padding: 22px 0 42px;
    }

    .panel, .question-card, .results-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 16px;
      margin-bottom: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.2fr 1.4fr auto auto auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 0.84rem;
      color: #2e4049;
      margin-bottom: 5px;
    }

    select, input[type="search"] {
      width: 100%;
      appearance: none;
      border: 1px solid #c7d5dc;
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding-top: 20px;
      color: #344a54;
      font-weight: 650;
      white-space: nowrap;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--brand);
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      background: var(--brand);
      color: #fff;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
    }

    button:hover:not(:disabled) {
      background: var(--brand-2);
      transform: translateY(-1px);
    }

    button.secondary {
      background: #e8eef1;
      color: #20313a;
      border: 1px solid #c9d5db;
    }

    button.secondary:hover:not(:disabled) {
      background: #dce6ea;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
      text-transform: uppercase;
    }

    .stat strong {
      display: block;
      font-size: 1.12rem;
      margin-top: 2px;
    }

    .progress-shell {
      height: 10px;
      background: #dce7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: var(--brand);
      transition: width 0.2s ease;
    }

    .question-card {
      padding: clamp(16px, 3vw, 26px);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      background: #e8f2f4;
      color: #144f5a;
      font-weight: 800;
      font-size: 0.82rem;
    }

    .question-text {
      font-size: clamp(1.08rem, 2.3vw, 1.38rem);
      font-weight: 800;
      margin: 8px 0 18px;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .option {
      width: 100%;
      text-align: left;
      background: #f8fafb;
      color: var(--ink);
      border: 1px solid #d1dde3;
      display: grid;
      grid-template-columns: 38px 1fr;
      align-items: start;
      gap: 8px;
      min-height: 52px;
    }

    .option:hover:not(:disabled) {
      background: #eef6f8;
      border-color: #8fb5bf;
    }

    .option .key {
      font-weight: 900;
      color: var(--brand);
    }

    .option.correct {
      background: var(--good-bg);
      border-color: var(--good);
      color: #113f2c;
    }

    .option.wrong {
      background: var(--bad-bg);
      border-color: var(--bad);
      color: #5d1f1f;
    }

    .feedback {
      display: none;
      border-radius: 8px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      background: #f7fafb;
      margin-top: 8px;
    }

    .feedback.show { display: block; }
    .feedback.good { border-color: #8bc7a9; background: var(--good-bg); }
    .feedback.bad { border-color: #dca0a0; background: var(--bad-bg); }
    .feedback strong { display: block; margin-bottom: 4px; }

    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .results-card {
      padding: clamp(18px, 3vw, 28px);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eaf1f4;
      font-size: 0.85rem;
    }

    tr:last-child td { border-bottom: 0; }

    .review-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .review-item {
      border: 1px solid var(--line);
      background: #fbfcfd;
      border-radius: 8px;
      padding: 12px;
    }

    .review-item strong { display: block; margin-bottom: 4px; }

    .print-only {
      display: none;
    }

    @media (max-width: 880px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .check-row { padding-top: 0; }
      .stats, .results-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      .wrap { width: min(100% - 18px, 1120px); }
      header { padding: 18px 12px; }
      .controls, .stats, .results-grid { grid-template-columns: 1fr; }
      .option { grid-template-columns: 30px 1fr; }
      .header-actions, .nav-row { flex-direction: column; }
      button { width: 100%; }
    }

    @media print {
      body {
        background: #fff;
        color: #000;
        font-size: 11pt;
      }

      header, .panel, .stats, .progress-shell, .question-card, .results-card, .screen-only {
        display: none !important;
      }

      .print-only {
        display: block;
      }

      main { padding: 0; }
      .wrap { width: 100%; }

      .print-question {
        break-inside: avoid;
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ccc;
      }

      .print-question h3 {
        margin: 0 0 6px;
        font-size: 12pt;
      }

      .print-question ol {
        margin: 4px 0 6px 22px;
        padding: 0;
      }

      .answer-key {
        break-before: page;
      }
    }
  </style>
</head>
<body>
  <header class="screen-only">
    <div class="wrap topline">
      <div>
        <h1>Έσω ους - MCQs Νευροανατομίας</h1>
        <div class="subtitle">Δύσκολες ερωτήσεις πολλαπλής επιλογής βασισμένες στις διαφάνειες.</div>
      </div>
      <div class="header-actions">
        <button class="secondary" id="printBtn">Εκτύπωση</button>
        <button class="secondary" id="clearBtn">Καθαρισμός προόδου</button>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="panel screen-only" aria-label="Ρυθμίσεις quiz">

          <div>
            <label for="categoryFilter">Κατηγορία</label>
            <select id="categoryFilter"></select>
          </div>
          <div>
            <label for="searchInput">Αναζήτηση</label>
            <input id="searchInput" type="search" placeholder="π.χ. ελικοτρήμα, Reissner, υδραγωγός">
          </div>
          <label class="check-row"><input id="shuffleQuestions" type="checkbox" checked> Ανακάτεμα ερωτήσεων</label>
          <label class="check-row"><input id="shuffleOptions" type="checkbox" checked> Ανακάτεμα απαντήσεων</label>
          <button id="startBtn">Έναρξη</button>
        </div>
      </section>

      <section class="stats screen-only" aria-label="Στατιστικά">
        <div class="stat"><span>Σκορ</span><strong id="scoreStat">0</strong></div>
        <div class="stat"><span>Πρόοδος</span><strong id="progressStat">0 / 64</strong></div>
        <div class="stat"><span>Επιτυχία</span><strong id="percentStat">0%</strong></div>
        <div class="stat"><span>Κατηγορία</span><strong id="categoryStat">-</strong></div>
      </section>

      <div class="progress-shell screen-only"><div id="progressBar" class="progress-bar"></div></div>

      <section id="quizArea" class="screen-only"></section>
      <section id="resultsArea" class="screen-only"></section>
      <section id="printArea" class="print-only"></section>
    </div>
  </main>

      {

      },
      {
        id: 64,
        category: "Αγγεία, νεύρα και φλεβική αποχέτευση",
        source: "Διαφάνειες 16, 41, 42",
        question: "Ποια αντιστοιχία δομής και περιεχομένου ή απορροής δεν είναι σωστή;",
        options: [
          { key: "α", text: "Ελικοειδής πόρος - ελικοειδές γάγγλιο του κοχλιακού νεύρου.", correct: false },
          { key: "β", text: "Υδραγωγός αίθουσας - ενδολεμφικός πόρος και μικρό φλεβίδιο.", correct: false },
          { key: "γ", text: "Φλέβα υδραγωγού αίθουσας - άνω λιθοειδής κόλπος.", correct: false },
          { key: "δ", text: "Φλέβα υδραγωγού κοχλία - απορροή από ελλειπτικό κυστίδιο και ημικύκλιους σωλήνες.", correct: true }
        ],
        explanation: "Η φλέβα του υδραγωγού του κοχλία αποχετεύει από τον κοχλία και το σφαιρικό κυστίδιο."
      }
    ];

    let state = {
      pool: [],
      current: 0,
      answers: {},
      score: 0,
      completed: false,
      settings: {
        category: "all",
        search: "",
        shuffleQuestions: true,
        shuffleOptions: true
      },
      wrongIds: []
    };

    const els = {
      categoryFilter: document.getElementById("categoryFilter"),
      searchInput: document.getElementById("searchInput"),
      shuffleQuestions: document.getElementById("shuffleQuestions"),
      shuffleOptions: document.getElementById("shuffleOptions"),
      startBtn: document.getElementById("startBtn"),
      clearBtn: document.getElementById("clearBtn"),
      printBtn: document.getElementById("printBtn"),
      quizArea: document.getElementById("quizArea"),
      resultsArea: document.getElementById("resultsArea"),
      scoreStat: document.getElementById("scoreStat"),
      progressStat: document.getElementById("progressStat"),
      percentStat: document.getElementById("percentStat"),
      categoryStat: document.getElementById("categoryStat"),
      progressBar: document.getElementById("progressBar"),
      printArea: document.getElementById("printArea")
    };

    function shuffle(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function normalizeText(text) {
      return String(text).toLocaleLowerCase("el-GR");
    }

    function questionMatches(q, term) {
      if (!term) return true;
      const haystack = [
        q.question,
        q.category,
        q.source,
        q.explanation,
        ...q.options.map(o => o.text)
      ].join(" ");
      return normalizeText(haystack).includes(normalizeText(term));
    }

    function buildPool() {
      const category = els.categoryFilter.value;
      const term = els.searchInput.value.trim();
      let pool = questions.filter(q => (category === "all" || q.category === category) && questionMatches(q, term));
      if (els.shuffleQuestions.checked) pool = shuffle(pool);
      return pool.map(q => ({
        ...q,
        displayOptions: els.shuffleOptions.checked ? shuffle(q.options) : [...q.options]
      }));
    }

    function saveState() {
      const data = {
        ...state,
        settings: {
          category: els.categoryFilter.value,
          search: els.searchInput.value,
          shuffleQuestions: els.shuffleQuestions.checked,
          shuffleOptions: els.shuffleOptions.checked
        }
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const saved = JSON.parse(raw);
        if (!Array.isArray(saved.pool) || !saved.pool.length) return false;
        state = saved;
        els.categoryFilter.value = saved.settings?.category || "all";
        els.searchInput.value = saved.settings?.search || "";
        els.shuffleQuestions.checked = saved.settings?.shuffleQuestions !== false;
        els.shuffleOptions.checked = saved.settings?.shuffleOptions !== false;
        return true;
      } catch {
        localStorage.removeItem(STORAGE_KEY);
        return false;
      }
    }

    function resetProgress() {
      localStorage.removeItem(STORAGE_KEY);
      state = {
        pool: [],
        current: 0,
        answers: {},
        score: 0,
        completed: false,
        settings: {
          category: els.categoryFilter.value,
          search: els.searchInput.value,
          shuffleQuestions: els.shuffleQuestions.checked,
          shuffleOptions: els.shuffleOptions.checked
        },
        wrongIds: []
      };
      renderIntro();
      updateStats();
    }

    function startQuiz(customPool) {
      state.pool = customPool || buildPool();
      state.current = 0;
      state.answers = {};
      state.score = 0;
      state.completed = false;
      state.wrongIds = [];
      els.resultsArea.innerHTML = "";
      if (!state.pool.length) {
        els.quizArea.innerHTML = '<div class="question-card empty">Δεν βρέθηκαν ερωτήσεις με τα τρέχοντα φίλτρα.</div>';
        updateStats();
        return;
      }
      saveState();
      renderQuestion();
    }

    function renderIntro() {
      els.resultsArea.innerHTML = "";
      els.quizArea.innerHTML = `
        <div class="question-card">
          <div class="meta"><span class="pill">64 ερωτήσεις</span><span>Αρχείο: Έσω ους</span></div>
          <div class="question-text">Επίλεξε φίλτρα και πάτησε «Έναρξη».</div>
          <p>Το quiz κρατά σκορ, εξηγεί κάθε απάντηση μετά την επιλογή και στο τέλος δίνει ανασκόπηση ανά κατηγορία.</p>
        </div>
      `;
    }

    function renderQuestion() {
      const q = state.pool[state.current];
      if (!q) return renderResults();

      const answered = state.answers[q.id];
      const selectedText = answered?.selectedText;

      els.quizArea.innerHTML = `
        <article class="question-card">
          <div class="meta">
            <span class="pill">${q.category}</span>
            <span>${q.source} · Ερώτηση ${state.current + 1} / ${state.pool.length}</span>
          </div>
          <div class="question-text">${q.question}</div>
          <div class="options">
            ${q.displayOptions.map((opt, idx) => {
              const selected = selectedText === opt.text;
              const cls = answered ? (opt.correct ? "correct" : selected ? "wrong" : "") : "";
              const disabled = answered ? "disabled" : "";
              return `<button class="option ${cls}" ${disabled} data-index="${idx}">
                <span class="key">${LETTERS[idx]})</span><span>${opt.text}</span>
              </button>`;
            }).join("")}
          </div>
          <div id="feedback" class="feedback ${answered ? "show " + (answered.correct ? "good" : "bad") : ""}">
            ${answered ? `<strong>${answered.correct ? "Σωστό." : "Λάθος."}</strong>${q.explanation}` : ""}
          </div>
          <div class="nav-row">
            <button class="secondary" id="restartBtn">Επανεκκίνηση</button>
            <button id="nextBtn" ${answered ? "" : "disabled"}>${state.current === state.pool.length - 1 ? "Αποτελέσματα" : "Επόμενη ερώτηση"}</button>
          </div>
        </article>
      `;

      document.querySelectorAll(".option").forEach(btn => {
        btn.addEventListener("click", () => answerQuestion(Number(btn.dataset.index)));
      });
      document.getElementById("nextBtn").addEventListener("click", nextQuestion);
      document.getElementById("restartBtn").addEventListener("click", () => startQuiz());
      updateStats();
    }

    function answerQuestion(index) {
      const q = state.pool[state.current];
      if (state.answers[q.id]) return;
      const selected = q.displayOptions[index];
      state.answers[q.id] = {
        selectedText: selected.text,
        correct: selected.correct,
        category: q.category
      };
      if (selected.correct) {
        state.score += 1;
      } else {
        state.wrongIds.push(q.id);
      }
      saveState();
      renderQuestion();
    }

    function nextQuestion() {
      if (state.current >= state.pool.length - 1) {
        renderResults();
        return;
      }
      state.current += 1;
      saveState();
      renderQuestion();
    }

    function categoryStats() {
      const stats = {};
      state.pool.forEach(q => {
        stats[q.category] ||= { total: 0, correct: 0 };
        stats[q.category].total += 1;
        if (state.answers[q.id]?.correct) stats[q.category].correct += 1;
      });
      return stats;
    }

    function renderResults() {
      state.completed = true;
      saveState();
      els.quizArea.innerHTML = "";
      const total = state.pool.length;
      const wrong = total - state.score;
      const percent = total ? Math.round((state.score / total) * 100) : 0;
      const stats = categoryStats();
      const wrongQuestions = state.pool.filter(q => !state.answers[q.id]?.correct);

      els.resultsArea.innerHTML = `
        <article class="results-card">
          <h2>Τελική επίδοση</h2>
          <div class="results-grid">
            <div class="stat"><span>Σκορ</span><strong>${state.score} / ${total}</strong></div>
            <div class="stat"><span>Ποσοστό</span><strong>${percent}%</strong></div>
            <div class="stat"><span>Σωστές</span><strong>${state.score}</strong></div>
            <div class="stat"><span>Λάθος</span><strong>${wrong}</strong></div>
            <div class="stat"><span>Σύνολο</span><strong>${total}</strong></div>
          </div>

          <h3>Απόδοση ανά κατηγορία</h3>
          <table>
            <thead><tr><th>Κατηγορία</th><th>Σωστές</th><th>Σύνολο</th><th>Ποσοστό</th></tr></thead>
            <tbody>
              ${Object.entries(stats).map(([cat, s]) => `<tr><td>${cat}</td><td>${s.correct}</td><td>${s.total}</td><td>${Math.round((s.correct / s.total) * 100)}%</td></tr>`).join("")}
            </tbody>
          </table>

          <h3>Ανασκόπηση λανθασμένων</h3>
          <div class="review-list">
            ${wrongQuestions.length ? wrongQuestions.map(q => {
              const correct = q.options.find(o => o.correct);
              const picked = state.answers[q.id]?.selectedText || "Δεν απαντήθηκε";
              return `<div class="review-item">
                <strong>${q.id}. ${q.question}</strong>
                <div>Απάντησες: ${picked}</div>
                <div>Σωστό: ${correct.text}</div>
                <div>${q.explanation}</div>
              </div>`;
            }).join("") : '<div class="review-item">Δεν υπάρχουν λανθασμένες ερωτήσεις.</div>'}
          </div>

          <div class="nav-row">
            <button id="restartFinalBtn">Επανεκκίνηση</button>
            <button id="retryWrongBtn" ${wrongQuestions.length ? "" : "disabled"}>Επανάληψη λανθασμένων</button>
          </div>
        </article>
      `;

      document.getElementById("restartFinalBtn").addEventListener("click", () => startQuiz());
      document.getElementById("retryWrongBtn").addEventListener("click", () => {
        const retry = wrongQuestions.map(q => ({
          ...q,
          displayOptions: els.shuffleOptions.checked ? shuffle(q.options) : [...q.options]
        }));
        startQuiz(els.shuffleQuestions.checked ? shuffle(retry) : retry);
      });
      updateStats();
    }

    function updateStats() {
      const total = state.pool.length || questions.length;
      const answeredCount = Object.keys(state.answers).length;
      const percent = answeredCount ? Math.round((state.score / answeredCount) * 100) : 0;
      const q = state.pool[state.current];
      els.scoreStat.textContent = String(state.score);
      els.progressStat.textContent = `${Math.min(answeredCount, total)} / ${total}`;
      els.percentStat.textContent = `${percent}%`;
      els.categoryStat.textContent = q?.category || "-";
      els.progressBar.style.width = total ? `${Math.min(100, (answeredCount / total) * 100)}%` : "0%";
    }

    function populateCategories() {
      const cats = [...new Set(questions.map(q => q.category))];
      els.categoryFilter.innerHTML = '<option value="all">Όλες οι κατηγορίες</option>' + cats.map(cat => `<option value="${cat}">${cat}</option>`).join("");
    }

    function renderPrintView() {
      const byCategory = {};
      questions.forEach(q => {
        byCategory[q.category] = (byCategory[q.category] || 0) + 1;
      });
      els.printArea.innerHTML = `
        <h1>Έσω ους - MCQs Νευροανατομίας</h1>
        <p>Σύνολο ερωτήσεων: ${questions.length}</p>
        <table>
          <thead><tr><th>Κατηγορία</th><th>Αριθμός ερωτήσεων</th></tr></thead>
          <tbody>${Object.entries(byCategory).map(([cat, count]) => `<tr><td>${cat}</td><td>${count}</td></tr>`).join("")}</tbody>
        </table>
        ${questions.map(q => `
          <div class="print-question">
            <h3>${q.id}. ${q.question}</h3>
            <div>${q.category} · ${q.source}</div>
            <ol type="a">
              ${q.options.map(o => `<li>${o.text}</li>`).join("")}
            </ol>
          </div>
        `).join("")}
        <section class="answer-key">
          <h2>Απαντήσεις και αιτιολογήσεις</h2>
          ${questions.map(q => {
            const correct = q.options.find(o => o.correct);
            return `<div class="print-question"><strong>${q.id}. ${correct.key}) ${correct.text}</strong><br>${q.explanation}</div>`;
          }).join("")}
        </section>
      `;
    }

    els.startBtn.addEventListener("click", () => startQuiz());
    els.clearBtn.addEventListener("click", resetProgress);
    els.printBtn.addEventListener("click", () => {
      renderPrintView();
      window.print();
    });

    populateCategories();
    renderPrintView();
    if (loadState()) {
      if (state.completed) renderResults();
      else renderQuestion();
    } else {
      renderIntro();
      updateStats();
    }
  </script>
