<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Ακτινοφυσικής - Οδοντιατρική Σχολή</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --background-color: #f8f9fa;
            --correct-color: #27ae60;
            --incorrect-color: #e74c3c;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .question-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .question-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .options-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .option-item {
            margin-bottom: 10px;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 10px 15px;
            background: #f1f4f6;
            border: 1px solid #dcdde1;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-label:hover {
            background: #e1e8ed;
        }

        .option-input {
            margin-top: 4px;
            margin-right: 10px;
        }

        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            font-size: 0.95em;
            background-color: #e8f4f8;
            border-left: 4px solid var(--secondary-color);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 30px;
        }

        .btn-submit:hover {
            background-color: #2980b9;
        }

        #results {
            display: none;
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            font-size: 1.5em;
        }

        /* Classes applied via JS for correct/incorrect visual feedback */
        .correct-answer {
            background-color: #d5f5e3 !important;
            border-color: var(--correct-color) !important;
        }

        .incorrect-answer {
            background-color: #fadbd8 !important;
            border-color: var(--incorrect-color) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Αυτοαξιολόγηση: Γενικές Αρχές Ακτινοφυσικής</h1>
    <div id="quiz-container">
        </div>
    <button class="btn-submit" id="submit-btn" onclick="evaluateQuiz()">Υποβολή & Έλεγχος Απαντήσεων</button>
    <div id="results"></div>
</div>

<script>
    const questions = [
        {
            q: "Ποια είναι η ελάχιστη ενέργεια που πρέπει να έχει ένα φωτόνιο ακτινοβολίας για να προκαλέσει ιοντισμό στα άτομα;",
            options: ["5 eV", "10 eV", "15 eV", "25 eV"],
            correct: 2,
            exp: "Όταν ένα φωτόνιο έχει ενέργεια 15 eV ή μεγαλύτερη, είναι ικανό να προκαλέσει ιοντισμό στα άτομα και στα μόρια της ύλης."
        },
        {
            q: "Ποια σωματιδιακή ακτινοβολία αποτελείται από πυρήνες υδρογόνου επιταχυνόμενους με μάζα περίπου 2000 φορές της μάζας των ηλεκτρονίων;",
            options: ["Σωματίδια-α", "Ηλεκτρόνια (β-σωματίδια)", "Πρωτόνια", "Νετρόνια"],
            correct: 2,
            exp: "Σύμφωνα με το κείμενο, τα πρωτόνια είναι πυρήνες υδρογόνου, ελαφρύτερα από τα σωματίδια-α, και έχουν μάζα 2000 φορές μεγαλύτερη από τα ηλεκτρόνια."
        },
        {
            q: "Ποια είναι η ταχύτητα με την οποία ταξιδεύουν οι ακτίνες-Χ στο κενό;",
            options: ["3 &times; 10<sup>8</sup> m/sec", "3 &times; 10<sup>10</sup> m/sec", "2.42 &times; 10<sup>19</sup> m/sec", "Ανάλογη με το δυναμικό kVp"],
            correct: 0,
            exp: "Οι ακτίνες Χ αποτελούν ηλεκτρομαγνητική ακτινοβολία και, όπως το ορατό φως, ταξιδεύουν με ταχύτητα 3 &times; 10<sup>8</sup> m/sec."
        },
        {
            q: "Ποιο είναι το σύνηθες μήκος κύματος των ακτίνων-Χ που χρησιμοποιούνται στην Οδοντιατρική Ακτινολογία;",
            options: ["0.001 - 0.01 nm", "0.01 - 0.05 nm", "0.1 - 0.5 nm", "1 - 5 nm"],
            correct: 1,
            exp: "Στην Ιατρική και Οδοντιατρική Ακτινολογία, η συνήθης διακύμανση μήκους κύματος των ακτίνων-Χ είναι περίπου 0.01 - 0.05 nm."
        },
        {
            q: "Ποια είναι η σχέση μεταξύ του μήκους κύματος και της συχνότητας των ακτίνων-Χ;",
            options: ["Είναι ανάλογα (μεγαλύτερο μήκος κύματος σημαίνει μεγαλύτερη συχνότητα)", "Είναι αντιστρόφως ανάλογα (μικρότερο μήκος κύματος σημαίνει μεγαλύτερη συχνότητα)", "Η συχνότητα παραμένει σταθερή ανεξάρτητα από το μήκος κύματος", "Εξαρτώνται αποκλειστικά από τον ατομικό αριθμό του στόχου"],
            correct: 1,
            exp: "Όσο μικρότερο είναι το μήκος κύματος, τόσο μεγαλύτερη είναι η συχνότητα, άρα και η ενέργεια των φωτονίων και η διεισδυτικότητά τους."
        },
        {
            q: "Πώς παράγεται το συνεχές φάσμα ενεργειών στην ακτινογραφική λυχνία;",
            options: ["Μέσω του φωτοηλεκτρικού φαινομένου", "Μέσω της χαρακτηριστικής ακτινοβολίας", "Μέσω της ακτινοβολίας πέδησης", "Μέσω της σκέδασης Compton"],
            correct: 2,
            exp: "Οι αλληλεπιδράσεις της ακτινοβολίας πέδησης δημιουργούν φωτόνια ακτίνων-Χ σε ένα συνεχές φάσμα ενεργειών."
        },
        {
            q: "Γιατί χρησιμοποιούνται μέταλλα με υψηλό ατομικό αριθμό (όπως το βολφράμιο) ως στόχοι στην άνοδο;",
            options: ["Επειδή απάγουν ταχύτερα τη θερμότητα από τον χαλκό", "Επειδή παράγουν λιγότερα σωματίδια-α", "Επειδή αλλάζουν πιο αποτελεσματικά την κατεύθυνση των ηλεκτρονίων", "Επειδή εμποδίζουν την παραγωγή χαρακτηριστικής ακτινοβολίας"],
            correct: 2,
            exp: "Οι αλληλεπιδράσεις πέδησης είναι ανάλογες του τετραγώνου του ατομικού αριθμού, άρα μέταλλα-στόχοι με υψηλό Ζ είναι αποτελεσματικότερα στην αλλαγή κατεύθυνσης των ηλεκτρονίων."
        },
        {
            q: "Ποια διεργασία είναι υπεύθυνη για την παραγωγή της χαρακτηριστικής ακτινοβολίας;",
            options: ["Η άμεση κρούση ηλεκτρονίου στον πυρήνα", "Η εκδίωξη ηλεκτρονίου από εσωτερική στοιβάδα (Κ ή L) του στόχου", "Η επιβράδυνση των ηλεκτρονίων λόγω του πυρηνικού πεδίου", "Η αλληλεπίδραση φωτονίου με εξωτερικό ηλεκτρόνιο ασθενούς"],
            correct: 1,
            exp: "Η χαρακτηριστική ακτινοβολία παράγεται όταν καθοδικά ηλεκτρόνια εκδιώκουν ηλεκτρόνια από τις εσωτερικές στοιβάδες K ή L του στόχου, και το κενό αναπληρώνεται από εξωτερική στοιβάδα."
        },
        {
            q: "Τι ποσοστό της ωφέλιμης ακτινοβολίας Χ αποτελεί η χαρακτηριστική ακτινοβολία σε δυναμικό πάνω από 70 kVp;",
            options: ["1%", "10%", "27%", "57%"],
            correct: 1,
            exp: "Η χαρακτηριστική ακτινοβολία συνεισφέρει στο 10% της ωφέλιμης ακτινοβολίας Χ για διαφορά δυναμικού πάνω από 70 kVp."
        },
        {
            q: "Ποιο είναι το ποσοστό της ενέργειας των ηλεκτρονίων που μετατρέπεται σε θερμότητα κατά τον βομβαρδισμό του στόχου;",
            options: ["1%", "10%", "50%", "99%"],
            correct: 3,
            exp: "Η ενέργεια που χάνεται μεταφέρεται είτε ως θερμότητα (99%) είτε ως ακτίνες-Χ (1%)."
        },
        {
            q: "Ποιο υλικό της ανόδου αναλαμβάνει κυρίως την απομάκρυνση και διασκορπισμό της τεράστιας θερμότητας που παράγεται;",
            options: ["Το μολύβδινο περίβλημα", "Ο στόχος βολφραμίου", "Το χάλκινο υλικό και το έλαιο", "Το παράθυρο αλουμινίου"],
            correct: 2,
            exp: "Η θερμότητα απομακρύνεται και διασκορπίζεται από το χάλκινο υλικό της ανόδου και το υπάρχον έλαιο."
        },
        {
            q: "Ποιο φαινόμενο αλληλεπίδρασης της δέσμης με τους ιστούς του ασθενούς εμφανίζεται με τη μεγαλύτερη συχνότητα (57%);",
            options: ["Φωτοηλεκτρικό φαινόμενο", "Σκέδαση Compton", "Ελαστική σκέδαση (Tompson)", "Ουδεμία αλληλεπίδραση"],
            correct: 1,
            exp: "Το 57% των αλληλεπιδράσεων στην οδοντιατρική έκθεση οφείλονται στο φαινόμενο Compton."
        },
        {
            q: "Στο Φωτοηλεκτρικό Φαινόμενο, το προσπίπτον φωτόνιο αλληλεπιδρά με:",
            options: ["Τον πυρήνα του ατόμου", "Ένα ηλεκτρόνιο εξωτερικής στοιβάδας", "Ένα ηλεκτρόνιο εσωτερικής στοιβάδας", "Ολόκληρο το άτομο στιγμιαία"],
            correct: 2,
            exp: "Η διαδικασία του φωτοηλεκτρικού φαινομένου συμβαίνει όταν ένα φωτόνιο αλληλεπιδράσει με ένα ηλεκτρόνιο εσωτερικής στοιβάδας του ιστού."
        },
        {
            q: "Πώς επηρεάζεται η ενέργεια του φωτονίου μετά από μια αλληλεπίδραση Φωτοηλεκτρικού Φαινομένου;",
            options: ["Χάνει ένα μικρό μέρος της και σκεδάζεται", "Χάνει το 50% της ενέργειάς του", "Δεν χάνει ενέργεια, μόνο αλλάζει κατεύθυνση", "Χάνει όλη την ενέργειά του (εκχωρείται στο ηλεκτρόνιο)"],
            correct: 3,
            exp: "Το φωτόνιο εκδιώκει το ηλεκτρόνιο παίρνοντας όλη την ενέργεια του φωτονίου, και το ίδιο παύει να υπάρχει."
        },
        {
            q: "Σε ποια μαθηματική σχέση βασίζεται η πιθανότητα να συμβεί Φωτοηλεκτρικό Φαινόμενο στους ιστούς;",
            options: ["Είναι ανάλογη του ατομικού αριθμού (Z)", "Είναι ανάλογη του τετραγώνου του ατομικού αριθμού (Z&sup2;)", "Είναι ανάλογη της 3ης δύναμης του ατομικού αριθμού (Z&sup3;)", "Είναι αντιστρόφως ανάλογη της 3ης δύναμης του ατομικού αριθμού"],
            correct: 2,
            exp: "Η πιθανότητα του φωτοηλεκτρικού φαινομένου εξαρτάται από την 3η δύναμη του ατομικού αριθμού του υλικού απορρόφησης (Z&sup3;)."
        },
        {
            q: "Γιατί το οστό εμφανίζεται διαφορετικά από τους μαλακούς ιστούς στην ακτινογραφία (παραγωγή αντίθεσης);",
            options: ["Λόγω της διαφοράς νερού στους ιστούς", "Επειδή το οστό έχει 6.5 φορές μεγαλύτερη πιθανότητα φωτοηλεκτρικής απορρόφησης", "Επειδή στους μαλακούς ιστούς συμβαίνει μόνο σκέδαση Tompson", "Λόγω της απορρόφησης των φωτονίων Compton από το ασβέστιο"],
            correct: 1,
            exp: "Επειδή ο ατομικός αριθμός των οστών (13.8) είναι μεγαλύτερος από των μαλακών ιστών (7.4), η πιθανότητα φωτοηλεκτρικού φαινομένου είναι (13.8/7.4)&sup3; = 6.5 φορές μεγαλύτερη."
        },
        {
            q: "Στη σκέδαση Compton, το προσπίπτον φωτόνιο συγκρούεται με:",
            options: ["Τον πυρήνα του ατόμου", "Ένα ηλεκτρόνιο εσωτερικής στοιβάδας", "Ένα ηλεκτρόνιο εξωτερικής στοιβάδας", "Ελεύθερα πρωτόνια"],
            correct: 2,
            exp: "Το φαινόμενο Compton εμφανίζεται όταν ένα φωτόνιο αλληλεπιδράσει με ηλεκτρόνιο εξωτερικής στοιβάδας ατόμου."
        },
        {
            q: "Ποια είναι η βασική αρνητική συνέπεια των σκεδαζόμενων φωτονίων Compton στην κλινική πράξη;",
            options: ["Καταστρέφουν την άνοδο της λυχνίας", "Αυξάνουν τη θερμοκρασία του ασθενούς", "Μειώνουν την αντίθεση φτάνοντας στο φιλμ ως ομίχλη και αποτελούν κίνδυνο ακτινοβολίας", "Μειώνουν το πάχος ημίσειας τιμής της δέσμης"],
            correct: 2,
            exp: "Τα σκεδαζόμενα φωτόνια φτάνοντας στο φιλμ δεν δίνουν χρήσιμη πληροφορία, αλλά υποβιβάζουν την εικόνα (ομίχλη), και όσα εξέρχονται του ασθενούς είναι κίνδυνος."
        },
        {
            q: "Ποιο ποσοστό της ακτινικής δέσμης περνά μέσα από τον ασθενή χωρίς ΚΑΜΙΑ απολύτως αλληλεπίδραση;",
            options: ["0%", "7%", "9%", "27%"],
            correct: 2,
            exp: "Σύμφωνα με την Εικόνα Β2.5 (και το κείμενο), ένα 9% των φωτονίων διέρχεται χωρίς καμία αλληλεπίδραση."
        },
        {
            q: "Στην ελαστική σκέδαση (Tompson), ποιο από τα παρακάτω ισχύει;",
            options: ["Το φωτόνιο χάνει το 50% της ενέργειάς του", "Προκαλείται ισχυρός ιοντισμός των ιστών", "Το φωτόνιο εκπέμπεται με την ίδια συχνότητα αλλά σε διαφορετική διεύθυνση", "Είναι υπεύθυνη για το 57% των αλληλεπιδράσεων"],
            correct: 2,
            exp: "Στην ελαστική σκέδαση, το φωτόνιο διεγείρει στιγμιαία το άτομο και εκπέμπεται με την ίδια συχνότητα/ενέργεια, απλώς σε διαφορετική διεύθυνση."
        },
        {
            q: "Τι είναι το Πάχος Ημίσειας Τιμής (HVL);",
            options: ["Το πάχος του δέρματος του ασθενούς που μειώνει την ακτινοβολία στο μισό", "Το πάχος αλουμινίου που απαιτείται για να μειωθεί η ένταση της δέσμης στο μισό", "Ο χρόνος που χρειάζεται η λυχνία για να παράγει τη μισή ακτινοβολία", "Η απόσταση από την εστία μέχρι το φιλμ"],
            correct: 1,
            exp: "Το πάχος ημίσειας τιμής (HVL) είναι το πάχος του απορροφητικού υλικού (συνήθως αλουμινίου) που απαιτείται για να μειωθεί στο μισό η ένταση των φωτονίων."
        },
        {
            q: "Τι σημαίνει πρακτικά ο όρος 'Σκλήρυνση της Δέσμης' κατά τη διέλευσή της από την ύλη;",
            options: ["Η δέσμη αποκτά μεγαλύτερη μάζα", "Η δέσμη απορροφά ηλεκτρόνια από τους ιστούς", "Τα επιφανειακά στρώματα απορροφούν τα φωτόνια χαμηλής ενέργειας, αυξάνοντας τη μέση ενέργεια της εναπομείνασας δέσμης", "Η δέσμη μετατρέπεται σε σωματιδιακή ακτινοβολία"],
            correct: 2,
            exp: "Επειδή η ακτινική δέσμη έχει διάφορες ενέργειες, τα χαμηλής ενέργειας φωτόνια απορροφώνται επιφανειακά. Η ένταση μειώνεται, αλλά η μέση ενέργεια αυξάνεται (σκλήρυνση)."
        },
        {
            q: "Σε τι είδους αλληλεπιδράσεις αναφέρεται ο ιοντισμός;",
            options: ["Μόνο στην απόσπαση νετρονίων", "Στην απόκτηση θετικού ή αρνητικού φορτίου λόγω απώλειας ή κέρδους ηλεκτρονίου", "Στη μετατροπή ενός ατόμου σε διαφορετικό χημικό στοιχείο", "Στην εκπομπή φωτός από φθορίζουσες ουσίες"],
            correct: 1,
            exp: "Ιοντισμός είναι η διαδικασία κατά την οποία ένα ουδέτερο άτομο αποκτά θετικό ή αρνητικό φορτίο (ζεύγος ιόντων) λόγω ηλεκτρονίου."
        },
        {
            q: "Ποια είναι η διαφορά μεταξύ ακτίνων-γ και ακτίνων-Χ;",
            options: ["Οι ακτίνες-γ έχουν μάζα, ενώ οι Χ δεν έχουν", "Οι ακτίνες-γ είναι σωματιδιακές, ενώ οι Χ είναι ηλεκτρομαγνητικές", "Είναι πανομοιότυπες εκτός από τον τρόπο προέλευσής τους", "Οι ακτίνες-Χ διεισδύουν περισσότερο από τις γ"],
            correct: 2,
            exp: "Το κείμενο αναφέρει ξεκάθαρα: 'Οι ακτίνες-γ είναι πανομοιότυπες εκτός από τον τρόπο προέλευσής τους' (οι γ από πυρήνες ραδιενεργών ατόμων)."
        },
        {
            q: "Ποια από τις παρακάτω ΔΕΝ είναι ιδιότητα των ακτίνων-Χ;",
            options: ["Είναι αόρατες και άοσμες", "Μπορούν να εστιαστούν σε σημείο χρησιμοποιώντας φακούς", "Ταξιδεύουν σε ευθεία γραμμή", "Προκαλούν φθορισμό σε κάποιες ουσίες"],
            correct: 1,
            exp: "Στη λίστα με τις ιδιότητες των ακτίνων-Χ δεν αναφέρεται ικανότητα εστίασης με φακούς (σε αντίθεση με το ορατό φως). Ταξιδεύουν σε ευθεία, είναι αόρατες και προκαλούν φθορισμό."
        },
        {
            q: "Ποιος είναι ο ρόλος των νετρονίων στον πυρήνα του ατόμου σχετικά με τις δυνάμεις;",
            options: ["Απωθούν τα πρωτόνια", "Έχουν σημασία στην πυρηνική φυσική διότι δεν υφίστανται δυνάμεις απώθησης κατά την είσοδό τους", "Διατηρούν τα ηλεκτρόνια στην τροχιά τους", "Παράγουν τις ακτίνες-Χ κατά την πρόσκρουση"],
            correct: 1,
            exp: "Τα νετρόνια δεν έχουν ηλεκτρικό φορτίο και είναι σημαντικά διότι διεισδύουν στον πυρήνα χωρίς να υπόκεινται σε τεράστιες δυνάμεις απώθησης."
        },
        {
            q: "Στο Φωτοηλεκτρικό Φαινόμενο, αφού το εσωτερικό ηλεκτρόνιο εκδιωχθεί, τι συμβαίνει στο άτομο;",
            options: ["Παραμένει μόνιμα ιοντισμένο χωρίς καμία άλλη διεργασία", "Το άτομο καταστρέφεται εντελώς", "Ένα ηλεκτρόνιο επόμενης στοιβάδας αντικαθιστά το κενό εκπέμποντας χαρακτηριστική ακτινοβολία", "Ο πυρήνας εκπέμπει ένα σωματίδιο-α"],
            correct: 2,
            exp: "Η απώλεια αυτού του ηλεκτρονίου αντικαθίσταται από ηλεκτρόνιο της επόμενης στοιβάδας με την εκπομπή χαρακτηριστικής ακτινοβολίας."
        },
        {
            q: "Όταν αυξάνεται το HVL μιας δέσμης ακτίνων-Χ, αυτό σημαίνει ότι:",
            options: ["Η δέσμη έγινε πιο 'μαλακή' (λιγότερο διεισδυτική)", "Η δέσμη έγινε πιο 'σκληρή' (περισσότερο διεισδυτική)", "Το μηχάνημα παράγει περισσότερη θερμότητα", "Μειώθηκε η απόσταση εστίας-δέρματος"],
            correct: 1,
            exp: "Όσο αυξάνεται η μέση ενέργεια των φωτονίων της ακτινικής δέσμης (άρα και η διεισδυτικότητά της), τόσο αυξάνεται και το πάχος του υλικού που απαιτείται για να τη μειώσει στο μισό (HVL)."
        },
        {
            q: "Πώς επηρεάζει η πυκνότητα των ηλεκτρονίων ενός υλικού τη σκέδαση Compton;",
            options: ["Δεν την επηρεάζει καθόλου", "Η πιθανότητα σκέδασης Compton είναι ανάλογη άμεσα με την πυκνότητα ηλεκτρονίων του υλικού", "Η πιθανότητα μειώνεται όσο αυξάνεται η πυκνότητα", "Εξαρτάται μόνο από τη θερμοκρασία του υλικού"],
            correct: 1,
            exp: "Το κείμενο αναφέρει: 'Η πιθανότητα της αλληλεπίδρασης Compton είναι ανάλογη άμεσα με την πυκνότητα ηλεκτρονίων στον ιστό/υλικό'."
        },
        {
            q: "Τα σωματίδια-α έχουν μεγάλη ή μικρή διεισδυτική ικανότητα και γιατί;",
            options: ["Μεγάλη, γιατί δεν έχουν μάζα", "Μεγάλη, γιατί κινούνται με την ταχύτητα του φωτός", "Μικρή, γιατί είναι βαρέα και δίνουν την ενέργειά τους σε μικρή απόσταση", "Μικρή, γιατί είναι ηλεκτρικά ουδέτερα"],
            correct: 2,
            exp: "Τα σωματίδια-α εκπέμπονται από βαρύ πυρήνα, έχουν μικρή διεισδυτική ικανότητα, δίνουν την ενέργειά τους σε μικρή απόσταση (5 cm αέρα, 100 μm σε ιστό) διότι είναι βαριά σωματίδια."
        }
    ];

    const quizContainer = document.getElementById('quiz-container');

    // Δημιουργία του HTML για κάθε ερώτηση δυναμικά
    questions.forEach((q, index) => {
        const questionHTML = `
            <div class="question-card" id="q-card-${index}">
                <div class="question-title">${index + 1}. ${q.q}</div>
                <ul class="options-list">
                    ${q.options.map((opt, optIndex) => `
                        <li class="option-item">
                            <label class="option-label" id="label-${index}-${optIndex}">
                                <input type="radio" class="option-input" name="q${index}" value="${optIndex}">
                                <span>${opt}</span>
                            </label>
                        </li>
                    `).join('')}
                </ul>
                <div class="explanation" id="exp-${index}">
                    <strong>Αιτιολόγηση:</strong> ${q.exp}
                </div>
            </div>
        `;
        quizContainer.innerHTML += questionHTML;
    });

    function evaluateQuiz() {
        let score = 0;
        
        questions.forEach((q, index) => {
            const selectedOption = document.querySelector(`input[name="q${index}"]:checked`);
            const explanationBlock = document.getElementById(`exp-${index}`);
            const correctLabel = document.getElementById(`label-${index}-${q.correct}`);
            
            // Αφαίρεση προηγούμενων κλάσεων
            q.options.forEach((_, optIndex) => {
                document.getElementById(`label-${index}-${optIndex}`).classList.remove('correct-answer', 'incorrect-answer');
            });

            if (selectedOption) {
                const selectedValue = parseInt(selectedOption.value);
                const selectedLabel = document.getElementById(`label-${index}-${selectedValue}`);

                if (selectedValue === q.correct) {
                    score++;
                    selectedLabel.classList.add('correct-answer');
                } else {
                    selectedLabel.classList.add('incorrect-answer');
                    correctLabel.classList.add('correct-answer'); // Δείχνουμε το σωστό
                }
            } else {
                // Αν δεν απαντηθεί, απλώς δείχνουμε το σωστό
                correctLabel.classList.add('correct-answer');
            }
            
            // Εμφάνιση επεξήγησης
            explanationBlock.style.display = "block";
        });

        // Εμφάνιση βαθμολογίας
        const resultsDiv = document.getElementById('results');
        const percentage = ((score / questions.length) * 100).toFixed(1);
        resultsDiv.innerHTML = `Τελική Βαθμολογία: ${score} / ${questions.length} (${percentage}%)`;
        resultsDiv.style.display = "block";

        // Scroll στα αποτελέσματα
        resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
