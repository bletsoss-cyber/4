<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κλινική Εμβρυολογία & Τερατολογία: Εξαντλητική Αξιολόγηση</title>
    <style>
        :root {
            --primary-dark: #1e293b;
            --accent-blue: #3b82f6;
            --correct-green: #22c55e;
            --wrong-red: #ef4444;
            --bg-gray: #f8fafc;
            --text-main: #334155;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--primary-dark);
            font-size: 2.2rem;
            margin: 0;
        }

        .quiz-info {
            color: #64748b;
            margin-top: 10px;
            font-style: italic;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        .question-header {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .options-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: #fff;
            border: 1px solid #cbd5e1;
            padding: 15px 20px;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .option-btn:hover:not(:disabled) {
            background-color: #f1f5f9;
            border-color: var(--accent-blue);
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--correct-green) !important;
            color: #166534 !important;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: var(--wrong-red) !important;
            color: #991b1b !important;
        }

        .feedback-box {
            margin-top: 20px;
            padding: 20px;
            background-color: #f0f7ff;
            border-left: 5px solid var(--accent-blue);
            border-radius: 4px;
            display: none;
            font-size: 0.95rem;
        }

        .feedback-header {
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 8px;
            display: block;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* CSS Rule to strictly hide all citations from the user */
        .hide-cite { display: none !important; }
    </style>
</head>

    function loadQuiz() {
        const quizContainer = document.getElementById('quiz-content');
        
        questions.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q${index}`;

            const qHeader = document.createElement('div');
            qHeader.className = 'question-header';
            qHeader.innerHTML = `<span>${index + 1}.</span> <span>${item.q}</span>`;
            card.appendChild(qHeader);

            const optionsGrid = document.createElement('div');
            optionsGrid.className = 'options-list';

            item.options.forEach((opt, optIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(index, optIndex, item.correct, item.feedback);
                optionsGrid.appendChild(btn);
            });

            card.appendChild(optionsGrid);

            const feedback = document.createElement('div');
            feedback.className = 'feedback-box';
            feedback.id = `fb${index}`;
            card.appendChild(feedback);

            quizContainer.appendChild(card);
        });
    }

    function checkAnswer(qIndex, selected, correct, feedbackText) {
        const card = document.getElementById(`q${qIndex}`);
        const buttons = card.querySelectorAll('.option-btn');
        const feedbackBox = document.getElementById(`fb${qIndex}`);

        buttons.forEach((btn, index) => {
            btn.disabled = true;
            if (index === correct) {
                btn.classList.add('correct');
            } else if (index === selected) {
                btn.classList.add('wrong');
            }
        });

        feedbackBox.innerHTML = `<span class="feedback-header">Ακαδημαϊκή Τεκμηρίωση:</span> ${feedbackText}`;
        feedbackBox.style.display = 'block';
    }

    window.onload = loadQuiz;
</script>
