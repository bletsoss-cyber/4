<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κλινική Ακτινοπροστασία - Advanced Quiz</title>
    <style>
        :root {
            --primary: #2b5797;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
            --correct-bg: #d4edda;
            --correct-border: #c3e6cb;
            --correct-text: #155724;
            --wrong-bg: #f8d7da;
            --wrong-border: #f5c6cb;
            --wrong-text: #721c24;
            --explain-bg: #e2e8f0;
            --explain-border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            margin: 0;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        .quiz-container {
            max-width: 850px;
            margin: 0 auto;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }

        .question-card:hover {
            transform: translateY(-2px);
        }

        .question-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            font-family: inherit;
        }

        .option-btn:hover:not(:disabled) {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 600;
        }

        .option-btn.wrong {
            background: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: var(--wrong-text);
        }

        .explanation {
            margin-top: 20px;
            padding: 18px;
            background: var(--explain-bg);
            border-left: 5px solid var(--primary);
            border-radius: 0 8px 8px 0;
            display: none;
            font-size: 0.95rem;
            animation: fadeIn 0.4s ease;
        }

        .explanation.show {
            display: block;
        }

        .explanation strong {
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 5px;
            background: #ddd;
            z-index: 100;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

    <div class="header">
        <h1>Κλινική Ακτινοπροστασία: Active Recall</h1>
        <p>Απάντησε για να δεις την άμεση ανατροφοδότηση και την επιστημονική εξήγηση.</p>
    </div>

    <div class="quiz-container" id="quizContainer">
        </div>

    <script>
        const quizData = [
            {
                q: "Σύμφωνα με το γραμμικό πρότυπο χωρίς κατώφλι (LNT) που επικρατεί στην ακτινοπροστασία, ποια είναι η βασική παραδοχή για τις χαμηλές δόσεις ακτινοβολίας;",
                options: [
                    "Οι βιολογικές βλάβες στις χαμηλές δόσεις είναι άμεσα μετρήσιμες και ανάλογες του χρόνου έκθεσης.",
                    "Κάθε δόση ακτινοβολίας, οσοδήποτε μικρή, ενέχει πιθανότητα πρόκλησης καρκίνου ανάλογη του μεγέθους της δόσης.",
                    "Υπάρχει ένα συγκεκριμένο όριο κάτω από το οποίο η ακτινοβολία είναι απολύτως ασφαλής και δεν προκαλεί στοχαστικά αποτελέσματα.",
                    "Η εκτίμηση της πιθανότητας καρκίνου στις χαμηλές δόσεις είναι απόλυτα βέβαιη χάρη στις σύγχρονες επιδημιολογικές μελέτες."
                ],
                correct: 1,
                explanation: "Το LNT μοντέλο (Linear Non-Threshold) θεωρεί πως δεν υπάρχει δόση-κατώφλι. Κάθε δόση ενέχει θεωρητική πιθανότητα πρόκλησης καρκίνου ανάλογη της δόσης. Οι επιδημιολογικές μελέτες αδυνατούν να την αποδείξουν με βεβαιότητα (παραμένει θεωρητική εκτίμηση), ενώ οι βλάβες σε χαμηλές δόσεις ΔΕΝ μπορούν να μετρηθούν (εξ ου και η θεωρητική αναγωγή)."
            },
            {
                q: "Ποια από τις παρακάτω πηγές ευθύνεται για το μεγαλύτερο ποσοστό της συνολικής έκθεσης του γενικού πληθυσμού σε ακτινοβολία παγκοσμίως;",
                options: [
                    "Η ιατρική έκθεση (κυρίως λόγω αξονικών τομογραφιών).",
                    "Η επίγεια ακτινοβολία από ραδιενεργά νουκλίδια στο έδαφος.",
                    "Το ραδόνιο, ως προϊόν διάσπασης του ουρανίου.",
                    "Η κοσμική ακτινοβολία που προέρχεται από τον ήλιο και το διάστημα."
                ],
                correct: 2,
                explanation: "Το ραδόνιο ευθύνεται για περίπου το 52% της συνολικής παγκόσμιας έκθεσης (ή το 50% της φυσικής). Η ιατρική έκθεση αυξάνεται (κυρίως CT), αλλά το ραδόνιο παραμένει η κυρίαρχη πηγή συνολικά, προκαλώντας καρκίνο του πνεύμονα μετά το κάπνισμα."
            },
            {
                q: "Η Αρχή της Αιτιολόγησης στην οδοντιατρική ακτινολογία υπαγορεύει ότι:",
                options: [
                    "Κάθε λήψη πρέπει να πραγματοποιείται με τη βέλτιστη τεχνική (π.χ. ορθογώνιο κατευθυντήρα) για τη μείωση της δόσης.",
                    "Οι ακτινογραφίες ρουτίνας σε καθορισμένα χρονικά διαστήματα επιτρέπονται αν ο ασθενής ανήκει σε ομάδα υψηλού κινδύνου.",
                    "Πρέπει να τηρούνται τα αυστηρά όρια δόσεων (π.χ. 20 mSv/έτος) για τους επαγγελματίες υγείας.",
                    "Δεν επιτρέπεται η λήψη ακτινογραφημάτων χωρίς προηγούμενη λήψη ιστορικού και κλινική εξέταση, απορρίπτοντας τις λήψεις 'ρουτίνας'."
                ],
                correct: 3,
                explanation: "Η Αρχή της Αιτιολόγησης απαγορεύει τις ακτινογραφίες 'ρουτίνας' χωρίς αιτία. Πρέπει ΠΑΝΤΑ να προηγείται κλινική εξέταση και λήψη ιστορικού. Η βελτιστοποίηση της τεχνικής (ALARA) ανήκει στην Αρχή της Βελτιστοποίησης, όχι της Αιτιολόγησης."
            },
            {
                q: "Σύμφωνα με την ICRP, ποιο είναι το όριο της ετήσιας ενεργού δόσης για τους επαγγελματικά εκτιθέμενους (π.χ. οδοντιάτρους);",
                options: [
                    "1 mSv / ανά έτος.",
                    "20 mSv / έτος (σταθμισμένη σε περίοδο 5 ετών).",
                    "50 mSv / έτος για όλους τους ιστούς εξίσου.",
                    "150 mSv / έτος, με εξαίρεση τους φακούς των ματιών."
                ],
                correct: 1,
                explanation: "Για τους επαγγελματίες το όριο της ετήσιας ενεργού δόσης είναι 20 mSv/έτος (σταθμισμένο σε 5ετία). Το 1 mSv/έτος αφορά τον γενικό πληθυσμό. Τα 150 mSv αφορούν τους φακούς των ματιών των επαγγελματιών (ειδικό όριο, όχι όριο ενεργού δόσης) και τα 500 mSv τα άκρα/επιδερμίδα."
            },
            {
                q: "Ποια είναι η επίδραση της αλλαγής της απόστασης πηγής-δέρματος (μήκος κατευθυντήρα) από τα 20 cm στα 40 cm;",
                options: [
                    "Η δόση στον ασθενή αυξάνεται επειδή απαιτείται μεγαλύτερος χρόνος έκθεσης για να φτάσει η δέσμη στο φιλμ.",
                    "Η έκθεση μειώνεται κατά 10-25% διότι ο μικρότερος όγκος της δέσμης λόγω μικρότερης απόκλισης, ακτινοβολεί λιγότερους ιστούς.",
                    "Δεν υπάρχει ουσιαστική διαφορά στη δόση, αρκεί να χρησιμοποιείται ορθογώνιο διάφραγμα.",
                    "Η ποιότητα της εικόνας υποβαθμίζεται σημαντικά λόγω του φαινομένου penumbra."
                ],
                correct: 1,
                explanation: "Στα 40 cm η δέσμη είναι λιγότερο αποκλίνουσα όταν φτάνει στον ασθενή. Παρόλο που πρέπει να αυξηθεί ο χρόνος (λόγω του νόμου του αντιστρόφου τετραγώνου), η συνολική δόση στους ιστούς ΜΕΙΩΝΕΤΑΙ (10-25%) επειδή ακτινοβολείται μικρότερος όγκος (λιγότερο 'άνοιγμα' της δέσμης). Επίσης η ποιότητα εικόνας ΒΕΛΤΙΩΝΕΤΑΙ (μεγαλύτερη ευκρίνεια)."
            },
            {
                q: "Σε σύγκριση με τον κυκλικό κατευθυντήρα (διαμέτρου 7 cm), ο ορθογώνιος κατευθυντήρας:",
                options: [
                    "Είναι λιγότερο αποτελεσματικός στη μείωση της ενεργού δόσης διότι συγκεντρώνει τη δέσμη σε μικρότερη επιφάνεια.",
                    "Μειώνει τη δόση ακτινοβολίας μέχρι και 50% και τον ακτινοβολούμενο όγκο των ιστών τουλάχιστον πέντε φορές.",
                    "Πρέπει να χρησιμοποιείται αποκλειστικά με ενδοστοματικά φιλμ ταχύτητας D για την αποφυγή 'cone-cut'.",
                    "Μειώνει την ευκρίνεια της εικόνας λόγω αυξημένης σκέδασης στα άκρα του ορθογωνίου."
                ],
                correct: 1,
                explanation: "Ο ορθογώνιος κατευθυντήρας περιορίζει δραστικά το μέγεθος της δέσμης ακριβώς στο μέγεθος του φιλμ. Μειώνει την περιοχή απεικόνισης, άρα τον όγκο ιστών (τουλάχιστον 5 φορές) και τη μη απαραίτητη έκθεση (έως 50%)."
            },
            {
                q: "Ποιος είναι ο πρωταρχικός ρόλος του φίλτρου αλουμινίου στο ακτινογραφικό μηχάνημα;",
                options: [
                    "Να απορροφά τα φωτόνια υψηλής ενέργειας για να αυξήσει την αντίθεση της εικόνας (contrast).",
                    "Να επιβραδύνει τα ηλεκτρόνια πριν χτυπήσουν την άνοδο του βολφραμίου.",
                    "Να απομακρύνει τα φωτόνια χαμηλής ενέργειας, τα οποία συμβάλλουν μόνο στη δόση του δέρματος και όχι στη διαγνωστική πληροφορία.",
                    "Να εστιάζει τη δέσμη των ακτίνων-Χ, αποτρέποντας την ανεπιθύμητη απόκλιση."
                ],
                correct: 2,
                explanation: "Τα φωτόνια χαμηλής ενέργειας (μεγάλο μήκος κύματος) δεν έχουν αρκετή διαπεραστική ικανότητα για να φτάσουν στο φιλμ/δέκτη. Απορροφώνται στους επιφανειακούς ιστούς του ασθενή, αυξάνοντας τη δόση χωρίς να προσφέρουν πληροφορία. Το φίλτρο Al τα απομακρύνει (hardening of the beam)."
            },
            {
                q: "Πόσο πρέπει να είναι το ελάχιστο ολικό φίλτρο για οδοντιατρικά μηχανήματα που λειτουργούν σε kVp υψηλότερα του 70;",
                options: [
                    "1.5 mm Al",
                    "2.0 mm Al",
                    "2.5 - 3 mm Al",
                    "Εξαρτάται αποκλειστικά από τον χρόνο έκθεσης (mAs)"
                ],
                correct: 2,
                explanation: "Οι διεθνείς οργανισμοί συστήνουν: Για kVp μέχρι 70, τουλάχιστον 1.5 mm Al. Για kVp > 70, συστήνεται ολικό φίλτρο 2.5-3 mm Al."
            },
            {
                q: "Όσον αφορά τις μολύβδινες ποδιές προστασίας στην οδοντιατρική ακτινογραφία, οι σύγχρονες οδηγίες (NCRP, ADA) συμπεραίνουν ότι:",
                options: [
                    "Είναι απόλυτα απαραίτητες σε κάθε ασθενή για την προστασία των γονάδων, διότι οι δόσεις στην περιοχή είναι υψηλές.",
                    "Δεν είναι απαραίτητες εφόσον τηρούνται όλες οι σύγχρονες τεχνικές, διότι οι δόσεις στις γονάδες είναι αμελητέες (αν και η χρήση τους μειώνει την εξασθένηση της δέσμης κατά 98%).",
                    "Πρέπει να αντικατασταθούν αποκλειστικά από κολάρα θυρεοειδούς σε όλους τους ενήλικες ασθενείς.",
                    "Απαιτούνται μόνο όταν χρησιμοποιούνται μηχανήματα εναλλασσόμενου ρεύματος (AC)."
                ],
                correct: 1,
                explanation: "Οι σύγχρονες οδηγίες αναφέρουν ότι ΔΕΝ είναι πλέον απαραίτητες (ειδικά με χρήση ψηφιακών, ορθογώνιων κατευθυντήρων κλπ) επειδή η πρωτεύουσα δέσμη δεν κατευθύνεται στις γονάδες και η σκεδαζόμενη δόση εκεί είναι αμελητέα. Παρόλα αυτά, η χρήση τους (ειδικά υλικών χωρίς μόλυβδο πλέον) προσφέρει μια μείωση της τάξης του 98% στη δέσμη που φτάνει εκεί."
            },
            {
                q: "Ποια είναι η συμβολή της χρήσης σύγχρονων ενισχυτικών πινακίδων από σπάνιες γαίες (π.χ. γαδολίνιο) στην εξωστοματική ακτινογραφία;",
                options: [
                    "Εκπέμπουν μπλε φως και προσφέρουν ελάχιστη μείωση δόσης σε σχέση με το βολφραμικό ασβέστιο.",
                    "Εκπέμπουν πράσινο φως, μειώνοντας την έκθεση στον ασθενή κατά 55% σε σχέση με τις παλαιότερες πινακίδες βολφραμικού ασβεστίου.",
                    "Αυξάνουν την ανάγκη για υψηλότερα mAs, βελτιώνοντας όμως δραματικά την ανάλυση της πανοραμικής.",
                    "Αντικαθιστούν πλήρως τους ψηφιακούς αισθητήρες λόγω χαμηλότερου κόστους."
                ],
                correct: 1,
                explanation: "Οι σπάνιες γαίες εκπέμπουν πράσινο φως (σε αντίθεση με τις παλιές που εξέπεμπαν μπλε) και είναι πολύ πιο αποδοτικές, επιτυγχάνοντας μείωση της δόσης κατά 55% στην πανοραμική και κεφαλομετρική."
            },
            {
                q: "Πώς επηρεάζει το υψηλότερο kVp (π.χ. αύξηση από 70 σε 90) την έκθεση του ασθενή;",
                options: [
                    "Αυξάνει την απορροφούμενη δόση, διότι τα φωτόνια γίνονται πιο καταστροφικά για τους ιστούς.",
                    "Δεν επηρεάζει την ενεργό δόση, επηρεάζει μόνο την αντίθεση (contrast) της εικόνας.",
                    "Μειώνει την ενεργό δόση κατά 23-25%, διότι τα φωτόνια υψηλότερης ενέργειας διαπερνούν τους ιστούς χωρίς να απορροφώνται σε μεγάλο βαθμό.",
                    "Απαιτεί την αφαίρεση του φίλτρου αλουμινίου για να διατηρηθεί η ποιότητα της εικόνας."
                ],
                correct: 2,
                explanation: "Πολύ συχνή παγίδα. Η αύξηση των kVp σημαίνει μεγαλύτερη διαπεραστικότητα της δέσμης. Επομένως, περισσότερα φωτόνια περνούν μέσα από τον ασθενή και φτάνουν στο φιλμ, αντί να απορροφηθούν στο δέρμα του. Αυτό μειώνει την ενεργό δόση (κατά 23-25%)."
            },
            {
                q: "Τι προσφέρει η χρήση μηχανημάτων συνεχούς δυναμικού (DC / σταθερών kVp) σε σχέση με το εναλλασσόμενο (AC);",
                options: [
                    "Επιτυγχάνει μείωση των επιπτώσεων ακτινοβολίας στον ασθενή διότι εξαλείφει τις φάσεις χαμηλής ενέργειας της δέσμης.",
                    "Παράγει αποκλειστικά φωτόνια χαμηλής ενέργειας που βελτιώνουν το contrast των μαλακών ιστών.",
                    "Αυξάνει τον απαραίτητο χρόνο έκθεσης, γι' αυτό χρησιμοποιείται σπάνια στη σύγχρονη οδοντιατρική.",
                    "Καταργεί την ανάγκη χρήσης ορθογώνιου κατευθυντήρα."
                ],
                correct: 0,
                explanation: "Τα μηχανήματα AC παράγουν ακτινοβολία κατά 'κύματα', δημιουργώντας πολλά φωτόνια χαμηλής ενέργειας (poules) κατά την πτώση της τάσης. Το DC διατηρεί σταθερή την τάση, παράγοντας μια πιο ομοιογενή δέσμη υψηλότερης ενέργειας, άρα λιγότερη απορροφούμενη δόση."
            },
            {
                q: "Ο οδοντίατρος (χειριστής) πρέπει να στέκεται κατά τη διάρκεια της λήψης:",
                options: [
                    "Ακριβώς πίσω από τον κατευθυντήρα, ώστε η δέσμη να τον προσπερνά.",
                    "Σε απόσταση τουλάχιστον 2 μέτρων από τον ασθενή και σε γωνία 90-135 μοιρών από την κεντρική ακτίνα της δέσμης.",
                    "Σε γωνία 0-45 μοιρών ως προς την πρωτεύουσα δέσμη για να ελέγχει τον ασθενή.",
                    "Μέσα στο δωμάτιο, αρκεί να φοράει διπλή μολύβδινη ποδιά, ανεξαρτήτως γωνίας."
                ],
                correct: 1,
                explanation: "Ο χρυσός κανόνας θέσης και απόστασης: ≥ 2 μέτρα μακριά, εκτός της πρωτεύουσας δέσμης, ιδανικά σε γωνία 90°-135°. Εκεί η σκεδαζόμενη ακτινοβολία απορροφάται σε μεγάλο βαθμό από το ίδιο το κεφάλι του ασθενή πριν φτάσει στον χειριστή."
            },
            {
                q: "Γιατί η λανθασμένη διαδικασία εμφάνισης (στο χημικό θάλαμο) αποτελεί σημαντικό πρόβλημα ακτινοπροστασίας;",
                options: [
                    "Διότι τα χημικά αναδίδουν ραδιενεργά αέρια που προκαλούν εσωτερική έκθεση.",
                    "Διότι αναγκάζει τους οδοντιάτρους να καταργήσουν τις ποδιές μολύβδου.",
                    "Επειδή η κακή εμφάνιση οδηγεί σε επαναλήψεις, κάτι που διπλασιάζει άσκοπα τη δόση στον ασθενή (περίπου 30% των φιλμ επαναλαμβάνονται για αυτό το λόγο).",
                    "Διότι απαιτεί τη μείωση των kVp στο μηχάνημα για να αντισταθμιστεί η διαφορά."
                ],
                correct: 2,
                explanation: "Οι επαναλήψεις (retakes) είναι η #1 αιτία αδικαιολόγητης έξτρα δόσης. Η ελαττωματική εμφάνιση (π.χ. εξαντλημένα υγρά) κάνει την εικόνα 'αδύναμη', και συχνά ο οδοντίατρος αυξάνει λανθασμένα τον χρόνο έκθεσης αντί να αλλάξει τα υγρά!"
            },
            {
                q: "Σύμφωνα με τους κανονισμούς, η έκθεση σε ακτινοβολία στους διπλανούς χώρους (εκτός του ακτινολογικού θαλάμου) δεν πρέπει να υπερβαίνει:",
                options: [
                    "Τα 100 mGy την εβδομάδα.",
                    "Τα 100 μGy (microGray) την εβδομάδα.",
                    "Το 1 mSv την ημέρα.",

        let currentActiveBtn = null;

        function renderQuiz() {
            const container = document.getElementById('quizContainer');
            
            quizData.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-card-${index}`;

                const title = document.createElement('h3');
                title.className = 'question-title';
                title.textContent = `${index + 1}. ${q.q}`;
                card.appendChild(title);

                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';

                const explanationDiv = document.createElement('div');
                explanationDiv.className = 'explanation';
                explanationDiv.innerHTML = `<strong>Επεξήγηση:</strong> ${q.explanation}`;

                let answered = false;

                q.options.forEach((optText, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = optText;

                    btn.onclick = () => {
                        if(answered) return;
                        answered = true;
                        
                        const buttons = optionsGrid.querySelectorAll('.option-btn');
                        buttons.forEach((b, i) => {
                            b.disabled = true;
                            if(i === q.correct) {
                                b.classList.add('correct');
                            }
                        });

                        if(optIndex !== q.correct) {
                            btn.classList.add('wrong');
                        }

                        explanationDiv.classList.add('show');
                        updateProgress();
                    };

                    optionsGrid.appendChild(btn);
                });

                card.appendChild(optionsGrid);
                card.appendChild(explanationDiv);
                container.appendChild(card);
            });
        }

        function updateProgress() {
            const total = quizData.length;
            const answered = document.querySelectorAll('.explanation.show').length;
            const percentage = (answered / total) * 100;
            document.getElementById('progressBar').style.width = percentage + '%';
        }

        // Initialize
        renderQuiz();

    </script>
