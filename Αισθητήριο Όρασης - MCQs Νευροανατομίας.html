<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Αισθητήριο Όρασης - MCQs Νευροανατομίας</title>
  <style>
    :root {
      --bg: #f4f7f8;
      --surface: #ffffff;
      --ink: #172126;
      --muted: #62727d;
      --line: #d7e0e5;
      --primary: #1f6f78;
      --primary-dark: #15545b;
      --accent: #8a5d2f;
      --good: #1f7a4d;
      --good-bg: #e6f4ec;
      --bad: #b13b3b;
      --bad-bg: #f8e8e8;
      --warn-bg: #fff7dc;
      --shadow: 0 18px 45px rgba(23, 33, 38, 0.09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }

    header {
      background: #12343a;
      color: #fff;
      padding: 22px 18px;
      border-bottom: 5px solid #d9a85c;
    }

    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.25rem);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: #d7e7ea;
      font-size: 0.98rem;
    }

    main {
      padding: 22px 0 38px;
    }

    .panel, .quiz-card, .results {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 18px;
      margin-bottom: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 240px) minmax(220px, 1fr) repeat(2, auto);
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
    }

    select, input[type="search"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    .checkrow {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 14px;
    }

    .checkrow label {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin: 0;
      font-weight: 650;
      color: var(--ink);
      cursor: pointer;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      min-height: 42px;
    }

    button:hover { background: var(--primary-dark); }
    button.secondary { background: #e9eff2; color: var(--ink); }
    button.secondary:hover { background: #dce6ea; }
    button.warning { background: var(--accent); }
    button.warning:hover { background: #70491f; }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .statsbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: #edf4f5;
      border: 1px solid #d7e5e8;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .stat strong {
      font-size: 1rem;
    }

    .progress-shell {
      height: 10px;
      background: #dce7ea;
      border-radius: 999px;
      overflow: hidden;
      margin: 0 0 16px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #1f6f78, #d9a85c);
      transition: width 180ms ease;
    }

    .quiz-card {
      padding: clamp(16px, 3vw, 26px);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .question {
      font-size: clamp(1.08rem, 2.4vw, 1.45rem);
      font-weight: 760;
      margin: 0 0 18px;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      font-weight: 600;
    }

    .option:hover {
      background: #f4fafb;
      border-color: #9fc6cc;
    }

    .option.correct {
      background: var(--good-bg);
      border-color: var(--good);
      color: #0d4f30;
    }

    .option.wrong {
      background: var(--bad-bg);
      border-color: var(--bad);
      color: #7b2323;
    }

    .key {
      font-weight: 850;
      color: var(--primary);
    }

    .feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fbfc;
      display: none;
    }

    .feedback.good {
      display: block;
      border-color: var(--good);
      background: var(--good-bg);
    }

    .feedback.bad {
      display: block;
      border-color: var(--bad);
      background: var(--bad-bg);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.94rem;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .results {
      padding: clamp(16px, 3vw, 26px);
      display: none;
    }

    .review-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .review-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdfe;
    }

    .notice {
      background: var(--warn-bg);
      border: 1px solid #ecd388;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .print-only { display: none; }

    @media (max-width: 820px) {
      .controls, .statsbar {
        grid-template-columns: 1fr;
      }
      .topline {
        align-items: flex-start;
      }
      .option {
        grid-template-columns: 28px 1fr;
      }
    }

    @media print {
      body {
        background: #fff;
        color: #000;
        font-size: 11pt;
      }
      header, .panel, .statsbar, .progress-shell, .quiz-card, .results, .no-print {
        display: none !important;
      }
      .wrap {
        width: 100%;
        margin: 0;
      }
      .print-only {
        display: block;
      }
      .print-question {
        break-inside: avoid;
        border-bottom: 1px solid #bbb;
        padding: 0 0 10px;
        margin: 0 0 12px;
      }
      .print-question h3 {
        margin: 0 0 6px;
        font-size: 12pt;
      }
      .print-question ol {
        margin: 4px 0 0 22px;
        padding: 0;
      }
      .answer-key {
        break-before: page;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topline">
      <div>
        <h1>Αισθητήριο Όρασης - MCQs Νευροανατομίας</h1>
        <p class="subtitle">Δύσκολες ερωτήσεις Ανατομίας βασισμένες στις διαφάνειες του PDF.</p>
      </div>
      <button class="warning no-print" id="printBtn" type="button">Εκτύπωση</button>
    </div>
  </header>

  <main class="wrap">
    <section class="panel no-print">
      <div class="controls">
        <div>
          <label for="categoryFilter">Κατηγορία</label>
          <select id="categoryFilter"></select>
        </div>
        <div>
          <label for="searchBox">Αναζήτηση</label>
          <input id="searchBox" type="search" placeholder="π.χ. ακτινωτό, Schlemm, θηλή">
        </div>
        <button id="applyBtn" type="button">Έναρξη</button>
        <button id="resetBtn" type="button" class="secondary">Επανεκκίνηση</button>
      </div>
      <div class="checkrow">
        <label><input id="shuffleQuestions" type="checkbox" checked> Ανακάτεμα ερωτήσεων</label>
        <label><input id="shuffleOptions" type="checkbox" checked> Ανακάτεμα απαντήσεων</label>
        <button id="clearProgressBtn" class="secondary" type="button">Καθαρισμός προόδου</button>
      </div>
      <div id="distribution"></div>
    </section>

    <section class="statsbar no-print" aria-live="polite">
      <div class="stat"><span>Σκορ</span><strong id="scoreStat">0</strong></div>
      <div class="stat"><span>Πρόοδος</span><strong id="progressStat">0 / 0</strong></div>
      <div class="stat"><span>Ποσοστό</span><strong id="percentStat">0%</strong></div>
      <div class="stat"><span>Κατηγορία</span><strong id="categoryStat">-</strong></div>
    </section>

    <div class="progress-shell no-print"><div class="progress-fill" id="progressFill"></div></div>

    <section class="quiz-card no-print" id="quizCard">
      <div class="meta">
        <span id="sourceMeta"></span>
        <span id="idMeta"></span>
      </div>
      <p class="question" id="questionText">Πατήστε «Έναρξη» για να ξεκινήσει το quiz.</p>
      <div class="options" id="optionsBox"></div>
      <div class="feedback" id="feedbackBox"></div>
      <div class="actions">
        <button id="nextBtn" type="button" style="display:none;">Επόμενη ερώτηση</button>
      </div>
    </section>

    <section class="results no-print" id="resultsBox"></section>

    <section class="print-only" id="printArea"></section>
  </main>

          { key: "δ", text: "Καταφύεται στην κάτω έσω επιφάνεια του βολβού μπροστά από τον ισημερινό.", correct: true }
        ],
        explanation: "Ο άνω λοξός καταφύεται στην άνω έξω επιφάνεια του βολβού πίσω από τον ισημερινό. (Διαφ. 86)"
      },
      {
        id: 75,
        category: "Μύες οφθαλμικού κόγχου",
        source: "Διαφάνεια 87",
        question: "Ποια πρόταση για τον κάτω λοξό μυ είναι σωστή;",
        options: [
          { key: "α", text: "Εκφύεται πίσω από την έσω μοίρα του υποκόγχιου χείλους και φέρεται κάτω από τον κάτω ορθό.", correct: true },
          { key: "β", text: "Εκφύεται από το οπτικό τρήμα και γωνιώνεται στην τροχιλία.", correct: false },
          { key: "γ", text: "Καταφύεται στην έσω επιφάνεια του σκληρού μπροστά από τον ισημερινό.", correct: false },
          { key: "δ", text: "Νευρώνεται από το τροχιλιακό νεύρο και φέρει την κόρη προς τα κάτω.", correct: false }
        ],
        explanation: "Ο κάτω λοξός εκφύεται πίσω από την έσω μοίρα του υποκόγχιου χείλους, περνά κάτω από τον κάτω ορθό και νευρώνεται από III. (Διαφ. 87)"
      },
      {
        id: 76,
        category: "Μύες οφθαλμικού κόγχου",
        source: "Διαφάνειες 82, 86-88",
        question: "Ποια αντιστοιχία μυός-νεύρου δεν είναι σωστή;",
        options: [
          { key: "α", text: "Άνω λοξός - τροχιλιακό νεύρο.", correct: false },
          { key: "β", text: "Έξω ορθός - απαγωγό νεύρο.", correct: false },
          { key: "γ", text: "Κάτω λοξός - κοινό κινητικό νεύρο.", correct: false },
          { key: "δ", text: "Άνω λοξός - κοινό κινητικό νεύρο.", correct: true }
        ],
        explanation: "Η εξαίρεση είναι ο άνω λοξός, ο οποίος νευρώνεται από το τροχιλιακό νεύρο. (Διαφ. 82, 86)"
      },
      {
        id: 77,
        category: "Μύες οφθαλμικού κόγχου",
        source: "Διαφάνειες 86-88",
        question: "Ποια ενέργεια δεν αντιστοιχεί σωστά στον μυ;",
        options: [
          { key: "α", text: "Άνω λοξός - στροφή του βολβού προς τα κάτω και έξω.", correct: false },
          { key: "β", text: "Κάτω λοξός - ανάσπαση και απαγωγή.", correct: false },
          { key: "γ", text: "Έσω ορθός - στροφή προς τα έσω.", correct: false },
          { key: "δ", text: "Έξω ορθός - στροφή προς τα έσω.", correct: true }
        ],
        explanation: "Ο έξω ορθός προκαλεί στροφή προς τα έξω, όχι προς τα έσω. (Διαφ. 88)"
      },
      {
        id: 78,
        category: "Μύες οφθαλμικού κόγχου",
        source: "Διαφάνειες 86-88",
        question: "Ποια αντιστοιχία μυός-κίνησης είναι σωστή;",
        options: [
          { key: "α", text: "Κάτω ορθός - στροφή προς τα έσω και κάτω.", correct: true },
          { key: "β", text: "Άνω ορθός - στροφή προς τα έξω και κάτω.", correct: false },
          { key: "γ", text: "Κάτω λοξός - στροφή προς τα έσω και κάτω.", correct: false },
          { key: "δ", text: "Άνω λοξός - στροφή προς τα έσω και άνω.", correct: false }
        ],
        explanation: "Στο διάγραμμα ενεργειών ο κάτω ορθός στρέφει προς τα έσω και κάτω. (Διαφ. 88)"
      },
      {
        id: 79,
        category: "Διαθλαστικά μέσα και θάλαμοι",
        source: "Διαφάνειες 45-52",
        question: "Ποιο από τα παρακάτω δεν ανήκει στα διαθλαστικά μέσα όπως παρουσιάζονται;",
        options: [
          { key: "α", text: "Κρυσταλλοειδής φακός.", correct: false },
          { key: "β", text: "Θάλαμοι και υδατοειδές υγρό.", correct: false },
          { key: "γ", text: "Υαλοειδές σώμα.", correct: false },
          { key: "δ", text: "Περιοφθάλμια περιτονία του Tenon.", correct: true }
        ],
        explanation: "Η περιτονία Tenon είναι επικουρικό μόριο που περιβάλλει τον βολβό, όχι διαθλαστικό μέσο. (Διαφ. 45, 78)"
      },
      {
        id: 80,
        category: "Επιπεφυκότας",
        source: "Διαφάνειες 68-69",
        question: "Ποια σχέση του βολβικού επιπεφυκότα ή των θόλων είναι λανθασμένη;",
        options: [
          { key: "α", text: "Ο βολβικός επιπεφυκότας μεταπίπτει στο επιθήλιο της πρόσθιας επιφάνειας του κερατοειδή.", correct: false },
          { key: "β", text: "Γύρω από το χείλος του κερατοειδή περιέχει το επιχείλιο αγκυλωτό αγγειακό δίκτυο.", correct: false },
          { key: "γ", text: "Οι θόλοι είναι ανακάμψεις από την οπίσθια επιφάνεια των βλεφάρων στον βολβό.", correct: false },
          { key: "δ", text: "Κάθε θόλος συνάπτεται στενά και αμετακίνητα με τον σκληρό χιτώνα.", correct: true }
        ],
        explanation: "Οι θόλοι συνάπτονται χαλαρά με το υπόθεμα, διευκολύνοντας κινήσεις βολβού και βλεφάρων. (Διαφ. 69)"
      }
    ];

    const storageKey = "vision_mcq_progress_v1";
    let activeQuestions = [];
    let currentIndex = 0;
    let answers = {};
    let optionOrders = {};
    let repeatMode = false;

    const categoryFilter = document.getElementById("categoryFilter");
    const searchBox = document.getElementById("searchBox");
    const shuffleQuestionsBox = document.getElementById("shuffleQuestions");
    const shuffleOptionsBox = document.getElementById("shuffleOptions");
    const quizCard = document.getElementById("quizCard");
    const resultsBox = document.getElementById("resultsBox");
    const optionsBox = document.getElementById("optionsBox");
    const feedbackBox = document.getElementById("feedbackBox");
    const nextBtn = document.getElementById("nextBtn");

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function percent(part, total) {
      return total ? Math.round((part / total) * 100) : 0;
    }

    function getCorrectOption(q) {
      return q.options.find(o => o.correct);
    }

    function visibleText(q) {
      return [q.category, q.source, q.question, q.explanation, ...q.options.map(o => o.text)].join(" ").toLowerCase();
    }

    function makeFilteredQuestions() {
      const selected = categoryFilter.value;
      const query = searchBox.value.trim().toLowerCase();
      let list = questions.filter(q => selected === "all" || q.category === selected);
      if (query) list = list.filter(q => visibleText(q).includes(query));
      if (shuffleQuestionsBox.checked) list = shuffle(list);
      return list;
    }

    function buildOptionOrder(q) {
      const opts = shuffleOptionsBox.checked ? shuffle(q.options) : q.options.slice();
      optionOrders[q.id] = opts.map(o => o.key);
      return opts;
    }

    function orderedOptions(q) {
      const order = optionOrders[q.id];
      if (!order) return buildOptionOrder(q);
      return order.map(key => q.options.find(o => o.key === key)).filter(Boolean);
    }

    function saveProgress() {
      const payload = {
        activeIds: activeQuestions.map(q => q.id),
        currentIndex,
        answers,
        optionOrders,
        repeatMode,
        settings: {
          category: categoryFilter.value,
          search: searchBox.value,
          shuffleQuestions: shuffleQuestionsBox.checked,
          shuffleOptions: shuffleOptionsBox.checked
        }
      };
      localStorage.setItem(storageKey, JSON.stringify(payload));
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return false;
        const payload = JSON.parse(raw);
        if (!payload.activeIds || !payload.activeIds.length) return false;
        categoryFilter.value = payload.settings?.category || "all";
        searchBox.value = payload.settings?.search || "";
        shuffleQuestionsBox.checked = payload.settings?.shuffleQuestions !== false;
        shuffleOptionsBox.checked = payload.settings?.shuffleOptions !== false;
        activeQuestions = payload.activeIds.map(id => questions.find(q => q.id === id)).filter(Boolean);
        currentIndex = payload.currentIndex || 0;
        answers = payload.answers || {};
        optionOrders = payload.optionOrders || {};
        repeatMode = Boolean(payload.repeatMode);
        return activeQuestions.length > 0;
      } catch {
        return false;
      }
    }

    function updateStats() {
      const answeredCount = Object.keys(answers).length;
      const correctCount = Object.values(answers).filter(a => a.correct).length;
      const q = activeQuestions[currentIndex];
      document.getElementById("scoreStat").textContent = String(correctCount);
      document.getElementById("progressStat").textContent = `${Math.min(currentIndex + 1, activeQuestions.length)} / ${activeQuestions.length}`;
      document.getElementById("percentStat").textContent = `${percent(correctCount, answeredCount)}%`;
      document.getElementById("categoryStat").textContent = q ? q.category : "-";
      document.getElementById("progressFill").style.width = `${percent(answeredCount, activeQuestions.length)}%`;
    }

    function renderQuestion() {
      resultsBox.style.display = "none";
      quizCard.style.display = "block";
      feedbackBox.className = "feedback";
      feedbackBox.innerHTML = "";
      nextBtn.style.display = "none";

      if (!activeQuestions.length) {
        document.getElementById("questionText").textContent = "Δεν βρέθηκαν ερωτήσεις με τα τρέχοντα φίλτρα.";
        document.getElementById("sourceMeta").textContent = "";
        document.getElementById("idMeta").textContent = "";
        optionsBox.innerHTML = "";
        updateStats();
        return;
      }

      if (currentIndex >= activeQuestions.length) {
        renderResults();
        return;
      }

      const q = activeQuestions[currentIndex];
      document.getElementById("sourceMeta").textContent = `${q.category} · ${q.source}`;
      document.getElementById("idMeta").textContent = `ID ${q.id}`;
      document.getElementById("questionText").textContent = q.question;
      optionsBox.innerHTML = "";

      const prior = answers[q.id];
      orderedOptions(q).forEach((option, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option";
        btn.innerHTML = `<span class="key">${["α", "β", "γ", "δ"][index]})</span><span>${option.text}</span>`;
        btn.dataset.key = option.key;
        btn.disabled = Boolean(prior);
        if (prior) {
          if (option.correct) btn.classList.add("correct");
          if (prior.selectedKey === option.key && !option.correct) btn.classList.add("wrong");
        }
        btn.addEventListener("click", () => answerQuestion(q, option.key));
        optionsBox.appendChild(btn);
      });

      if (prior) showFeedback(q, prior);
      updateStats();
      saveProgress();
    }

    function answerQuestion(q, selectedKey) {
      if (answers[q.id]) return;
      const selected = q.options.find(o => o.key === selectedKey);
      answers[q.id] = { selectedKey, correct: Boolean(selected?.correct) };
      saveProgress();
      renderQuestion();
    }

    function showFeedback(q, answer) {
      const correct = getCorrectOption(q);
      const selected = q.options.find(o => o.key === answer.selectedKey);
      feedbackBox.className = `feedback ${answer.correct ? "good" : "bad"}`;
      feedbackBox.innerHTML = `
        <strong>${answer.correct ? "Σωστό." : "Λάθος."}</strong>
        <div>Σωστή απάντηση: ${correct.text}</div>
        <div>${q.explanation}</div>
      `;
      nextBtn.style.display = "inline-block";
      nextBtn.textContent = currentIndex === activeQuestions.length - 1 ? "Αποτελέσματα" : "Επόμενη ερώτηση";
    }

    function startQuiz() {
      activeQuestions = makeFilteredQuestions();
      currentIndex = 0;
      answers = {};
      optionOrders = {};
      repeatMode = false;
      activeQuestions.forEach(q => buildOptionOrder(q));
      saveProgress();
      renderQuestion();
    }

    function restartSame() {
      const ids = activeQuestions.map(q => q.id);
      activeQuestions = ids.map(id => questions.find(q => q.id === id)).filter(Boolean);
      if (shuffleQuestionsBox.checked) activeQuestions = shuffle(activeQuestions);
      currentIndex = 0;
      answers = {};
      optionOrders = {};
      activeQuestions.forEach(q => buildOptionOrder(q));
      saveProgress();
      renderQuestion();
    }

    function renderResults() {
      quizCard.style.display = "none";
      resultsBox.style.display = "block";
      const total = activeQuestions.length;
      const correct = Object.values(answers).filter(a => a.correct).length;
      const wrong = total - correct;
      const byCategory = {};
      activeQuestions.forEach(q => {
        byCategory[q.category] ||= { total: 0, correct: 0 };
        byCategory[q.category].total++;
        if (answers[q.id]?.correct) byCategory[q.category].correct++;
      });
      const wrongQuestions = activeQuestions.filter(q => answers[q.id] && !answers[q.id].correct);
      const rows = Object.entries(byCategory).map(([cat, s]) =>
        `<tr><td>${cat}</td><td>${s.correct} / ${s.total}</td><td>${percent(s.correct, s.total)}%</td></tr>`
      ).join("");
      const review = wrongQuestions.length ? wrongQuestions.map(q => {
        const picked = q.options.find(o => o.key === answers[q.id].selectedKey);
        const correctOption = getCorrectOption(q);
        return `<div class="review-item"><strong>ID ${q.id} · ${q.category}</strong><br>${q.question}<br><span>Απάντησες: ${picked?.text || "-"}</span><br><span>Σωστό: ${correctOption.text}</span><br><span>${q.explanation}</span></div>`;
      }).join("") : `<div class="notice">Δεν υπάρχουν λανθασμένες απαντήσεις για επανάληψη.</div>`;

      resultsBox.innerHTML = `
        <h2>Τελικό αποτέλεσμα</h2>
        <div class="statsbar">
          <div class="stat"><span>Συνολικό σκορ</span><strong>${correct} / ${total}</strong></div>
          <div class="stat"><span>Ποσοστό</span><strong>${percent(correct, total)}%</strong></div>
          <div class="stat"><span>Σωστές</span><strong>${correct}</strong></div>
          <div class="stat"><span>Λανθασμένες</span><strong>${wrong}</strong></div>
        </div>
        <h3>Απόδοση ανά κατηγορία</h3>
        <table><thead><tr><th>Κατηγορία</th><th>Σκορ</th><th>Ποσοστό</th></tr></thead><tbody>${rows}</tbody></table>
        <h3>Ανασκόπηση λανθασμένων</h3>
        <div class="review-list">${review}</div>
        <div class="actions">
          <button type="button" onclick="restartSame()">Επανεκκίνηση</button>
          <button type="button" ${wrongQuestions.length ? "" : "disabled"} onclick="repeatWrong()">Επανάληψη λανθασμένων</button>
        </div>
      `;
      updateStats();
      saveProgress();
    }

    function repeatWrong() {
      const wrongIds = activeQuestions.filter(q => answers[q.id] && !answers[q.id].correct).map(q => q.id);
      activeQuestions = wrongIds.map(id => questions.find(q => q.id === id)).filter(Boolean);
      if (shuffleQuestionsBox.checked) activeQuestions = shuffle(activeQuestions);
      currentIndex = 0;
      answers = {};
      optionOrders = {};
      repeatMode = true;
      activeQuestions.forEach(q => buildOptionOrder(q));
      saveProgress();
      renderQuestion();
    }

    function clearProgress() {
      localStorage.removeItem(storageKey);
      answers = {};
      optionOrders = {};
      currentIndex = 0;
      renderQuestion();
    }

    function renderCategoryControls() {
      const cats = [...new Set(questions.map(q => q.category))].sort((a, b) => a.localeCompare(b, "el"));
      categoryFilter.innerHTML = `<option value="all">Όλες οι κατηγορίες</option>` + cats.map(c => `<option value="${c}">${c}</option>`).join("");
      const counts = cats.map(cat => [cat, questions.filter(q => q.category === cat).length]);
      document.getElementById("distribution").innerHTML = `
        <table>
          <thead><tr><th>Κατηγορία</th><th>Αριθμός ερωτήσεων</th></tr></thead>
          <tbody>${counts.map(([cat, count]) => `<tr><td>${cat}</td><td>${count}</td></tr>`).join("")}</tbody>
        </table>
      `;
    }

    function renderPrintArea() {
      const questionHtml = questions.map((q, i) => `
        <div class="print-question">
          <h3>${i + 1}. ${q.question}</h3>
          <div>${q.category} · ${q.source}</div>
          <ol type="a">
            ${q.options.map(o => `<li>${o.text}</li>`).join("")}
          </ol>
        </div>
      `).join("");
      const answerHtml = questions.map((q, i) => {
        const correct = getCorrectOption(q);
        const letter = ["α", "β", "γ", "δ"][q.options.findIndex(o => o.correct)];
        return `<div class="print-question"><strong>${i + 1}. ${letter})</strong> ${correct.text}<br>${q.explanation}</div>`;
      }).join("");
      document.getElementById("printArea").innerHTML = `
        <h1>Αισθητήριο Όρασης - MCQs Νευροανατομίας</h1>
        ${questionHtml}
        <section class="answer-key">
          <h2>Απαντήσεις και αιτιολογήσεις</h2>
          ${answerHtml}
        </section>
      `;
    }

    nextBtn.addEventListener("click", () => {
      currentIndex++;
      renderQuestion();
    });
    document.getElementById("applyBtn").addEventListener("click", startQuiz);
    document.getElementById("resetBtn").addEventListener("click", restartSame);
    document.getElementById("clearProgressBtn").addEventListener("click", clearProgress);
    document.getElementById("printBtn").addEventListener("click", () => window.print());

    renderCategoryControls();
    renderPrintArea();
    if (loadProgress()) {
      renderQuestion();
    } else {
      startQuiz();
    }
  </script>
</body>
</html>
