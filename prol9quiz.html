                "Διότι η συχνή λήψη μειώνει τον πληθυσμό των μικροβίων στον τεμνόμενο κύκλο του Fitzgerald.",
                "Διότι τα υποκατάστατα ζάχαρης λειτουργούν μόνο όταν χορηγούνται σε πολύ μεγάλες, εφάπαξ δόσεις."
            ],
            correct: 1,
            rationale: "Στο 'παιχνίδι της τραμπάλας', η δυναμική της ιοντικής διαταραχής (Ζάχαρα -> H+) πυροδοτείται με κάθε λήψη. Η **ΣΟΣ: συχνή λήψη ('Ζαχαρούχα, συχνά') κρατά την τραμπάλα διαρκώς στη 'Νόσο'**, εμποδίζοντας την επανασβεστίωση από το σάλιο[cite: 1]."
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    function renderQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('q-number').innerText = `Ερώτηση ${currentQuestion + 1} από ${questions.length}`;
        document.getElementById('q-text').innerText = q.question;
        
        const optionsBox = document.getElementById('options-box');
        optionsBox.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = String.fromCharCode(65 + index) + ". " + opt;
            btn.onclick = () => selectOption(index, btn);
            optionsBox.appendChild(btn);
        });

        document.getElementById('rationale-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function selectOption(selectedIndex, btn) {
        const q = questions[currentQuestion];
        const allBtns = document.querySelectorAll('.option-btn');
        
        allBtns.forEach(b => b.disabled = true);

        if (selectedIndex === q.correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('incorrect');
            allBtns[q.correct].classList.add('correct');
        }

        const rationaleBox = document.getElementById('rationale-box');
        // Render rationale with parsed bold tags if necessary (using innerHTML safely since data is static)
        rationaleBox.innerHTML = "<strong>Επεξήγηση:</strong> " + q.rationale;
        rationaleBox.style.display = 'block';

        document.getElementById('progress-text').innerText = `Σκορ: ${score}`;
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < questions.length) {
            renderQuestion();
        } else {
            showFinalScore();
        }
    }

    function showFinalScore() {
        document.getElementById('quiz-content').style.display = 'none';
        const finalBox = document.getElementById('final-score');
        finalBox.innerText = `Το κουίζ ολοκληρώθηκε! Τελικό Σκορ: ${score} / ${questions.length}`;
        finalBox.style.display = 'block';
    }

    // Initialize Quiz
    renderQuestion();
</script>

</html>
