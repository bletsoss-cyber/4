<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κουίζ: Δείκτες Στοματικής Υγιεινής</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: var(--card-bg);
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 15px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-family: inherit;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e3f2fd;
            border-color: var(--accent-color);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--success-color);
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: var(--danger-color);
            color: #721c24;
        }

        .rationale-container {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            display: none;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        .rationale-container strong.sos {
            color: #d35400;
            font-weight: 800;
            background-color: rgba(211, 84, 0, 0.1);
            padding: 2px 5px;
            border-radius: 3px;
        }

        .action-container {
            margin-top: 25px;
            text-align: right;
        }

        .next-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none;
        }

        .next-btn:hover {
            background-color: #2980b9;
        }

        .results-container {
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #f1f8ff;
            border: 8px solid var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0 auto 20px auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .quiz-container { padding: 20px; }
            .option-btn { font-size: 14px; padding: 12px 15px; }
            .question-text { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h1>Δείκτες Στοματικής Υγιεινής</h1>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <div id="quiz-body">
        <div class="question-meta">
            <span id="slide-num">Διαφάνεια 1</span>
            <span id="question-count">Ερώτηση 1 / 22</span>
        </div>
        <div class="question-text" id="question">Φόρτωση ερώτησης...</div>
        
        <div class="options-container" id="options">
            <!-- Options will be generated here -->
        </div>

        <div class="rationale-container" id="rationale">
            <!-- Rationale will appear here -->
        </div>

        <div class="action-container">
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Επόμενη Ερώτηση &rarr;</button>
        </div>
    </div>

    <div class="results-container" id="results">
        <h2>Ολοκλήρωση Κουίζ!</h2>
        <div class="score-circle" id="score-display">0/22</div>
        <p style="font-size: 18px; color: var(--text-color); margin-bottom: 30px;">
            Η πρακτική εξάσκηση είναι το κλειδί για την επιτυχία στις εξετάσεις Οδοντιατρικής.
        </p>
        <button class="next-btn" style="display: inline-block;" onclick="location.reload()">Επανεκκίνηση Κουίζ</button>
    </div>
</div>

<script>
    const quizData = [
        {
            slide: 1,
            question: "Ποιο είναι το κύριο αντικείμενο καταγραφής και αξιολόγησης σε ασθενείς για τον προσδιορισμό του επιπέδου στοματικής φροντίδας;",
            options: [
                "Ο σχεδιασμός θεραπείας της προχωρημένης περιοδοντίτιδας.",
                "Ο ακτινογραφικός έλεγχος των οδοντικών εμφυτευμάτων.",
                "Οι Δείκτες Στοματικής Υγιεινής και ο τρόπος καταγραφής τους.",
                "Η χειρουργική τεχνική εφαρμογής ελεύθερων ουλικών μοσχευμάτων."
            ],
            correct: 2,
            rationale: "<strong class='sos'>ΣΟΣ: Η σωστή καταγραφή των δεικτών στοματικής υγιεινής είναι η βάση για τη διάγνωση και πρόληψη της περιοδοντικής νόσου.</strong>"
        },
        {
            slide: 2,
            question: "Ποιοι ιστοί οριοθετούνται πρωτίστως για την κλινική αξιολόγηση των δεικτών πλάκας και αιμορραγίας στην αυχενική περιοχή του δοντιού;",
            options: [
                "Μόνο το ελεύθερο ουλικό χείλος χωρίς επαφή με το δόντι.",
                "Το σύμπλεγμα των ελεύθερων και προσπεφυκότων ούλων σε άμεση επαφή με το δόντι.",
                "Ο φατνιακός βλεννογόνος αποκλειστικά.",
                "Η αδαμαντινοοστεϊνική ένωση και η κλινική μύλη του δοντιού ανεξάρτητα από τα ούλα."
            ],
            correct: 1,
            rationale: "<strong class='sos'>ΣΟΣ: Η αξιολόγηση των δεικτών (π.χ. φλεγμονή/αιμορραγία) εστιάζει στα ελεύθερα και προσπεφυκότα ούλα και την άμεση επαφή τους με τον αυχένα του δοντιού, καθώς εκεί ξεκινά η φλεγμονώδης διεργασία.</strong>"
        },
        {
            slide: 3,
            question: "Σε περιπτώσεις εκτεταμένης καταστροφής της μύλης νεογιλών δοντιών (πρόσθιων), ποια είναι η κύρια αιτιολογία που εξετάζεται κατά την αξιολόγηση της στοματικής υγιεινής;",
            options: [
                "Εκτεταμένη αποτριβή λόγω έντονου νυχτερινού βρυγμού.",
                "Συγγενής απουσία μονίμων σπερμάτων.",
                "Απώλεια οδοντικής ουσίας λόγω νόσου της τερηδόνας (π.χ. τερηδόνα βρεφικής ηλικίας).",
                "Ατελής αδαμαντινογένεση εκ γενετής."
            ],
            correct: 2,
            rationale: "<strong class='sos'>ΣΟΣ: Σε εκτεταμένες καταστροφές μύλης σε νεογιλά (ειδικά άνω πρόσθια), η τερηδόνα αποτελεί την κύρια και πλέον κρίσιμη διαγνωστική υποψία.</strong>"
        },
        {
            slide: 4,
            question: "Σε περιπτώσεις όπου τα δόντια παρουσιάζουν εκτεταμένες βλάβες και αλλοιώσεις της μύλης, ποιο είναι το απαραίτητο προαπαιτούμενο βήμα πριν την ορθή καταγραφή των δεικτών στοματικής υγιεινής;",
            options: [
                "Άμεση εξαγωγή όλων των τερηδονισμένων δοντιών χωρίς άλλη εξέταση.",
                "Διακοπή της διαδικασίας αξιολόγησης δεικτών εντελώς.",
                "Ο ακριβής προσδιορισμός των κλινικών ανατομικών ορίων για τεκμηριωμένη καταγραφή.",
                "Η χορήγηση συστηματικών αντιβιοτικών."
            ],
            correct: 2,
            rationale: "<strong class='sos'>ΣΟΣ: Η σωστή διάγνωση και καταγραφή δεικτών σε κατεστραμμένα δόντια προϋποθέτει πρώτα τον αυστηρό καθορισμό των ανατομικών ορίων (π.χ. διεπαφή ούλου-δοντιού), ώστε να ξέρουμε τι αξιολογούμε.</strong>"
        },
        {
            slide: 5,
            question: "Ποιο κλινικό όριο πρέπει να καθοριστεί με ακρίβεια για τη σωστή τοπογραφική καταγραφή της οδοντικής πλάκας και φλεγμονής;",
            options: [
                "Τα κλινικά όρια στη διεπαφή δοντιού - ούλου.",
                "Το πάχος του φατνιακού οστού παρειακά.",
                "Το εύρος του ριζικού σωλήνα στα πολύρριζα δόντια.",
                "Το σημείο επαφής μεταξύ άνω και κάτω γνάθου."
            ],
            correct: 0,
            rationale: "<strong class='sos'>ΣΟΣ: Ο ακριβής καθορισμός της διεπαφής δοντιού-ούλου είναι θεμελιώδης, καθώς εκεί συγκεντρώνεται η πλάκα και ξεκινά η παρυφώδης ουλίτιδα.</strong>"
        },
        {
            slide: 6,
            question: "Ποια ανατομικά στοιχεία λειτουργούν ως κύριοι 'οδηγοί' για τον διαχωρισμό των επιφανειών εξέτασης του δοντιού κατά την καταγραφή των δεικτών;",
            options: [
                "Το ακρορρίζιο και ο ακρορριζικός βλεννογόνος.",

                "Ο χαλινός του χείλους και οι υπερώιες πτυχές."
            ],
            correct: 1,
            rationale: "<strong class='sos'>ΣΟΣ: Οι δίεδρες γωνίες (π.χ. ομοροπαρειακή) και η βάση της μεσοδόντιας θηλής οριοθετούν σαφώς την εγγύς/άπω επιφάνεια από την παρειακή/γλωσσική επιτρέποντας σωστή χαρτογράφηση.</strong>"
        },
        {
            slide: 7,
            question: "Κατά τον ανατομικό καθορισμό των ορίων στην όμορη/μεσοδόντια επιφάνεια για την καταγραφή δεικτών, ποιο ανατομικό στοιχείο αποτελεί σημαντικό ορόσημο προς την ακρορριζική κατεύθυνση, κάτω από την παρυφή του ούλου;",
            options: [
                "Η οριακή ακρολοφία.",
                "Η ομοροπαρειακή δίεδρη γωνία.",
                "Το κοπτικό χείλος.",
                "Η αδαμαντινοοστεϊνική ένωση (CEJ)."
            ],
            correct: 3,
            rationale: "<strong class='sos'>ΣΟΣ: Η γνώση της θέσης της CEJ σε σχέση με την παρυφή του ούλου αποτελεί την κρίσιμη μέτρηση για τη διάγνωση της υφίζησης και της απώλειας κλινικής πρόσφυσης (CAL).</strong>"
        },
        {
            slide: 8,
            question: "Κατά τη λεπτομερή ανατομική διαίρεση της θηλής των ούλων για την καταγραφή αιμορραγίας, ποια επιμέρους τμήματα διακρίνονται συνήθως εκτός από την κορυφή και τη βάση της;",
            options: [
                "Παρειακά και γλωσσικά τμήματα.",
                "Ριζικά και πολφικά τμήματα.",
                "Οστικά και βλεννογόνια τμήματα.",
                "Αδαμαντινικά και οστεϊνικά τμήματα."
            ],
            correct: 0,
            rationale: "<strong class='sos'>ΣΟΣ: Η θηλή έχει τρισδιάστατη μορφή. Ο διαχωρισμός παρειακού/γλωσσικού τμήματος είναι κρίσιμος, καθώς η φλεγμονή (αιμορραγία) μπορεί να εντοπίζεται μόνο στη μία όψη του μεσοδοντίου.</strong>"
        },
        {
            slide: 9,
            question: "Ποια είναι η βασική κλινική διαφορά μεταξύ του Δείκτη Πλάκας (ΡΙ%) και του Δείκτη Αιμορραγίας (GBI%) ως προς τη χρονική περίοδο που αντανακλούν;",
            options: [
                "Ο PI% αξιολογεί τα βουρτσίσματα του 10ημέρου, ενώ ο GBI% την ύπαρξη τερηδόνας.",
                "Ο PI% αξιολογεί την αποτελεσματικότητα του πιο πρόσφατου βουρτσίσματος, ενώ ο GBI% την αποτελεσματικότητα των βουρτσισμάτων του τελευταίου 10ημέρου.",
                "Και οι δύο δείκτες αξιολογούν αποκλειστικά το βούρτσισμα των τελευταίων 2 ωρών.",
                "Ο PI% δείχνει τη συσσώρευση τρυγίας 6 μηνών, ενώ ο GBI% την τρέχουσα υφίζηση."
            ],
            correct: 1,
            rationale: "<strong class='sos'>ΣΟΣ: Η παρουσία πλάκας είναι δείκτης οξείας/στιγμιαίας παραμέλησης (ταχύτητα συσσώρευσης), ενώ η αιμορραγία αντικατοπτρίζει παγιωμένη φλεγμονή λόγω αναποτελεσματικής υγιεινής για τουλάχιστον μία εβδομάδα.</strong>"
        },
        {
            slide: 10,
            question: "Κατά την εφαρμογή του Δείκτη Πλάκας (PI%) κατά O'Leary, ποιο από τα παρακάτω ΔΕΝ πρέπει να καταγράφεται ως θετικό εύρημα πλάκας;",
            options: [
                "Η πλάκα που βρίσκεται σε άμεση επαφή με τα ελεύθερα ούλα.",

            ],
            correct: 2,
            rationale: "<strong class='sos'>ΣΟΣ: Ο επίκτητος υμένας (pellicle) είναι μια φυσιολογική στρώση πρωτεϊνών του σάλιου. Αντιθέτως, η πλάκα (βιοϋμένιο) είναι το παθολογικό αίτιο. Επίσης, δεν μετράμε πλάκα στα γεφυρώματα, μόνο στα στηρίγματα (αυχενικά).</strong>"
        },
        {
            slide: 11,
            question: "Σε ποιο τριτημόριο της μύλης του δοντιού παρατηρείται συχνότερα η μεγαλύτερη συσσώρευση οδοντικής πλάκας και χρωστικών, συχνά λόγω ελλιπούς προσπέλασης από τις ίνες της οδοντόβουρτσας;",

            correct: 1,
            rationale: "<strong class='sos'>ΣΟΣ: Η αυχενική περιοχή αποτελεί το συχνότερο 'τυφλό σημείο' στο βούρτσισμα. Η αδυναμία καθαρισμού εκεί οδηγεί σε παρυφώδη ουλίτιδα, ειδικά εάν ο ασθενής εστιάζει μόνο στο μέσο/κοπτικό τριτημόριο.</strong>"

            slide: 12,

            correct: 2,

        },
        {
            slide: 14,

                "Το Διγλυκονικό άλας της Χλωρεξιδίνης",

            options: [

                "Στο μέσο τριτημόριο των λείων παρειακών επιφανειών αποκλειστικά."

            options: [

                "Το γεγονός ότι οι μασητικές επιφάνειες αυτοκαθαρίζονται 100% από το σάλιο χωρίς ανάγκη βουρτσίσματος.",

    ];
    let currentQuestionIndex = 0;
    let score = 0;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const rationaleEl = document.getElementById('rationale');
    const nextBtn = document.getElementById('next-btn');
    const progressEl = document.getElementById('progress');
    const slideNumEl = document.getElementById('slide-num');
    const questionCountEl = document.getElementById('question-count');

    function loadQuestion(index) {
        // Reset state
        rationaleEl.style.display = 'none';
        nextBtn.style.display = 'none';
        optionsEl.innerHTML = '';
        
        const data = quizData[index];
        questionEl.textContent = data.question;
        slideNumEl.textContent = `Διαφάνεια ${data.slide}`;
        questionCountEl.textContent = `Ερώτηση ${index + 1} / ${quizData.length}`;
        
        // Update progress bar
        const progressPercentage = ((index) / quizData.length) * 100;
        progressEl.style.width = `${progressPercentage}%`;

        // Generate option buttons
        data.options.forEach((optText, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = `${String.fromCharCode(65 + i)}. ${optText}`;
            btn.onclick = () => selectOption(i, btn);
            optionsEl.appendChild(btn);
        });
    }

    function selectOption(selectedIndex, selectedBtn) {
        const data = quizData[currentQuestionIndex];
        const allButtons = optionsEl.querySelectorAll('.option-btn');
        
        // Disable all buttons
        allButtons.forEach(btn => btn.disabled = true);

        // Check if correct
        if (selectedIndex === data.correct) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            // Highlight correct one
            allButtons[data.correct].classList.add('correct');
        }

        // Show rationale
        rationaleEl.innerHTML = data.rationale;
        rationaleEl.style.display = 'block';

        // Show Next button
        if(currentQuestionIndex === quizData.length - 1) {
            nextBtn.textContent = 'Εμφάνιση Αποτελεσμάτων';
        }
        nextBtn.style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        
        if (currentQuestionIndex < quizData.length) {
            loadQuestion(currentQuestionIndex);
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-body').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('progress').style.width = '100%';
        document.getElementById('score-display').textContent = `${score}/${quizData.length}`;
    }

    // Init Quiz
    loadQuestion(0);
</script>
