<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κουίζ: Δείκτες Στοματικής Υγιεινής</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: var(--card-bg);
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 15px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.4s ease;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-family: inherit;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e3f2fd;
            border-color: var(--accent-color);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--success-color);
            color: #155724;
        }

        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: var(--danger-color);
            color: #721c24;
        }

        .rationale-container {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            display: none;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        .rationale-container strong.sos {
            color: #d35400;
            font-weight: 800;
            background-color: rgba(211, 84, 0, 0.1);
            padding: 2px 5px;
            border-radius: 3px;
        }

        .action-container {
            margin-top: 25px;
            text-align: right;
        }

        .next-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none;
        }

        .next-btn:hover {
            background-color: #2980b9;
        }

        .results-container {
            text-align: center;
            display: none;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #f1f8ff;
            border: 8px solid var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0 auto 20px auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .quiz-container { padding: 20px; }
            .option-btn { font-size: 14px; padding: 12px 15px; }
            .question-text { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h1>Δείκτες Στοματικής Υγιεινής</h1>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <div id="quiz-body">
        <div class="question-meta">
            <span id="slide-num">Διαφάνεια 1</span>
            <span id="question-count">Ερώτηση 1 / 22</span>
        </div>
        <div class="question-text" id="question">Φόρτωση ερώτησης...</div>
        
        <div class="options-container" id="options">
            <!-- Options will be generated here -->
        </div>

        <div class="rationale-container" id="rationale">
            <!-- Rationale will appear here -->
        </div>

        <div class="action-container">
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Επόμενη Ερώτηση &rarr;</button>
        </div>
    </div>

    <div class="results-container" id="results">
        <h2>Ολοκλήρωση Κουίζ!</h2>
        <div class="score-circle" id="score-display">0/22</div>
        <p style="font-size: 18px; color: var(--text-color); margin-bottom: 30px;">
            Η πρακτική εξάσκηση είναι το κλειδί για την επιτυχία στις εξετάσεις Οδοντιατρικής.
        </p>
        <button class="next-btn" style="display: inline-block;" onclick="location.reload()">Επανεκκίνηση Κουίζ</button>
    </div>
</div>

<script>
    const quizData = [
        {
            slide: 1,
            question: "Ποιο είναι το κύριο αντικείμενο καταγραφής και αξιολόγησης που εισάγεται στην πρώτη διαφάνεια του μαθήματος;",
            options: [
                "Ο σχεδιασμός θεραπείας της προχωρημένης περιοδοντίτιδας.",
                "Ο ακτινογραφικός έλεγχος των οδοντικών εμφυτευμάτων.",
                "Οι Δείκτες Στοματικής Υγιεινής και ο τρόπος καταγραφής τους.",
                "Η χειρουργική τεχνική εφαρμογής ελεύθερων ουλικών μοσχευμάτων."
            ],
            correct: 2,
            rationale: "Η εισαγωγική διαφάνεια προσδιορίζει το γνωστικό αντικείμενο ως την αξιολόγηση και καταγραφή δεικτών. <strong class='sos'>ΣΟΣ: Η σωστή καταγραφή των δεικτών στοματικής υγιεινής είναι η βάση για τη διάγνωση και πρόληψη της περιοδοντικής νόσου.</strong>"
        },
        {
            slide: 2,
            question: "Στην κλινική εικόνα που φέρει μπλε αγκύλη στην αυχενική περιοχή, ποιοι ιστοί οριοθετούνται πρωτίστως για την αξιολόγηση των δεικτών πλάκας και αιμορραγίας;",
            options: [
                "Μόνο το ελεύθερο ουλικό χείλος.",

        },
        {
            slide: 3,

            correct: 3,
            rationale: "Η διαφάνεια αναγράφει ρητά το ερώτημα: 'Απώλεια λόγω νόσου τερηδόνας ;'. <strong class='sos'>ΣΟΣ: Σε εκτεταμένες καταστροφές μύλης σε νεογιλά, η πρώιμη παιδική τερηδόνα αποτελεί την κύρια και πλέον κρίσιμη διαγνωστική υποψία.</strong>"
        },
        {
            slide: 4,
            question: "Στο πλαίσιο ελέγχου της στοματικής υγιεινής, η χρήση ερωτηματικού ('?') σε μεταβατική διαφάνεια μετά από κλινικές εικόνες εκτεταμένης βλάβης (όπως στη διαφάνεια 4), κλινικά υποδηλώνει την ανάγκη για:",
            options: [

            correct: 2,
            rationale: "Το ερωτηματικό θέτει τον κλινικό προβληματισμό (πώς αξιολογούμε αυτές τις βλάβες;), οδηγώντας στις επόμενες διαφάνειες που αναλύουν τα κλινικά όρια. <strong class='sos'>ΣΟΣ: Η σωστή διάγνωση και καταγραφή δεικτών σε κατεστραμμένα δόντια προϋποθέτει τον αυστηρό καθορισμό των ανατομικών ορίων.</strong>"

                "Το σημείο επαφής μεταξύ άνω και κάτω γνάθου (σύγκλειση)."

            correct: 0,

            correct: 1,
            rationale: "Το κείμενο απαριθμεί ως οδηγούς: 'βάση θηλής' και 'δίεδρος γωνία'. <strong class='sos'>ΣΟΣ: Οι δίεδρες γωνίες και η βάση της μεσοδόντιας θηλής οριοθετούν σαφώς την εγγύς/άπω επιφάνεια από την παρειακή/γλωσσική, επιτρέποντας σωστή χαρτογράφηση.</strong>"
        },
        {
            slide: 7,
            question: "Στο αναλυτικό ανατομικό διάγραμμα καθορισμού ορίων της διαφάνειας 7, ποιο ανατομικό στοιχείο αντιστοιχεί στον αριθμό 5 του υπομνήματος;",

            rationale: "Στο υπόμνημα, το 5 αντιστοιχεί ρητά στην 'αδαμαντινόστεϊνική ένωση'. Το 4 είναι η παρυφή της θηλής. <strong class='sos'>ΣΟΣ: Η γνώση της θέσης της CEJ (σημείο 5) σε σχέση με την παρυφή του ούλου (σημείο 4) αποτελεί την κρίσιμη μέτρηση για τη διάγνωση της υφίζησης και της απώλειας κλινικής πρόσφυσης (CAL).</strong>"

    let currentQuestionIndex = 0;
    let score = 0;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const rationaleEl = document.getElementById('rationale');
    const nextBtn = document.getElementById('next-btn');
    const progressEl = document.getElementById('progress');
    const slideNumEl = document.getElementById('slide-num');
    const questionCountEl = document.getElementById('question-count');

    function loadQuestion(index) {
        // Reset state
        rationaleEl.style.display = 'none';
        nextBtn.style.display = 'none';
        optionsEl.innerHTML = '';
        
        const data = quizData[index];
        questionEl.textContent = data.question;
        slideNumEl.textContent = `Διαφάνεια ${data.slide}`;
        questionCountEl.textContent = `Ερώτηση ${index + 1} / ${quizData.length}`;
        
        // Update progress bar
        const progressPercentage = ((index) / quizData.length) * 100;
        progressEl.style.width = `${progressPercentage}%`;

        // Generate option buttons
        data.options.forEach((optText, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = `${String.fromCharCode(65 + i)}. ${optText}`;
            btn.onclick = () => selectOption(i, btn);
            optionsEl.appendChild(btn);
        });
    }

    function selectOption(selectedIndex, selectedBtn) {
        const data = quizData[currentQuestionIndex];
        const allButtons = optionsEl.querySelectorAll('.option-btn');
        
        // Disable all buttons
        allButtons.forEach(btn => btn.disabled = true);

        // Check if correct
        if (selectedIndex === data.correct) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            // Highlight correct one
            allButtons[data.correct].classList.add('correct');
        }

        // Show rationale
        rationaleEl.innerHTML = data.rationale;
        rationaleEl.style.display = 'block';

        // Show Next button
        if(currentQuestionIndex === quizData.length - 1) {
            nextBtn.textContent = 'Εμφάνιση Αποτελεσμάτων';
        }
        nextBtn.style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        
        if (currentQuestionIndex < quizData.length) {
            loadQuestion(currentQuestionIndex);
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-body').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('progress').style.width = '100%';
        document.getElementById('score-display').textContent = `${score}/${quizData.length}`;
    }

    // Init Quiz
    loadQuestion(0);
</script>
