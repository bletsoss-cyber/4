        },
        {
            question: "Ποιο ήταν το ιστορικό πρόβλημα με τη θεωρία 'AH-B' της γλυκιάς γεύσης;",
            options: [
                "Απαιτούσε το pH του σάλιου να είναι αυστηρά αλκαλικό.",
                "Δεν μπορούσε να εξηγήσει πώς τεράστια πρωτεϊνικά μόρια (όπως η θαυματίνη) που δεν συνδέονται με απλούς δεσμούς υδρογόνου AH-B, προκαλούν έντονη και παρατεταμένη γλυκιά γεύση.",
                "Απέτυχε να εξηγήσει τη γλυκύτητα της γλυκόζης.",
                "Απαιτούσε την παρουσία 3 διαφορετικών υποδοχέων."
            ],
            correct: 1,
            feedback: "Σωστό. Το μοντέλο AH-B περιέγραφε επιτυχώς μικρά μόρια. Η αδυναμία του να εξηγήσει τη συμπεριφορά των τεράστιων 'sweet proteins' οδήγησε στην ανάπτυξη του 'μοντέλου της σφήνας'."
        },
        {
            question: "Εκτός από τον 'άσκοπο κύκλο', ποιο άλλο κλινικό όφελος έχει παρατηρηθεί με τη χρήση τσίχλας Ξυλιτόλης σε μητέρες βρεφών;",
            options: [
                "Πλήρης αναστολή ανάπτυξης των δοντιών του βρέφους.",
                "Άμεση θεραπεία της περιοδοντίτιδας.",
                "Μειωμένη τερηδονική δραστηριότητα στα βρέφη (<2 ετών) που φροντίζουν, πιθανότατα λόγω μειωμένης κάθετης μετάδοσης του S. mutans.",
                "Αλλαγή της γευστικής προτίμησης του βρέφους αποκλειστικά σε αλμυρές τροφές."
            ],
            correct: 2,
            feedback: "Ορθό. Μειώνοντας τα επίπεδα και τη λοιμογόνο δύναμη του S. mutans στο στόμα της μητέρας, μειώνεται δραστικά η μετάδοση του μικροβίου στο βρέφος."
        },
        {
            question: "Βιοχημικά, γιατί η Γλυκόζη ΔΕΝ ρίχνει την ενδοκυττάρια οξειδοαναγωγική ισορροπία εκτός ελέγχου;",
            options: [
                "Επειδή μεταφέρεται εκτός κυττάρου πριν καταβολιστεί.",
                "Επειδή η αναγωγή των 4 μορίων Πυροσταφυλικού Οξέος σε 4 μόρια Γαλακτικού οξέος, χρησιμοποιεί ακριβώς τα 4 μόρια NADH2 που παρήχθησαν κατά τη γλυκόλυση, ανακυκλώνοντας πλήρως το NAD.",
                "Επειδή δεν απαιτεί καθόλου NAD για να διασπαστεί.",
                "Διότι διασπάται απευθείας από το ένζυμο οξειδάση του NADH."
            ],
            correct: 1,
            feedback: "Ακριβώς. Στη γλυκόζη υπάρχει τέλεια ισορροπία παραγωγής/κατανάλωσης ηλεκτρονίων (1:1). Αντίθετα, η σορβιτόλη (ως αναγμένο σάκχαρο) φέρνει περίσσεια ηλεκτρονίων, απαιτώντας πολύπλοκες εναλλακτικές (όπως η λυάση του πυροσταφυλικού-μυρμηκικού)."
        },
        {
            question: "Κατά την είσοδό της στο μικρόβιο μέσω PTS, σε ποια ένωση μετατρέπεται η Μαννιτόλη;",
            options: [

                "1-φωσφορική φρουκτόζη",
                "6-φωσφορική μαννιτόλη",
                "Μυρμηκικό οξύ"
            ],
            correct: 2,
            feedback: "Σωστό. Όπως φαίνεται στην Εικόνα 6, η μαννιτόλη φωσφορυλιώνεται μέσω του PTS της δημιουργώντας '6-φωσφορική μαννιτόλη', η οποία ακολούθως μετατρέπεται σε 6-φωσφορική φρουκτόζη."
        },

            options: [
                "Ινουλίνη",
                "Παλατινόζη (Palatinose)",
                "Ξυλόζη",
                "Ταγατόζη"
            ],
            correct: 1,
            feedback: "Σωστό. Στην κατηγορία 'Υδατάνθρακες - Ολιγοσακχαρίτες' ανήκουν η Λακτόζη (0.2x), η Μαλτόζη (0.3x) και η Παλατινόζη (0.4x). Η Ινουλίνη είναι πολυσακχαρίτης, ενώ Ξυλόζη και Ταγατόζη είναι μονοσακχαρίτες."
        },
        {
            question: "Η έρευνα για τα υποκατάστατα ζάχαρης οδήγησε στο χαρακτηρισμό της Ξυλιτόλης όχι απλώς ως 'μη τερηδονογόνου' αλλά ως 'αντιτερηδονικού' υποκατάστατου. Γιατί;",
            options: [
                "Επειδή αυξάνει άμεσα την παραγωγή του σάλιου κατά 1000%.",
                "Διότι δεν ζυμώνεται απλώς (μη τερηδονογόνο), αλλά μειώνει ενεργά τους πληθυσμούς των S. mutans και προάγει τη φυσική επούλωση αρχόμενων βλαβών (όταν δίνεται σε τσίχλες).",
                "Διότι η παρουσία της σκοτώνει άμεσα τον μύκητα Candida albicans.",
                "Επειδή συνδέεται χημικά με το ασβέστιο της αδαμαντίνης σχηματίζοντας μια άφθαρτη ασπίδα."
            ],
            correct: 1,
            feedback: "Απόλυτα σωστό. Αυτός είναι ο ορισμός του 'αντιτερηδονικού' στο πλαίσιο του συγγράμματος. Η ξυλιτόλη δεν είναι απλώς αδρανής, αλλά επιτίθεται ενεργειακά (futile cycle) στο κυριότερο τερηδονογόνο βακτήριο."
        }
    ];

    const quizListContainer = document.getElementById('quiz-list');
    let score = 0;
    let answeredQuestions = 0;

    // Λούπα για να δημιουργήσουμε δυναμικά και τις 42 κάρτες (cards)
    quizData.forEach((q, qIndex) => {
        // Δημιουργία της κάρτας της ερώτησης
        const card = document.createElement('div');
        card.className = 'question-card';

        // Μετρητής ερώτησης
        const counter = document.createElement('div');
        counter.className = 'question-counter';
        counter.innerText = `Ερώτηση ${qIndex + 1}`;
        card.appendChild(counter);

        // Κείμενο ερώτησης
        const text = document.createElement('div');
        text.className = 'question-text';
        text.innerText = q.question;
        card.appendChild(text);

        // Κοντέινερ για τις επιλογές
        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        // Κοντέινερ για το feedback
        const feedbackDiv = document.createElement('div');
        feedbackDiv.className = 'feedback-box';

        // Λούπα για τις 4 επιλογές (κουμπιά)
        q.options.forEach((opt, oIndex) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            
            btn.onclick = () => {
                // Απενεργοποίηση όλων των κουμπιών σε ΑΥΤΗΝ την κάρτα
                const allBtns = optionsDiv.querySelectorAll('.option-btn');
                allBtns.forEach(b => b.disabled = true);

                // Έλεγχος Σωστού / Λάθους
                if (oIndex === q.correct) {
                    btn.classList.add('correct');
                    score++; // Αυξάνουμε το συνολικό σκορ
                    feedbackDiv.className = 'feedback-box';
                    feedbackDiv.innerHTML = `<h4>Ορθή Επιλογή</h4><p>${q.feedback}</p>`;
                } else {
                    btn.classList.add('wrong');
                    // Δείχνουμε και το σωστό
                    allBtns[q.correct].classList.add('correct');
                    feedbackDiv.className = 'feedback-box error-feedback';
                    feedbackDiv.innerHTML = `<h4>Λανθασμένη Επιλογή</h4><p>${q.feedback}</p>`;
                }
                
                feedbackDiv.style.display = 'block';
                answeredQuestions++;
            };
            optionsDiv.appendChild(btn);
        });

        card.appendChild(optionsDiv);
        card.appendChild(feedbackDiv);
        quizListContainer.appendChild(card);
    });

    // Λειτουργικότητα του τελικού κουμπιού
    document.getElementById('finish-btn').onclick = () => {
        const display = document.getElementById('final-score-display');
        display.style.display = 'block';
        display.innerHTML = `
            Το τελικό σου σκορ είναι: 
            <span class="score-highlight">${score} / ${quizData.length}</span>
            <span style="font-size:1rem; color:#64748b;">(Έχεις απαντήσει ${answeredQuestions} από τις ${quizData.length} ερωτήσεις)</span>
        `;
        
        // Ομαλό scroll προς το σκορ
        display.scrollIntoView({ behavior: 'smooth' });
    };
</script>
