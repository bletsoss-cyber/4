<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Λοβοί Εγκεφάλου - MCQs Νευροανατομίας</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #607080;
      --line: #d9e0e7;
      --accent: #244c78;
      --accent-2: #3f6f5b;
      --good: #1f7a4d;
      --bad: #b23a48;
      --warn: #a16013;
      --shadow: 0 12px 28px rgba(23, 32, 42, .08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }

    header {
      background: #102235;
      color: #fff;
      padding: 18px 22px;
      border-bottom: 4px solid #9b6b2f;
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2vw, 1.75rem);
      letter-spacing: 0;
      font-weight: 700;
    }

    .subtitle {
      margin: 4px 0 0;
      color: #d4dde7;
      font-size: .95rem;
    }

    main {
      width: min(1120px, calc(100% - 28px));
      margin: 24px auto 44px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    .panel, .question-card, .results-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel { padding: 18px; }
    .question-card { padding: 22px; }
    .results-card { padding: 22px; }

    .controls {
      display: grid;
      gap: 14px;
    }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 700;
      color: #334353;
      margin-bottom: 6px;
    }

    select, input[type="search"] {
      width: 100%;
      border: 1px solid #c9d2dc;
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #2d3c4b;
      font-size: .94rem;
    }

    .check-row input { width: 18px; height: 18px; }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 6px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 10px 13px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }

    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button.secondary {
      background: #fff;
      color: var(--accent);
      border-color: #b8c6d5;
    }
    button.good { background: var(--accent-2); }
    button.danger { background: #fff; color: var(--bad); border-color: #e2b7bd; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 74px;
    }

    .stat .label {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .stat .value {
      font-size: 1.22rem;
      font-weight: 800;
      margin-top: 4px;
    }

    .progress-wrap {
      height: 10px;
      background: #e5ebf0;
      border-radius: 999px;
      overflow: hidden;
      margin: 4px 0 18px;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #244c78, #3f6f5b);
      transition: width .22s ease;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: .9rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid #ccd7e2;
      background: #f8fafc;
      color: #334353;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: .82rem;
      font-weight: 700;
    }

    .question-text {
      font-size: clamp(1.08rem, 1.6vw, 1.34rem);
      font-weight: 750;
      margin: 0 0 18px;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      color: var(--ink);
      background: #fff;
      border: 1px solid #cbd5df;
      border-radius: 8px;
      padding: 12px 13px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      font-weight: 600;
      min-height: 56px;
    }

    .option:hover:not(:disabled) {
      border-color: #7892ae;
      background: #f7fafc;
    }

    .option.correct {
      border-color: rgba(31, 122, 77, .55);
      background: #eaf6ef;
      color: #145536;
    }

    .option.wrong {
      border-color: rgba(178, 58, 72, .55);
      background: #faecee;
      color: #852933;
    }

    .option-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #eef3f7;
      color: #21364b;
      font-weight: 800;
    }

    .feedback {
      margin-top: 16px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.good { border-color: #b9dcc8; background: #eef8f2; }
    .feedback.bad { border-color: #e4b9bf; background: #fff0f2; }
    .feedback-title {
      font-weight: 800;
      margin-bottom: 4px;
    }

    .side-title {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .distribution, .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }

    .distribution th, .distribution td,
    .result-table th, .result-table td {
      border-bottom: 1px solid var(--line);
      padding: 8px 4px;
      text-align: left;
      vertical-align: top;
    }

    .distribution th, .result-table th {
      color: #425466;
      font-size: .78rem;
      text-transform: uppercase;
    }

    .muted {
      color: var(--muted);
      font-size: .92rem;
    }

    .hidden { display: none !important; }

    .wrong-review {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .wrong-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfd;
    }

    .wrong-item strong { display: block; margin-bottom: 4px; }

    #printAll { display: none; }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .header-inner { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 520px) {
      main { width: min(100% - 18px, 1120px); margin-top: 14px; }
      .question-card, .results-card, .panel { padding: 14px; }
      .stats { grid-template-columns: 1fr; }
      .option { grid-template-columns: 30px minmax(0, 1fr); padding: 11px; }
      .button-row button { flex: 1 1 100%; }
    }

    @media print {
      body { background: #fff; color: #000; }
      header, .controls-panel, .stats, .progress-wrap, #quizArea, #resultsArea { display: none !important; }
      main { width: 100%; margin: 0; }
      #printAll { display: block; }
      .print-question {
        break-inside: avoid;
        border-bottom: 1px solid #ccc;
        padding: 12px 0;
      }
      .print-question h3 { margin: 0 0 6px; font-size: 13pt; }
      .print-question ol { margin: 4px 0 8px 22px; padding: 0; }
      .print-answer { font-size: 10.5pt; color: #222; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1>Λοβοί Εγκεφάλου - MCQs Νευροανατομίας</h1>
        <p class="subtitle">Δύσκολες ερωτήσεις πολλαπλής επιλογής βασισμένες στο PDF «ΛΟΒΟΙ ΕΓΚΕΦΑΛΟΥ».</p>
      </div>
      <button class="secondary" id="printBtn" type="button">Εκτύπωση</button>
    </div>
  </header>

  <main>
    <section class="stats" aria-label="Στατιστικά quiz">
      <div class="stat"><div class="label">Σκορ</div><div class="value" id="scoreStat">0</div></div>
      <div class="stat"><div class="label">Πρόοδος</div><div class="value" id="progressStat">0 / 0</div></div>
      <div class="stat"><div class="label">Επιτυχία</div><div class="value" id="percentStat">0%</div></div>
      <div class="stat"><div class="label">Κατηγορία</div><div class="value" id="categoryStat">-</div></div>
    </section>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

    <div class="grid">
      <section id="quizArea">
        <article class="question-card" id="questionCard">
          <div class="meta">
            <span class="pill" id="sourcePill">Πηγή</span>
            <span class="pill" id="modePill">Κανονικό quiz</span>
          </div>
          <p class="question-text" id="questionText">Ρύθμισε το quiz και πάτησε «Έναρξη».</p>
          <div class="options" id="optionsArea"></div>
          <div class="feedback" id="feedbackBox"></div>
          <div class="button-row">
            <button id="nextBtn" type="button" class="hidden">Επόμενη ερώτηση</button>
          </div>
        </article>
      </section>

      <aside class="panel controls-panel">
        <h2 class="side-title">Ρυθμίσεις</h2>
        <div class="controls">
          <div>
            <label for="categoryFilter">Κατηγορία</label>
            <select id="categoryFilter"></select>
          </div>
          <div>
            <label for="searchBox">Αναζήτηση</label>
            <input type="search" id="searchBox" placeholder="Όρος, δομή, αύλακα, πεδίο...">
          </div>
          <label class="check-row"><input type="checkbox" id="shuffleQuestions" checked> Ανακάτεμα ερωτήσεων</label>
          <label class="check-row"><input type="checkbox" id="shuffleAnswers" checked> Ανακάτεμα απαντήσεων</label>
          <div class="button-row">
            <button id="startBtn" type="button">Έναρξη</button>
            <button id="resumeBtn" type="button" class="secondary">Συνέχεια</button>
            <button id="clearBtn" type="button" class="danger">Καθαρισμός προόδου</button>
          </div>
          <p class="muted" id="poolInfo"></p>
        </div>
        <h2 class="side-title" style="margin-top:18px;">Κατανομή</h2>
        <table class="distribution" id="distributionTable"></table>
      </aside>
    </div>

    <section id="resultsArea" class="results-card hidden" aria-live="polite"></section>
    <section id="printAll"></section>
  </main>

  <script>
    const questions = [
      {

    function shuffle(array) {
      const a = array.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

      const orders = {};
      order.forEach(id => {
        const keys = questionById(id).options.map(o => o.key);
        orders[id] = shouldShuffle ? shuffle(keys) : keys;
      });
      return orders;
    }

    function saveState() {
      if (!state) return;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      els.resumeBtn.disabled = false;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed.order) || !parsed.order.length) return null;
        return parsed;
      } catch {
        return null;
      }
    }

    function startQuiz(ids, mode = "Κανονικό quiz") {
      const order = els.shuffleQuestions.checked ? shuffle(ids) : ids.slice();
      state = {
        order,
        current: 0,
        answers: {},
        optionOrders: buildOptionOrders(order, els.shuffleAnswers.checked),
        settings: {
          category: els.categoryFilter.value,
          search: els.searchBox.value,
          shuffleQuestions: els.shuffleQuestions.checked,
          shuffleAnswers: els.shuffleAnswers.checked
        },
        mode
      };
      els.resultsArea.classList.add("hidden");
      els.quizArea.classList.remove("hidden");
      saveState();
      renderQuestion();
    }

    function updatePoolInfo() {
      const pool = filteredQuestions();
      els.poolInfo.textContent = `Διαθέσιμες ερωτήσεις με τα τρέχοντα φίλτρα: ${pool.length} / ${questions.length}.`;
    }

    function updateStats() {
      const total = state ? state.order.length : 0;
      const answered = state ? Object.keys(state.answers).length : 0;
      const score = state ? Object.values(state.answers).filter(a => a.correct).length : 0;
      const percent = answered ? Math.round((score / answered) * 100) : 0;
      const currentQ = state && state.order[state.current] ? questionById(state.order[state.current]) : null;
      els.scoreStat.textContent = String(score);
      els.progressStat.textContent = `${Math.min(answered + (state && state.order[state.current] && state.answers[state.order[state.current]] ? 0 : 0), total)} / ${total}`;
      els.percentStat.textContent = `${percent}%`;
      els.categoryStat.textContent = currentQ ? currentQ.category : "-";
      els.progressBar.style.width = total ? `${(answered / total) * 100}%` : "0%";
    }

    function renderQuestion() {
      if (!state || !state.order.length) {
        updateStats();
        return;
      }
      if (state.current >= state.order.length) {
        renderResults();
        return;
      }
      const q = questionById(state.order[state.current]);
      const answer = state.answers[q.id];
      els.questionText.textContent = q.question;
      els.sourcePill.textContent = q.source || "PDF";
      els.modePill.textContent = state.mode || "Κανονικό quiz";
      els.optionsArea.innerHTML = "";
      const order = state.optionOrders[q.id] || q.options.map(o => o.key);
      order.map(key => q.options.find(o => o.key === key)).forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "option";
        btn.disabled = !!answer;
        btn.dataset.key = opt.key;
        const visibleKey = letters[index];
        btn.innerHTML = `<span class="option-key">${visibleKey}</span><span>${opt.text}</span>`;
        if (answer) {
          if (opt.correct) btn.classList.add("correct");
          if (answer.key === opt.key && !opt.correct) btn.classList.add("wrong");
        }
        btn.addEventListener("click", () => submitAnswer(q, opt));
        els.optionsArea.appendChild(btn);
      });
      renderFeedback(q, answer);
      els.nextBtn.classList.toggle("hidden", !answer);
      els.nextBtn.textContent = state.current === state.order.length - 1 ? "Αποτελέσματα" : "Επόμενη ερώτηση";
      updateStats();
      saveState();
    }

    function renderFeedback(q, answer) {
      els.feedbackBox.className = "feedback";
      els.feedbackBox.innerHTML = "";
      if (!answer) return;
      els.feedbackBox.classList.add("show", answer.correct ? "good" : "bad");
      const correctOpt = q.options.find(o => o.correct);
      els.feedbackBox.innerHTML = `
        <div class="feedback-title">${answer.correct ? "Σωστό." : "Λάθος."}</div>
        <div><strong>Σωστή απάντηση:</strong> ${correctOpt.text}</div>
        <div style="margin-top:6px;">${q.explanation}</div>
      `;
    }

    function submitAnswer(q, opt) {
      if (state.answers[q.id]) return;
      state.answers[q.id] = { key: opt.key, correct: !!opt.correct };
      saveState();
      renderQuestion();
    }

    function nextQuestion() {
      if (!state) return;
      if (state.current >= state.order.length - 1) {
        state.current = state.order.length;
        saveState();
        renderResults();
      } else {
        state.current += 1;
        saveState();
        renderQuestion();
      }
    }

    function renderResults() {
      const total = state.order.length;
      const answered = Object.keys(state.answers).length;
      const correct = Object.values(state.answers).filter(a => a.correct).length;
      const wrongIds = state.order.filter(id => state.answers[id] && !state.answers[id].correct);
      const wrong = wrongIds.length;
      const percent = total ? Math.round((correct / total) * 100) : 0;
      const byCat = {};
      state.order.forEach(id => {
        const q = questionById(id);
        if (!byCat[q.category]) byCat[q.category] = { total: 0, correct: 0 };
        byCat[q.category].total += 1;
        if (state.answers[id]?.correct) byCat[q.category].correct += 1;
      });
      els.quizArea.classList.add("hidden");
      els.resultsArea.classList.remove("hidden");
      els.resultsArea.innerHTML = `
        <h2 style="margin-top:0;">Τελικό αποτέλεσμα</h2>
        <p><strong>Σκορ:</strong> ${correct}/${total} (${percent}%) · <strong>Σωστές:</strong> ${correct} · <strong>Λανθασμένες:</strong> ${wrong} · <strong>Απαντημένες:</strong> ${answered}</p>
        <h3>Απόδοση ανά κατηγορία</h3>
        <table class="result-table">
          <thead><tr><th>Κατηγορία</th><th>Σωστές</th><th>Σύνολο</th><th>Ποσοστό</th></tr></thead>
          <tbody>
            ${Object.entries(byCat).map(([cat, v]) => `<tr><td>${cat}</td><td>${v.correct}</td><td>${v.total}</td><td>${Math.round((v.correct / v.total) * 100)}%</td></tr>`).join("")}
          </tbody>
        </table>
        <div class="button-row" style="margin-top:16px;">
          <button type="button" id="restartResults">Επανεκκίνηση</button>
          <button type="button" id="repeatWrong" class="good" ${wrongIds.length ? "" : "disabled"}>Επανάληψη λανθασμένων</button>
        </div>
        <h3>Λανθασμένες ερωτήσεις</h3>
        <div class="wrong-review">
          ${wrongIds.length ? wrongIds.map(id => {
            const q = questionById(id);
            const chosen = q.options.find(o => o.key === state.answers[id].key);
            const correctOpt = q.options.find(o => o.correct);
            return `<div class="wrong-item"><strong>${q.id}. ${q.question}</strong><div class="muted">${q.category} · ${q.source}</div><div>Απάντησες: ${chosen.text}</div><div>Σωστό: ${correctOpt.text}</div><div class="muted">${q.explanation}</div></div>`;
          }).join("") : `<p class="muted">Δεν υπάρχουν λανθασμένες ερωτήσεις.</p>`}
        </div>
      `;
      document.getElementById("restartResults").addEventListener("click", () => {
        const ids = filteredQuestions().map(q => q.id);
        if (ids.length) startQuiz(ids, "Κανονικό quiz");
      });
      const repeatBtn = document.getElementById("repeatWrong");
      repeatBtn.addEventListener("click", () => {
        if (wrongIds.length) startQuiz(wrongIds, "Επανάληψη λανθασμένων");
      });
      updateStats();
    }

    function renderDistribution() {
      const counts = {};
      questions.forEach(q => counts[q.category] = (counts[q.category] || 0) + 1);
      els.distributionTable.innerHTML = `
        <thead><tr><th>Κατηγορία</th><th>Ερωτήσεις</th></tr></thead>
        <tbody>${Object.entries(counts).map(([cat, n]) => `<tr><td>${cat}</td><td>${n}</td></tr>`).join("")}</tbody>
      `;
    }

    function renderPrintAll() {
      els.printAll.innerHTML = `
        <h1>Λοβοί Εγκεφάλου - MCQs Νευροανατομίας</h1>
        <p>Ερωτήσεις, επιλογές και ενότητα απαντήσεων/αιτιολογήσεων.</p>
        ${questions.map(q => {
          const correct = q.options.find(o => o.correct);
          return `<div class="print-question"><h3>${q.id}. ${q.question}</h3><div>${q.category} · ${q.source}</div><div>${q.options.map(o => `<p>${o.key}) ${o.text}</p>`).join("")}</div><div class="print-answer"><strong>Απάντηση:</strong> ${correct.key}) ${correct.text}<br><strong>Αιτιολόγηση:</strong> ${q.explanation}</div></div>`;
        }).join("")}
      `;
    }

    function init() {
      getCategories().forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        els.categoryFilter.appendChild(opt);
      });
      const all = document.createElement("option");
      all.value = "all";
      all.textContent = "Όλες οι κατηγορίες";
      els.categoryFilter.insertBefore(all, els.categoryFilter.firstChild);
      els.categoryFilter.value = "all";

      renderDistribution();
      renderPrintAll();
      updatePoolInfo();
      updateStats();

      const saved = loadState();
      els.resumeBtn.disabled = !saved;

      els.startBtn.addEventListener("click", () => {
        const pool = filteredQuestions();
        if (!pool.length) {
          els.poolInfo.textContent = "Δεν βρέθηκαν ερωτήσεις με αυτά τα φίλτρα.";
          return;
        }
        startQuiz(pool.map(q => q.id));
      });

      els.resumeBtn.addEventListener("click", () => {
        const savedState = loadState();
        if (!savedState) return;
        state = savedState;
        els.resultsArea.classList.add("hidden");
        els.quizArea.classList.remove("hidden");
        renderQuestion();
      });

      els.clearBtn.addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        els.resumeBtn.disabled = true;
        state = null;
        els.resultsArea.classList.add("hidden");
        els.quizArea.classList.remove("hidden");
        els.questionText.textContent = "Η αποθηκευμένη πρόοδος καθαρίστηκε. Πάτησε «Έναρξη» για νέο quiz.";
        els.optionsArea.innerHTML = "";
        els.feedbackBox.className = "feedback";
        els.nextBtn.classList.add("hidden");
        updateStats();
      });

      els.categoryFilter.addEventListener("change", updatePoolInfo);
      els.searchBox.addEventListener("input", updatePoolInfo);
      els.nextBtn.addEventListener("click", nextQuestion);
      els.printBtn.addEventListener("click", () => window.print());
    }

    init();
  </script>
</body>
</html>
