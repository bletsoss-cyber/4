<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Quiz Αξιολόγησης: Γαμετογένεση</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        #quiz-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 800px; width: 100%; }
        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; color: #2c3e50; }
        .option { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 8px; text-align: left; cursor: pointer; transition: 0.3s; font-size: 1rem; background: white; }
        .option:hover:not(:disabled) { background: #edf2f7; border-color: #cbd5e0; }
        .option.correct { background: #c6f6d5 !important; border-color: #48bb78 !important; color: #22543d; }
        .option.wrong { background: #fed7d7 !important; border-color: #f56565 !important; color: #742a2a; }
        #feedback { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; line-height: 1.5; font-size: 0.95rem; }
        .feedback-correct { background: #f0fff4; border-left: 5px solid #48bb78; color: #22543d; }
        .feedback-wrong { background: #fff5f5; border-left: 5px solid #f56565; color: #742a2a; }
        #nav-controls { margin-top: 30px; display: flex; justify-content: space-between; width: 100%; }
        button.nav-btn { padding: 12px 25px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #progress { margin-bottom: 20px; font-weight: bold; color: #4a5568; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="progress">Ερώτηση 1 από 40</div>
    <div id="question-area">
        <div id="question-text" class="question-text"></div>
        <div id="options-container"></div>
    </div>
    <div id="feedback"></div>
    <div id="nav-controls">
        <button id="prev-btn" class="nav-btn" disabled>Προηγούμενη</button>
        <button id="next-btn" class="nav-btn">Επόμενη</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "Από ποιο εμβρυϊκό στρώμα προέρχονται τα αρχέγονα γεννητικά κύτταρα (PGCs) κατά τη 2η εβδομάδα;",
            o: ["Υποβλάστη", "Επιβλάστη", "Εξωεμβρυϊκό μεσόδερμα", "Ενδόδερμα λεκιθικού ασκού"],
            c: 1,
            f: "Τα PGCs σχηματίζονται στην επιβλάστη κατά τη 2η εβδομάδα και στη συνέχεια μετακινούνται μέσω της αρχικής ταινίας[cite: 1]."
        },
        {
            q: "Πότε φτάνουν τα PGCs στις αναπτυσσόμενες γονάδες (γεννητικές ακρολοφίες);",
            o: ["Τέλος 2ης εβδομάδας", "Τέλος 4ης εβδομάδας", "Τέλος 5ης εβδομάδας", "Αρχές 7ης εβδομάδας"],
            c: 2,
            f: "Η μετανάστευση ξεκινά την 4η εβδομάδα και η άφιξη ολοκληρώνεται στο τέλος της 5ης εβδομάδας[cite: 1]."
        },
        {
            q: "Σε ποιο στάδιο της μείωσης Ι σταματούν τα πρωτογενή ωοκύτταρα κατά τη γέννηση;",
            o: ["Λεπτοταινία", "Παχυταινία", "Διπλοταινία", "Διακίνηση"],
            c: 2,
            f: "Τα ωοκύτταρα εισέρχονται στη φάση διπλοταινίας της πρόφασης Ι, όπου παραμένουν έως την ωορρηξία[cite: 1]."
        },
        {
            q: "Ποια ορμόνη πυροδοτεί την ολοκλήρωση της μείωσης Ι στο πρωτογενές ωοκύτταρο;",
            o: ["FSH", "LH", "Οιστρογόνα", "Προγεστερόνη"],
            c: 1,
            f: "Η αιχμή της LH (LH surge) προκαλεί την ολοκλήρωση της μείωσης Ι λίγο πριν την ωορρηξία[cite: 1]."
        },
        {
            q: "Ποιο είναι το αποτέλεσμα της ολοκλήρωσης της μείωσης Ι στο θηλυκό;",
            o: ["2 ισομερή δευτερογενή ωοκύτταρα", "1 δευτερογενές ωοκύτταρο και 1 πολικό σωμάτιο", "4 απλοειδείς σπερματίδες", "1 ώριμο ωάριο"],
            c: 1,
            f: "Σχηματίζονται δύο κύτταρα με ανόμοιο μέγεθος: το δευτερογενές ωοκύτταρο και το πρώτο πολικό σωμάτιο[cite: 1]."
        },
        {
            q: "Πού σταματά η μείωση ΙΙ του δευτερογενούς ωοκυττάρου πριν τη γονιμοποίηση;",
            o: ["Πρόφαση ΙΙ", "Μετάφαση ΙΙ", "Ανάφαση ΙΙ", "Τελόφαση ΙΙ"],
            c: 1,
            f: "Η μείωση ΙΙ σταματά στη μετάφαση και ολοκληρώνεται μόνο εάν συμβεί γονιμοποίηση[cite: 1]."
        },
        {
            q: "Πόσα αρχέγονα ωοθυλάκια 'διασώζει' η FSH κάθε μήνα στην εφηβεία;",
            o: ["1-2", "5-10", "15-20", "50-100"],
            c: 2,
            f: "Στην εφηβεία, κάθε μήνα, 15-20 αρχέγονα ωοθυλάκια επιλέγονται υπό την επίδραση της FSH[cite: 1]."
        },
        {
            q: "Από τι αποτελείται η διάφανη ζώνη (zona pellucida);",
            o: ["Λιπίδια", "Γλυκοπρωτεΐνες", "Κολλαγόνο", "Ελαστίνη"],
            c: 1,
            f: "Η διάφανη ζώνη είναι μια στιβάδα γλυκοπρωτεϊνών (ZP1, ZP2, ZP3, ZP4) που εκκρίνεται από τα θυλακικά κύτταρα και το ωοκύτταρο[cite: 1]."
        },
        {
            q: "Ποια είναι η λειτουργία των κυττάρων της έσω θήκης;",
            o: ["Παραγωγή ινώδους ιστού", "Έκκριση ορμονών", "Φαγοκυττάρωση", "Σχηματισμό της ουράς"],
            c: 1,
            f: "Η θυλακική θήκη χωρίζεται σε έσω θήκη (εκκριτικά κύτταρα) και έξω θήκη (ινώδη κύτταρα)[cite: 1]."
        },
        {
            q: "Τι προκαλεί την αποδόμηση του κολλαγόνου γύρω από το γρααφιανό ωοθυλάκιο;",
            o: ["Προσταγλανδίνες", "Κολλαγονάσες (υπό LH)", "Οιστρογόνα", "hCG"],
            c: 1,
            f: "Η LH αυξάνει τη δραστηριότητα των κολλαγονασών, που αποδομούν τις ίνες κολλαγόνου για την έξοδο του ωαρίου[cite: 1]."
        },
        {

        },
        {

            o: ["LH", "FSH", "hCG", "Προλακτίνη"],
            c: 2,
            f: "Λόγω της δράσης της hCG, το ωχρό σωμάτιο διογκώνεται και σχηματίζεται το ωχρό σωμάτιο της κύησης[cite: 1]."
        },
        {
            q: "Από ποια κύτταρα προέρχονται τα κύτταρα Sertoli;",
            o: ["PGCs", "Επιφανειακό επιθήλιο του όρχεως", "Μεσόδερμα οπισθίου εντέρου", "Λεκιθικό ασκό"],
            c: 1,
            f: "Τα στηρικτικά κύτταρα (Sertoli) προέρχονται από το επιφανειακό επιθήλιο του όρχεως[cite: 1]."
        },
        {
            q: "Ποια είναι η διάρκεια μετατροπής των σπερματογονίων τύπου Α σε ώριμα σπερματοζωάρια;",
            o: ["24 ώρες", "48 ώρες", "74 ώρες", "100 ώρες"],
            c: 2,
            f: "Σύμφωνα με το έγγραφο, το διάστημα αυτό είναι 74 ώρες[cite: 1]."
        },
        {
            q: "Τι περιλαμβάνει η σπερμιογένεση;",
            o: ["Μείωση των χρωμοσωμάτων", "Σχηματισμό ακροσώματος και ουράς", "Μιτωτική διαίρεση", "Σχηματισμό του άντρου"],
            c: 1,
            f: "Η σπερμιογένεση είναι η μορφολογική μετατροπή των σπερματίδων σε σπερματοζωάρια (ακρόσωμα, πύκνωση πυρήνα, ουρά)[cite: 1]."
        },
        {
            q: "Τι ορίζεται ως αζωοσπερμία;",
            o: ["Ελάττωση αριθμού σπερματοζωαρίων", "Απουσία σπερματοζωαρίων", "Μειωμένη κινητικότητα", "Ανώμαλη μορφολογία"],
            c: 1,
            f: "Αζωοσπερμία είναι η πλήρης απουσία σπερματοζωαρίων στο σπέρμα[cite: 1]."
        },
        {
            q: "Ποιο ποσοστό του σπέρματος αποτελούν τα σπερματοζωάρια;",
            o: ["3-5%", "25-30%", "60-65%", "90%"],
            c: 0,
            f: "Τα σπερματοζωάρια αποτελούν μόλις το 3-5% του σπέρματος, με το υπόλοιπο να είναι εκκρίσεις αδένων[cite: 1]."
        },
        {
            q: "Τι συμβαίνει στα διπύρηνα ωοκύτταρα;",
            o: ["Δημιουργούν δίδυμα", "Πεθαίνουν πριν ωριμάσουν", "Γονιμοποιούνται κανονικά", "Γίνονται πολικά σωμάτια"],
            c: 1,
            f: "Τα διπύρηνα ή τριπύρηνα ωοκύτταρα πεθαίνουν πριν ωριμάσουν[cite: 1]."
        },
        {
            q: "Ποια φάση του ενδομητρίου συμπίπτει με την ωοθηκική παραγωγή προγεστερόνης;",
            o: ["Παραγωγική", "Εκκριτική", "Ισχαιμική", "Εμμηνορρυσιακή"],
            c: 1,
            f: "Η έκκριση προγεστερόνης από το ωχρό σωμάτιο οδηγεί στην εκκριτική φάση του ενδομητρίου[cite: 1]."
        },
        {
            q: "Πού αποθηκεύονται τα μιτοχόνδρια στο ώριμο σπερματοζωάριο;",
            o: ["Κεφαλή", "Ακρόσωμα", "Μέσο τμήμα", "Ουρά"],
            c: 2,
            f: "Τα μιτοχόνδρια οργανώνονται στο μέσο τμήμα του σπερματοζωαρίου για την παροχή ενέργειας[cite: 1]."
        },
        // Οι υπόλοιπες 20 ερωτήσεις ακολουθούν την ίδια λογική εξαντλητικής κάλυψης
        { q: "Ποια ορμόνη εκκρίνουν τα θυλακικά κύτταρα υπό την FSH;", o: ["Προγεστερόνη", "Οιστρογόνα", "LH", "GnRH"], c: 1, f: "Η FSH προκαλεί την έκκριση οιστρογόνων από τα θυλακικά κύτταρα[cite: 1]." },
        { q: "Τι προκαλεί η αύξηση των οιστρογόνων στην τραχηλική βλέννη;", o: ["Πήξη", "Λέπτυνση", "Αιμορραγία", "Καμία αλλαγή"], c: 1, f: "Ως αποτέλεσμα της έκκρισης οιστρογόνων έχουμε τη λέπτυνση της τραχηλικής βλέννης[cite: 1]." },
        { q: "Πόσα σπερματοζωάρια σχηματίζονται καθημερινά;", o: ["1 εκατομμύριο", "100 εκατομμύρια", "300 δισεκατομμύρια", "1 τρισεκατομμύριο"], c: 2, f: "300 δισεκατομμύρια σπερματοζωάρια σχηματίζονται καθημερινά[cite: 1]." },
        { q: "Τι ορίζεται ως ολιγοσπερμία;", o: ["Κάτω από 100 εκ/ml", "Κάτω από 50 εκ/ml", "Κάτω από 20 εκ/ml", "Κάτω από 1 εκ/ml"], c: 2, f: "Ολιγοσπερμία είναι η ελάττωση κάτω από 20 εκατομμύρια/ml[cite: 1]." },
        { q: "Ποιο όργανο εκκρίνει το 60-65% του σπέρματος;", o: ["Προστάτης", "Σπερματοδόχες κύστεις", "Βολβουρηθραίοι αδένες", "Όρχεις"], c: 1, f: "Οι σπερματοδόχες κύστεις εκκρίνουν το 60-65% του όγκου[cite: 1]." },
        { q: "Ποια ορμόνη παράγεται από τον υποθάλαμο για τον έλεγχο του κύκλου;", o: ["FSH", "LH", "GnRH", "hCG"], c: 2, f: "Η GnRH του υποθαλάμου πυροδοτεί την έκκριση FSH και LH[cite: 1]." },
        { q: "Τι ονομάζεται στίγμα της ωοθήκης;", o: ["Σημείο γονιμοποίησης", "Περιοχή προεξοχής πριν την ωορρηξία", "Ουλή από λευκό σωμάτιο", "Υπολειμματικό ωοθυλάκιο"], c: 1, f: "Λίγο πριν την ωορρηξία σχηματίζεται το στίγμα στην επιφάνεια της ωοθήκης[cite: 1]." },
        { q: "Ποια κύτταρα αποτελούν την ακτινωτή στεφάνη;", o: ["Κύτταρα Sertoli", "Κύτταρα της έσω θήκης", "Κύτταρα του ωοφόρου λόφου", "Κύτταρα της έξω θήκης"], c: 2, f: "Ορισμένα κύτταρα του ωοφόρου λόφου αποβάλλονται με το ωάριο σχηματίζοντας την ακτινωτή στεφάνη[cite: 1]." },
        { q: "Σε ποια φάση του κύκλου το ενδομήτριο είναι 'ισχαιμικό';", o: ["Ημέρα 1-5", "Ημέρα 14", "Ημέρα 27-28", "Ημέρα 10"], c: 2, f: "Η ισχαιμική φάση συμβαίνει λίγο πριν την έμμηνο ρύση (ημέρα 27-28)[cite: 1]." },
        { q: "Τι συμβαίνει στο κυτταρόπλασμα της σπερματίδας;", o: ["Διπλασιάζεται", "Γίνεται ακρόσωμα", "Αποπίπτει και φαγοκυτταρώνεται", "Μετατρέπεται σε DNA"], c: 2, f: "Το περισσότερο κυτταρόπλασμα αποπίπτει και φαγοκυτταρώνεται από τα κύτταρα Sertoli[cite: 1]." },
        { q: "Τι είναι η τερατοζωοσπερμία;", o: ["Μειωμένος αριθμός", "Μορφολογική αλλοίωση", "Πλήρης ακινησία", "Απουσία σπέρματος"], c: 1, f: "Τερατοζωοσπερμία είναι η ποιοτική αλλοίωση της μορφολογίας (π.χ. 2 κεφαλές)[cite: 1]." },
        { q: "Ποια δομή εκκρίνει προγεστερόνη έως τον 4ο μήνα της κύησης;", o: ["Πλακούντας", "Ωχρό σωμάτιο κύησης", "Υπόφυση", "Μήτρα"], c: 1, f: "Το ωχρό σωμάτιο της κύησης εκκρίνει προγεστερόνη έως τον 4ο μήνα[cite: 1]." },
        { q: "Ποιος είναι ο ρόλος των προσταγλανδινών στην ωορρηξία;", o: ["Λέπτυνση βλέννης", "Σύσπαση ωοθηκικού τοιχώματος", "Σύνθεση DNA", "Σχηματισμός πολικού σωματίου"], c: 1, f: "Οι προσταγλανδίνες προκαλούν σύσπαση του ωοθηκικού τοιχώματος[cite: 1]." },
        { q: "Πώς μεταφέρεται το σπερματοζωάριο στην επιδιδυμίδα;", o: ["Με δική του κίνηση", "Παθητικά μέσω ορχικού υγρού", "Μέσω της κυκλοφορίας του αίματος", "Δεν μεταφέρεται"], c: 1, f: "Η μεταφορά στην επιδιδυμίδα είναι παθητική μέσω του ορχικού υγρού[cite: 1]." },
        { q: "Ποιο κύτταρο έχει 'παρατεταμένη πρόφαση' στη σπερματογένεση;", o: ["Σπερματογόνιο", "Πρωτογενές σπερματοκύτταρο", "Σπερματίδα", "Σπερματοζωάριο"], c: 1, f: "Τα πρωτογενή σπερματοκύτταρα εισέρχονται σε μια παρατεταμένη πρόφαση της μείωσης Ι[cite: 1]." },
        { q: "Τι είναι το 'άντρο' στο ωοθυλάκιο;", o: ["Ο πυρήνας του ωαρίου", "Κοιλότητα με υγρό", "Η εξωτερική θήκη", "Το πολικό σωμάτιο"], c: 1, f: "Το άντρο είναι η κοιλότητα που σχηματίζεται στο δευτερογενές/τριτογενές ωοθυλάκιο[cite: 1]." },
        { q: "Πόσα χρωμοσώματα έχει το δευτερογενές σπερματοκύτταρο;", o: ["46", "23", "92", "0"], c: 1, f: "Μετά τη μείωση Ι, τα δευτερογενή σπερματοκύτταρα έχουν απλοειδή αριθμό (23)[cite: 1]." },
        { q: "Ποια είναι η ταχεία φάση διέλευσης του σπερματοζωαρίου;", o: ["Στην επιδιδυμίδα", "Στον τράχηλο", "Στον εκφορητικό πόρο", "Στη μήτρα"], c: 2, f: "Η ταχεία διέλευση συμβαίνει στον εκφορητικό πόρο[cite: 1]." },
        { q: "Τι συμβαίνει αν το ωάριο δεν γονιμοποιηθεί εντός 24 ωρών;", o: ["Γίνεται κύστη", "Εκφυλίζεται", "Επιστρέφει στην ωοθήκη", "Μένει στη σάλπιγγα για πάντα"], c: 1, f: "Το ωάριο εκφυλίζεται αν δεν γονιμοποιηθεί σύντομα μετά την ωορρηξία[cite: 1]." },
        { q: "Ποιος παράγοντας οδηγεί στην εμμηνορρυσία;", o: ["Αύξηση LH", "Πτώση προγεστερόνης/οιστρογόνων", "Αύξηση hCG", "Λέπτυνση ενδομητρίου"], c: 1, f: "Ο εκφυλισμός του ωχρού σωματίου προκαλεί πτώση ορμονών και απόπτωση του ενδομητρίου[cite: 1]." }
    ];

    let currentQuestion = 0;
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const feedback = document.getElementById('feedback');
    const progress = document.getElementById('progress');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function loadQuestion() {
        const q = quizData[currentQuestion];
        questionText.textContent = q.q;
        optionsContainer.innerHTML = '';
        feedback.style.display = 'none';
        progress.textContent = `Ερώτηση ${currentQuestion + 1} από ${quizData.length}`;

        q.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(index);
            optionsContainer.appendChild(btn);
        });

        prevBtn.disabled = currentQuestion === 0;
        nextBtn.disabled = true;
    }

    function checkAnswer(selected) {
        const q = quizData[currentQuestion];
        const options = document.querySelectorAll('.option');
        
        options.forEach((btn, index) => {
            btn.disabled = true;
            if (index === q.c) btn.classList.add('correct');
            else if (index === selected) btn.classList.add('wrong');
        });

        feedback.style.display = 'block';
        if (selected === q.c) {
            feedback.className = 'feedback-correct';
            feedback.innerHTML = `<b>Σωστό!</b> ${q.f}`;
        } else {
            feedback.className = 'feedback-wrong';
            feedback.innerHTML = `<b>Λάθος.</b> ${q.f}`;
        }
        nextBtn.disabled = false;
    }

    nextBtn.onclick = () => {
        if (currentQuestion < quizData.length - 1) {
            currentQuestion++;
            loadQuestion();
        }
    };

    prevBtn.onclick = () => {
        if (currentQuestion > 0) {
            currentQuestion--;
            loadQuestion();
        }
    };

    loadQuestion();
</script>

</body>
</html>
