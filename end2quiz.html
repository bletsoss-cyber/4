<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ακαδημαϊκό Κουίζ: Προκλινική Ενδοδοντία</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --correct-color: #27ae60;
            --incorrect-color: #e74c3c;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 800px;
            padding: 40px;
        }

        .quiz-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .quiz-header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .progress {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
            color: var(--secondary-color);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background-color: var(--card-bg);
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            line-height: 1.4;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            background-color: #f1f8ff;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background-color: #e8f8f5;
            border-color: var(--correct-color);
            color: #1e8449;
        }

        .option-btn.incorrect {
            background-color: #fdedec;
            border-color: var(--incorrect-color);
            color: #c0392b;
        }

        .explanation-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
            animation: fadeIn 0.4s ease;
        }

        .explanation-box h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: var(--primary-color);
        }

        .explanation-box p {
            margin: 0;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .next-btn {
            display: none;
            margin-top: 30px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-weight: 600;
        }

        .next-btn:hover {
            background-color: var(--secondary-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-screen {
            text-align: center;
        }

        .result-screen h2 {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-content">
            <div class="quiz-header">
                <h1>Μορφολογία Πολφικής Κοιλότητας</h1>
                <div class="progress" id="progress">Ερώτηση 1 από 3</div>
            </div>
            
            <div class="question-text" id="question">Loading...</div>
            
            <div class="options-grid" id="options">
                </div>

            <div class="explanation-box" id="explanation">
                <h3>Ακαδημαϊκή Επεξήγηση</h3>
                <p id="explanation-text"></p>
            </div>

            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Επόμενη Ερώτηση</button>
        </div>
        
        <div id="result-screen" class="result-screen" style="display: none;">
            <h2>Το Κουίζ Ολοκληρώθηκε!</h2>
            <p id="final-score"></p>
            <button class="next-btn" style="display: inline-block; width: auto;" onclick="location.reload()">Επανεκκίνηση</button>
        </div>
    </div>

        let currentQuestionIndex = 0;
        let score = 0;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const progressEl = document.getElementById('progress');
        const explanationBox = document.getElementById('explanation');
        const explanationText = document.getElementById('explanation-text');
        const nextBtn = document.getElementById('next-btn');
        const quizContent = document.getElementById('quiz-content');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreEl = document.getElementById('final-score');

        function loadQuestion() {
            // Reset state
            explanationBox.style.display = 'none';
            nextBtn.style.display = 'none';
            optionsEl.innerHTML = '';
            
            const currentQuestion = quizData[currentQuestionIndex];
            
            // Set Progress and Question
            progressEl.textContent = `Ερώτηση ${currentQuestionIndex + 1} από ${quizData.length}`;
            questionEl.textContent = currentQuestion.question;

            // Generate Options
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.textContent = option;
                button.classList.add('option-btn');
                button.onclick = () => selectOption(index, button);
                optionsEl.appendChild(button);
            });
        }

        function selectOption(selectedIndex, selectedButton) {
            const currentQuestion = quizData[currentQuestionIndex];
            const buttons = document.querySelectorAll('.option-btn');

            // Disable all buttons
            buttons.forEach(btn => btn.disabled = true);

            // Check correct/incorrect
            if (selectedIndex === currentQuestion.correctAnswer) {
                selectedButton.classList.add('correct');
                score++;
            } else {
                selectedButton.classList.add('incorrect');
                // Highlight the correct answer
                buttons[currentQuestion.correctAnswer].classList.add('correct');
            }

            // Show explanation
            explanationText.innerHTML = `<strong>${selectedIndex === currentQuestion.correctAnswer ? 'Σωστό!' : 'Λάθος.'}</strong> ${currentQuestion.explanation}`;
            explanationBox.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizContent.style.display = 'none';
            resultScreen.style.display = 'block';
            finalScoreEl.innerHTML = `Απάντησες σωστά στις <strong>${score}</strong> από τις <strong>${quizData.length}</strong> ερωτήσεις.`;
        }

        // Initialize App
        loadQuestion();
    </script>
