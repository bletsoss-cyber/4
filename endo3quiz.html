<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Προκλινική Ενδοδοντία ΙΙ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        .question-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .question-text {
            font-size: 1.1em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            padding: 12px 15px;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option:hover:not(.disabled) {
            background-color: #e2e6ea;
            border-color: #dae0e5;
        }
        .option.correct {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f4fd;
            border-left: 4px solid #3498db;
            border-radius: 4px;
            font-size: 0.95em;
        }
        .explanation.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>Ενδοδοντία: Τεστ Λεπτομερειών Προσθίων Δοντιών</h1>
    <div id="quiz-container"></div>

    <script>
        const quizData = [
            {
                question: "1. Ποιο είναι το ακριβές ποσοστό εμφάνισης παράπλευρων ριζικών σωλήνων στον άνω κεντρικό τομέα;",
                options: ["8%", "9.2%", "29%", "12%"],
                correct: 1,
                explanation: "Σωστό! Το ποσοστό εμφάνισης παράπλευρων ριζικών σωλήνων στον άνω κεντρικό τομέα είναι ακριβώς 9.2%[cite: 30]."
            },
            {
                question: "2. Σε τι ποσοστό ο ριζικός σωλήνας του άνω κεντρικού τομέα εμφανίζει άπω πορεία;",
                options: ["9.2%", "100%", "8%", "75%"],
                correct: 2,
                explanation: "Σωστό! Ενώ στο 75% των περιπτώσεων η πορεία είναι ευθεία, στο 8% εμφανίζει άπω πορεία[cite: 27]."
            },
            {
                question: "3. Ποια είναι η υπερώια απόκλιση (σε μοίρες) του άνω κεντρικού τομέα;",
                options: ["17°", "22.5°", "29°", "12°"],
                correct: 2,
                explanation: "Ο άνω κεντρικός τομέας παρουσιάζει χαρακτηριστική υπερώια απόκλιση 29°[cite: 51, 53]."
            },
            {
                question: "4. Ποιο είναι το μέσο μήκος μύλης και μήκος ρίζας (αντίστοιχα) του άνω κεντρικού τομέα;",
                options: ["12 χιλ / 10.5 χιλ", "10.5 χιλ / 12 χιλ", "17 χιλ / 29 χιλ", "12 χιλ / 22.5 χιλ"],
                correct: 1,
                explanation: "Το μήκος της μύλης είναι 10.5 χιλιοστά και το μήκος της ρίζας 12 χιλιοστά[cite: 16]."
            },
            {
                question: "5. Τι ισχύει για τη σχέση μυλικού θαλάμου και ριζικού σωλήνα στον άνω κεντρικό τομέα;",
                options: ["Ο μυλικός θάλαμος διαχωρίζεται σαφώς από τον ριζικό σωλήνα", "Υπάρχει έντονη στένωση στο υποπολφικό τοίχωμα", "Ο μυλικός θάλαμος δε διαχωρίζεται από τον ριζικό σωλήνα", "Διαχωρίζονται μόνο στο 8% των περιπτώσεων"],
                correct: 2,
                explanation: "Ένα από τα χαρακτηριστικά του άνω κεντρικού είναι ότι ο μυλικός θάλαμος ΔΕΝ διαχωρίζεται από τον ριζικό σωλήνα[cite: 26]."
            },
            {
                question: "6. Από ποια επιφάνεια πρέπει να γίνεται Η διάνοιξη στα πρόσθια δόντια σε περίπτωση εκτεταμένης όμορης τερηδόνας;",
                options: ["Από την όμορη επιφάνεια, για εξοικονόμηση οδοντικής ουσίας", "Πάντα από τη γλωσσική επιφάνεια", "Από την κοπτική επιφάνεια", "Από την προστομιακή επιφάνεια"],
                correct: 1,
                explanation: "Η διάνοιξη γίνεται ΠΑΝΤΑ από τη γλωσσική επιφάνεια για τα πρόσθια δόντια. Ποτέ από τις όμορες, ακόμη κι αν υπάρχει εκτεταμένη τερηδόνα[cite: 72, 73]."
            },
            {
                question: "7. Τι εργαλείο απαγορεύεται αυστηρά να χρησιμοποιείται για τον καθαρισμό και το στέγνωμα της πολφικής κοιλότητας;",
                options: ["Κυλινδροκωνική εγγλυφίδα", "Διακλυσμοί με υγρά", "Ρεύμα αέρος", "Εγγλυφίδα υψηλών ταχυτήτων"],
                correct: 2,
                explanation: "Δεν πρέπει ΠΟΤΕ να χρησιμοποιείται ρεύμα αέρος για τον καθαρισμό και το στέγνωμα της κοιλότητας[cite: 81]."
            },
            {
                question: "8. Ποιο είναι το πλέον σταθερό ανατομικό σημείο για τον εντοπισμό του ριζικού σωλήνα σύμφωνα με τους νόμους ανατομίας;",
                options: ["Το γλωσσικό φύμα", "Η αδαμαντινοοστεϊνική σύναψη (ΑΟΣ)", "Το έδαφος του πολφικού θαλάμου", "Τα πολφικά κέρατα"],
                correct: 1,
                explanation: "Σύμφωνα με το νόμο της ΑΟΣ, η αδαμαντινοοστεϊνική σύναψη είναι το πλέον σταθερό σημείο για τον εντοπισμό του ριζικού σωλήνα[cite: 89]."
            },
            {
                question: "9. Ποια δόντια αποτελούν εξαίρεση στον Πρώτο και Δεύτερο Νόμο Συμμετρίας;",
                options: ["Οι κάτω τομείς", "Οι άνω κεντρικοί τομείς", "Οι άνω προγόμφιοι", "Οι άνω γομφίοι"],
                correct: 3,
                explanation: "Εξαίρεση στους νόμους συμμετρίας (που ορίζουν την απόσταση και την καθετότητα των στομίων σε σχέση με την εγγύς-άπω γραμμή) αποτελούν οι άνω γομφίοι[cite: 92, 94]."
            },
            {
                question: "10. Σύμφωνα με τον Νόμο της Αλλαγής Χρώματος, τι ισχύει για την οδοντίνη του πολφικού θαλάμου;",
                options: ["Το έδαφος είναι πιο ανοιχτόχρωμο από τα τοιχώματα", "Τα τοιχώματα είναι πιο σκούρα από το έδαφος", "Το έδαφος είναι πιο σκούρο από τα τοιχώματα", "Το χρώμα είναι ενιαίο σε όλη την έκταση"],
                correct: 2,
                explanation: "Το χρώμα της οδοντίνης του εδάφους του πολφικού θαλάμου είναι πιο σκούρο από το χρώμα της οδοντίνης των τοιχωμάτων[cite: 96]."
            },
            {
                question: "11. Κατά την έναρξη της διάνοιξης στον άνω κεντρικό, πού ακριβώς σημαδεύει αρχικά η εγγλυφίδα;",
                options: ["Στην κοπτική ακμή", "Στο κεντρικό σημείο της γλωσσικής επιφάνειας, λίγο πιο κάτω από το γλωσσικό φύμα", "Στο κέντρο του γλωσσικού φύματος", "Στο κεντρικό σημείο της γλωσσικής επιφάνειας, λίγο πιο ψηλά από το γλωσσικό φύμα"],
                correct: 3,
                explanation: "Η εγγλυφίδα αρχικά σημαδεύει το κεντρικό σημείο της γλωσσικής επιφάνειας λίγο πιο ψηλά από το γλωσσικό φύμα[cite: 98]."
            },
            {
                question: "12. Μετά το αρχικό σημάδι, ποια είναι η σωστή αλλαγή κλίσης της εγγλυφίδας στα πρόσθια δόντια;",
                options: ["Κάθετα στον επιμήκη άξονα του δοντιού", "Νοητά προς το κέντρο του ριζικού σωλήνα στον αυχένα, σχεδόν παράλληλα με τον επιμήκη άξονα", "Προς την προστομιακή επιφάνεια με γωνία 45 μοιρών", "Προς την άπω επιφάνεια για προστασία του πολφικού κέρατος"],
                correct: 1,
                explanation: "Στη συνέχεια αλλάζει κλίση με κατεύθυνση νοητά το κέντρο του ριζικού σωλήνα στον αυχένα, σχεδόν παράλληλα με τον επιμήκη άξονα του δοντιού[cite: 101, 111]."
            },
            {
                question: "13. Ποια ομάδα δοντιών από τις παρακάτω εμφανίζει παραλλαγές στην ακτινογραφική εικόνα και μπορεί να κρύβει 2 ριζικούς σωλήνες;",
                options: ["Άνω κεντρικοί τομείς (11, 21)", "Άνω πλάγιοι τομείς (12, 22)", "Κάτω κεντρικοί και πλάγιοι τομείς (41, 42, 31, 32)", "Όλα τα παραπάνω"],
                correct: 2,
                explanation: "Οι κάτω τομείς (κεντρικός και πλάγιος) εμφανίζουν συχνά παραλλαγές της ακτινογραφικής εικόνας των ριζικών σωλήνων (μπορεί να έχουν 1 ή 2)[cite: 55, 67, 68]."
            },
            {
                question: "14. Με τι είδους εγγλυφίδες ολοκληρώνεται η διαμόρφωση των τοιχωμάτων της κοιλότητας διάνοιξης;",
                options: ["Σφαιρικές εγγλυφίδες", "Κυλινδροκωνικές εγγλυφίδες", "Ανεστραμμένου κώνου", "Εγγλυφίδες Gates Glidden"],
                correct: 1,
                explanation: "Η διαμόρφωση των τοιχωμάτων της κοιλότητας διάνοιξης ολοκληρώνεται με κυλινδροκωνικές εγγλυφίδες[cite: 105]."
            },
            {
                question: "15. Ποιος κανόνας ισχύει για τις ταχύτητες των εγγλυφίδων κατά τη διάνοιξη;",
                options: ["Η διάνοιξη αρχίζει και ολοκληρώνεται με υψηλές ταχύτητες", "Αρχίζει με χαμηλές και ολοκληρώνεται με υψηλές ταχύτητες", "Αρχίζει με υψηλές και ολοκληρώνεται με χαμηλές ταχύτητες", "Γίνεται εξ ολοκλήρου με χαμηλές ταχύτητες για αποφυγή διατρήσεων"],
                correct: 2,
                explanation: "Η διάνοιξη αρχίζει με υψηλές ταχύτητες (για αφαίρεση αδαμαντίνης/επίτευξη πρόσβασης) και ολοκληρώνεται με χαμηλές ταχύτητες[cite: 79]."
            },
            {
                question: "16. Τι αναφέρει ο Νόμος Κεντρικότητας;",
                options: ["Ο πολφικός θάλαμος βρίσκεται πάντα στο κέντρο της μύλης", "Στο ύψος της ΑΟΣ, ο ριζικός σωλήνας βρίσκεται πάντα στο κέντρο του δοντιού", "Το κεντρικό σημείο της γλωσσικής επιφάνειας είναι η αρχή της διάνοιξης", "Ο ριζικός σωλήνας είναι πάντα ομόκεντρος με την εξωτερική επιφάνεια του δοντιού"],
                correct: 1,
                explanation: "Ο νόμος κεντρικότητας ορίζει ότι στο ύψος της αδαμαντινοοστεϊνικής σύναψης (ΑΟΣ), ο ριζικός σωλήνας βρίσκεται πάντα στο κέντρο του δοντιού[cite: 83]."
            },
            {
                question: "17. Για τον εντοπισμό μυλικών στομίων, πού ΔΕΝ πρέπει να χρησιμοποιούνται εγγλυφίδες;",
                options: ["Στην αδαμαντίνη", "Στα πολφικά κέρατα", "Στο υποπολφικό τοίχωμα", "Στο μυλικό θάλαμο"],
                correct: 2,
                explanation: "Δεν πρέπει να χρησιμοποιούνται εγγλυφίδες στο υποπολφικό τοίχωμα για πιθανή εντόπιση μυλικών στομίων. Η φυσιολογική ανατομία τους πρέπει να διατηρείται[cite: 77]."
            },
            {
                question: "18. Ο 1ος Νόμος Συμμετρίας βασίζεται σε ποια νοητή γραμμή;",
                options: ["Τη γραμμή που ενώνει την προστομιακή και γλωσσική επιφάνεια", "Τον επιμήκη άξονα του δοντιού", "Τη γραμμή της ΑΟΣ", "Τη γραμμή που ενώνει την εγγύς και την άπω επιφάνεια του δοντιού"],
                correct: 3,
                explanation: "Τα στόμια των ριζικών σωλήνων βρίσκονται σε ίσες αποστάσεις από τη νοητή γραμμή που ενώνει την εγγύς και την άπω επιφάνεια του δοντιού[cite: 91]."
            },
            {
                question: "19. Ποιο είναι το μέγιστο και το ελάχιστο αναμενόμενο μήκος του άνω κεντρικού τομέα (αντίστοιχα);",
                options: ["29 χιλ / 17 χιλ", "22.5 χιλ / 10.5 χιλ", "31 χιλ / 15 χιλ", "25 χιλ / 18 χιλ"],
                correct: 0,
                explanation: "Το μέγιστο μήκος είναι 29 χιλιοστά και το ελάχιστο 17 χιλιοστά (με μέσο τα 22.5 χιλ)[cite: 16]."
            },
            {
                question: "20. Τι πρέπει να διασφαλίζεται σχετικά με την έκταση της διάνοιξης;",
                options: ["Να είναι όσο το δυνατόν μικρότερη για προστασία του δοντιού", "Να καταλαμβάνει ολόκληρη την περιφέρεια του μυλικού θαλάμου και τα πολφικά κέρατα", "Να εκτείνεται μέχρι την κοπτική ακμή", "Να αλλοιώνει το υποπολφικό τοίχωμα για καλύτερη ορατότητα"],
                correct: 1,
                explanation: "Η διάνοιξη θα πρέπει να καταλαμβάνει ολόκληρη την περιφέρεια του μυλικού θαλάμου και τα πολφικά κέρατα, χωρίς όμως άσκοπη αφαίρεση οδοντικής ουσίας[cite: 74, 76]."
            }
        ];

        const container = document.getElementById('quiz-container');

        quizData.forEach((q, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-container';

            const questionText = document.createElement('div');
            questionText.className = 'question-text';
            questionText.innerText = q.question;
            questionDiv.appendChild(questionText);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            const explanationDiv = document.createElement('div');
            explanationDiv.className = 'explanation';
            explanationDiv.innerHTML = `<strong>Εξήγηση:</strong> ${q.explanation}`;

            q.options.forEach((optText, optIndex) => {
                const optionBtn = document.createElement('div');
                optionBtn.className = 'option';
                optionBtn.innerText = optText;

                optionBtn.addEventListener('click', function() {
                    // Disable all options in this question
                    const allOptions = optionsDiv.querySelectorAll('.option');
                    allOptions.forEach(btn => btn.classList.add('disabled'));

                    // Check answer
                    if (optIndex === q.correct) {
                        this.classList.add('correct');
                    } else {
                        this.classList.add('incorrect');
                        // Highlight correct answer
                        allOptions[q.correct].classList.add('correct');
                    }

                    // Show explanation
                    explanationDiv.classList.add('show');
                });

                optionsDiv.appendChild(optionBtn);
            });

            questionDiv.appendChild(optionsDiv);
            questionDiv.appendChild(explanationDiv);
            container.appendChild(questionDiv);
        });
    </script>
</body>
</html>
