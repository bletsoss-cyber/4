<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Νευροανατομία - Μετωπιαίος & Βρεγματικός Λοβός MCQs</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #5d6978;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-2: #1d4ed8;
      --good: #137a3f;
      --good-bg: #e7f6ee;
      --bad: #b42318;
      --bad-bg: #fff0ed;
      --warn: #9a6700;
      --shadow: 0 18px 45px rgba(26, 35, 48, .08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }

    header {
      background: #11212f;
      color: #fff;
      border-bottom: 4px solid var(--accent);
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      padding: 22px 0 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.2vw, 2.1rem);
      font-weight: 750;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: #dbeafe;
      font-size: .98rem;
    }

    .header-actions, .controls-grid, .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button, select, input[type="search"] {
      font: inherit;
    }

    button {
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      min-height: 42px;
    }

    button.secondary {
      background: #fff;
      color: #1f2937;
      border-color: var(--line);
    }

    button.ghost {
      background: transparent;
      color: #fff;
      border-color: rgba(255,255,255,.35);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    main {
      padding: 24px 0 42px;
    }

    .controls {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 18px;
    }

    .controls-grid {
      justify-content: space-between;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 190px;
      flex: 1 1 220px;
    }

    .field.compact {
      flex: 0 1 auto;
      min-width: 150px;
    }

    label, .checkline {
      color: var(--muted);
      font-size: .88rem;
      font-weight: 700;
    }

    select, input[type="search"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      min-height: 42px;
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 4px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 76px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 700;
    }

    .stat strong {
      display: block;
      margin-top: 5px;
      font-size: 1.25rem;
    }

    .progress-shell {
      background: #dde4ee;
      border-radius: 999px;
      overflow: hidden;
      height: 10px;
      margin-bottom: 18px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 28px);
    }

    .question-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid #cfd8e5;
      color: #294052;
      background: #f8fafc;
      padding: 5px 10px;
      font-size: .82rem;
      font-weight: 800;
    }

    .question {
      margin: 0 0 18px;
      font-size: clamp(1.08rem, 1.8vw, 1.38rem);
      font-weight: 750;
    }

    .options {
      display: grid;
      gap: 10px;
      margin: 0 0 16px;
      padding: 0;
      list-style: none;
    }

    .option {
      width: 100%;
      text-align: left;
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px 14px;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 8px;
      font-weight: 650;
      min-height: 56px;
    }

    .option:hover:not(:disabled) {
      border-color: var(--accent);
      background: #f0fdfa;
    }

    .option.correct {
      border-color: var(--good);
      background: var(--good-bg);
      color: #08351e;
    }

    .option.wrong {
      border-color: var(--bad);
      background: var(--bad-bg);
      color: #58120c;
    }

    .option .key {
      font-weight: 850;
      color: var(--accent);
    }

    .feedback {
      display: none;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 13px 14px;
      margin: 12px 0 16px;
      background: #f8fafc;
    }

    .feedback.show {
      display: block;
    }

    .feedback.good {
      border-color: #9bd4b3;
      background: var(--good-bg);
    }

    .feedback.bad {
      border-color: #f1aaa0;
      background: var(--bad-bg);
    }

    .empty {
      text-align: center;
      padding: 36px 18px;
      color: var(--muted);
    }

    .results {
      display: none;
    }

    .results.show {
      display: block;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 20px;
      font-size: .94rem;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #2d3b4d;
      background: #f8fafc;
      font-size: .86rem;
    }

    .wrong-list {
      display: grid;
      gap: 10px;
      margin: 12px 0 18px;
    }

    .wrong-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fff;
    }

    .print-area {
      display: none;
    }

    @media (max-width: 820px) {
      .topbar, .stats, .result-grid {
        grid-template-columns: 1fr;
      }
      .header-actions {
        justify-content: flex-start;
      }
      .option {
        grid-template-columns: 28px 1fr;
      }
    }

    @media print {
      body {
        background: #fff;
        color: #000;
      }
      header, .controls, .stats, .progress-shell, #quizCard, #resultsCard {
        display: none !important;
      }
      main {
        padding: 0;
      }
      .wrap {
        width: 100%;
        margin: 0;
      }
      .print-area {
        display: block;
      }
      .print-q {
        break-inside: avoid;
        border-bottom: 1px solid #bbb;
        padding: 10px 0;
      }
      .print-q h3 {
        margin: 0 0 5px;
        font-size: 12pt;
      }
      .print-q p, .print-q li {
        font-size: 10.5pt;
      }
      .print-q ol {
        margin: 5px 0 6px 20px;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>Νευροανατομία: Μετωπιαίος & Βρεγματικός Λοβός</h1>
        <p class="subtitle">Διαδραστικό quiz υψηλής δυσκολίας, βασισμένο στις διαφάνειες του PDF.</p>
      </div>
      <div class="header-actions">
        <button class="ghost" id="printBtn" type="button">Εκτύπωση</button>
        <button class="ghost" id="clearProgressBtn" type="button">Καθαρισμός προόδου</button>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="controls" aria-label="Ρυθμίσεις quiz">
        <div class="controls-grid">
          <div class="field">
            <label for="categoryFilter">Κατηγορία</label>
            <select id="categoryFilter"></select>
          </div>
          <div class="field">
            <label for="searchBox">Αναζήτηση</label>
            <input id="searchBox" type="search" placeholder="Ερώτηση, επιλογή, αιτιολόγηση...">
          </div>
          <label class="checkline"><input id="shuffleQuestions" type="checkbox" checked> Ανακάτεμα ερωτήσεων</label>
          <label class="checkline"><input id="shuffleAnswers" type="checkbox" checked> Ανακάτεμα απαντήσεων</label>
          <div class="field compact">
            <label>&nbsp;</label>
            <button id="startBtn" type="button">Έναρξη</button>
          </div>
        </div>
      </section>

      <section class="stats" aria-label="Στατιστικά">
        <div class="stat"><span>Πρόοδος</span><strong id="progressText">0 / 60</strong></div>
        <div class="stat"><span>Σκορ</span><strong id="scoreText">0</strong></div>
        <div class="stat"><span>Ποσοστό</span><strong id="percentText">0%</strong></div>
        <div class="stat"><span>Κατηγορία</span><strong id="currentCategory">-</strong></div>
      </section>

      <div class="progress-shell" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>

      <section class="card" id="quizCard">
        <div id="quizMount"></div>
      </section>

      <section class="card results" id="resultsCard">
        <div id="resultsMount"></div>
      </section>

      <section class="print-area" id="printArea"></section>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "neuroanatomy_mcqs_frontal_parietal_v1";
    const labels = ["α", "β", "γ", "δ"];

    const questions = [
      {

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalize(text) {
      return String(text || "").toLocaleLowerCase("el-GR").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function getFilteredQuestions() {
      const category = els.categoryFilter.value;
      const term = normalize(els.searchBox.value.trim());
      return questions.filter(q => {
        const categoryOk = category === "all" || q.category === category;
        const haystack = normalize([
          q.question,
          q.category,
          q.source,
          q.explanation,
          q.options.map(o => o.text).join(" ")
        ].join(" "));
        return categoryOk && (!term || haystack.includes(term));
      });
    }

    function startQuiz(sourceQuestions, mode = "full") {
      currentMode = mode;
      const pool = sourceQuestions || getFilteredQuestions();
      activeQuestions = els.shuffleQuestions.checked && mode !== "resume" ? shuffle(pool) : pool.slice();
      currentIndex = 0;
      score = 0;
      answered = {};
      wrongIds = [];
      els.resultsCard.classList.remove("show");
      els.quizCard.style.display = "block";
      renderQuestion();
      saveProgress();

        renderResults();

        : (els.shuffleAnswers.checked ? shuffle(q.options.map((o, i) => ({...o, originalIndex: i}))) : q.options.map((o, i) => ({...o, originalIndex: i})));
      if (!prior) {
        answered[q.id] = { optionOrder: optionList.map(o => o.originalIndex), selected: null, correct: null };
      }

      els.quizMount.innerHTML = `
        <div class="question-meta">
          <span class="pill">${q.category}</span>
          <span class="pill">${q.source}</span>
          <span class="pill">Ερώτηση ${currentIndex + 1} / ${activeQuestions.length}</span>
        </div>
        <h2 class="question">${escapeHtml(q.question)}</h2>
        <div class="options" id="optionsMount"></div>
        <div class="feedback" id="feedback"></div>
        <div class="action-row">
          <button id="nextBtn" type="button" style="display:none;">${currentIndex === activeQuestions.length - 1 ? "Αποτελέσματα" : "Επόμενη ερώτηση"}</button>
        </div>
      `;

      const optionsMount = document.getElementById("optionsMount");
      const state = answered[q.id];
      optionList.forEach((opt, idx) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.innerHTML = `<span class="key">${labels[idx]})</span><span>${escapeHtml(opt.text)}</span>`;
        button.dataset.originalIndex = opt.originalIndex;
        button.addEventListener("click", () => answerQuestion(q, opt.originalIndex));
        optionsMount.appendChild(button);
      });

      if (state.selected !== null) {
        showAnsweredState(q);
      }
      updateStats();
    }

    function answerQuestion(q, originalIndex) {
      const selected = q.options[originalIndex];
      const isCorrect = !!selected.correct;
      answered[q.id].selected = originalIndex;
      answered[q.id].correct = isCorrect;
      if (isCorrect) {
        score += 1;
      } else if (!wrongIds.includes(q.id)) {
        wrongIds.push(q.id);
      }
      showAnsweredState(q);
      updateStats();
      saveProgress();
    }

    function showAnsweredState(q) {
      const state = answered[q.id];
      const buttons = Array.from(document.querySelectorAll(".option"));
      buttons.forEach(button => {
        const idx = Number(button.dataset.originalIndex);
        button.disabled = true;
        if (q.options[idx].correct) button.classList.add("correct");
        if (state.selected === idx && !q.options[idx].correct) button.classList.add("wrong");
      });
      const feedback = document.getElementById("feedback");
      feedback.className = `feedback show ${state.correct ? "good" : "bad"}`;
      feedback.innerHTML = `<strong>${state.correct ? "Σωστό." : "Λάθος."}</strong> ${escapeHtml(q.explanation)}`;
      const nextBtn = document.getElementById("nextBtn");
      nextBtn.style.display = "inline-flex";
      nextBtn.addEventListener("click", () => {
        currentIndex += 1;
        renderQuestion();
        saveProgress();
      }, { once: true });
    }

    function updateStats() {
      const answeredCount = Object.values(answered).filter(a => a.selected !== null).length;
      const total = activeQuestions.length || getFilteredQuestions().length || questions.length;
      const pct = answeredCount ? Math.round((score / answeredCount) * 100) : 0;
      els.progressText.textContent = `${Math.min(currentIndex + (activeQuestions.length ? 1 : 0), total)} / ${total}`;
      els.scoreText.textContent = String(score);
      els.percentText.textContent = `${pct}%`;
      els.currentCategory.textContent = activeQuestions[currentIndex]?.category || "-";
      els.progressBar.style.width = total ? `${Math.min(100, (answeredCount / total) * 100)}%` : "0%";
    }

    function renderResults() {
      els.quizCard.style.display = "none";
      els.resultsCard.classList.add("show");
      const total = activeQuestions.length;
      const wrong = wrongIds.length;
      const correct = score;
      const pct = total ? Math.round((correct / total) * 100) : 0;
      const byCategory = {};
      activeQuestions.forEach(q => {
        byCategory[q.category] ||= { total: 0, correct: 0 };
        byCategory[q.category].total += 1;
        if (answered[q.id]?.correct) byCategory[q.category].correct += 1;
      });
      const categoryRows = Object.entries(byCategory).map(([cat, s]) => `
        <tr><td>${escapeHtml(cat)}</td><td>${s.correct} / ${s.total}</td><td>${Math.round((s.correct / s.total) * 100)}%</td></tr>
      `).join("");
      const wrongRows = wrongIds.map(id => {
        const q = questions.find(item => item.id === id);
        const selected = answered[id]?.selected;
        const selectedText = selected !== null && selected !== undefined ? q.options[selected].text : "-";
        const correctText = q.options.find(o => o.correct).text;
        return `<div class="wrong-item">
          <strong>${q.id}. ${escapeHtml(q.question)}</strong>
          <p><b>Δική σου απάντηση:</b> ${escapeHtml(selectedText)}</p>
          <p><b>Σωστή:</b> ${escapeHtml(correctText)}</p>
          <p>${escapeHtml(q.explanation)}</p>
        </div>`;
      }).join("") || "<p>Δεν υπάρχουν λανθασμένες ερωτήσεις.</p>";

      els.resultsMount.innerHTML = `
        <h2>Τελική επίδοση</h2>
        <div class="result-grid">
          <div class="stat"><span>Συνολικό σκορ</span><strong>${correct} / ${total}</strong></div>
          <div class="stat"><span>Ποσοστό</span><strong>${pct}%</strong></div>
          <div class="stat"><span>Σωστές</span><strong>${correct}</strong></div>
          <div class="stat"><span>Λανθασμένες</span><strong>${wrong}</strong></div>
        </div>
        <h3>Απόδοση ανά κατηγορία</h3>
        <table>
          <thead><tr><th>Κατηγορία</th><th>Σκορ</th><th>Ποσοστό</th></tr></thead>
          <tbody>${categoryRows}</tbody>
        </table>
        <h3>Ανασκόπηση λανθασμένων</h3>
        <div class="wrong-list">${wrongRows}</div>
        <div class="action-row">
          <button type="button" id="restartBtn">Επανεκκίνηση</button>
          <button type="button" id="retryWrongBtn" class="secondary" ${wrong ? "" : "disabled"}>Επανάληψη λανθασμένων</button>
        </div>
      `;
      document.getElementById("restartBtn").addEventListener("click", () => startQuiz(getFilteredQuestions(), "full"));
      document.getElementById("retryWrongBtn").addEventListener("click", () => {
        const retry = wrongIds.map(id => questions.find(q => q.id === id)).filter(Boolean);
        startQuiz(retry, "wrong");
      });
      updateStats();
      saveProgress();
    }

    function populateCategories() {
      const cats = Array.from(new Set(questions.map(q => q.category))).sort((a, b) => a.localeCompare(b, "el"));
      els.categoryFilter.innerHTML = '<option value="all">Όλες οι κατηγορίες</option>' + cats.map(cat => `<option value="${escapeAttr(cat)}">${escapeHtml(cat)}</option>`).join("");
    }

    function renderPrintArea() {
      const categoryCounts = Array.from(new Set(questions.map(q => q.category))).map(cat => {
        const count = questions.filter(q => q.category === cat).length;
        return `<tr><td>${escapeHtml(cat)}</td><td>${count}</td></tr>`;
      }).join("");
      els.printArea.innerHTML = `
        <h1>Νευροανατομία - Μετωπιαίος & Βρεγματικός Λοβός</h1>
        <p>Σύνολο ερωτήσεων: ${questions.length}</p>
        <h2>Κατανομή ανά κατηγορία</h2>
        <table><thead><tr><th>Κατηγορία</th><th>Ερωτήσεις</th></tr></thead><tbody>${categoryCounts}</tbody></table>
        <h2>Ερωτήσεις και απαντήσεις</h2>
        ${questions.map(q => `
          <div class="print-q">
            <h3>${q.id}. ${escapeHtml(q.question)} <small>(${escapeHtml(q.category)} - ${escapeHtml(q.source)})</small></h3>
            <ol type="a">
              ${q.options.map(o => `<li>${escapeHtml(o.text)}</li>`).join("")}
            </ol>
            <p><b>Σωστή απάντηση:</b> ${labels[q.options.findIndex(o => o.correct)]}) ${escapeHtml(q.options.find(o => o.correct).text)}</p>
            <p><b>Αιτιολόγηση:</b> ${escapeHtml(q.explanation)}</p>
          </div>
        `).join("")}
      `;
    }

    function saveProgress() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          ids: activeQuestions.map(q => q.id),
          currentIndex,
          score,
          answered,
          wrongIds,
          settings: {
            category: els.categoryFilter.value,
            search: els.searchBox.value,
            shuffleQuestions: els.shuffleQuestions.checked,
            shuffleAnswers: els.shuffleAnswers.checked
          },
          mode: currentMode
        }));
      } catch (err) {}
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!data?.ids?.length) return false;
        els.categoryFilter.value = data.settings?.category || "all";
        els.searchBox.value = data.settings?.search || "";
        els.shuffleQuestions.checked = data.settings?.shuffleQuestions ?? true;
        els.shuffleAnswers.checked = data.settings?.shuffleAnswers ?? true;
        activeQuestions = data.ids.map(id => questions.find(q => q.id === id)).filter(Boolean);
        currentIndex = Math.min(data.currentIndex || 0, activeQuestions.length);
        score = data.score || 0;
        answered = data.answered || {};
        wrongIds = data.wrongIds || [];
        currentMode = data.mode || "resume";
        els.resultsCard.classList.remove("show");
        els.quizCard.style.display = "block";
        renderQuestion();
        return true;
      } catch (err) {
        return false;
      }
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[ch]));
    }

    function escapeAttr(text) {
      return escapeHtml(text).replace(/"/g, "&quot;");
    }

    els.startBtn.addEventListener("click", () => startQuiz(getFilteredQuestions(), "full"));
    els.categoryFilter.addEventListener("change", () => updateStats());
    els.searchBox.addEventListener("input", () => updateStats());
    els.printBtn.addEventListener("click", () => {
      renderPrintArea();
      window.print();
    });
    els.clearProgressBtn.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      startQuiz(getFilteredQuestions(), "full");
    });

    populateCategories();
    renderPrintArea();
    if (!loadProgress()) {
      startQuiz(getFilteredQuestions(), "full");
    }
  </script>
</body>
</html>
