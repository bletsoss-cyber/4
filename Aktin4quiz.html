<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Quiz: Ακτινοβιολογία & Δοσιμετρία</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --primary-color: #34495e;
            --accent-color: #2980b9;
            --correct-color: #27ae60;
            --incorrect-color: #c0392b;
            --border-radius: 10px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 750px;
        }

        h1 {
            font-size: 1.6rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 5px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .progress-bar-container {
            background-color: #ecf0f1;
            border-radius: 5px;
            height: 8px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-box {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .option-item {
            background-color: #f8f9fa;
            border: 2px solid #e2e8f0;
            padding: 14px 20px;
            margin-bottom: 12px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
        }

        .option-item:hover {
            background-color: #edf2f7;
            border-color: #cbd5e1;
        }

        .option-item.correct {
            background-color: #e8f5e9 !important;
            border-color: var(--correct-color) !important;
            color: #1b5e20;
            font-weight: 600;
        }

        .option-item.incorrect {
            background-color: #ffebee !important;
            border-color: var(--incorrect-color) !important;
            color: #c62828;
        }

        .option-item.disabled {
            pointer-events: none;
        }

        .feedback-box {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            line-height: 1.5;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .feedback-box.correct-bg {
            background-color: #e8f5e9;
            border-left: 5px solid var(--correct-color);
            color: #1b5e20;
        }

        .feedback-box.incorrect-bg {
            background-color: #ffebee;
            border-left: 5px solid var(--incorrect-color);
            color: #c62828;
        }

        .explanation-title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .nav-btn {
            display: block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--border-radius);
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
            text-align: center;
        }

        .nav-btn:hover {
            background-color: #2c3e50;
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .score-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 20px 0;
        }

        .restart-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <h1 id="quiz-title">Ακτινοβιολογία & Δοσιμετρία</h1>
        <div class="subtitle" id="question-counter">Ερώτηση 1 από 25</div>
        
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="question-box" id="question-text">Φόρτωση ερώτησης...</div>
        
        <ul class="options-list" id="options-container">
            </ul>

        <div class="feedback-box" id="feedback-container">
            <div class="explanation-title" id="feedback-title">Ανατροφοδότηση</div>
            <div id="explanation-text">Επεξήγηση...</div>
        </div>

        <button class="nav-btn" id="next-btn" style="display: none;">Επόμενη Ερώτηση</button>
    </div>

    <div class="results-screen" id="results-screen">
        <h1>Αποτελέσματα Κουίζ</h1>
        <div class="score-text" id="score-text">Σκορ: 0 / 25</div>
        <div id="performance-feedback" style="margin-bottom: 25px; line-height: 1.5; color: #555;"></div>
        <button class="restart-btn" onclick="restartQuiz()">Προσπάθεια Ξανά</button>
    </div>
</div>

<script>
    const quizData = [
        {
            question: "Ποιο από τα παρακάτω αποδίδει με απόλυτη ακρίβεια τη χρονική διάρκεια και το κύριο συμβάν του Βιοχημικού Σταδίου της ακτινοβολικής επίδρασης στη βιολογική ύλη;",
            options: [
                "Διαρκεί 10⁻¹³ sec, κατά το οποίο πραγματοποιείται η μεταφορά ενέργειας, η διέγερση και ο ιοντισμός των μορίων.",
                "Διαρκεί 10⁻¹⁶ sec, όπου οι ελεύθερες ρίζες αλληλεπιδρούν με τα βάρη του DNA σχηματίζοντας άτυπα μόρια.",
                "Διαρκεί 10⁻¹¹ sec, κατά το οποίο οι παραγόμενες ελεύθερες ρίζες (OH• και H•) αντιδρούν με τα συστατικά των κυττάρων προκαλώντας βλάβες στο DNA.",
                "Κυμαίνεται από μερικά λεπτά έως πολλά χρόνια και χαρακτηρίζεται από την αναστολή της πρωτεϊνοσύνθεσης και κυτταρικό θάνατο."
            ],
            correct: 2,
            explanation: "Το βιοχημικό στάδιο διαρκεί ακριβώς 10⁻¹¹ sec, όπου οι ελεύθερες ρίζες από τη ραδιόλυση του νερού αλληλεπιδρούν χημικά με τα μακρομόρια (DNA). Το φυσικό στάδιο ξεκινά στα 10⁻¹³ sec (μεταφορά ενέργειας), ενώ το βιολογικό στάδιο διαρκεί από λεπτά έως χρόνια."
        },
        {
            question: "Κατά τη σύγκριση ακτινοβολιών υψηλού LET (Linear Energy Transfer) και χαμηλού LET, ποια πρόταση περιγράφει σωστά τη συμπεριφορά τους;",
            options: [
                "Οι ακτίνες-Χ είναι υψηλού LET επειδή προκαλούν πυκνούς ιοντισμούς κατά μήκος μιας μικρής διαδρομής.",
                "Οι ακτινοβολίες χαμηλού LET (π.χ. ακτίνες-Χ, σωματίδια β) χαρακτηρίζονται από μικρό αριθμό ιοντισμών/διεγέρσεων ανά διαδρομή, με αποτέλεσμα αραιότερη εναπόθεση ενέργειας.",
                "Τα σωματίδια α και τα πρωτόνια χαρακτηρίζονται ως χαμηλού LET επειδή η ενέργειά τους εξαντλείται ακαριαία στην επιφάνεια του ιστού.",
                "Η πυκνότητα εναπόθεσης ενέργειας (LET) δεν σχετίζεται με τον βαθμό σοβαρότητας των βιολογικών συνεπειών."
            ],
            correct: 1,
            explanation: "Οι ακτίνες-Χ και τα σωματίδια β έχουν χαμηλό LET, δηλαδή προκαλούν σποραδικούς, αραιούς ιοντισμούς κατά μήκος της διαδρομής τους. Αντίθετα, τα βαρέα σωματίδια (α, πρωτόνια) έχουν υψηλό LET επειδή εναποθέτουν πυκνά την ενέργειά τους."
        },
        {
            question: "Ποια είναι η θεμελιώδης διαφορά μεταξύ της διέγερσης (excitation) και του ιοντισμού (ionization) ενός ατόμου από φωτόνιο ακτίνων-Χ;",
            options: [
                "Στη διέγερση το ηλεκτρόνιο αποσπάται πλήρως από τη δομή του ατόμου, ενώ στον ιοντισμό απλώς πάλλεται στιγμιαία.",
                "Η διέγερση προκαλεί μόνιμη μεταβολή στη χημική συμπεριφορά του μορίου, ενώ ο ιοντισμός επιφέρει μόνο θερμικές δονήσεις.",
                "Στον ιοντισμό το ηλεκτρόνιο αποσπάται πλήρως από την τροχιά του μεταβάλλοντας τη χημική συμπεριφορά του μορίου, ενώ στη διέγερση το ηλεκτρόνιο μετακινείται απλώς σε τροχιά υψηλότερης ενέργειας.",
                "Ο ιοντισμός αφορά αποκλειστικά τα εσωτερικά ηλεκτρόνια, ενώ η διέγερση προκαλείται μόνο όταν το φωτόνιο αλληλεπιδρά με τον πυρήνα."
            ],
            correct: 2,
            explanation: "Ο ιοντισμός αποσπά πλήρως το ηλεκτρόνιο, δημιουργώντας ένα ιονοζεύγος και αλλάζοντας δραστικά τη χημική σταθερότητα του μορίου. Στη διέγερση, το ηλεκτρόνιο δεν εγκαταλείπει το άτομο, απλώς μετατοπίζεται προσωρινά σε υψηλότερη ενεργειακή στάθμη."
        },
        {
            question: "Γιατί η έμμεση δράση (indirect action) της ακτινοβολίας θεωρείται η επικρατούσα αιτία βιολογικής βλάβης στα ανθρώπινα κύτταρα κατά την έκθεση σε ακτίνες-Χ;",
            options: [
                "Επειδή οι ακτίνες-Χ στοχεύουν επιλεκτικά και με ακρίβεια τα μόρια του DNA, παρακάμπτοντας το κυτταρόπλασμα.",
                "Επειδή το ανθρώπινο κύτταρο αποτελείται κατά 80% από νερό, αυξάνοντας δραματικά την πιθανότητα αλληλεπίδρασης των φωτονίων με αυτό (ραδιόλυση) και την παραγωγή δραστικών ελεύθερων ριζών.",
                "Επειδή η έμμεση δράση προκαλείται αποκλειστικά από ακτινοβολίες υψηλού LET, οι οποίες κυριαρχούν στην οδοντιατρική απεικόνιση.",
                "Επειδή τα προϊόντα της άμεσης δράσης εξουδετερώνονται άμεσα από τα ένζυμα του βιοχημικού σταδίου."
            ],
            correct: 1,
            explanation: "Λόγω της κυτταρικής σύστασης (80% νερό), η πιθανότητα να χτυπήσει το φωτόνιο το νερό είναι πολύ μεγαλύτερη από το να χτυπήσει απευθείας το DNA (άμεση δράση). Η ραδιόλυση του νερού παράγει ελεύθερες ρίζες που μεταφέρουν τη βλάβη στο DNA."
        },
        {
            question: "Ποιο από τα παρακάτω αποτελεί αποκλειστικό χαρακτηριστικό των Στοχαστικών (Stochastic) αποτελεσμάτων της ακτινοβολίας;",
            options: [
                "Η σοβαρότητα της βλάβης αυξάνεται ανάλογα με τη δόση και υπάρχει σαφής ουδός (κατώφλι) δόσης.",
                "Εκδηλώνονται βραχυπρόθεσμα (μέσα σε λίγες ημέρες) και οφείλονται σε κυτταρικό θάνατο μεγάλου αριθμού κυττάρων.",
                "Δεν υπάρχει ουδός δόσης, και η πιθανότητα εμφάνισης (όχι η σοβαρότητα) είναι ανάλογη της ληφθείσας δόσης.",
                "Περιλαμβάνουν κλινικές εκδηλώσεις όπως το ερύθημα, η απόπτωση μαλλιών και η οστεοραδιονέκρωση."
            ],
            correct: 2,
            explanation: "Τα στοχαστικά αποτελέσματα (π.χ. καρκινογένεση, γενετικές βλάβες) διέπονται από τους νόμους των πιθανοτήτων. Δεν έχουν κατώφλι δόσης (θεωρητικά και ένα μόνο φωτόνιο μπορεί να προκαλέσει μετάλλαξη), και η δόση αυξάνει μόνο την πιθανότητα εμφάνισης, όχι τη βαρύτητα."
        },
        {
            question: "Ποιο από τα παρακάτω βιολογικά αποτελέσματα ταξινομείται ως Καθορισμένο αποτέλεσμα (Tissue Reaction) με βάση την ICRP 2007;",
            options: [
                "Η πρόκληση λευχαιμίας σε ασθενείς που εκτέθηκαν σε χαμηλές δόσεις ακτινοβολίας.",
                "Η εμφάνιση καταρράκτη των οφθαλμών, ξηροστομίας και οστεοραδιονέκρωσης.",
                "Οι κληρονομικές ανωμαλίες στους απογόνους λόγω ακτινοβόλησης των αναπαραγωγικών κυττάρων.",
                "Η εμφάνιση θυρεοειδικού καρκίνου λόγω γενετικής μετάλλαξης σωματικών κυττάρων."
            ],
            correct: 1,
            explanation: "Ο καταρράκτης, η ξηροστομία, το ερύθημα και η οστεοραδιονέκρωση είναι καθορισμένα αποτελέσματα (αντιδράσεις ιστών). Απαιτούν τη θανάτωση μεγάλου αριθμού κυττάρων για να εκδηλωθούν κλινικά, κάτι που συμβαίνει μόνο πάνω από μια συγκεκριμένη δόση-κατώφλι."
        },
        {
            question: "Σύμφωνα με τον Πίνακα Β4.1 (Whaites & Drage), ποιος είναι ο πολλαπλασιαστικός συντελεστής κινδύνου για την εμφάνιση στοχαστικών επιδράσεων σε έναν παιδιατρικό ασθενή ηλικίας κάτω των 10 ετών;",
            options: [
                "x 1,5",
                "x 2",
                "x 3",
                "Αμελητέος κίνδυνος"
            ],
            correct: 2,
            explanation: "Ο Πίνακας Β4.1 ορίζει ότι για παιδιά <10 ετών ο συντελεστής κινδύνου είναι x3. Αυτό οφείλεται στην υψηλή ακτινοευαισθησία των αναπτυσσόμενων ιστών και στον μεγάλο προσδόκιμο χρόνο ζωής τους, που επιτρέπει την εκδήλωση στοχαστικών βλαβών."
        },
        {
            question: "Κατά ποια περίοδο της ενδομήτριας ζωής το έμβρυο παρουσιάζει τη μέγιστη ευαισθησία για την πρόκληση ανατομικών δυσπλασιών (καθορισμένα αποτελέσματα) στα όργανά του;",
            options: [
                "Κατά τις πρώτες 2 εβδομάδες (προεμφύτευση), όπου προκαλείται κυρίως νοητική στέρηση.",
                "Κατά την περίοδο της οργανογένεσης (3η έως 8η εβδομάδα κύησης).",
                "Μετά τη 15η εβδομάδα, καθώς το έμβρυο είναι πλέον πλήρως διαφοροποιημένο.",
                "Καθ' όλη τη διάρκεια της κύησης με την ίδια ακριβώς ευαισθησία."
            ],
            correct: 1,
            explanation: "Η περίοδος της οργανογένεσης (3-8 εβδομάδες) χαρακτηρίζεται από έντονο πολλαπλασιασμό και διαφοροποίηση των κυττάρων για τον σχηματισμό των οργάνων. Η ακτινοβόληση σε αυτή τη φάση μπορεί να οδηγήσει σε μορφολογικές δυσπλασίες."
        },
        {
            question: "Η εμφάνιση νοητικής στέρησης στο έμβρυο λόγω ακτινοβόλησης παρουσιάζει τη μέγιστη ευαισθησία της μεταξύ 8ης και 15ης εβδομάδας κύησης. Ποιος είναι ο ουδός δόσης και η πιθανότητα εμφάνισης ανά Gy σύμφωνα με τον Πίνακα Β4.2;",
            options: [
                "Δεν υπάρχει ουδός δόσης, και η πιθανότητα είναι 0,015% ανά mGy.",
                "Ουδός δόσης >100 mGy και πιθανότητα εμφάνισης αμελητέα.",
                "Ουδός δόσης >300 mGy και πιθανότητα εμφάνισης 40% ανά Gy.",
                "Ουδός δόσης >100 mGy και πιθανότητα εμφάνισης 0,015% ανά mSv."
            ],
            correct: 2,
            explanation: "Με βάση τον Πίνακας Β4.2, η νοητική στέρηση στο διάστημα 8-15 εβδομάδων είναι καθορισμένο αποτέλεσμα με υψηλό ουδό (>300 mGy). Αν ξεπεραστεί αυτός ο ουδός, ο κίνδυνος είναι εξαιρετικά υψηλός, αγγίζοντας το 40% ανά Gy."
        },
        {
            question: "Ποια είναι η εκτιμώμενη δόση που λαμβάνει το έμβρυο κατά τη διενέργεια μιας ενδοστοματικής οδοντιατρικής ακτινογραφίας με ορθογώνιο διάφραγμα και χρήση μολύβδινης ποδιάς;",
            options: [
                "Περίπου 0,1 Gy, αγγίζοντας το όριο της οργανογένεσης.",
                "Περίπου 0,001 mSv.",
                "Ακριβώς 2,25 mGy, που ισούται με τη φυσική ακτινοβολία 9 μηνών.",
                "0 mSv, καθώς η δέσμη δεν κατευθύνεται ποτέ προς την κοιλιακή χώρα."
            ],
            correct: 1,
            explanation: "Η δόση στο έμβρυο από μια οδοντιατρική ακτινογραφία με σύγχρονες προδιαγραφές (ορθογώνιο διάφραγμα, προστασία) είναι απειροελάχιστη, περίπου 0,001 mSv (ή 0,002 mSv χωρίς ποδιά). Η τιμή αυτή απέχει εκατοντάδες χιλιάδες φορές από τα επικίνδυνα όρια."
        },
        {
            question: "Πώς ορίζεται η Απορροφούμενη Δόση (D) και ποια είναι η μονάδα της στο διεθνές σύστημα (SI);",
            options: [
                "Εκφράζει τη βιολογική βλάβη ενός ιστού ανάλογα με το είδος της ακτινοβολίας και μετράται σε Sievert (Sv).",
                "Είναι το ποσό της ενέργειας που εναποτίθεται ανά μονάδα μάζας βιολογικής ύλης (1 Joule/Kg) και μετράται σε Gray (Gy).",
                "Εκφράζει τον συνολικό στοχαστικό κίνδυνο για ολόκληρο τον οργανισμό και μετράται σε Gray (Gy).",
                "Είναι το γινόμενο της ισοδύναμης δόσης επί τον συντελεστή στάθμισης των ιστών (W_T)."
            ],
            correct: 1,
            explanation: "Η απορροφούμενη δόση (D) είναι καθαρά φυσικό μέγεθος που μετρά την ενέργεια ανά μάζα (1 Gy = 1 J/kg). Δεν λαμβάνει υπόψη ούτε το είδος της ακτινοβολίας ούτε την ευαισθησία των ιστών (αυτά αφορούν τα μεγέθη H_T και E_eff)."
        },
        {
            question: "Αν ένας ιστός απορροφήσει δόση 2 mGy από σωματίδια α (fission fragments), ποια θα είναι η Ισοδύναμη Δόση (H_T) στον ιστό αυτό με βάση τους συντελεστές στάθμισης ακτινοβολίας (W_R);",
            options: [
                "2 mSv",
                "10 mSv",
                "40 mSv",
                "0,1 mSv"
            ],
            correct: 2,
            explanation: "Η ισοδύναμη δόση υπολογίζεται από τον τύπο H_T = D x W_R. Από τον Πίνακα Β4.3, ο συντελεστής στάθμισης W_R για τα σωματίδια α, τα θραύσματα σχάσης και τους βαρείς πυρήνες είναι 20. Επομένως: 2 mGy x 20 = 40 mSv."
        },
        {
            question: "Σύμφωνα με τον Πίνακα Β4.3, ποιο εύρος ενεργειών των νετρονίων παρουσιάζει τον υψηλότερο συντελεστή στάθμισης ακτινοβολίας (W_R = 20), υποδεικνύοντας τη μεγαλύτερη βιολογική επικινδυνότητα;",
            options: [
                "Νετρόνια με ενέργεια <10 keV",
                "Νετρόνια με ενέργεια 10 keV έως 100 keV",
                "Νετρόνια με ενέργεια >100 keV έως 2 MeV",
                "Νετρόνια με ενέργεια >20 MeV"

    let currentQuestionIndex = 0;
    let score = 0;
    let hasAnswered = false;

    const questionTextEl = document.getElementById("question-text");
    const optionsContainerEl = document.getElementById("options-container");
    const feedbackContainerEl = document.getElementById("feedback-container");
    const explanationTextEl = document.getElementById("explanation-text");
    const feedbackTitleEl = document.getElementById("feedback-title");
    const nextBtnEl = document.getElementById("next-btn");
    const questionCounterEl = document.getElementById("question-counter");
    const progressBarEl = document.getElementById("progress-bar");
    const quizScreenEl = document.getElementById("quiz-screen");
    const resultsScreenEl = document.getElementById("results-screen");
    const scoreTextEl = document.getElementById("score-text");
    const performanceFeedbackEl = document.getElementById("performance-feedback");

    function loadQuestion() {
        hasAnswered = false;
        feedbackContainerEl.style.display = "none";
        nextBtnEl.style.display = "none";
        optionsContainerEl.innerHTML = "";

        const currentQuestion = quizData[currentQuestionIndex];
        
        // Counter and Progress Bar
        questionCounterEl.textContent = `Ερώτηση ${currentQuestionIndex + 1} από ${quizData.length}`;
        const progressPercentage = ((currentQuestionIndex) / quizData.length) * 100;
        progressBarEl.style.width = `${progressPercentage}%`;

        // Question text
        questionTextEl.textContent = currentQuestion.question;

        // Populate Options
        currentQuestion.options.forEach((option, index) => {
            const li = document.createElement("li");
            li.className = "option-item";
            li.textContent = option;
            li.addEventListener("click", () => selectOption(index, li));
            optionsContainerEl.appendChild(li);
        });
    }

    function selectOption(selectedIndex, selectedLi) {
        if (hasAnswered) return;
        hasAnswered = true;

        const currentQuestion = quizData[currentQuestionIndex];
        const allOptionElements = optionsContainerEl.children;

        // Disable all options
        for (let i = 0; i < allOptionElements.length; i++) {
            allOptionElements[i].classList.add("disabled");
        }

        // Check answer
        if (selectedIndex === currentQuestion.correct) {
            selectedLi.classList.add("correct");
            score++;
            showFeedback(true, currentQuestion.explanation);
        } else {
            selectedLi.classList.add("incorrect");
            // Highlight correct one
            allOptionElements[currentQuestion.correct].classList.add("correct");
            showFeedback(false, currentQuestion.explanation);
        }

        nextBtnEl.style.display = "block";
        if (currentQuestionIndex === quizData.length - 1) {
            nextBtnEl.textContent = "Προβολή Αποτελεσμάτων";
        } else {
            nextBtnEl.textContent = "Επόμενη Ερώτηση";
        }
    }

    function showFeedback(isCorrect, text) {
        feedbackContainerEl.style.display = "block";
        explanationTextEl.textContent = text;
        
        if (isCorrect) {
            feedbackContainerEl.className = "feedback-box correct-bg";
            feedbackTitleEl.textContent = "✓ Σωστό!";
        } else {
            feedbackContainerEl.className = "feedback-box incorrect-bg";
            feedbackTitleEl.textContent = "✕ Λάθος Επιλογή";
        }
    }

    nextBtnEl.addEventListener("click", () => {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    });

    function showResults() {
        progressBarEl.style.width = "100%";
        quizScreenEl.style.display = "none";
        resultsScreenEl.style.display = "block";
        scoreTextEl.textContent = `Σκορ: ${score} / ${quizData.length}`;

        let feedbackMsg = "";
        const percentage = (score / quizData.length) * 100;

        if (percentage === 100) {
            feedbackMsg = "Άριστα! Έχεις κατανοήσει πλήρως και την παραμικρή λεπτομέρεια της Ακτινοβιολογίας και της Δοσιμετρίας. Είσαι πανέτοιμος!";
        } else if (percentage >= 80) {
            feedbackMsg = "Εξαιρετική επίδοση! Έχεις πολύ δυνατό υπόβαθρο στις λεπτομέρειες των πινάκων ICRP, των σταδίων και των βιολογικών επιδράσεων.";
        } else if (percentage >= 65) {
            feedbackMsg = "Καλή προσπάθεια! Κάνε μια επανάληψη στους ουδούς δόσης του εμβρύου και στις διαφορές μεταξύ στοχαστικών και καθορισμένων αποτελεσμάτων.";
        } else {
            feedbackMsg = "Χρειάζεται περισσότερη μελέτη. Το κεφάλαιο αυτό έχει πολλές παραπλανητικές λεπτομέρειες (μονάδες Gy/Sv, LET, W_R και W_T). Ξαναδιάβασε τις επεξηγήσεις του κουίζ και προσπάθησε πάλι!";
        }
        performanceFeedbackEl.textContent = feedbackMsg;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        quizScreenEl.style.display = "block";
        resultsScreenEl.style.display = "none";
        nextBtnEl.textContent = "Επόμενη Ερώτηση";
        loadQuestion();
    }

    // Initialize Quiz
    loadQuestion();
