<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Radiology Advanced Quiz</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --correct: #27ae60;
            --wrong: #c0392b;
            --bg: #f5f7fa;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .quiz-container {
            background: #fff;
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .progress {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 25px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-btn {
            background: #fdfdfd;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--secondary);
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #f0f8ff;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .option-btn.correct {
            background: #e8f8f5;
            border-color: var(--correct);
            color: var(--correct);
            font-weight: bold;
        }
        .option-btn.wrong {
            background: #fdedec;
            border-color: var(--wrong);
            color: var(--wrong);
        }
        .explanation-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background: #eef2f5;
            border-left: 5px solid var(--accent);
            font-size: 1rem;
            animation: fadeIn 0.4s ease;
        }
        .explanation-box h4 {
            margin-top: 0;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .next-btn {
            display: none;
            margin-top: 25px;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            float: right;
            transition: background 0.2s;
        }
        .next-btn:hover {
            background: #2980b9;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 1px solid #eee;
}

.question-nav-btn {
    width: 42px;
    height: 38px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    color: var(--secondary);
    transition: all 0.2s ease;
}

.question-nav-btn:hover {
    border-color: var(--accent);
    background: #f0f8ff;
}

.question-nav-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h2>Ακτινολογία - Προχωρημένο Επίπεδο</h2>
        <div class="progress" id="progressText">Ερώτηση 1 / 20</div>
    </div>

    <div class="question-nav" id="questionNav"></div>
    
    <div class="question-text" id="questionText">Η ερώτηση φορτώνει...</div>
    
    <div class="options-container" id="optionsContainer">
        </div>

    <div class="explanation-box" id="explanationBox">
        <h4>Ανάλυση & Επεξήγηση</h4>
        <div id="explanationText"></div>
    </div>

    <div class="clearfix">
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Επόμενο</button>
    </div>
</div>

<script>
    // Επικόλλησε εδώ τα αντικείμενα των ερωτήσεων!
    const quizQuestions = [
  {
    question: "Κατά την ενδοστοματική ακτινογράφηση των προγομφίων της άνω γνάθου με την τεχνική της διχοτόμου, ο οδοντίατρος κατευθύνει την κεντρική ακτίνα με κατακόρυφη γωνία +25° αντί για την ενδεδειγμένη +45°. Ποιο θα είναι το ακτινογραφικό αποτέλεσμα και ποιος ο μηχανισμός παραγωγής του;",
    options: [
      "Βράχυνση (foreshortening) του ειδώλου, διότι η κεντρική ακτίνα είναι υπερβολικά κάθετη προς το επίπεδο του πλακιδίου.",
      "Επιμήκυνση (elongation) του ειδώλου, διότι η κλίση της κεντρικής ακτίνας είναι μικρότερη της κανονικής ως προς το οριζόντιο επίπεδο.",
      "Ατελής απεικόνιση των μεσοφατνιακών διαφραγμάτων λόγω επιπροβολής (overlap), εξαιτίας λανθασμένης οριζόντιας γωνίας.",
      "Μερική κάλυψη του πλακιδίου (cone cut), λόγω μη παράλληλης τοποθέτησης του κατευθυντήρα σε σχέση με τη διχοτόμο."
    ],
    correctIndex: 1,
    explanation: "Σύμφωνα με τον πίνακα B9.1, η σωστή κατακόρυφη γωνία για τους άνω προγομφίους είναι +45°. Όταν η κατακόρυφη γωνία που σχηματίζει η κεντρική ακτίνα είναι μικρότερη (π.χ. +25°), τότε η ακτίνα προσπίπτει πιο οριζόντια σε σχέση με τη διχοτόμο, με αποτέλεσμα το είδωλο του δοντιού να εμφανίζεται μακρύτερο (επιμήκυνση). Αντίθετα, αν η γωνία ήταν μεγαλύτερη της κανονικής, θα είχαμε βράχυνση. Η επιπροβολή αφορά αποκλειστικά την οριζόντια γωνία."
  },
  {
    question: "Σε ασθενή με ρηχή υπερώα επιχειρείται ακτινογράφηση των άνω γομφίων με την τεχνική του παραλληλισμού. Λόγω της ανατομίας, το ακτινογραφικό πλακίδιο είναι αδύνατον να τοποθετηθεί απόλυτα παράλληλα με τον επιμήκη άξονα των δοντιών χωρίς να προκαλέσει τραυματισμό, και τελικά τοποθετείται με ελαφρά κλίση. Πώς πρέπει να προσαρμοστεί η κεντρική ακτίνα για να διατηρηθούν οι αρχές του Cieszynski;",
    options: [
      "Η κεντρική ακτίνα πρέπει να κατευθυνθεί αυστηρά κάθετα στον επιμήκη άξονα του δοντιού, αγνοώντας την κλίση του πλακιδίου.",
      "Η κεντρική ακτίνα πρέπει να κατευθυνθεί κάθετα στο επίπεδο του πλακιδίου για να αποφευχθεί η παραμόρφωση της οστεΐνης και της lamina dura.",
      "Ο κανόνας του παραλληλισμού καταρρέει. Η τεχνική μετατρέπεται πρακτικά σε τεχνική διχοτόμου και η ακτίνα πρέπει να κατευθυνθεί κάθετα στη διχοτόμο της γωνίας πλακιδίου-δοντιού.",
      "Πρέπει να αυξηθεί η απόσταση εστίας-αντικειμένου μειώνοντας τα kVp για να αποτραπεί η παραμόρφωση της εικόνας λόγω της κλίσης."
    ],
    correctIndex: 2,
    explanation: "Η τεχνική του παραλληλισμού προϋποθέτει απόλυτη παραλληλία πλακιδίου και άξονα δοντιού, με την ακτίνα κάθετη ΚΑΙ στα δύο. Όταν ανατομικοί περιορισμοί (όπως η ρηχή υπερώα ή το torus palatinus) αναγκάζουν το πλακίδιο να τοποθετηθεί με κλίση, δεν υπάρχει πλέον παραλληλισμός. Σύμφωνα με τη βιβλιογραφία (βλ. παρεκκλίσεις τεχνικών), η μέθοδος αναγκαστικά μεταπίπτει στην τεχνική της διχοτόμου (κανόνας ισομετρίας Cieszynski), άρα η ακτίνα πρέπει να είναι κάθετη στη νοητή διχοτόμο για να αποφευχθεί η επιμήκυνση ή βράχυνση. Αν η ακτίνα παραμείνει κάθετη στο δόντι (με το πλακίδιο σε κλίση) θα έχουμε επιμήκυνση, ενώ αν είναι κάθετη στο πλακίδιο, θα έχουμε βράχυνση."
  },
  {
    question: "Κατά την εφαρμογή του κανόνα εντοπισμού αντικειμένου του Clark (SLOB rule) στον κάτω γνάθο, λαμβάνεται μία αρχική περιακρορριζική ακτινογραφία στον 46, όπου μια ακτινοσκιερή μάζα φαίνεται να επιπροβάλλεται στην άπω ρίζα. Λαμβάνεται δεύτερη ακτινογραφία με τη μετατόπιση της κεφαλής του μηχανήματος προς τα εγγύς. Στη νέα εικόνα, η μάζα μετακινείται προς τα άπω σε σχέση με τη ρίζα. Η μάζα βρίσκεται:",
    options: [

      "Παρειακά (Buccal), διότι η μετακίνησή της σε σχέση με το δόντι αναφοράς είναι αντίθετη προς την κατεύθυνση μετακίνησης της ακτίνας.",
      "Στο ίδιο επίπεδο με την οστεΐνη της άπω ρίζας (εντός του ριζικού σωλήνα).",

    ],
    correctIndex: 1,
    explanation: "Ο κανόνας του Clark ή SLOB (Same Lingual, Opposite Buccal) είναι σαφής: Εάν το αντικείμενο στην ακτινογραφία μετακινηθεί στην ΙΔΙΑ κατεύθυνση με την κατεύθυνση που μετακινήσαμε την κεφαλή (τον κατευθυντήρα), τότε βρίσκεται γλωσσικά/υπερώια. Εάν μετακινηθεί στην ΑΝΤΙΘΕΤΗ κατεύθυνση, βρίσκεται παρειακά/χειλικά. Εδώ, η λυχνία μετακινήθηκε εγγύς (mesial), και το αντικείμενο μετακινήθηκε άπω (distal) ως προς το δόντι αναφοράς. Αφού η κίνηση είναι αντίθετη (Opposite), η βλάβη/μάζα βρίσκεται παρειακά (Buccal)."
  },
  {
    question: "Ασθενής προσέρχεται με έντονο αντανακλαστικό εμέτου (gag reflex). Χρειάζεται να ληφθεί ακτινογραφία για την αξιολόγηση περιακρορριζικής αλλοίωσης στους κάτω γομφίους (36, 37). Ποιος χειρισμός κατά την τοποθέτηση του αισθητήρα/πλακιδίου αυξάνει τον κίνδυνο διέγερσης του αντανακλαστικού και πρέπει να αποφεύγεται;",
    options: [
      "Η καθοδήγηση του ασθενούς να αναπνέει βαθιά από τη μύτη κατά τη διάρκεια της τοποθέτησης.",
      "Η σύρσιμο του πλακιδίου πάνω στον βλεννογόνο της υπερώας ή του εδάφους του στόματος μέχρι την τελική του θέση.",
      "Η τοποθέτηση του πλακιδίου στο έδαφος του στόματος ταυτόχρονα με την κίνηση κλεισίματος των γνάθων πάνω στο συγκρατητήρα (bite block).",
      "Η γρήγορη, αποφασιστική τοποθέτηση του μέσου αποτύπωσης απευθείας στην τελική του θέση χωρίς επαναλαμβανόμενες ψηλαφήσεις."
    ],
    correctIndex: 1,
    explanation: "Για την πρόληψη του αντανακλαστικού του εμέτου, ο χρυσός κανόνας είναι η αποφασιστική τοποθέτηση του πλακιδίου στην τελική του θέση με μία κίνηση. Το συρτό πέρασμα (sliding) του πλακιδίου πάνω στον βλεννογόνο (ιδίως στη μαλακή υπερώα ή το οπίσθιο έδαφος του στόματος) ερεθίζει τους αισθητικούς υποδοχείς και πυροδοτεί άμεσα το αντανακλαστικό. Η αναπνοή από τη μύτη και το κλείσιμο της γνάθου πάνω στο bite block χαλαρώνουν τους μύες του εδάφους και βοηθούν την ανεκτικότητα."
  },
  {
    question: "Κατά την τεχνική της οπισθομυλικής (bitewing) ακτινογραφίας, ποια είναι η αναγκαιότητα εφαρμογής κατακόρυφης γωνίας +5° έως +10° προς τα κάτω;",
    options: [
      "Για να αντισταθμιστεί η παρειακή κλίση των δοντιών της κάτω γνάθου και να απεικονιστούν χωρίς παραμόρφωση οι μύλες.",
      "Για να διαπεράσει η ακτίνα παράλληλα το φατνιακό οστούν, καθώς οι ακρολοφίες της άνω και κάτω γνάθου δεν είναι απόλυτα οριζόντιες λόγω της καμπύλης του Spee και της ελαφράς υπερώιας κλίσης των άνω οπισθίων.",
      "Για την αποφυγή επιπροβολής των φυμάτων (cusp overlap), διαχωρίζοντας τα παρειακά από τα γλωσσικά φύματα των γομφίων.",
      "Είναι απλώς μια ιστορική πρακτική για την αποφυγή κοπής (cone cut) του άνω ορίου του πλακιδίου όταν δεν χρησιμοποιείται συγκρατητήρας."
    ],
    correctIndex: 1,
    explanation: "Στην οπισθομυλική ακτινογραφία (για έλεγχο όμορων επιφανειών και φατνιακής ακρολοφίας), το πλακίδιο τοποθετείται παράλληλα με τις μύλες, αλλά τα άνω οπίσθια δόντια έχουν μια φυσιολογική ελαφρά υπερώια (γλωσσική) κλίση της ρίζας τους. Επίσης υπάρχει η καμπύλη του Spee. Αν η κεντρική ακτίνα ήταν αυστηρά στις 0°, το φατνιακό οστούν της άνω γνάθου δεν θα απεικονιζόταν σωστά και τα φύματα της άνω γνάθου θα επέπεφταν το ένα πάνω στο άλλο. Η μικρή θετική γωνία (+5° έως +10°) κατευθύνει τη δέσμη ελαφρώς προς τα κάτω, επιτρέποντάς της να περάσει εφαπτομενικά από τις μασητικές επιφάνειες και το ύψος του οστού, αντισταθμίζοντας αυτές τις ανατομικές κλίσεις."
  },
  {
    question: "Στην ακτινογραφία δήξεως (occlusal) άνω γνάθου, κατά τη μέση τυπική προβολή (τοπογραφική), η κεντρική ακτίνα κατευθύνεται στο σημείο της ρίζας της ρινός. Σύμφωνα με τον πίνακα B9.4, ποια είναι η σωστή κατακόρυφη γωνία και ποιος ο κύριος διαγνωστικός σκοπός της;",
    options: [
      "Γωνία +90°. Ιδανική για τον ακριβή χωροταξικό εντοπισμό εγκλείστων (π.χ. υπεραρίθμων) στην παρειακή ή υπερώια πλευρά.",

      "Γωνία -55°. Χρησιμοποιείται για την ανάδειξη της γναθιαίας σύμφυσης και τον εντοπισμό ριζών στην κάτω γνάθο."
    ],
    correctIndex: 1,

  {

  {
    question: "Σύμφωνα με τους κανόνες τοποθέτησης της κεφαλής του ασθενούς για λήψεις της άνω γνάθου, ποιο επίπεδο πρέπει να είναι αυστηρά παράλληλο με το οριζόντιο επίπεδο του εδάφους;",
    options: [

      "Η γραμμή από την κόρη του οφθαλμού έως τη γωνία του στόματος."

            function createQuestionNav() {
    questionNav.innerHTML = '';

    quizQuestions.forEach((_, index) => {
        const btn = document.createElement('button');
        btn.className = 'question-nav-btn';
        btn.textContent = index + 1;
        btn.onclick = () => goToQuestion(index);
        questionNav.appendChild(btn);
    });
}

function updateQuestionNav() {
    const navButtons = questionNav.querySelectorAll('.question-nav-btn');

    navButtons.forEach((btn, index) => {
        btn.classList.toggle('active', index === currentQuestionIndex);
    });
}

function goToQuestion(index) {
    currentQuestionIndex = index;
    loadQuestion();

    function checkAnswer(selectedIndex, selectedBtn) {
        const currentQ = quizQuestions[currentQuestionIndex];
        const allButtons = optionsContainer.querySelectorAll('.option-btn');
        
        // Κλείδωμα επιλογών
        allButtons.forEach(btn => btn.disabled = true);

        // Χρωματισμός σωστού/λάθους
        if (selectedIndex === currentQ.correctIndex) {
            selectedBtn.classList.add('correct');
        } else {
            selectedBtn.classList.add('wrong');
            allButtons[currentQ.correctIndex].classList.add('correct');
        }

        // Εμφάνιση εξήγησης και κουμπιού "Επόμενο"
        explanationText.innerHTML = currentQ.explanation;
        explanationBox.style.display = 'block';
        nextBtn.style.display = 'block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizQuestions.length) {
            loadQuestion();
        } else {
            questionTextElement.textContent = "Συγχαρητήρια! Το τεστ ολοκληρώθηκε.";
            optionsContainer.innerHTML = '';
            explanationBox.style.display = 'none';
            nextBtn.style.display = 'none';
            progressText.textContent = "Ολοκληρώθηκε";
        }
    }

    // Initialize (Θα λειτουργήσει μόλις βάλεις τα δεδομένα στον πίνακα)
    if(quizQuestions.length > 0) {
        createQuestionNav();
        loadQuestion();
    } else {
        questionTextElement.textContent = "Παρακαλώ προσθέστε ερωτήσεις στον πίνακα quizQuestions.";
