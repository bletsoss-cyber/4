<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">

    <title>Dental Radiology Advanced Quiz</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --correct: #27ae60;
            --wrong: #c0392b;
            --bg: #f5f7fa;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .quiz-container {
            background: #fff;
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .progress {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 25px;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-btn {
            background: #fdfdfd;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--secondary);
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: #f0f8ff;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .option-btn.correct {
            background: #e8f8f5;
            border-color: var(--correct);
            color: var(--correct);
            font-weight: bold;
        }
        .option-btn.wrong {
            background: #fdedec;
            border-color: var(--wrong);
            color: var(--wrong);
        }
        .explanation-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background: #eef2f5;
            border-left: 5px solid var(--accent);
            font-size: 1rem;
            animation: fadeIn 0.4s ease;
        }
        .explanation-box h4 {
            margin-top: 0;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .next-btn {
            display: none;
            margin-top: 25px;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            float: right;
            transition: background 0.2s;
        }
        .next-btn:hover {
            background: #2980b9;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 1px solid #eee;
}

.question-nav-btn {
    width: 42px;
    height: 38px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    color: var(--secondary);
    transition: all 0.2s ease;
}

.question-nav-btn:hover {
    border-color: var(--accent);
    background: #f0f8ff;
}

.question-nav-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}
    </style>
</head>

    let currentQuestionIndex = 0;

const questionTextElement = document.getElementById('questionText');
const optionsContainer = document.getElementById('optionsContainer');
const explanationBox = document.getElementById('explanationBox');
const explanationText = document.getElementById('explanationText');
const nextBtn = document.getElementById('nextBtn');
const progressText = document.getElementById('progressText');
const questionNav = document.getElementById('questionNav');

function createQuestionNav() {
    questionNav.innerHTML = '';

    quizQuestions.forEach((_, index) => {
        const btn = document.createElement('button');
        btn.className = 'question-nav-btn';
        btn.textContent = index + 1;
        btn.onclick = () => goToQuestion(index);
        questionNav.appendChild(btn);
    });
}

function updateQuestionNav() {
    const navButtons = questionNav.querySelectorAll('.question-nav-btn');

    navButtons.forEach((btn, index) => {
        btn.classList.toggle('active', index === currentQuestionIndex);
    });
}

function goToQuestion(index) {
    currentQuestionIndex = index;
    loadQuestion();
}

function loadQuestion() {
    const currentQ = quizQuestions[currentQuestionIndex];

    questionTextElement.textContent = currentQ.question;
    progressText.textContent = `Ερώτηση ${currentQuestionIndex + 1} / ${quizQuestions.length}`;

    optionsContainer.innerHTML = '';
    explanationBox.style.display = 'none';
    nextBtn.style.display = 'none';

    currentQ.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = option;
        btn.onclick = () => checkAnswer(index, btn);
        optionsContainer.appendChild(btn);
    });

    updateQuestionNav();
}

function checkAnswer(selectedIndex, selectedBtn) {
    const currentQ = quizQuestions[currentQuestionIndex];
    const allButtons = optionsContainer.querySelectorAll('.option-btn');

    // Κλείδωμα επιλογών
    allButtons.forEach(btn => btn.disabled = true);

    // Χρωματισμός σωστού/λάθους
    if (selectedIndex === currentQ.correctIndex) {
        selectedBtn.classList.add('correct');
    } else {
        selectedBtn.classList.add('wrong');
        allButtons[currentQ.correctIndex].classList.add('correct');
    }

    // Εμφάνιση εξήγησης και κουμπιού "Επόμενο"
    explanationText.innerHTML = currentQ.explanation;
    explanationBox.style.display = 'block';
    nextBtn.style.display = 'block';
}

function nextQuestion() {
    currentQuestionIndex++;

    if (currentQuestionIndex < quizQuestions.length) {
        loadQuestion();
    } else {
        questionTextElement.textContent = "Συγχαρητήρια! Το τεστ ολοκληρώθηκε.";
        optionsContainer.innerHTML = '';
        explanationBox.style.display = 'none';
        nextBtn.style.display = 'none';
        questionNav.style.display = 'none';
        progressText.textContent = "Ολοκληρώθηκε";
    }
}

// Initialize
if (quizQuestions.length > 0) {
    createQuestionNav();
    loadQuestion();
} else {
    questionTextElement.textContent = "Παρακαλώ προσθέστε ερωτήσεις στον πίνακα quizQuestions.";
}
</script>
