<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Radiology Quiz - Πανεπιστημιακό Επίπεδο (Άμεση Ανατροφοδότηση)</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00d2ff;
            --hover-color: #3a86ff;
            --correct-color: #00b4d8;
            --wrong-color: #ef233c;
            --border-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
            border: 1px solid var(--border-color);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .progress {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.1em;
        }
        h2 {
            margin-top: 0;
            font-size: 1.4em;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option-btn {
            background-color: #2a2a2a;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1em;
            transition: all 0.2s ease;
            line-height: 1.3;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #333;
            border-color: var(--hover-color);
        }
        .option-btn.correct {
            background-color: rgba(0, 180, 216, 0.2);
            border-color: var(--correct-color);
            box-shadow: 0 0 8px rgba(0, 180, 216, 0.4);
        }
        .option-btn.wrong {
            background-color: rgba(239, 35, 60, 0.2);
            border-color: var(--wrong-color);
        }
        .option-btn:disabled {
            cursor: default;
        }
        .controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .action-btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background-color 0.2s;
        }
        .action-btn:hover {
            background-color: var(--hover-color);
            color: #fff;
        }
        .explanation {
            margin-top: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #222;
            border-left: 4px solid var(--accent-color);
            border-radius: 4px;
            display: none;
            font-size: 0.95em;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .results {
            text-align: center;
            display: none;
        }
        .results h1 {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-box">
    <div class="header">
        <div class="progress" id="progress">Ερώτηση 1 / 50</div>
        <div class="score" id="score-display">Σκορ: 0</div>
    </div>
    <h2 id="question-text">Φόρτωση ερώτησης...</h2>
    <div class="options" id="options-container"></div>
    <div class="explanation" id="explanation"></div>
    <div class="controls">
        <button class="action-btn" id="next-btn" style="display: none;">Επόμενη Ερώτηση</button>
    </div>
</div>

<div class="quiz-container results" id="results-box">
    <h1>Τέλος Δοκιμασίας!</h1>
    <h2 id="final-score"></h2>
    <p>Εξαιρετική προσπάθεια. Η επανάληψη είναι η μητέρα της μάθησης.</p>
    <button class="action-btn" onclick="location.reload()">Επανεκκίνηση Κουίζ</button>
</div>

                "Τη σχέση της ρίζας με το γλωσσικό τρήμα.",
                "Τη σχέση των ακρορριζίων με τον πόρο του κάτω φατνιακού νεύρου.",
                "Την απόσταση από τη γενειακή άκανθα.",
                "Την ύπαρξη τομικού βόθρου."
            ],
            correct: 1,
            explanation: "Η τρώση του κάτω φατνιακού νεύρου κατά την εξαγωγή μπορεί να προκαλέσει μόνιμη ή παροδική υπαίσθησία (μούδιασμα) στο κάτω χείλος."
        },
        {
            question: "Πού κατασκηνώνει ο υπογνάθιος σιαλογόνος αδένας;",
            options: [
                "Στον τομικό βόθρο της άνω γνάθου.",
                "Πάνω από την έξω λοξή γραμμή.",
                "Στον υπογνάθιο βόθρο, ο οποίος βρίσκεται στη γλωσσική επιφάνεια, κάτω από την έσω λοξή γραμμή.",
                "Μέσα στο ιγμόρειο άντρο."
            ],
            correct: 2,
            explanation: "Αυτή η ανατομική κοιλότητα δημιουργεί τη χαρακτηριστική διαύγαση που συχνά παρερμηνεύεται ως οστική βλάβη (κύστη κ.λπ.)."
        },
        {
            question: "Τι σημαίνει 'ακτινοσκιερότητα' υλικού στην κλινική πράξη;",
            options: [
                "Ότι το υλικό είναι μαλακό και αφήνει τις ακτίνες να περνούν.",
                "Ότι το υλικό έχει υψηλό ατομικό αριθμό/πυκνότητα και εμποδίζει τις ακτίνες, αποτρέποντας το μαύρισμα του φιλμ.",
                "Ότι το υλικό παράγει δική του ακτινοβολία.",
                "Ότι το υλικό αντανακλά το φως."
            ],
            correct: 1,
            explanation: "Τα ακτινοσκιερά υλικά ('κόβουν' τις ακτίνες) φαίνονται λευκά στην ακτινογραφία (π.χ. μέταλλα, αδαμαντίνη)."
        },
        {
            question: "Η αδαμαντίνη απεικονίζεται πιο λευκή (έντονα ακτινοσκιερή) από την οδοντίνη διότι:",
            options: [
                "Βρίσκεται στο εξωτερικό του δοντιού.",
                "Είναι πιο παχιά από την οδοντίνη.",
                "Έχει μεγαλύτερη πυκνότητα και υψηλότερο ατομικό αριθμό.",
                "Έχει μεγαλύτερη περιεκτικότητα σε νερό."
            ],
            correct: 2,
            explanation: "Η αδαμαντίνη είναι κατά 96% ανόργανη (κυρίως υδροξυαπατίτης), καθιστώντας την την πιο πυκνή ουσία του σώματος."
        },
        {
            question: "Στις ακτινογραφίες δήξεως, ο μυϊκός ιστός της γλώσσας:",
            options: [
                "Δεν φαίνεται ποτέ, είναι απόλυτα διαυγαστικός.",
                "Εμφανίζεται ως ακτινοσκιερή οστική δοκίδα.",
                "Απεικονίζεται ελαφρώς πιο ακτινοσκιερός σε σχέση με άλλα μαλακά μόρια, λόγω της μεγάλης του μάζας.",
                "Καλύπτει πάντα τα δόντια της άνω γνάθου."
            ],
            correct: 2,
            explanation: "Παρότι μαλακός ιστός, ο μεγάλος όγκος της γλώσσας προκαλεί μια ήπια (γκρίζα) ακτινοσκίαση στην περιοχή του εδάφους του στόματος."
        },
        {
            question: "Κατά την περίοδο του νεογιλού φραγμού, τι συμβαίνει στις ρίζες των νεογιλών δοντιών πριν την απόπτωσή τους;",
            options: [
                "Υφίστανται εσωτερική απορρόφηση.",
                "Υφίστανται φυσιολογική εξωτερική απορρόφηση.",
                "Παρουσιάζουν υπεροστεΐνωση.",
                "Διατηρούνται ακέραιες."
            ],
            correct: 1,
            explanation: "Η ανάδυση του μόνιμου σπέρματος ασκεί πίεση και προκαλεί φυσιολογική εξωτερική απορρόφηση της ρίζας του νεογιλού."
        },
        {
            question: "Ποια η διαφορά εσωτερικής και εξωτερικής απορρόφησης όσον αφορά την αιτιολογία;",
            options: [
                "Και οι δύο είναι πάντα ιδιοπαθείς.",
                "Η εσωτερική σχετίζεται πάντα με ορθοδοντική δυνάμεις.",
                "Η εσωτερική ξεκινά από τον πολφό (π.χ. φλεγμονή/τραύμα), ενώ η εξωτερική από το περιρρίζιο (π.χ. ορθοδοντική, έγκλειστα, φλεγμονές).",
                "Δεν υπάρχει διαφορά στην αιτιολογία."
            ],
            correct: 2,
            explanation: "Το σημείο έναρξης της δράσης των οδοντοκλαστών καθορίζει τον τύπο της απορρόφησης (πολφική κοιλότητα έναντι εξωτερικής επιφάνειας ρίζας)."
        },
        {
            question: "Τέλος, το 'Cervical Burnout' παρατηρείται συχνότερα στα:",
            options: [
                "Μασητικά επίπεδα των γομφίων.",
                "Ακρορρίζια των τομέων.",
                "Πλάγια (όμορα) τοιχώματα της αυχενικής περιοχής των δοντιών.",
                "Στο κέντρο του πολφικού θαλάμου."
            ],
            correct: 2,
            explanation: "Ακριβώς επειδή ο αυχένας (cervix) έχει το μικρότερο πάχος ανάμεσα στη μύλη (παχιά αδαμαντίνη) και τη ρίζα (παχύ οστό/οστεΐνη)."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    // DOM Elements
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const explanationDiv = document.getElementById('explanation');
    const progressText = document.getElementById('progress');
    const scoreText = document.getElementById('score-display');
    const nextBtn = document.getElementById('next-btn');
    const quizBox = document.getElementById('quiz-box');
    const resultsBox = document.getElementById('results-box');
    const finalScoreText = document.getElementById('final-score');

    function loadQuestion() {
        answered = false;
        const qData = questionsData[currentQuestionIndex];
        questionText.textContent = `${currentQuestionIndex + 1}. ${qData.question}`;
        optionsContainer.innerHTML = '';
        explanationDiv.style.display = 'none';
        explanationDiv.textContent = '';
        
        nextBtn.style.display = 'none';

        progressText.textContent = `Ερώτηση ${currentQuestionIndex + 1} / ${questionsData.length}`;
        scoreText.textContent = `Σκορ: ${score}`;

        qData.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = option;
            btn.onclick = () => selectOption(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(index, button) {
        if (answered) return; // Prevent clicking again
        answered = true;

        const qData = questionsData[currentQuestionIndex];
        const allBtns = document.querySelectorAll('.option-btn');
        
        // Disable all buttons
        allBtns.forEach(btn => btn.disabled = true);

        // Check if correct
        if (index === qData.correct) {
            button.classList.add('correct');
            score++;
            scoreText.textContent = `Σκορ: ${score}`;
        } else {
            button.classList.add('wrong');
            allBtns[qData.correct].classList.add('correct'); // Highlight the correct one
        }

        // Show explanation immediately
        explanationDiv.innerHTML = `<strong>Επεξήγηση:</strong> ${qData.explanation}`;
        explanationDiv.style.display = 'block';

        // Show next button
        nextBtn.style.display = 'block';
    }

    nextBtn.onclick = () => {
        currentQuestionIndex++;
        if (currentQuestionIndex < questionsData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    };

    function showResults() {
        quizBox.style.display = 'none';
        resultsBox.style.display = 'block';
        finalScoreText.textContent = `Τελικό Σκορ: ${score} / ${questionsData.length} (${Math.round((score/questionsData.length)*100)}%)`;
    }

    // Initialize Quiz
    loadQuestion();
</script>

</body>
</html>
