<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Amalgam Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; line-height: 1.6; }
        .quiz-container { max-width: 950px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 4px solid #34495e; padding-bottom: 15px; text-transform: uppercase; }
        .q-card { background: #fff; border: 1px solid #e1e8ed; padding: 25px; margin: 25px 0; border-radius: 8px; transition: 0.3s; }
        .q-text { font-weight: bold; font-size: 1.15em; margin-bottom: 18px; color: #2c3e50; }
        .option { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #bdc3c7; border-radius: 6px; text-align: left; cursor: pointer; background: #fff; font-size: 1em; transition: 0.2s; }
        .option:hover { background: #f8f9fa; border-color: #34495e; }
        .correct { background-color: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b; }
        .explanation { display: none; margin-top: 15px; padding: 18px; background: #e8f4f8; border-left: 6px solid #3498db; font-size: 0.95em; border-radius: 4px; }
        .formula { font-family: 'Times New Roman', serif; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Master Quiz: Οδοντιατρικό Αμάλγαμα</h1>
    <div id="quiz-root"></div>
</div>

<script>
const amalgamQuestions = [
    {
        q: "Ποια είναι η χημική σύσταση της φάσης γ2, η οποία θεωρείται ο 'ασθενής κρίκος' του αμαλγάματος;",
        options: ["Ag3Sn", "Ag2Hg3", "Sn7-8Hg", "Cu6Sn5"],
        correct: 2,
        why: "Η φάση γ2 (κασσίτερος-υδράργυρος) είναι η πλέον επιρρεπής σε διάβρωση και υπεύθυνη για τον υψηλό ερπυσμό στα αμαλγάματα χαμηλού χαλκού."
    },
    {
        q: "Ποιο στοιχείο προστίθεται στο κράμα για να εξαλείψει τη φάση γ2 μέσω του σχηματισμού της φάσης η' (Cu6Sn5);",
        options: ["Άργυρος (Ag)", "Κασσίτερος (Sn)", "Χαλκός (Cu)", "Ψευδάργυρος (Zn)"],
        correct: 2,
        why: "Στα αμαλγάματα υψηλού χαλκού (12-30%), ο χαλκός αντιδρά με τον κασσίτερο εμποδίζοντας τη δημιουργία της φάσης γ2."
    },
    {
        q: "Η 'καθυστερημένη διαστολή' του αμαλγάματος οφείλεται στην επιμόλυνση με υγρασία κραμάτων που περιέχουν:",
        options: ["Πάνω από 10% Χαλκό", "Ψευδάργυρο (Zn)", "Περισσότερο Άργυρο", "Μόνο Σφαιρικούς κόκκους"],
        correct: 1,
        why: "Ο ψευδάργυρος αντιδρά με το νερό παράγοντας αέριο υδρογόνο, το οποίο προκαλεί εσωτερικές πιέσεις και διαστολή της έμφραξης."
    },
    {
        q: "Ποια είναι η τυπική τιμή της αντοχής σε θλίψη ενός σύγχρονου αμαλγάματος μετά από 24 ώρες;",
        options: ["50-100 MPa", "150-250 MPa", "334-510 MPa", "800-1000 MPa"],
        correct: 2,
        why: "Μετά την πλήρη κρυστάλλωση (24h), η αντοχή σε θλίψη φτάνει σε πολύ υψηλά επίπεδα (έως 510 MPa), καθιστώντας το υλικό ανθεκτικό στη μάσηση."
    },
    {
        q: "Σύμφωνα με τον Ευρωπαϊκό Κανονισμό 2017/852, η χρήση αμαλγάματος απαγορεύεται από την 1η Ιουλίου 2018 σε:",
        options: ["Άτομα άνω των 65 ετών", "Παιδιά < 15 ετών, έγκυες και θηλάζουσες", "Μόνο σε πρόσθια δόντια", "Ασθενείς με ουλίτιδα"],
        correct: 1,
        why: "Ο κανονισμός στοχεύει στον περιορισμό της έκθεσης ευπαθών ομάδων στον υδράργυρο."
    },
    {
        q: "Η 'μεταβολή διαστάσεων' του αμαλγάματος εντός 24 ωρών πρέπει να κυμαίνεται σύμφωνα με το ISO 24234 μεταξύ:",
        options: ["-0.5% έως +0.5%", "-0.1% έως +0.1%", "-1% έως 0%", "+1% έως +2%"],
        correct: 1,
        why: "Η ελάχιστη μεταβολή διαστάσεων (-0.1% έως +0.1%) εξασφαλίζει την οριακή ακεραιότητα χωρίς να πιέζει τα οδοντικά τοιχώματα."
    },
    {
        q: "Ποιο πλεονέκτημα προσφέρουν οι 'Σφαιρικοί κόκκοι' σε σχέση με τους ακανόνιστους (Lathe-cut);",
        options: ["Απαιτούν περισσότερο υδράργυρο", "Απαιτούν χαμηλότερη πίεση συμπύκνωσης και έχουν υψηλή αρχική αντοχή", "Είναι πιο φθηνοί", "Δεν περιέχουν χαλκό"],
        correct: 1,
        why: "Η σφαιρική μορφολογία μειώνει την επιφάνεια επαφής, απαιτώντας λιγότερο Hg για τη διαβροχή και διευκολύνοντας τη συμπύκνωση."
    },
    {
        q: "Ο 'ερπυσμός' (creep) ορίζεται ως:",
        options: ["Η αλλαγή χρώματος λόγω οξείδωσης", "Η συνεχή παραμόρφωση του υλικού υπό σταθερό φορτίο", "Η χημική σύνδεση με την οδοντίνη", "Η εξάτμιση του υδραργύρου"],
        correct: 1,
        why: "Ο ερπυσμός οδηγεί στην 'υπερχείλιση' του αμαλγάματος στα όρια της κοιλότητας, προκαλώντας κάταγμα των λεπτών άκρων (ditching)."
    },
    {
        q: "Ποιο είναι το ποσοστό υδραργύρου (Hg) που περιέχεται τυπικά στις προζυγισμένες κάψουλες;",
        options: ["10-20% κ.β.", "40-50% κ.β.", "70-80% κ.β.", "90% κ.β."],
        correct: 1,
        why: "Η αναλογία κράματος-υδραργύρου είναι περίπου 1:1 για την εξασφάλιση της σωστής αντίδρασης πήξης."
    },
    {
        q: "Η 'αμαύρωση' (Tarnish) του αμαλγάματος αφορά:",
        options: ["Τη δομική αποσύνθεση του υλικού", "Μια επιφανειακή χρωματική αλλοίωση χωρίς απώλεια ιδιοτήτων", "Την εμφάνιση τερηδόνας", "Τη θραύση των ορίων"],
        correct: 1,
        why: "Η αμαύρωση οφείλεται στο σχηματισμό οξειδίων και θειούχων ενώσεων στην επιφάνεια, αλλά δεν επηρεάζει τη μηχανική αντοχή."
    },
    {
        q: "Ποιο στάδιο του κλινικού χειρισμού στοχεύει στην αφαίρεση της περίσσειας υδραργύρου από την επιφάνεια;",
        options: ["Αμαλγάμωση", "Συμπύκνωση", "Σκάλιση", "Λείανση"],
        correct: 1,
        why: "Κατά τη συμπύκνωση, ο υδράργυρος ανεβαίνει στην επιφάνεια, από όπου και αφαιρείται για να μειωθεί το ποσοστό της φάσης γ2."
    },
    {
        q: "Η 'Σύμβαση της Μιναμάτα' (2013) αποτελεί παγκόσμια δέσμευση για:",
        options: ["Την αύξηση της αντοχής των υλικών", "Τη σταδιακή μείωση και κατάργηση της χρήσης υδραργύρου", "Την προώθηση των ρητινών", "Τη χρήση μόνο χρυσού"],
        correct: 1,
        why: "Πρόκειται για περιβαλλοντική συνθήκη που επηρεάζει άμεσα την οδοντιατρική πρακτική παγκοσμίως."
    },
    {
        q: "Η ηλεκτρολυτική διάβρωση (γαλβανισμός) συμβαίνει συχνότερα όταν το αμάλγαμα έρχεται σε επαφή με:",
        options: ["Σύνθετη ρητίνη", "Υαλοϊονομερή κονία", "Ευγενή μέταλλα (π.χ. χρυσό)", "Πολυκαρβοξυλικό οξύ"],
        correct: 2,
        why: "Η διαφορά ηλεκτροθετικότητας δημιουργεί γαλβανικό ρεύμα που επιταχύνει τη διάβρωση του αμαλγάματος."
    },
    {
        q: "Οι 'διαχωριστές αμαλγάματος' στα ιατρεία πρέπει να έχουν απόδοση τουλάχιστον:",
        options: ["50%", "75%", "95%", "100%"],
        correct: 2,
        why: "Ο κανονισμός EU 2017/852 επιβάλλει απόδοση 95% για την προστασία του υδροφόρου ορίζοντα από σωματίδια Hg."
    },
    {
        q: "Ποια φάση σχηματίζεται στα αμαλγάματα υψηλού χαλκού αντί της γ2;",
        options: ["φάση ε (Cu3Sn)", "φάση η' (Cu6Sn5)", "φάση ζ", "φάση δ"],
        correct: 1,
        why: "Η φάση η' αντικαθιστά τη γ2, προσδίδοντας ανώτερες κλινικές ιδιότητες και αντοχή στη διάβρωση."
    },
    {
        q: "Η 'αντοχή σε εφελκυσμό' του αμαλγάματος είναι περίπου:",
        options: ["Ίση με τη θλιπτική", "Το 1/2 της θλιπτικής", "Το 1/8 της θλιπτικής", "Διπλάσια της θλιπτικής"],
        correct: 2,
        why: "Το αμάλγαμα είναι ψαθυρό υλικό και η αντοχή του σε εφελκυσμό είναι πολύ χαμηλή σε σχέση με τη θλίψη."
    },
    {
        q: "Η 'αρωματική αμίνη' στο αμάλγαμα:",
        options: ["Χρησιμοποιείται ως φωτοεναρκτήρας", "Προκαλεί αμαύρωση", "Δεν περιέχεται στο αμάλγαμα (είναι συστατικό ρητινών)", "Βελτιώνει τον ερπυσμό"],
        correct: 2,
        why: "Οι αρωματικές αμίνες αφορούν το χημικό πολυμερισμό των ρητινών, όχι τη χημεία του αμαλγάματος."
    },
    {
        q: "Ποια είναι η κύρια οδός απορρόφησης του στοιχειακού υδραργύρου από τον οδοντίατρο;",
        options: ["Δερματική επαφή", "Κατάποση", "Εισπνοή ατμών (70-80% απορρόφηση)", "Οπτική επαφή"],
        correct: 2,
        why: "Οι ατμοί Hg απορροφώνται ταχύτατα από τους πνεύμονες, καθιστώντας απαραίτητο τον εξαερισμό."
    },
    {
        q: "Η 'οριακή απόσπαση' (ditching) είναι αποτέλεσμα:",
        options: ["Υπερβολικής διαστολής", "Συνδυασμού υψηλού ερπυσμού και διάβρωσης της φάσης γ2", "Χρήσης σφαιρικών κόκκων", "Υπερβολικής συμπύκνωσης"],
        correct: 1,
        why: "Η σταδιακή φθορά των άκρων της έμφραξης οδηγεί σε κενά και δευτερογενή τερηδόνα."
    },
    {
        q: "Η αντίδραση αμαλγάμωσης (trituration) έχει ως σκοπό:",
        options: ["Τη θέρμανση του υλικού", "Την πλήρη διαβροχή των κόκκων της σκόνης από τον υδράργυρο", "Την εξάτμιση του Hg", "Την αλλαγή του χρώματος"],
        correct: 1,
        why: "Η μηχανική δόνηση σπάει το στρώμα οξειδίων των κόκκων επιτρέποντας την αντίδραση με τον Hg."
    },
    {
        q: "Ποιο μέταλλο προσδίδει την αντοχή και τη διαστολή στο κράμα αμαλγάματος;",
        options: ["Κασσίτερος (Sn)", "Άργυρος (Ag)", "Ψευδάργυρος (Zn)", "Παλλάδιο (Pd)"],
        correct: 1,
        why: "Ο άργυρος είναι το κύριο συστατικό που εξασφαλίζει τη μηχανική ακεραιότητα."
    },
    {
        q: "Το 'Ditching' παρατηρείται συχνότερα σε:",
        options: ["Αμαλγάματα υψηλού χαλκού", "Αμαλγάματα χαμηλού χαλκού", "Σύνθετες ρητίνες", "Κεραμικά ένθετα"],
        correct: 1,
        why: "Λόγω της παρουσίας της φάσης γ2, τα αμαλγάματα χαμηλού χαλκού είναι πιο ευάλωτα."
    },
    {
        q: "Η 'χημική αδράνεια' του αμαλγάματος:",
        options: ["Είναι απόλυτη", "Δεν υφίσταται (το υλικό διαβρώνεται ηλεκτρολυτικά)", "Επιτυγχάνεται με σιλάνιο", "Αφορά μόνο τη φάση γ"],
        correct: 1,
        why: "Το αμάλγαμα υπόκειται σε συνεχή διάβρωση στο στοματικό περιβάλλον."
    },
    {
        q: "Η 'αναλογία Eames' αφορά:",
        options: ["Την ποσότητα χαλκού", "Την αναλογία 1:1 κράματος-υδραργύρου", "Τον χρόνο φωτοπολυμερισμού", "Το πάχος της οδοντίνης"],
        correct: 1,
        why: "Η τεχνική Eames εισήγαγε τη χρήση χαμηλότερων ποσοστών Hg για καλύτερα αποτελέσματα."
    },
    {
        q: "Το 'γυάλισμα' (polishing) του αμαλγάματος πρέπει να γίνεται:",
        options: ["Αμέσως μετά τη σκάλιση", "Τουλάχιστον 24 ώρες μετά την τοποθέτηση", "Μετά από 1 χρόνο", "Ποτέ"],
        correct: 1,
        why: "Πρέπει να έχει ολοκληρωθεί πλήρως η κρυστάλλωση όλων των φάσεων."
    },
    {
        q: "Η 'φάση γ' (gamma) χημικά είναι:",
        options: ["Ag2Hg3", "Sn7-8Hg", "Ag3Sn", "Cu3Sn"],
        correct: 2,
        why: "Είναι η αρχική φάση του κράματος πριν την αντίδραση με τον υδράργυρο."
    },
    {
        q: "Η παρουσία 'Ψευδαργύρου' (Zn > 0.01%) στο κράμα βοηθά:",
        options: ["Στην αύξηση της σκληρότητας", "Στην αποφυγή οξείδωσης κατά την τήξη του κράματος (deoxidizer)", "Στην αλλαγή του C-factor", "Στη συγκόλληση"],
        correct: 1,
        why: "Ο Zn δρα ως 'καθαριστής' κατά την παραγωγή, αλλά απαιτεί προσοχή στην υγρασία."
    },
    {
        q: "Ποιο είναι το κύριο μειονέκτημα του αμαλγάματος σε σχέση με τις ρητίνες;",
        options: ["Η χαμηλή αντοχή σε θλίψη", "Η έλλειψη αισθητικής και η ανάγκη για παρασκευή με μηχανική συγκράτηση", "Το υψηλό κόστος", "Ο μικρός χρόνος ζωής"],
        correct: 1,
        why: "Το αμάλγαμα δεν συνδέεται χημικά και απαιτεί θυσία υγιούς οδοντικής ουσίας για συγκράτηση."
    },
    {
        q: "Η 'φάση γ1' (Ag2Hg3) αποτελεί:",
        options: ["Το 10% της μάζας", "Τη συνεχή φάση (μήτρα) που συγκρατεί τους κόκκους", "Την πιο σκληρή φάση", "Την αιτία της δευτερογενούς τερηδόνας"],
        correct: 1,
        why: "Είναι η κύρια φάση που σχηματίζεται και περιβάλλει τα υπολείμματα του αρχικού κράματος."
    },
    {
        q: "Το 'Snap set' στις υαλοϊονομερείς κονίες:",
        options: ["Υπάρχει και στο αμάλγαμα", "Οφείλεται στο ταρταρικό οξύ (δεν αφορά το αμάλγαμα)", "Προκαλείται από τον Hg", "Είναι στάδιο της λείανσης"],
        correct: 1,
        why: "Το snap set είναι χαρακτηριστικό των GIC, ενώ το αμάλγαμα πήζει σταδιακά μέσω διάχυσης."
    }
];

const root = document.getElementById('quiz-root');
amalgamQuestions.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `<div class="q-text">${idx + 1}. ${item.q}</div>`;
    
    item.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerText = opt;
        btn.onclick = () => {
            const btns = card.querySelectorAll('.option');
            btns.forEach(b => b.disabled = true);
            if(i === item.correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                btns[item.correct].classList.add('correct');
            }
            card.querySelector('.explanation').style.display = 'block';
        };
        card.appendChild(btn);
    });
    
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.innerHTML = `<strong>Επιστημονική Αιτιολόγηση:</strong> ${item.why}`;
    card.appendChild(exp);
    root.appendChild(card);
});
</script>

</body>
</html>
