                "Από τη συχνότητα χρήσης οδοντικού νήματος και διαλυμάτων χλωρεξιδίνης.",
                "Αποκλειστικά από το ποσοστό υγρασίας που περιέχεται στο άκαπνο προϊόν."
            ],
            correct: 1,
            rationale: "<strong>ΣΟΣ: Η βαρύτητα των συμπτωμάτων αυξάνει με την 'ποσότητα συσκευασιών/εβδομάδα και έτη χρήσης'</strong> του καπνού μάσησης."
        },
        {
            text: "Ποια είναι η αύξηση της πιθανότητας για την εκδήλωση κινητικότητας ή και απώλειας δοντιών (εκτός εμφυτευμάτων) στους καπνιστές;",
            options: [
                "Αυξάνεται η πιθανότητα εμφάνισής της κατά 7 έως 10 φορές σε σχέση με υγιείς.",
                "Μειώνεται δραστικά λόγω της ισχυρής αγγειοσύσπασης και ουλικής σκλήρυνσης.",
                "Παραμένει στατιστικά αμετάβλητη παρά τη σημαντική απώλεια του οστικού ιστού.",
                "Αυξάνεται η πιθανότητα εμφάνισής της κατά 1 έως 2 φορές σε σχέση με υγιείς."
            ],
            correct: 3,
            rationale: "<strong>ΣΟΣ: Η κινητικότητα και η απώλεια δοντιών παρουσιάζει αύξηση πιθανότητας 1-2 φορές.</strong> (Η σοβαρή περιοδοντίτιδα γενικά 2-4 φορές, η απώλεια εμφυτευμάτων 2-9 φορές)."
        },
        {
            text: "Ποια συγκεκριμένη πυραζίνη αποτελεί αναγνωρισμένο προϊόν διάσπασης του καπνού που συμβάλλει άμεσα στην κακοσμία;",
            options: [
                "Η 1, 4-βενζοπυραζίνη, η οποία προέρχεται από την αποδόμηση του κολλαγόνου.",
                "Η 2, 5-διμεθυλοπυραζίνη, η οποία δρα ως κύριο και άμεσο προϊόν διάσπασης.",
                "Η 3, 6-τετραμεθυλοπυραζίνη, που εκκρίνεται από τα παθογόνα βακτήρια του στόματος.",
                "Η 2, 8-διαιθυλοπυραζίνη, που παράγεται κατά την ταχεία εξάτμιση του σάλιου."
            ],
            correct: 1,
            rationale: "<strong>ΣΟΣ: Η 2, 5-διμεθυλοπυραζίνη (όπως και η 2, 3, 5-τριμεθυλοπυριδίνη)</strong> είναι εξειδικευμένα άμεσα προϊόντα διάσπασης νικοτίνης που προκαλούν κακοσμία."
        },
        {
            text: "Τι παρατηρείται κλινικά σε περιπτώσεις όπου ένας πρώην καπνιστής, με έξαρση αφθώδους στοματίτιδας, ξεκινά ΕΚ ΝΕΟΥ (resumption) το κάπνισμα;",
            options: [
                "Οδηγεί άμεσα σε δραματική αύξηση της εμφάνισης και της βαρύτητας της νόσου.",
                "Δεν προκαλεί καμία απολύτως μεταβολή στην κλινική εικόνα των αφθωδών ελκών.",
                "Προκαλεί τη μετατροπή των κοινών αφθωδών ελκών σε προκαρκινικές αλλοιώσεις.",
                "Οδηγεί άμεσα σε αισθητή μείωση της εμφάνισης και της βαρύτητας της νόσου."
            ],
            correct: 3,
            rationale: "<strong>ΣΟΣ: Η επαναφορά/επανάκτηση (resumption) του καπνίσματος ΜΕΙΩΝΕΙ την εμφάνιση και βαρύτητα των αφθών</strong>, επιβεβαιώνοντας τον κατασταλτικό του ρόλο στην εκδήλωσή τους."
        },
        {
            text: "Η αναφορά στην 'Εξαίρεση του κανόνα' στις τελευταίες διαφάνειες της παρουσίασης, παραπέμπει κλινικά σε ποιο από τα παρακάτω φαινόμενα;",
            options: [
                "Την πλήρη απουσία της τερηδόνας σε καπνιστές που καταναλώνουν πολλά σάκχαρα.",
                "Την ταχύτατη επούλωση των εμφυτευμάτων σε καπνιστές με ελκονεκρωτική ουλίτιδα.",
                "Την ύπαρξη υπερηλίκων που επιβιώνουν επί μακρόν παρά το συστηματικό κάπνισμα.",
                "Την απόλυτη έλλειψη χρωστικών παρά την πολυετή κατανάλωση σκούρων πούρων."
            ],
            correct: 2,
            rationale: "<strong>ΣΟΣ: Η 'Εξαίρεση του κανόνα' αφορά την εικόνα της ηλικιωμένης γυναίκας που γιορτάζει τα 100 χρόνια</strong> ενώ συνεχίζει να καπνίζει, τονίζοντας τον στατιστικό -και όχι απόλυτα ντετερμινιστικό- χαρακτήρα του ρίσκου."
        }
    ];

    const quizRoot = document.getElementById('quiz-root');

    questionsData.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';

        const qNumber = document.createElement('div');
        qNumber.className = 'question-number';
        qNumber.textContent = `Ερωτηση ${index + 1} από ${questionsData.length}`;
        
        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.textContent = q.text;

        const optionsContainer = document.createElement('div');
        optionsContainer.className = 'options';

        const rationaleDiv = document.createElement('div');
        rationaleDiv.className = 'rationale';
        rationaleDiv.innerHTML = q.rationale;

        let answered = false;

        q.options.forEach((optText, optIndex) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.textContent = `${String.fromCharCode(65 + optIndex)}. ${optText}`;
            
            btn.addEventListener('click', () => {
                if (answered) return;
                answered = true;
                
                const allButtons = optionsContainer.querySelectorAll('.option');
                allButtons.forEach((b, i) => {
                    b.classList.add('disabled');
                    if (i === q.correct) {
                        b.classList.add('correct');
                    } else if (i === optIndex && optIndex !== q.correct) {
                        b.classList.add('wrong');
                    }
                });

                rationaleDiv.classList.add('show');
            });
            
            optionsContainer.appendChild(btn);
        });

        card.appendChild(qNumber);
        card.appendChild(qText);
        card.appendChild(optionsContainer);
        card.appendChild(rationaleDiv);
        
        quizRoot.appendChild(card);
    });
</script>
