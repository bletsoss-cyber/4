function initQuiz() {
    const container = document.getElementById('quiz-container');
    examData.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `
            <div class="question-text">${index + 1}. ${data.q}</div>
            <div class="options-grid" id="options-${index}">
                ${data.options.map((opt, i) => `
                    <button class="option-btn" onclick="evaluateAnswer(${index}, ${i}, this)">${opt}</button>
                `).join('')}
            </div>
            <div class="rationale" id="rationale-${index}">
                <strong>Ακαδημαϊκή Τεκμηρίωση:</strong> ${data.why}
            </div>
        `;
        container.appendChild(card);
    });
}

window.evaluateAnswer = function(qIdx, choiceIdx, btn) {
    const parent = document.getElementById(`options-${qIdx}`);
    const buttons = parent.querySelectorAll('.option-btn');
    const rationale = document.getElementById(`rationale-${qIdx}`);
    const isCorrect = choiceIdx === examData[qIdx].correct;

    // Disable all buttons for this question
    buttons.forEach(b => b.disabled = true);

    // Visual feedback
    if (isCorrect) {
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        buttons[examData[qIdx].correct].classList.add('correct');
    }

    // Show rationale
    rationale.style.display = 'block';
};

initQuiz();
</script>
