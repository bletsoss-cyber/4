<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Οδοντικές Εναποθέσεις & Νοσήματα (1-20)</title>
<style>
    :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --correct: #16a34a;
        --correct-bg: #dcfce7;
        --incorrect: #dc2626;
        --incorrect-bg: #fee2e2;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #1e293b;
        --text-light: #64748b;
        --border: #e2e8f0;
    }
    
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        line-height: 1.6;
        padding: 20px;
        margin: 0;
        display: flex;
        justify-content: center;
    }

    .quiz-container {
        background-color: var(--card);
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        max-width: 800px;
        width: 100%;
        padding: 30px;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid var(--border);
        padding-bottom: 15px;
        margin-bottom: 25px;
    }

    .progress {
        color: var(--text-light);
        font-weight: 600;
        font-size: 1.1rem;
    }

    .question {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 25px;
    }

    .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .option {
        padding: 16px;
        border: 2px solid var(--border);
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        font-size: 1rem;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s ease;
        line-height: 1.5;
    }

    .option:hover:not(:disabled) {
        border-color: var(--primary);
        background-color: #eff6ff;
    }

    .option:disabled {
        cursor: default;
    }

    .option.correct {
        border-color: var(--correct);
        background-color: var(--correct-bg);
        color: #14532d;
    }

    .option.incorrect {
        border-color: var(--incorrect);
        background-color: var(--incorrect-bg);
        color: #7f1d1d;
    }

    .rationale {
        margin-top: 25px;
        padding: 20px;
        background-color: #f1f5f9;
        border-left: 4px solid var(--primary);
        border-radius: 4px;
        display: none;
        animation: fadeIn 0.4s ease;
    }

    .rationale strong {
        color: var(--primary);
    }

    .controls {
        margin-top: 25px;
        display: flex;
        justify-content: flex-end;
    }

    .btn {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        display: none;
    }

    .btn:hover {
        background-color: var(--primary-hover);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .results {
        text-align: center;
        display: none;
    }
    
    .results h2 {
        font-size: 2rem;
        color: var(--primary);
        margin-bottom: 10px;
    }

</style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-content">
        <div class="header">
            <h1 style="font-size: 1.2rem; margin: 0; color: var(--primary);">Οδοντικές Εναποθέσεις</h1>
            <div class="progress"><span id="current-q">1</span> / <span id="total-q">20</span></div>
        </div>
        
        <div class="question" id="question-text"></div>
        <div class="options" id="options-container"></div>
        <div class="rationale" id="rationale-container"></div>
        
        <div class="controls">
            <button class="btn" id="next-btn">Επόμενη Ερώτηση</button>
        </div>
    </div>

    <div class="results" id="results-content">
        <h2>Το Κουίζ Ολοκληρώθηκε!</h2>
        <p style="font-size: 1.2rem;">Η βαθμολογία σας: <strong id="score"></strong> / 20</p>
        <button class="btn" style="display: inline-block; margin-top: 20px;" onclick="location.reload()">Επανεκκίνηση</button>
    </div>
</div>

let currentQuestion = 0;
let score = 0;
let answered = false;

const questionEl = document.getElementById('question-text');
const optionsEl = document.getElementById('options-container');
const rationaleEl = document.getElementById('rationale-container');
const nextBtn = document.getElementById('next-btn');
const currentQEl = document.getElementById('current-q');

function loadQuestion() {
    answered = false;
    rationaleEl.style.display = 'none';
    nextBtn.style.display = 'none';
    
    const q = quizData[currentQuestion];
    currentQEl.innerText = currentQuestion + 1;
    questionEl.innerText = q.question;
    
    optionsEl.innerHTML = '';
    q.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerText = opt;
        btn.onclick = () => selectOption(index, btn);
        optionsEl.appendChild(btn);
    });
}

function selectOption(selectedIndex, btnElement) {
    if (answered) return;
    answered = true;
    
    const q = quizData[currentQuestion];
    const options = optionsEl.children;
    
    if (selectedIndex === q.correct) {
        btnElement.classList.add('correct');
        score++;
    } else {
        btnElement.classList.add('incorrect');
        options[q.correct].classList.add('correct');
    }
    
    for (let i = 0; i < options.length; i++) {
        options[i].disabled = true;
    }
    
    rationaleEl.innerHTML = q.rationale;
    rationaleEl.style.display = 'block';
    
    if (currentQuestion < quizData.length - 1) {
        nextBtn.innerText = 'Επόμενη Ερώτηση';
    } else {
        nextBtn.innerText = 'Ολοκλήρωση';
    }
    nextBtn.style.display = 'block';
}

nextBtn.onclick = () => {
    currentQuestion++;
    if (currentQuestion < quizData.length) {
        loadQuestion();
    } else {
        document.getElementById('quiz-content').style.display = 'none';
        const resultsEl = document.getElementById('results-content');
        resultsEl.style.display = 'block';
        document.getElementById('score').innerText = score;
    }
};

loadQuestion();
</script>
