<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ακαδημαϊκό Κουίζ: Ακτινογραφία στην Ενδοδοντία</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            background-color: var(--card-bg);
            max-width: 800px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 40px;
            box-sizing: border-box;
        }

        .quiz-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .quiz-header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin: 0 0 10px 0;
        }

        .progress-indicator {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 25px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--bg-color);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 1.1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            font-family: inherit;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            background-color: #ebf5fb;
        }

        .option-btn.correct {
            background-color: #eafaf1;
            border-color: var(--success-color);
            color: #1e8449;
        }

        .option-btn.wrong {
            background-color: #fdedec;
            border-color: var(--error-color);
            color: #b03a2e;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .explanation-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            background-color: #fef9e7;
            border-left: 5px solid #f1c40f;
            animation: fadeIn 0.4s ease;
        }

        .explanation-box h3 {
            margin: 0 0 10px 0;
            color: #b7950b;
            font-size: 1.1rem;
        }

        .explanation-box p {
            margin: 0;
            font-size: 1.05rem;
            color: #555;
        }

        .next-btn-container {
            margin-top: 30px;
            text-align: right;
        }

        .next-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            display: none;
        }

        .next-btn:hover {
            background-color: #2980b9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-screen {
            text-align: center;
        }

        .score-display {
            font-size: 3rem;
            color: var(--primary-color);
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-content">
            <div class="quiz-header">
                <h1>Η Ακτινογραφία στην Ενδοδοντία</h1>
                <div class="progress-indicator" id="progress">Ερώτηση 1 από X</div>
            </div>
            
            <div class="question-text" id="question">Φόρτωση ερώτησης...</div>
            
            <div class="options-grid" id="options">
                </div>

            <div class="explanation-box" id="explanation">
                <h3>Ακαδημαϊκή Επεξήγηση</h3>
                <p id="explanation-text"></p>
            </div>

            <div class="next-btn-container">
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">Επόμενη Ερώτηση</button>
            </div>
        </div>

        <div id="result-content" class="result-screen" style="display: none;">
            <h1>Ολοκλήρωση Κουίζ!</h1>
            <div class="score-display">
                <span id="score">0</span> / <span id="total-questions">0</span>
            </div>
            <p>Ακαδημαϊκή αξιολόγηση ολοκληρώθηκε.</p>
        </div>
    </div>

            // Reset UI
            explanationEl.style.display = 'none';
            nextBtn.style.display = 'none';
            optionsEl.innerHTML = '';
            
            const currentQ = questionsData[currentIndex];
            progressEl.textContent = `Ερώτηση ${currentIndex + 1} από ${questionsData.length}`;
            questionEl.textContent = currentQ.questionText;

            currentQ.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(btn, opt.isCorrect, currentQ.explanation);
                optionsEl.appendChild(btn);
            });
        }

        function selectOption(selectedBtn, isCorrect, explanationText) {
            const allBtns = optionsEl.querySelectorAll('.option-btn');
            
            // Κλείδωμα επιλογών
            allBtns.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                // Βρες και δείξε το σωστό
                const currentQ = questionsData[currentIndex];
                currentQ.options.forEach((opt, idx) => {
                    if (opt.isCorrect) {
                        allBtns[idx].classList.add('correct');
                    }
                });
            }

            // Εμφάνιση επεξήγησης
            explanationTextEl.textContent = explanationText;
            explanationEl.style.display = 'block';
            nextBtn.style.display = 'inline-block';
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questionsData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-content').style.display = 'block';
            document.getElementById('score').textContent = score;
            document.getElementById('total-questions').textContent = questionsData.length;
        }

        // Εκκίνηση Quiz
        loadQuestion();
