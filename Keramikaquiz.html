const container = document.getElementById('quiz-root');

ceramicQuestions.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `<h3>{idx + 1}. {item.q}</h3>`;
    
    item.options.forEach((opt, optIdx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerText = opt;
        btn.onclick = () => {
            const btns = card.querySelectorAll('.option');
            btns.forEach(b => b.disabled = true);
            if(optIdx === item.correct) btn.classList.add('correct');
            else {
                btn.classList.add('wrong');
                btns[item.correct].classList.add('correct');
            }
            card.querySelector('.explanation').style.display = 'block';
        };
        card.appendChild(btn);
    });
    
    const exp = document.createElement('div');
    exp.className = 'explanation';
    exp.innerHTML = `<strong>Επιστημονική Αιτιολόγηση:</strong> {item.why}`;
    card.appendChild(exp);
    container.appendChild(card);
});

</html>
