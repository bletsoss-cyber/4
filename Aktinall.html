                    const allOptions = optionsList.querySelectorAll('.option');
                    allOptions.forEach(o => o.classList.add('disabled'));

                    if (optIndex === item.correct) {
                        li.classList.add('correct');
                    } else {
                        li.classList.add('incorrect');
                        // Highlight the correct one
                        allOptions[item.correct].classList.remove('disabled');
                        allOptions[item.correct].classList.add('correct');
                    }
                    
                    rationaleBox.classList.add('show');
                });

                optionsList.appendChild(li);
            });

            card.appendChild(optionsList);
            card.appendChild(rationaleBox);
            container.appendChild(card);
        });
    </script>
</body>
</html>
