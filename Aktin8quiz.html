<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κουίζ Οδοντιατρικής Ακτινολογίας: Ψηφιακή Απεικόνιση</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --correct-color: #27ae60;
            --wrong-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }

        .quiz-header {
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .quiz-header h1 {
            color: var(--primary-color);
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }

        .progress {
            font-weight: bold;
            color: var(--accent-color);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--bg-color);
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e8f4fd;
            border-color: var(--accent-color);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: #e8f8f5;
            border-color: var(--correct-color);
            color: var(--correct-color);
        }

        .option-btn.wrong {
            background-color: #fdf2f0;
            border-color: var(--wrong-color);
            color: var(--wrong-color);
        }

        .explanation-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #f8f9fa;
            border-left: 5px solid var(--accent-color);
            border-radius: 4px;
            animation: fadeIn 0.4s ease;
        }

        .explanation-box h3 {
            margin-top: 0;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .explanation-box p {
            margin: 0;
            font-size: 0.95rem;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        #next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none;
        }

        #next-btn:hover {
            background-color: var(--secondary-color);
        }

        .results {
            text-align: center;
            display: none;
        }

        .results h2 {
            color: var(--primary-color);
        }

        .results .score {
            font-size: 2rem;
            color: var(--accent-color);
            font-weight: bold;
            margin: 20px 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e1e8ed;
}

.question-nav-btn {
    width: 42px;
    height: 38px;
    border: 1px solid #d5dde5;
    background: #ffffff;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    color: var(--secondary-color);
    transition: all 0.2s ease;
}

.question-nav-btn:hover {
    border-color: var(--accent-color);
    background: #e8f4fd;
}

.question-nav-btn.active {
    background: var(--accent-color);
    color: white;
    border-color: var(--accent-color);
}

.question-nav-btn.answered {
    border-color: var(--correct-color);
}
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-area">
            <div class="quiz-header">
                <h1>Ψηφιακή Απεικόνιση - Μέσα Καταγραφής</h1>
                <div class="progress">Ερώτηση <span id="current-q">1</span> από <span id="total-q">0</span></div>
            </div>

            <div class="question-nav" id="question-nav"></div>
            
            <div class="question-text" id="question-text">
                </div>

            <div class="options-list" id="options-container">
                </div>

            <div class="explanation-box" id="explanation-box">
                <h3>Επιστημονική Αιτιολόγηση</h3>
                <p id="explanation-text"></p>
            </div>

            <div class="controls">
                <button id="next-btn">Επόμενη Ερώτηση</button>
            </div>
        </div>

        <div id="results-area" class="results">
            <h2>Το Κουίζ Ολοκληρώθηκε!</h2>
            <p>Η βαθμολογία σας:</p>
            <div class="score"><span id="final-score">0</span> / <span id="final-total">0</span></div>
            <button id="restart-btn" style="background-color: var(--primary-color); color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 6px; cursor: pointer;">Επανεκκίνηση</button>
        </div>
    </div>

    <script>
        // ΕΔΩ ΘΑ ΕΠΙΚΟΛΛΗΣΕΙΣ ΤΑ OBJECTS ΤΩΝ ΕΡΩΤΗΣΕΩΝ
        const quizQuestions = [
            {
    question: "Κατά την ψηφιοποίηση μιας αναλογικής εικόνας, το εύρος των τιμών από το μαύρο μέχρι το απόλυτο λευκό καθορίζεται από το bit depth. Σε ένα ιατρικό απεικονιστικό σύστημα με οθόνη 12-bit, ποια είναι η κλινική σημασία της υποστηριζόμενης ανάλυσης αντιθέσεων, δεδομένων των περιορισμών της ανθρώπινης όρασης;",
    options: [
      "Επιτρέπει στο εκπαιδευμένο μάτι του οδοντιάτρου να αναγνωρίσει ταυτόχρονα και τις 4.096 διαβαθμίσεις του γκρι σε μια στατική εικόνα.",
      "Παρότι το ανθρώπινο μάτι ξεχωρίζει μόλις 30-40 αποχρώσεις, οι 4.096 διαβαθμίσεις επιτρέπουν στο λογισμικό να αναδείξει λανθάνουσες διαγνωστικές πληροφορίες μέσω εργαλείων επεξεργασίας.",
      "Αυξάνει δραματικά τη χωρική διακριτική ικανότητα (spatial resolution) στα 12 lp/mm, ανεξάρτητα από το μέγεθος των εικονοστοιχείων (pixels).",
      "Εξαλείφει πλήρως τον δομικό θόρυβο (structural noise) που παρατηρείται στα συστήματα πλακών φωσφόρου."
    ],
    correctIndex: 1,
    explanation: "Σωστή επιλογή είναι η 2η. Όπως αναφέρει το σύγγραμμα, ενώ τα σύγχρονα συστήματα φτάνουν τα 12 ή και 16 bits (4.096 - 65.536 διαβαθμίσεις), ο μέσος άνθρωπος μπορεί να ξεχωρίσει μόνο 30-40 αποχρώσεις (και θεωρητικά ποτέ πάνω από 100). Η ύπαρξη των πολλαπλών διαβαθμίσεων στο αρχείο (bit depth) δεν σημαίνει ότι φαίνονται όλες ταυτόχρονα, αλλά ότι η πληροφορία καταγράφηκε και είναι διαθέσιμη στο υπολογιστικό σύστημα. Έτσι, παρέχεται η δυνατότητα μέσω εργαλείων λογισμικού (όπως ρύθμιση φωτεινότητας/αντίθεσης ή windowing) να αναδειχθούν οι κρυμμένες λεπτομέρειες, μετατρέποντας τις μη αντιληπτές διαφορές αποχρώσεων σε διαφορές που μπορεί να δει το μάτι στις 30-40 δικές του διαβαθμίσεις."
  },
  {
    question: "Ποια είναι η ακριβής φωτοχημική/φυσική αλληλουχία που λαμβάνει χώρα κατά την 'έκθεση' και την 'σάρωση' σε ένα έμμεσο ψηφιακό σύστημα πλακών φωσφόρου (PSP);",
    options: [
      "Η ακτινοβολία X μετατρέπεται άμεσα σε ηλεκτρικό σήμα στο στρώμα άμορφου πυριτίου, και η σάρωση γίνεται με μπλε laser που εξάγει τα δεδομένα.",
      "Η ακτινοβολία X διεγείρει τα ηλεκτρόνια του αλογόνου που εγκλωβίζονται στο Ευρώπιο. Η σάρωση με ερυθρό laser (600nm) απελευθερώνει μπλε-πράσινο φως.",
      "Η ακτινοβολία X διεγείρει τα ηλεκτρόνια του Ευρωπίου (Eu+2 -> Eu+3), τα οποία εγκλωβίζονται σε κενά αλογόνου (F-centers). Κατά τη σάρωση, ερυθρό laser (600nm) τα αποδεσμεύει προκαλώντας εκπομπή μπλε-πράσινου φωτός (300-500nm).",
      "Οι ακτίνες X προσπίπτουν στον σπινθηριστή Ιωδιούχου Καισίου (CsI), ο οποίος εκπέμπει άμεσα ορατό φως που καταγράφεται από τις κρυσταλλολυχνίες TFT."
    ],
    correctIndex: 2,
    explanation: "Η σωστή απάντηση είναι η 3η. Το σύγγραμμα διευκρινίζει ότι η φωτοδιεγερμένη κρυσταλλική στρώση περιέχει BaFX:Eu2+. Με την έκθεση στις ακτίνες X, τα ηλεκτρόνια από το Ευρώπιο (Eu) διεγείρονται (Eu+2 μετατρέπεται σε Eu+3) και μεταφέρονται σε υψηλότερα ενεργειακά κενά στα παρακείμενα άτομα αλογόνου (F-centers), δημιουργώντας τη λανθάνουσα εικόνα. Κατά τη σάρωση (2ο στάδιο), η πλάκα χτυπιέται από ερυθρό laser (600nm) που δίνει στα ηλεκτρόνια την ενέργεια να επιστρέψουν στη βάση τους, εκπέμποντας ενέργεια υπό μορφή μπλε-πράσινου φωτός (300-500nm), το οποίο συλλέγεται από τον φωτοπολλαπλασιαστή. Η επιλογή 2 μπερδεύει τα στοιχεία (λέει ότι το αλογόνο εγκλωβίζεται στο Ευρώπιο), ενώ η 4 αναφέρεται σε αισθητήρες CCD/CMOS και η 1 σε άμεσους FPD."
  },
  {
    question: "Αναφορικά με τους αισθητήρες CCD (Charge-Coupled Devices) για ενδοστοματική ψηφιακή ακτινογραφία, ποιος είναι ο ακριβής ρόλος των οπτικών ινών που παρεμβάλλονται μεταξύ του σπινθηριστή και της μήτρας του αισθητήρα;",
    options: [
      "Να αποτρέπουν την εξασθένιση του σήματος (readout time delay) μεταφέροντας άμεσα τα ηλεκτρόνια στον υπολογιστή.",
      "Να προστατεύουν τη φωτοευαίσθητη επιφάνεια του πυριτίου από τα σκεδαζόμενα ορατά φωτόνια του σπινθηριστή, τα οποία δεν απορροφήθηκαν πλήρως.",
      "Να περιορίζουν τη διάχυση του ορατού φωτός κατά την κάθοδό του προς το αισθητήριο, κόβοντας ταυτόχρονα και τις ακτίνες X που δεν απορροφήθηκαν από τον σπινθηριστή, προστατεύοντας τα κυκλώματα σιλικόνης.",
      "Να μετατρέπουν τα φωτόνια των ακτίνων Χ απευθείας σε ελεύθερα φορτισμένα ηλεκτρόνια, παρακάμπτοντας το φωτοηλεκτρικό φαινόμενο."
    ],
    correctIndex: 2,
    explanation: "Η σωστή επιλογή είναι η 3η. Σύμφωνα με το κείμενο, σε έναν έμμεσο αισθητήρα (όπως ο CCD), οι ακτίνες X χτυπούν πρώτα τον σπινθηριστή (CsI) δημιουργώντας φωτόνια ορατού φωτός. Η διάταξη οπτικών ινών που βρίσκεται από κάτω, παίζει τον κρίσιμο ρόλο να οδηγεί (να επικεντρώνει) τα ορατά φωτόνια προς το στοιχείο (pixel) του αισθητήρα αποφεύγοντας την οριζόντια διάχυση (που θα προκαλούσε θολούρα), ενώ παράλληλα απορροφά («κόβει») τις εναπομείνασες ακτίνες X που πέρασαν μέσα από τον σπινθηριστή, προστατεύοντας έτσι την πλακέτα σιλικόνης του CCD από την καταστροφική επίδραση της ακτινοβολίας."
  },
  {
    question: "Ποια είναι η θεμελιώδης διαφορά αρχιτεκτονικής που διαφοροποιεί τους αισθητήρες CMOS/APS (Active Pixel Sensor) από τους παραδοσιακούς αισθητήρες CCD;",
    options: [
      "Οι CMOS δεν απαιτούν τη χρήση σπινθηριστή για τη μετατροπή της ακτινοβολίας σε φως, σε αντίθεση με τους CCD.",
      "Στους CMOS κάθε εικονοστοιχείο (pixel) διαθέτει το δικό του ενισχυτικό τρανζίστορ, επιτρέποντας την αυτόνομη ανάγνωση του φορτίου, ενώ στους CCD το φορτίο μεταφέρεται από pixel σε pixel («βροχή») μέχρι τον μετατροπέα.",
      "Οι CMOS χρησιμοποιούν άμορφο σελήνιο (a-Se) αντί για πυρίτιο, καθιστώντας τους πιο ανθεκτικούς στην υποβάθμιση από τις ακτίνες Χ.",
      "Η τεχνολογία CCD καταναλώνει σημαντικά λιγότερη ηλεκτρική ενέργεια σε σχέση με την CMOS, λόγω της απουσίας ενισχυτών σε κάθε pixel."
    ],
    correctIndex: 1,
    explanation: "Σωστή επιλογή η 2η. Το σύγγραμμα αναφέρει ξεκάθαρα πως στους αισθητήρες CCD, το φορτίο κάθε pixel μεταφέρεται σαν «βροχή» ή διαδοχικά (bucket-brigade) στο γειτονικό του μέχρι να φτάσει στο τέλος της στήλης για να αναγνωστεί. Αντίθετα, η καινοτομία των CMOS/APS έγκειται στην προσθήκη ενός ενεργού ενισχυτικού τρανζίστορ σε *κάθε* εικονοστοιχείο. Αυτό σημαίνει ότι κάθε pixel είναι ανεξάρτητο ως προς την ανάγνωση του φορτίου του. Οι επιλογές 1 και 3 είναι λανθασμένες επειδή και οι δύο ενδοστοματικοί CCD/CMOS είναι συνήθως έμμεσοι (άρα έχουν σπινθηριστή) και βασίζονται στο πυρίτιο. Η επιλογή 4 είναι αντίστροφη της πραγματικότητας, καθώς οι CMOS καταναλώνουν *λιγότερη* ενέργεια (1/100 σε σχέση με τους CCD)."
  },
  {
    question: "Στους Επίπεδους Ανιχνευτές (Flat Panel Detectors - FPD), ποιο υλικό χρησιμοποιείται στους 'άμεσους' ανιχνευτές προκειμένου η ενέργεια των ακτίνων X να μετατραπεί απευθείας σε ηλεκτρικό σήμα, αποφεύγοντας το στάδιο της δημιουργίας φωτός;",
    options: [
      "Ιωδιούχο Καίσιο (CsI) με δομή στηλοειδών κρυστάλλων.",
      "Άμορφο Πυρίτιο (a-Si) επικαλυμμένο με Θειοξείδιο του Γαδολινίου.",
      "Φθοροαλογονίδιο του Βαρίου εμπλουτισμένο με Ευρώπιο (BaFX:Eu2+).",
      "Άμορφο Σελήνιο (a-Se)."
    ],
    correctIndex: 3,
    explanation: "Η σωστή απάντηση είναι η 4η (Άμορφο Σελήνιο). Το σύγγραμμα αναφέρει ρητά (στη σελίδα 31/Εικ. 8.23) ότι οι άμεσοι ανιχνευτές FPD αποτελούνται από ένα φωτοαγώγιμο υλικό, συνήθως άμορφο σελήνιο (a-Se). Το υλικό αυτό απορροφά τις ακτίνες X και παράγει απευθείας ηλεκτρικά φορτία που καταγράφονται από τις διατάξεις TFT, χωρίς να μεσολαβεί σπινθηριστής (εξαλείφοντας τη διάχυση φωτός και βελτιώνοντας την ανάλυση). Το Ιωδιούχο Καίσιο (CsI) και το Άμορφο Πυρίτιο (a-Si) αποτελούν δομικά στοιχεία των *έμμεσων* FPD, ενώ το BaFX:Eu2+ αφορά τις πλάκες φωσφόρου (PSP)."
  },
  {
    question: "Ένας οδοντίατρος ρυθμίζει το ακτινογραφικό μηχάνημα σε πολύ χαμηλό χρόνο έκθεσης (υπο-ακτινοβόληση) για να προστατεύσει τον ασθενή, αλλά η παραγόμενη ψηφιακή εικόνα στον αισθητήρα CCD εμφανίζεται με έντονη «κοκκίδωση». Ποιο είδος θορύβου ευθύνεται κυρίως γι' αυτό το φαινόμενο και ποια κατανομή ακολουθεί;",
    options: [
      "Δομικός Ενδογενής Θόρυβος, ο οποίος ακολουθεί την κατανομή Gauss.",
      "Κβαντικός Θόρυβος, ο οποίος υπακούει στη στατιστική κατανομή Poisson.",

      "Υπολογιστικός Θόρυβος, ο οποίος προκύπτει από σφάλματα κατά την ψηφιοποίηση (analog-to-digital conversion)."
    ],
    correctIndex: 1,
    explanation: "Η σωστή επιλογή είναι η 2η. Όπως εξηγείται στην ανάλυση του Θορύβου, ο 'Κβαντικός θόρυβος' (Quantum noise) οφείλεται στο μικρό αριθμό (ή την ανισομερή κατανομή) των φωτονίων των ακτίνων X που φτάνουν στον ανιχνευτή, όταν δίνονται χαμηλές δόσεις ακτινοβολίας. Περιγράφεται από τη στατιστική κατανομή Poisson. Αντίθετα, ο δομικός θόρυβος χαρακτηρίζει κυρίως τα συστήματα PSP λόγω της κατασκευής της πλάκας και δεν εξαρτάται αποκλειστικά από την υπο-ακτινοβόληση με αυτόν τον τρόπο."
  },
  {
    question: "Ποιος παράγοντας ΔΕΝ αποτελεί προϋπόθεση για την επιτυχή εφαρμογή της Ψηφιακής Αφαιρετικής Ακτινογραφίας (DSR) σε κλινικό επίπεδο για την εκτίμηση της οστικής απώλειας;",
    options: [
      "Η διατήρηση αμετάβλητης της γεωμετρίας της προβολής (ίδια γωνία) μεταξύ του αρχικού και του επόμενου ακτινογραφήματος.",

    ],
    correctIndex: 3,
    explanation: "Η σωστή επιλογή (δηλαδή αυτή που ΔΕΝ αποτελεί προϋπόθεση) είναι η 4η. Το σύγγραμμα δεν θέτει ως περιορισμό τη χρήση αποκλειστικά CMOS για την DSR. Αντιθέτως, τονίζει εμφατικά ότι η επιτυχία της τεχνικής εξαρτάται από (α) την επαναληψιμότητα της γεωμετρίας, (β) την πιστή αναπαραγωγή των χαρακτηριστικών της δέσμης, και (γ) τη μαθηματική/αλγοριθμική διόρθωση των διαβαθμίσεων του γκρι πριν την αφαίρεση (για να αποφευχθούν τα ψευδή 'pixels'). Η αφαιρετική μπορεί να γίνει εφόσον οι εικόνες έχουν ψηφιοποιηθεί σωστά και τηρούνται οι γεωμετρικοί κανόνες, ανεξαρτήτως αν προέρχονται από PSP, CCD, ή CMOS."
  },
  {
    question: "Η χωρική διακριτική ικανότητα (spatial resolution) ενός ψηφιακού συστήματος περιγράφει την ικανότητα διάκρισης δύο μικρών αντικειμένων που βρίσκονται πολύ κοντά. Σε ποια μονάδα μέτρησης εκφράζεται συχνότερα και πώς επηρεάζεται από το μέγεθος του εικονοστοιχείου (pixel size);",

        let currentQuestionIndex = 0;

        const questionTextElement = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const explanationBox = document.getElementById('explanation-box');
        const explanationText = document.getElementById('explanation-text');
        const nextBtn = document.getElementById('next-btn');
        const currentQSpan = document.getElementById('current-q');
        const totalQSpan = document.getElementById('total-q');
        const quizArea = document.getElementById('quiz-area');
        const resultsArea = document.getElementById('results-area');
        const questionNav = document.getElementById('question-nav');
        const answeredQuestions = new Set();
        
        function initQuiz() {
            if (quizQuestions.length === 0) {
                questionTextElement.innerText = "Το array των ερωτήσεων είναι κενό. Παρακαλώ προσθέστε τις ερωτήσεις στον κώδικα.";
                return;
            }
            totalQSpan.innerText = quizQuestions.length;
            document.getElementById('final-total').innerText = quizQuestions.length;
            createQuestionNav();
            loadQuestion();

}

        function createQuestionNav() {
    questionNav.innerHTML = '';

    quizQuestions.forEach((_, index) => {
        const button = document.createElement('button');
        button.className = 'question-nav-btn';
        button.innerText = index + 1;
        button.onclick = () => goToQuestion(index);
        questionNav.appendChild(button);
    });
}

function updateQuestionNav() {
    const navButtons = questionNav.querySelectorAll('.question-nav-btn');

    navButtons.forEach((button, index) => {
        button.classList.toggle('active', index === currentQuestionIndex);
        button.classList.toggle('answered', answeredQuestions.has(index));
    });
}

function goToQuestion(index) {
    currentQuestionIndex = index;
    loadQuestion();
}
        
        function loadQuestion() {
            resetState();
            const currentQuestion = quizQuestions[currentQuestionIndex];
            currentQSpan.innerText = currentQuestionIndex + 1;
            questionTextElement.innerText = currentQuestion.question;

            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.onclick = () => selectOption(index, button);
                optionsContainer.appendChild(button);
                updateQuestionNav();
            });
        }

        function resetState() {
            nextBtn.style.display = 'none';
            explanationBox.style.display = 'none';
            optionsContainer.innerHTML = '';
        }

        function selectOption(selectedIndex, selectedButton) {
            const currentQuestion = quizQuestions[currentQuestionIndex];
            const isCorrect = selectedIndex === currentQuestion.correctIndex;

            // Απενεργοποίηση όλων των επιλογών
            const allButtons = optionsContainer.querySelectorAll('.option-btn');
            allButtons.forEach((btn, index) => {
                btn.disabled = true;
                if (index === currentQuestion.correctIndex) {
                    btn.classList.add('correct');
                } else if (index === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });

            if (isCorrect) score++;
            answeredQuestions.add(currentQuestionIndex);
updateQuestionNav();

            // Εμφάνιση εξήγησης
            explanationText.innerHTML = currentQuestion.explanation;
            explanationBox.style.display = 'block';
            nextBtn.style.display = 'block';
        }

        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function showResults() {
            quizArea.style.display = 'none';
            resultsArea.style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            currentQuestionIndex = 0;
            score = 0;
            answeredQuestions.clear();
            quizArea.style.display = 'block';
            resultsArea.style.display = 'none';
            loadQuestion();
        });

        // Έναρξη του quiz
        initQuiz();
    </script>
