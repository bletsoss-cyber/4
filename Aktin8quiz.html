<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz: Ψηφιακή Απεικόνιση & Μέσα Καταγραφής</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --success-color: #10b981;
            --error-color: #ef4444;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card-bg);
            max-width: 800px;
            width: 100%;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 30px;
            box-sizing: border-box;
        }

        header {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        .progress-container {
            background-color: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--secondary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-meta {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #0f172a;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            padding: 15px 20px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-color);
            font-weight: 500;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #e2e8f0;
            border-color: #cbd5e1;
        }

        .option-btn.correct {
            background-color: #d1fae5;
            border-color: var(--success-color);
            color: #065f46;
            font-weight: 600;
        }

        .option-btn.incorrect {
            background-color: #fee2e2;
            border-color: var(--error-color);
            color: #991b1b;
            font-weight: 600;
        }

        .feedback-container {
            margin-top: 25px;
            padding: 20px;
            border-radius: var(--border-radius);
            background-color: #f8fafc;
            border-left: 4px solid var(--secondary-color);
            display: none;
        }

        .feedback-title {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .feedback-text {
            font-size: 14px;
            line-height: 1.6;
            color: #334155;
        }

        .control-btns {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: var(--border-radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            transition: background-color 0.2s ease;
        }

        .next-btn:hover {
            background-color: #1d4ed8;
        }

        /* Results Screen styling */
        .results-screen {
            text-align: center;
            display: none;
        }

        .score-display {
            font-size: 48px;
            font-weight: 800;
            color: var(--primary-color);
            margin: 20px 0;
        }

        .restart-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: var(--border-radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-window">
        <header>
            <h1>Ψηφιακή Απεικόνιση – Μέσα Καταγραφής</h1>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </header>

        <div class="quiz-meta">
            <span id="question-number">Ερώτηση 1 από 50</span>
            <span id="score-counter">Σκορ: 0/0</span>
        </div>

        <div class="question-text" id="question-text">Φόρτωση ερώτησης...</div>

        <div class="options-container" id="options-container">
            </div>

        <div class="feedback-container" id="feedback-container">
            <div class="feedback-title" id="feedback-title">Ανατροφοδότηση</div>
            <div class="feedback-text" id="feedback-text">Επεξήγηση...</div>
        </div>

        <div class="control-btns">
            <button class="next-btn" id="next-btn" onclick="loadNextQuestion()">Επόμενη Ερώτηση</button>
        </div>
    </div>

    <div id="results-window" class="results-screen">
        <h1>Ολοκλήρωση Κουίζ!</h1>
        <p>Η επίδοσή σου στο απαιτητικό επίπεδο του Κεφαλαίου 8 είναι:</p>
        <div class="score-display" id="final-score">0 / 50</div>
        <p id="performance-comment">Σχόλιο επίδοσης...</p>
        <button class="restart-btn" onclick="restartQuiz()">Επανεκκίνηση Κουίζ</button>
    </div>
</div>

<script>

        },
        {
            q: "Τονίζεται ότι ο όρος 'ψηφιοποίηση' (digitization) αναλυτικότερα είναι η μετατροπή των πληροφοριών σε γλώσσα αναγνωρίσιμη από τον Η/Υ. Στο δυαδικό σύστημα, τι αντιπροσωπεύουν φυσικά τα ψηφία 0 και 1 (bits) στη βασική λειτουργία του υπολογιστή;",

        {

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    const questionTextEl = document.getElementById("question-text");
    const optionsContainerEl = document.getElementById("options-container");
    const feedbackContainerEl = document.getElementById("feedback-container");
    const feedbackTitleEl = document.getElementById("feedback-title");
    const feedbackTextEl = document.getElementById("feedback-text");
    const nextBtnEl = document.getElementById("next-btn");
    const questionNumberEl = document.getElementById("question-number");
    const scoreCounterEl = document.getElementById("score-counter");
    const progressBarEl = document.getElementById("progress-bar");

    const quizWindowEl = document.getElementById("quiz-window");
    const resultsWindowEl = document.getElementById("results-window");
    const finalScoreEl = document.getElementById("final-score");
    const performanceCommentEl = document.getElementById("performance-comment");

    function loadQuestion() {
        answered = false;
        nextBtnEl.style.display = "none";
        feedbackContainerEl.style.display = "none";
        
        const currentQuestion = quizData[currentQuestionIndex];
        
        // Update header & progress
        questionNumberEl.textContent = `Ερώτηση ${currentQuestionIndex + 1} από ${quizData.length}`;
        scoreCounterEl.textContent = `Σκορ: ${score}/${currentQuestionIndex}`;
        const progressPercent = (currentQuestionIndex / quizData.length) * 100;
        progressBarEl.style.width = `${progressPercent}%`;

        // Load text
        questionTextEl.textContent = currentQuestion.q;

        // Load options
        optionsContainerEl.innerHTML = "";
        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement("button");
            button.className = "option-btn";
            button.textContent = option;
            button.onclick = () => selectOption(index);
            optionsContainerEl.appendChild(button);
        });
    }

    function selectOption(selectedIndex) {
        if (answered) return;
        answered = true;

        const currentQuestion = quizData[currentQuestionIndex];
        const buttons = optionsContainerEl.getElementsByClassName("option-btn");

        if (selectedIndex === currentQuestion.correct) {
            buttons[selectedIndex].classList.add("correct");
            feedbackTitleEl.textContent = "✓ Σωστή Απάντηση!";
            feedbackTitleEl.style.color = "var(--success-color)";
            score++;
        } else {
            buttons[selectedIndex].classList.add("incorrect");
            buttons[currentQuestion.correct].classList.add("correct");
            feedbackTitleEl.textContent = "✗ Λάθος Απάντηση!";
            feedbackTitleEl.style.color = "var(--error-color)";
        }

        // Disable all buttons
        for (let btn of buttons) {
            btn.disabled = true;
        }

        // Show feedback & next button
        feedbackTextEl.textContent = currentQuestion.explanation;
        feedbackContainerEl.style.display = "block";
        nextBtnEl.style.display = "block";
        
        // Update live score display
        scoreCounterEl.textContent = `Σκορ: ${score}/${currentQuestionIndex + 1}`;
    }

    function loadNextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        progressBarEl.style.width = "100%";
        quizWindowEl.style.display = "none";
        resultsWindowEl.style.display = "block";
        finalScoreEl.textContent = `${score} / ${quizData.length}`;

        let comment = "";
        const percentage = (score / quizData.length) * 100;

        if (percentage >= 90) {
            comment = "Εξαιρετική επίδοση! Έχεις κατακτήσει πλήρως ακόμα και τις πιο δύσκολες τεχνικές λεπτομέρειες του κεφαλαίου.";
        } else if (percentage >= 70) {
            comment = "Πολύ καλή προσπάθεια! Έχεις γειωμένες γνώσεις, αλλά πρόσεξε τις παγίδες των λεπτομερειών.";
        } else if (percentage >= 50) {
            comment = "Ικανοποιητική βάση, αλλά το συγκεκριμένο κεφάλαιο απαιτεί απόλυτη ακρίβεια στους αριθμούς και τους ορισμούς. Κάνε μια επανάληψη.";
        } else {
            comment = "Χρειάζεται περισσότερη μελέτη. Ξαναδιάβασε τις επεξηγήσεις του κουίζ για να αφομοιώσεις τους όρους.";
        }
        performanceCommentEl.textContent = comment;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        resultsWindowEl.style.display = "none";
        quizWindowEl.style.display = "block";
        loadQuestion();
    }

    // Initialize Quiz on load
    window.onload = loadQuestion;
</script>
