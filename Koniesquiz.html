<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>The GIC Bible: Final Exam Simulator (30 MCQs)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f7; padding: 20px; color: #2c3e50; }
        .quiz-container { max-width: 900px; margin: auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2980b9; border-bottom: 3px solid #2980b9; padding-bottom: 15px; }
        .q-card { background: #fff; border: 1px solid #dce4ec; padding: 25px; margin: 20px 0; border-radius: 10px; }
        .q-text { font-weight: bold; font-size: 1.1em; margin-bottom: 15px; color: #2c3e50; }
        .option { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccd0d5; border-radius: 6px; text-align: left; cursor: pointer; background: #fff; font-size: 1em; transition: 0.2s; }
        .option:hover { background: #ebf5fb; }
        .correct { background-color: #2ecc71 !important; color: white; border-color: #27ae60; }
        .wrong { background-color: #e74c3c !important; color: white; border-color: #c0392b; }
        .justification { display: none; margin-top: 15px; padding: 15px; background: #e8f6f3; border-left: 5px solid #1abc9c; font-size: 0.95em; border-radius: 4px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Master Quiz: Υαλοϊονομερείς Κονίες (GIC)</h1>
    <div id="quiz-root"></div>
</div>

<script>
const gicQuestions = [
    {
        q: "Ποιο είναι το τυπικό ποσοστό του νερού στην τελική στερεοποιημένη μάζα της GIC;",
        options: ["2-5% κ.β.", "11-24% κ.β.", "40-50% κ.β.", "60% κ.β."],
        correct: 1,
        why: "Το νερό αποτελεί το 11-24% της τελικής μάζας, λειτουργώντας ως δομικό στοιχείο και μέσο ανταλλαγής ιόντων."
    },
    {
        q: "Η αναλογία σκόνης-υγρού στις συμπυκνώσιμες (condensable) GIC κυμαίνεται μεταξύ:",
        options: ["1:1 έως 2:1", "2:1 έως 3:1", "3:1 έως 4:1", "5:1 έως 6:1"],
        correct: 2,
        why: "Οι συμπυκνώσιμες GIC απαιτούν υψηλότερη αναλογία (3:1 έως 4:1) για αυξημένη αντοχή."
    },
    {
        q: "Ποιο συστατικό της σκόνης είναι υπεύθυνο για την αδιαφάνεια και τη δεύτερη φάση της πήξης;",
        options: ["SiO_2 (30%)", "Al_2O_3 (20%)", "CaF_2 (35%)", "AlPO_4 (10%)"],
        correct: 1,
        why: "Η αλουμίνα (Al_2O_3) συμμετέχει στη φάση ωρίμανσης με την απελευθέρωση ιόντων Al3+."
    },
    {
        q: "Η χρήση όξινων φθοριούχων gel (APF) στην επιφάνεια της GIC προκαλεί:",
        options: ["Επαναφόρτιση φθορίου χωρίς βλάβη", "Χημική αποδόμηση και διάβρωση της κονίας", "Αύξηση της σκληρότητας", "Βελτίωση της διαφάνειας"],
        correct: 1,
        why: "Τα όξινα σκευάσματα προσβάλλουν την υαλώδη δομή και τη μήτρα της κονίας."
    },
    {
        q: "Στις RMGIC, η τοποθέτηση υλικού προστασίας πολφού επιβάλλεται αν το RDT είναι:",
        options: ["< 2.0 mm", "< 1.5 mm", "< 1.0 mm", "< 0.5 mm"],
        correct: 3,
        why: "Λόγω της τοξικότητας του ελεύθερου HEMA, απαιτείται προστασία σε βάθος μικρότερο από 0,5 mm."
    },
    {
        q: "Η πρώτη φάση της οξεοβασικής αντίδρασης (0-5 λεπτά) χαρακτηρίζεται από:",
        options: ["Σχηματισμό αλάτων αλουμινίου", "Σχηματισμό αλάτων ασβεστίου και υψηλή υδατοευαισθησία", "Πλήρη φωτοπολυμερισμό", "Μηδενική απελευθέρωση φθορίου"],
        correct: 1,
        why: "Τα άλατα Ca δημιουργούνται πρώτα, αλλά η μάζα παραμένει ευάλωτη στην υγρασία."
    },
    {
        q: "Ποια είναι η τυπική τιμή της αντοχής σε εφελκυσμό των GIC;",
        options: ["2-4 MPa", "6-16 MPa", "60-300 MPa", "400 MPa"],
        correct: 1,
        why: "Η εφελκυστική αντοχή είναι χαμηλή (6-16 MPa), καθιστώντας το υλικό ψαθυρό."
    },
    {
        q: "Οι 'Cermet' κονίες παράγονται μέσω:",
        options: ["Απλής ανάμειξης ρητίνης και αργύρου", "Σύντηξης κόκκων αργύρου στην επιφάνεια της υάλου", "Προσθήκης HEMA στο υγρό", "Χρήσης μόνο ταρταρικού οξέος"],
        correct: 1,
        why: "Η σύντηξη εξασφαλίζει τη σταθερή ενσωμάτωση του μετάλλου στην ύαλο."
    },
    {
        q: "Ο συντελεστής θερμικής διαστολής της GIC (10.2-11.4 ppm/°C) προσεγγίζει αυτόν της:",
        options: ["Αδαμαντίνης", "Οδοντίνης", "Σύνθετης ρητίνης", "Ζιρκονίας"],
        correct: 1,
        why: "Η ομοιότητα με την οδοντίνη εξασφαλίζει εξαιρετική οριακή προσαρμογή."
    },
    {
        q: "Η λείανση των χημικά σκληρυνόμενων GIC πρέπει να ξεκινά μετά από:",
        options: ["2-3 λεπτά", "10-15 λεπτά", "24 ώρες", "1 εβδομάδα"],
        correct: 1,
        why: "Απαιτούνται 10-15 λεπτά για την αρχική σταθεροποίηση της οξεοβασικής αντίδρασης."
    },
    {
        q: "Ποιο είναι το ποσοστό απελευθέρωσης φθορίου κατά το πρώτο 48ωρο (Burst effect);",
        options: ["1-3%", "5-8%", "10-23%", "50%"],
        correct: 2,
        why: "Το 10-23% του διαθέσιμου φθορίου απελευθερώνεται άμεσα μετά την τοποθέτηση."
    },
    {
        q: "Το 'αφυδατωμένο πολυοξύ' σε ορισμένα σκευάσματα βρίσκεται:",
        options: ["Μέσα στο υγρό", "Ενσωματωμένο στη σκόνη", "Σε ξεχωριστό σωληνάριο", "Δεν χρησιμοποιείται πλέον"],
        correct: 1,
        why: "Το οξύ αφυδατώνεται και προστίθεται στη σκόνη για βελτίωση του χρόνου φύλαξης."
    },
    {
        q: "Η ογκομετρική συστολή πήξης των GIC κυμαίνεται περίπου στο:",
        options: ["0.5%", "2-3%", "6-8%", "15%"],
        correct: 1,
        why: "Η συστολή πήξης είναι τυπικά 2-3% κ.ο.."
    },
    {
        q: "Το 'ταρταρικό οξύ' στο υγρό της GIC (6-15%) χρησιμεύει για:",
        options: ["Αύξηση της διαφάνειας", "Αύξηση χρόνου εργασίας και snap set (ταχεία πήξη)", "Μείωση της απελευθέρωσης φθορίου", "Χρωματική απόδοση"],
        correct: 1,
        why: "Βελτιώνει τους χρονισμούς χειρισμού και την τελική πήξη."
    },
    {
        q: "Η χημική σύνδεση της GIC με τους οδοντικούς ιστούς αφορά:",
        options: ["Δεσμούς με το κολλαγόνο", "Ιοντικούς δεσμούς με το ασβέστιο του υδροξυαπατίτη", "Σύνδεση με το σιλάνιο", "Αποκλειστικά μηχανική συγκράτηση"],
        correct: 1,
        why: "Οι καρβοξυλομάδες αντιδρούν με τα ιόντα Ca της οδοντίνης/αδαμαντίνης."
    },
    {
        q: "Οι GIC αντενδείκνυνται για μόνιμες εμφράξεις ομάδων Ι και ΙΙ λόγω:",
        options: ["Τοξικότητας", "Χαμηλής αντίστασης στην αποτριβή", "Έλλειψης φθορίου", "Υψηλού κόστους"],
        correct: 1,
        why: "Η αντοχή στην τριβή δεν επαρκεί για μασητικές επιφάνειες μόνιμων δοντιών."
    },
    {
        q: "Ποιο στοιχείο αντικαθιστά συχνά το ασβέστιο στη σκόνη για ακτινοσκιερότητα;",
        options: ["Μαγνήσιο", "Στρόντιο (Sr)", "Νάτριο", "Κάλιο"],
        correct: 1,
        why: "Το στρόντιο παρέχει την απαραίτητη ακτινογραφική αντίθεση."
    },
    {
        q: "Το 'δεσμευμένο νερό' στη δομή της GIC:",
        options: ["Απομακρύνεται εύκολα με φύσημα", "Είναι δομικό συστατικό της μήτρας των αλάτων", "Προκαλεί τερηδόνα", "Είναι τοξικό"],
        correct: 1,
        why: "Αποτελεί μόνιμο μέρος του δικτύου των αλάτων της κονίας."
    },
    {
        q: "Στις RMGIC, η λείανση μπορεί να ξεκινήσει:",
        options: ["Μετά από 15 λεπτά", "Άμεσα (2-3 λεπτά) μετά τον φωτοπολυμερισμό", "Μετά από 24 ώρες", "Ποτέ"],
        correct: 1,
        why: "Η ρητινώδης φάση σταθεροποιεί το υλικό άμεσα."
    },
    {
        q: "Η αντοχή σε θλίψη της GIC κυμαίνεται μεταξύ:",
        options: ["10-20 MPa", "60-300 MPa", "500-600 MPa", "1000 MPa"],
        correct: 1,
        why: "Αυτό είναι το τυπικό εύρος αντοχής για τις υαλοϊονομερείς κονίες."
    },
    {
        q: "Το AlPO_4 (10%) στη σκόνη της GIC λειτουργεί ως:",
        options: ["Χρωστική", "Δομικό στοιχείο της υάλου", "Φωτοεναρκτήρας", "Απολυμαντικό"],
        correct: 1,
        why: "Αποτελεί μέρος της χημικής σύστασης της πυριτιούχου υάλου."
    },
    {
        q: "Το 'πορώδες' στη μάζα της κονίας μειώνεται κυρίως με:",
        options: ["Περισσότερο νερό", "Χρήση προζυγισμένων καψουλών και μηχανική ανάμειξη", "Χειροκίνητη ανάμειξη", "Προσθήκη αλουμίνας"],
        correct: 1,
        why: "Οι κάψουλες εξασφαλίζουν ομοιογένεια και ελάχιστο εγκλωβισμό αέρα."
    },
    {
        q: "Η 'μετεμφρακτική ευαισθησία' στις GIC οφείλεται κυρίως:",
        options: ["Στο φθόριο", "Στην αρχική οξύτητα του πολυακρυλικού οξέος", "Στη διαφάνεια", "Στο ταρταρικό οξύ"],
        correct: 1,
        why: "Το χαμηλό pH κατά την έναρξη της πήξης μπορεί να ερεθίσει τον πολφό."
    },
    {
        q: "Η απελευθέρωση φθορίου μετά το πρώτο 48ωρο σταθεροποιείται στα:",
        options: ["0 ppm", "1-3 ppm", "10-15 ppm", "100 ppm"],
        correct: 1,
        why: "Η απελευθέρωση συνεχίζεται σε χαμηλά, σταθερά επίπεδα."
    },
    {
        q: "Το 'IPN' (Interpenetrating Polymer Network) σχηματίζεται στις:",
        options: ["Παραδοσιακές GIC", "RMGIC (Ρητινωδώς τροποποιημένες)", "Μεταλλοκεραμικές", "Σύνθετες ρητίνες"],
        correct: 1,
        why: "Προκύπτει από τη σύμπλεξη του δικτύου ρητίνης και της οξεοβασικής μήτρας."
    },
    {
        q: "Ποια είναι η κύρια αντένδειξη για τις GIC;",
        options: ["Αλλεργία στο φθόριο", "Περιοχές με υψηλή μασητική φόρτιση", "Πρόσθια δόντια", "Παιδοδοντία"],
        correct: 1,
        why: "Η χαμηλή μηχανική αντοχή περιορίζει τη χρήση τους σε περιοχές φόρτισης."
    },
    {
        q: "Η προστασία της επιφάνειας με βερνίκι ή ρητίνη απαιτείται για τα πρώτα:",
        options: ["5-10 λεπτά", "60 λεπτά", "24 ώρες", "Δεν απαιτείται"],
        correct: 0,
        why: "Αποτρέπει τη διατάραξη της υδάτινης ισορροπίας κατά την αρχική πήξη."
    },
    {
        q: "Το μέτρο ελαστικότητας των GIC (4-7 GPa) είναι παραπλήσιο με αυτό:",
        options: ["Της αδαμαντίνης", "Της οδοντίνης", "Του αμαλγάματος", "Του χρυσού"],
        correct: 1,
        why: "Η ελαστική συμπεριφορά τους προσομοιάζει αυτή της οδοντίνης."
    },
    {
        q: "Η 'επαναφόρτιση' (recharge) φθορίου επιτυγχάνεται μέσω:",
        options: ["Φωτοπολυμερισμού", "Έκθεσης σε εξωγενείς πηγές φθορίου (π.χ. οδοντόκρεμα)", "Πρόσθετης αλουμίνας", "Χρήσης APF gel"],
        correct: 1,
        why: "Η GIC δρα ως αποθήκη, προσλαμβάνοντας και απελευθερώνοντας ξανά φθόριο."
    },
    {
        q: "Στις RMGIC, ο φωτοπολυμερισμός:",
        options: ["Σταματά την οξεοβασική αντίδραση", "Παρέχει άμεση σταθερότητα και προστασία στην οξεοβασική αντίδραση", "Δημιουργεί μόνο άλατα ασβεστίου", "Είναι προαιρετικός"],
        correct: 1,
        why: "Επιτρέπει τον άμεσο χειρισμό και προστατεύει την εσωτερική χημική πήξη."
    }
];

const root = document.getElementById('quiz-root');
gicQuestions.forEach((data, i) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `<div class="q-text">{i + 1}. {data.q}</div>`;
    
    data.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerText = opt;
        btn.onclick = function() {
            const btns = card.querySelectorAll('.option');
            btns.forEach(b => b.disabled = true);
            if(idx === data.correct) btn.classList.add('correct');
            else {
                btn.classList.add('wrong');
                btns[data.correct].classList.add('correct');
            }
            card.querySelector('.justification').style.display = 'block';
        };
        card.appendChild(btn);
    });
    
    const feedback = document.createElement('div');
    feedback.className = 'justification';
    feedback.innerHTML = `<strong>Επιστημονική Αιτιολόγηση:</strong> {data.why}`;
    card.appendChild(feedback);
    root.appendChild(card);
});
</script>

</body>
</html>
