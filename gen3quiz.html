<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Ακαδημαϊκή Αξιολόγηση - Κυτταρογενετική</title>
    <style>
        body {
            font-family: 'Roboto', 'Helvetica Neue', Helvetica, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 { text-align: center; color: #2c3e50; font-size: 2.2rem; margin-bottom: 2rem; }
        .quiz-container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .question-block { margin-bottom: 2rem; display: none; }
        .question-block.active { display: block; }
        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 1.5rem; color: #2c3e50; }
        .options { display: flex; flex-direction: column; gap: 0.8rem; }
        .option-btn {
            background-color: #ecf0f1;
            border: 2px solid transparent;
            padding: 1rem;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .option-btn:hover:not(:disabled) { background-color: #dfe6e9; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
        .option-btn.correct { background-color: #d4edda; border-color: #27ae60; color: #27ae60; font-weight: bold; }
        .option-btn.incorrect { background-color: #f8d7da; border-color: #e74c3c; color: #c0392b; }
        .feedback {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #e8f4fd;
            border-left: 4px solid #3498db;
            display: none;
            font-family: Georgia, serif;
            line-height: 1.5;
        }
        .feedback.show { display: block; animation: fadeIn 0.5s ease; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; }
        .nav-btn {
            background-color: #2c3e50; color: white; border: none; padding: 0.8rem 1.5rem;
            font-size: 1rem; border-radius: 4px; cursor: pointer; transition: background 0.2s;
        }
        .nav-btn:hover { background-color: #1a252f; }
        .nav-btn:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .progress { font-weight: bold; color: #7f8c8d; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1>Εξονυχιστική Αξιολόγηση: Γονιδιωματική Ανάλυση</h1>
    <div class="quiz-container">
        <div id="quiz-body"></div>
        <div class="controls">
            <button id="prev-btn" class="nav-btn" disabled>Προηγούμενη</button>
            <span class="progress" id="progress-text">1 / 65</span>
            <button id="next-btn" class="nav-btn">Επόμενη</button>
        </div>
    </div>

    <script>
        // Ο όγκος δεδομένων απαιτεί βελτιστοποίηση κώδικα (DRY Architecture & Minified Keys)
        // q = Ερώτηση, o = Επιλογές, a = Δείκτης σωστής, f = Feedback
        const quizData = [
            {
                q: "1. Ένα νεογνό παρουσιάζει σοβαρό δυσμορφικό προσωπείο και νοητική υστέρηση. Ο κλασικός καρυότυπος εμφανίζεται φυσιολογικός. Ποιο είναι το ενδεδειγμένο επόμενο βήμα;",
                o: ["Η εφαρμογή τεχνικής FISH χρησιμοποιώντας τυχαίους ανιχνευτές.", "Ανάλυση με χρωμοσωμικές μικροσυστοιχίες (Microarray) για ανίχνευση CNVs.", "Η αναμονή και επανάληψη του καρυοτύπου μετά από ένα έτος.", "Η αλληλούχιση κατά Sanger του γονιδιώματος."],
                a: 1,
                f: "Ο κλασικός καρυότυπος δεν ανιχνεύει αλλαγές μικρότερες των 3-5 Mb. Οι χρωμοσωμικές μικροσυστοιχίες (aCGH/SNP arrays) αποτελούν την εξέταση πρώτης γραμμής (first-line test) για αναπτυξιακή καθυστέρηση και συγγενείς ανωμαλίες χωρίς εμφανή καρυοτυπικά ευρήματα, εντοπίζοντας υπομικροσκοπικά μικροελλείμματα/μικροδιπλασιασμούς (CNVs)."
            },
            {
                q: "2. Κατά την καρυοτυπική ανάλυση, ποιος είναι ο ακριβής ρόλος της κολχικίνης;",
                o: ["Διεγείρει τα λεμφοκύτταρα να εισέλθουν στο στάδιο της μίτωσης.", "Διογκώνει τα κύτταρα αυξάνοντας την ωσμωτική πίεση.", "Αναστέλλει τον πολυμερισμό της τουμπουλίνης, σταματώντας τη διαίρεση στη μετάφαση.", "Χρωματίζει εκλεκτικά τις ΑΤ-πλούσιες περιοχές των χρωμοσωμάτων."],
                a: 2,
                f: "Η κολχικίνη συνδέεται στην τουμπουλίνη, εμποδίζοντας τον σχηματισμό των μικροσωληνίσκων της μιτωτικής ατράκτου. Χωρίς άτρακτο, τα χρωμοσώματα παραμένουν εγκλωβισμένα στο ισημερινό επίπεδο κατά τη μετάφαση, το στάδιο μέγιστης συμπύκνωσης."
            },
            {
                q: "3. Σε τι διαφέρει η τεχνική SNP array από την κλασική aCGH;",
                o: ["Η SNP array δεν εντοπίζει CNVs.", "Η SNP array επιτρέπει επιπλέον την ανίχνευση Απώλειας Ετεροζυγωτίας (LOH) και πολυμορφισμών.", "Η SNP array απαιτεί καλλιέργεια κυττάρων.", "Η SNP array ανιχνεύει ισοζυγισμένες μεταθέσεις."],
                a: 1,
                f: "Ενώ και οι δύο τεχνικές εντοπίζουν CNVs (ελλείμματα/διπλασιασμούς), η SNP array έχει το πρόσθετο πλεονέκτημα της ανίχνευσης της γενετικής ποικιλομορφίας (SNPs), επιτρέποντας τον εντοπισμό περιοχών απουσίας ετεροζυγωτίας (LOH) που σχετίζονται με μονογονεϊκή δισωμία ή γονεϊκή συγγένεια."
            },
            {
                q: "4. Αν ένα σφάλμα μη-διαχωρισμού συμβεί αποκλειστικά κατά τη Μείωση Ι, τι θα ισχύει για τους προκύπτοντες ανευπλοειδικούς γαμέτες;",
                o: ["Θα φέρουν δύο πανομοιότυπα αντίγραφα από τον έναν παππού/γιαγιά.", "Θα φέρουν και το πατρικό και το μητρικό ομόλογο χρωμόσωμα του ατόμου που παράγει το γαμέτη.", "Οι μισοί γαμέτες θα είναι φυσιολογικοί και οι άλλοι μισοί μονοσωμικοί.", "Θα οδηγήσουν σε τριπλοειδία (69 χρωμοσώματα)."],
                a: 1,

            },
            {

                a: 1,

                a: 1,
                f: "Η πλήρης μύλη προκύπτει συνήθως όταν ένα σπερματοζωάριο γονιμοποιεί ένα 'άδειο' ωάριο και το γονιδίωμά του διπλασιάζεται (46,XX συνήθως, αποκλειστικά πατρικό). Λόγω του πατρικού εντυπώματος (imprinting), ευνοείται η ανάπτυξη εξωεμβρυϊκών ιστών (τροφοβλάστη) εις βάρος του ίδιου του εμβρύου, το οποίο απουσιάζει παντελώς."
            },
            {
                q: "7. Ένας ασθενής φέρει τη μετάθεση t(13;14). Ποιο από τα παρακάτω αληθεύει;",

                a: 1,
                f: "Τα 13 και 14 είναι ακροκεντρικά χρωμοσώματα. Η συνένωσή τους (Robertsonian) μειώνει τον αριθμό των χρωμοσωμάτων σε 45. Επειδή χάνονται μόνο οι p-βραχίονες (που έχουν πολλαπλά αντίγραφα γονιδίων rRNA), ο ασθενής δεν έχει κλινικά συμπτώματα, αλλά έχει αυξημένο κίνδυνο παραγωγής ανευπλοειδικών γαμετών."
            },
            {
                q: "8. Στο Σύνδρομο Turner, η πιο συχνή αιτία είναι η μονοσωμία Χ. Ωστόσο, σε ένα 15% των περιπτώσεων, το σύνδρομο προκαλείται από:",
                o: ["Ισοχρωμόσωμα του q-βραχίονα, δηλαδή 46,X,i(Xq).", "Δακτυλιοειδές χρωμόσωμα Υ.", "Τρισωμία του βραχέος βραχίονα του Χ.", "Παρακεντρική αναστροφή του Χ."],
                a: 0,
                f: "Το ισοχρωμόσωμα προκύπτει από οριζόντια διαίρεση του κεντρομερούς. Στο i(Xq), το άτομο έχει δύο q βραχίονες και ΚΑΝΕΝΑΝ p βραχίονα στο δεύτερο Χ. Η απώλεια των γονιδίων του p-βραχίονα (συμπεριλαμβανομένου του γονιδίου SHOX που διαφεύγει την αδρανοποίηση) οδηγεί στα συμπτώματα του Turner."
            },
            {
                q: "9. Η τεχνική MLPA πλεονεκτεί έναντι του κλασικού FISH επειδή:",

                a: 1,
                f: "Η MLPA (Multiplex Ligation-dependent Probe Amplification) μπορεί να ελέγξει έως και 50 στόχους ταυτόχρονα σε μία αντίδραση. Σε αντίθεση με το FISH (που περιορίζεται από τον αριθμό των χρωμάτων/φθορισμών), η MLPA ξεχωρίζει τα προϊόντα βάσει μεγέθους, προσφέροντας υψηλή ανάλυση στο επίπεδο μεμονωμένων εξονίων."
            },
            {
                q: "10. Κατά τη μειωτική διαίρεση ενός φορέα αμοιβαίας μετάθεσης, η 'γειτονική-1' (adjacent-1) συνάθροιση καταλήγει σε:",
                o: ["Γαμέτες που είναι απολύτως φυσιολογικοί.", "Γαμέτες που φέρουν ισοζυγισμένη μετάθεση.", "Γαμέτες μη βιώσιμους, καθώς εμφανίζουν μερική μονοσωμία και μερική τρισωμία.", "Διπλασιασμό του κεντρομερούς."],
                a: 2,
                f: "Στο τετραδύναμο σύμπλεγμα που σχηματίζεται στην παχυταινία, η Adjacent-1 διαχωρίζει ομόλογα κεντρομερή σε αντίθετους πόλους. Επειδή όμως τα χρωμοσώματα αποτελούν προϊόν μετάθεσης, ο γαμέτης λαμβάνει διπλό αντίγραφο για κάποια τμήματα και κανένα για άλλα (μη ισοζυγισμένοι γαμέτες)."

                q: "11. Ποια μεθοδολογία θα επιλέγατε για την ανίχνευση Σημειακών Μεταλλάξεων (SNVs);",

        let currentQuestion = 0;

        function loadQuestion(index) {
            const container = document.getElementById('quiz-body');
            const qData = quizData[index];
            
            let html = `
                <div class="question-block active">
                    <div class="question-text">${qData.q}</div>
                    <div class="options">
            `;
            
            qData.o.forEach((opt, i) => {
                html += `<button class="option-btn" onclick="checkAnswer(${i}, ${qData.a}, this)">${String.fromCharCode(65 + i)}. ${opt}</button>`;
            });
            
            html += `
                    </div>
                    <div class="feedback" id="feedback-${index}">
                        <strong>Ακαδημαϊκή Επεξήγηση:</strong> ${qData.f}
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
            document.getElementById('progress-text').innerText = `${index + 1} / ${quizData.length}`;
            
            document.getElementById('prev-btn').disabled = (index === 0);
            document.getElementById('next-btn').disabled = (index === quizData.length - 1);
        }

        window.checkAnswer = function(selectedIdx, correctIdx, btnElement) {
            const btns = btnElement.parentElement.querySelectorAll('.option-btn');
            
            // Απενεργοποίηση όλων των επιλογών
            btns.forEach(btn => btn.disabled = true);
            
            if(selectedIdx === correctIdx) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('incorrect');
                btns[correctIdx].classList.add('correct');
            }
            
            // Εμφάνιση επεξήγησης
            const feedbackBox = document.getElementById(`feedback-${currentQuestion}`);
            feedbackBox.classList.add('show');
        };

        document.getElementById('next-btn').addEventListener('click', () => {
            if(currentQuestion < quizData.length - 1) {
                currentQuestion++;
                loadQuestion(currentQuestion);
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            if(currentQuestion > 0) {
                currentQuestion--;
                loadQuestion(currentQuestion);
            }
        });

        // Αρχική φόρτωση
        loadQuestion(0);
    </script>
