<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Quiz: Οργανογενετική Περίοδος</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #333;
            --primary-color: #2c3e50;
            --btn-bg: #ecf0f1;
            --btn-hover: #e0e6ed;
            --correct-bg: #d4edda;
            --correct-border: #28a745;
            --wrong-bg: #f8d7da;
            --wrong-border: #dc3545;
            --feedback-bg: #f8f9fa;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
        }
        h1 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 0.5rem;
            text-align: center;
        }
        .question-container {
            margin-bottom: 3rem;
            padding: 1.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .option-btn {
            font-family: inherit;
            font-size: 1rem;
            text-align: left;
            padding: 1rem;
            background-color: var(--btn-bg);
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background-color: var(--btn-hover);
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .option-btn.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: #155724;
            opacity: 1;
            font-weight: bold;
        }
        .option-btn.incorrect {
            background-color: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: #721c24;
            opacity: 1;
        }
        .feedback {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: var(--feedback-bg);
            border-left: 4px solid var(--primary-color);
            font-size: 0.95rem;
        }
        .feedback.show {
            display: block;
        }
    </style>
</head>
<body>

    <h1>Αξιολόγηση Κατανόησης: Εμβρυολογία</h1>
    
    <div id="quiz-app"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const questionsData = [
                {
                    q: "1. Ποια είναι η ακριβής αλληλουχία των φάσεων της εμβρυϊκής ανάπτυξης;",
                    options: [
                        "Αύξηση, Διαφοροποίηση, Μορφογένεση",
                        "Μορφογένεση, Αύξηση, Διαφοροποίηση",
                        "Αύξηση, Μορφογένεση, Διαφοροποίηση",
                        "Διαφοροποίηση, Μορφογένεση, Αύξηση"
                    ],
                    correctIndex: 2,
                    feedback: "Η σωστή απάντηση είναι η 'Αύξηση, Μορφογένεση, Διαφοροποίηση'. Πρώτα έχουμε κυτταρική διαίρεση (αύξηση), στη συνέχεια ανάπτυξη σχήματος (μορφογένεση) και τέλος ωρίμανση διαδικασιών (διαφοροποίηση)."
                },
                {
                    q: "2. Ποια δομή προβάλλει πάνω από την αναπτυσσόμενη καρδιά κατά τη διάρκεια της κεφαλικής κάμψης;",
                    options: [
                        "Ο αμαρικός υμένας",
                        "Ο αναπτυσσόμενος εγκέφαλος",
                        "Ο ομφαλεντερικός πόρος",
                        "Η ουραία απόφυση"
                    ],
                    correctIndex: 1,
                    feedback: "Κατά την κεφαλική κάμψη, ο αναπτυσσόμενος εγκέφαλος αυξάνεται πέρα από τον στοματοφαρυγγικό υμένα και προβάλλει πάνω από την αναπτυσσόμενη καρδιά."
                },
                {
                    q: "3. Από ποια εμβρυϊκή δομή σχηματίζεται το τενόντιο κέντρο του διαφράγματος;",
                    options: [
                        "Από τον στοματοφαρυγγικό υμένα",
                        "Από το εγκάρσιο διάφραγμα",
                        "Από τον συνδετικό μίσχο",
                        "Από την αλλαντοΐδα"
                    ],
                    correctIndex: 1,
                    feedback: "Το εγκάρσιο διάφραγμα μετακινείται κοιλιακά κατά την κάμψη και από αυτό θα σχηματιστεί το τενόντιο κέντρο του διαφράγματος."
                },
                {
                    q: "4. Ποια κάμψη ευθύνεται πρωτίστως για τον σχηματισμό του οπίσθιου εντέρου;",
                    options: [
                        "Η κεφαλική κάμψη",
                        "Η πλάγια κάμψη",
                        "Η ουραία κάμψη",
                        "Η οριζόντια κάμψη"
                    ],
                    correctIndex: 2,
                    feedback: "Ο σχηματισμός του οπίσθιου εντέρου συμβαίνει κατά την ουραία κάμψη, η οποία οφείλεται στην ανάπτυξη του νευρικού σωλήνα."
                },
                {
                    q: "5. Το μέσο έντερο (λεπτό έντερο) επικοινωνεί με το ομφαλικό κυστίδιο μέσω:",
                    options: [
                        "Της αλλαντοΐδας",
                        "Του συνδετικού μίσχου",
                        "Του ομφαλεντερικού πόρου",
                        "Του αυχενικού κόλπου"
                    ],
                    correctIndex: 2,
                    feedback: "Το ομφαλικό κυστίδιο παραμένει συνδεδεμένο με το μέσο έντερο μέσω του ομφαλεντερικού πόρου (ή λεκιθικού μίσχου) μετά την πλάγια κάμψη."
                },
                {
                    q: "6. Τι συμβαίνει με την επικοινωνία μεταξύ ενδοεμβρυϊκού και εξωεμβρυϊκού κοιλώματος καθώς προχωρά η κάμψη;",
                    options: [
                        "Παραμένει σταθερή και διευρύνεται",
                        "Εγκαθίσταται πλήρως κατά την 8η εβδομάδα",
                        "Περιορίζεται και τελικά χάνεται ('εγκλωβίζεται')",
                        "Αντικαθίσταται από τον περικαρδιοπεριτοναϊκό πόρο"
                    ],
                    correctIndex: 2,
                    feedback: "Αρχικά υπάρχει επικοινωνία, αλλά καθώς προχωρά η κάμψη στο οριζόντιο και μέσο επίπεδο, το ενδοεμβρυϊκό κοίλωμα 'εγκλωβίζεται' και χάνει κάθε επικοινωνία με το εξωεμβρυϊκό."
                },
                {
                    q: "7. Ποιο από τα παρακάτω ΔΕΝ αποτελεί παράγωγο του Εξωδέρματος;",
                    options: [
                        "Κεντρικό Νευρικό Σύστημα",
                        "Αδαμαντίνη ουσία των δοντιών",
                        "Ορογόνοι υμένες (π.χ. περιτόναιο)",
                        "Επιδερμίδα και τα εξαρτήματά της"
                    ],
                    correctIndex: 2,
                    feedback: "Οι ορογόνοι υμένες (περιτόναιο, υπεζωκότας, περικάρδιο) προέρχονται από το πλάγιο πέταλο του μεσοδέρματος, όχι από το εξώδερμα."
                },
                {
                    q: "8. Τα χρωστικοφόρα κύτταρα του χορίου (μελανοκύτταρα) προέρχονται από:",
                    options: [
                        "Το επιπολής εξώδερμα",
                        "Τα κύτταρα της νευρικής ακρολοφίας",
                        "Το ενδόδερμα",
                        "Το παραξονικό μεσόδερμα"
                    ],
                    correctIndex: 1,
                    feedback: "Τα χρωστικοφόρα κύτταρα (όπως και ο μυελός των επινεφριδίων και τα γάγγλια) αποτελούν παράγωγα των κυττάρων της νευρικής ακρολοφίας (νευροεξώδερμα)."
                },
                {
                    q: "9. Ποια είναι η εμβρυολογική προέλευση του φλοιού και του μυελού των επινεφριδίων αντίστοιχα;",
                    options: [
                        "Εξώδερμα και για τα δύο",
                        "Μεσόδερμα (φλοιός) / Νευρική ακρολοφία (μυελός)",
                        "Ενδόδερμα (φλοιός) / Μεσόδερμα (μυελός)",
                        "Νευρική ακρολοφία (φλοιός) / Μεσόδερμα (μυελός)"
                    ],
                    correctIndex: 1,
                    feedback: "Αυτή είναι μια κλασική ακαδημαϊκή διαφοροποίηση. Ο φλοιός των επινεφριδίων προέρχεται από το μεσόδερμα, ενώ ο μυελός από τη νευρική ακρολοφία."
                },
                {
                    q: "10. Ποιο βλαστικό δέρμα ευθύνεται για τον σχηματισμό του επιθηλίου της αναπνευστικής και της γαστρεντερικής οδού;",
                    options: [
                        "Το νευροεξώδερμα",
                        "Το επιπολής εξώδερμα",
                        "Το μεσόδερμα",
                        "Το ενδόδερμα"
                    ],
                    correctIndex: 3,
                    feedback: "Το ενδόδερμα δημιουργεί το επιθήλιο του γαστρεντερικού και του αναπνευστικού σωλήνα, καθώς και αδένες όπως το ήπαρ και το πάγκρεας."
                },
                {
                    q: "11. Πότε αρχίζει να πάλλεται η αρχέγονη καρδιά του εμβρύου;",
                    options: [
                        "Την 15η-16η ημέρα",
                        "Την 22η-23η ημέρα",
                        "Κατά την 6η εβδομάδα",
                        "Την 8η εβδομάδα"
                    ],
                    correctIndex: 1,
                    feedback: "Η καρδιά αρχίζει να χτυπάει την 22η-23η ημέρα, γεγονός που καθιστά το καρδιαγγειακό το πρώτο μεγάλο σύστημα που τίθεται σε λειτουργία."
                },
                {
                    q: "12. Το κλείσιμο του πρόσθιου νευροπόρου ολοκληρώνεται συνήθως κατά:",
                    options: [
                        "Την 20η ημέρα",
                        "Την 24η ημέρα",
                        "Την 26η ημέρα",
                        "Την 30η ημέρα"
                    ],
                    correctIndex: 2,
                    feedback: "Κατά την 4η εβδομάδα και συγκεκριμένα περί την 26η ημέρα, παρατηρείται το κλείσιμο του πρόσθιου νευροπόρου."
                },
                {
                    q: "13. Ποιο γεγονός είναι χαρακτηριστικό της 6ης εβδομάδας της εμβρυϊκής ανάπτυξης;",
                    options: [
                        "Η έναρξη της καρδιακής λειτουργίας",
                        "Ο πλήρης διαχωρισμός των δακτύλων",
                        "Η ανάπτυξη των αρχέγονων δακτύλων (δακτυλικές ακτίνες)",
                        "Η οστεοποίηση του μηριαίου οστού"
                    ],
                    correctIndex: 2,
                    feedback: "Την 6η εβδομάδα αναπτύσσονται τα αρχέγονα δάχτυλα που ονομάζονται δακτυλικές ακτίνες, ενώ τα έμβρυα εμφανίζουν και τις πρώτες συσπάσεις κορμού."
                },
                {
                    q: "14. Η οστεοποίηση στα οστά των άνω άκρων ξεκινά κατά την:",
                    options: [
                        "4η εβδομάδα",
                        "5η εβδομάδα",
                        "7η εβδομάδα",
                        "8η εβδομάδα"
                    ],
                    correctIndex: 2,
                    feedback: "Η οστεοποίηση των οστών των άνω άκρων, μαζί με την εμφάνιση εντομών μεταξύ των δακτυλικών ακτίνων, είναι ορόσημο της 7ης εβδομάδας."
                },
                {
                    q: "15. Κατά την 8η εβδομάδα, ποιο είναι ένα αξιοσημείωτο μορφολογικό χαρακτηριστικό του εμβρύου;",
                    options: [
                        "Η ουραία απόφυση φτάνει στο μέγιστο μήκος της",
                        "Η κεφαλή αποτελεί σχεδόν το 1/2 του μεγέθους του εμβρύου",
                        "Τα άνω και κάτω άκρα δεν έχουν ακόμη εμφανιστεί",
                        "Ο εντερικός σωλήνας είναι ευθύς χωρίς εντεροφόρο πόρο"
                    ],
                    correctIndex: 1,
                    feedback: "Στην 8η εβδομάδα παρατηρείται μια δυσανάλογα μεγάλη κεφαλή, η οποία αντιπροσωπεύει σχεδόν το μισό (1/2) του συνολικού μεγέθους του εμβρύου."
                },
                {
                    q: "16. Από ποιο βλαστικό δέρμα προέρχεται το πάγκρεας και το ήπαρ;",
                    options: [
                        "Μεσόδερμα",
                        "Νευρική ακρολοφία",
                        "Επιπολής εξώδερμα",
                        "Ενδόδερμα"
                    ],
                    correctIndex: 3,
                    feedback: "Το ήπαρ, το πάγκρεας, ο θυρεοειδής και οι παραθυρεοειδείς αποτελούν αδενικά παρεγχύματα ενδοδερμικής προέλευσης."
                },
                {
                    q: "17. Οι αγγειοβλαστικές χορδές, ως αρχέγονη καταβολή της καρδιάς, εμφανίζονται στο:",
                    options: [
                        "Σωματικό μεσόδερμα",
                        "Ενδόδερμα",
                        "Σπλαχνικό μεσόδερμα",
                        "Εξώδερμα"
                    ],
                    correctIndex: 2,
                    feedback: "Η αρχέγονη καταβολή της καρδιάς (αγγειοβλαστικές χορδές) εντοπίζεται εντός του καρδιογενούς σπλαχνικού μεσοδέρματος."
                },
                {
                    q: "18. Ποιο από τα παρακάτω ΔΕΝ χρησιμοποιείται ως μέθοδος εκτίμησης της εμβρυϊκής ηλικίας;",
                    options: [
                        "Η ημερομηνία της τελευταίας εμμήνου ρύσεως",
                        "Οι υπερηχογραφικές μετρήσεις του χοριακού σάκου",
                        "Η μέτρηση του πάχους της μήνιγγας",
                        "Η εξέταση των εξωτερικών χαρακτηριστικών"
                    ],
                    correctIndex: 2,
                    feedback: "Η εκτίμηση γίνεται μέσω της τελευταίας περιόδου, της πιθανής ημέρας γονιμοποίησης, υπερήχων και εξωτερικών μορφολογικών χαρακτηριστικών. Η μέτρηση πάχους μήνιγγας δεν αναφέρεται ως μέθοδος ηλικιακής εκτίμησης."
                },
                {
                    q: "19. Ο σπλήνας και τα κύτταρα του αίματος αποτελούν παράγωγα του:",
                    options: [
                        "Μεσοδέρματος",
                        "Ενδοδέρματος",
                        "Εξωδέρματος",
                        "Νευροεξωδέρματος"
                    ],
                    correctIndex: 0,
                    feedback: "Το μεσόδερμα είναι η στιβάδα που παράγει τα αιμοποιητικά όργανα (σπλήνας), το αίμα, τα λεμφαγγεία, και τους μύες."
                },
                {
                    q: "20. Κατά την ουραία κάμψη, ποια εμβρυϊκή δομή αλλάζει θέση και εφάπτεται στην κοιλιακή επιφάνεια του εμβρύου;",
                    options: [
                        "Το οπίσθιο έντερο",
                        "Ο συνδετικός μίσχος",
                        "Ο νευρικός σωλήνας",
                        "Η περικαρδιακή κοιλότητα"
                    ],
                    correctIndex: 1,
                    feedback: "Κατά την ουραία κάμψη, ο συνδετικός μίσχος (αρχέγονος ομφάλιος λώρος) αλλάζει θέση και μετακινείται προς την κοιλιακή επιφάνεια."
                },
                {
                    q: "21. Το αμνίο, καθώς επεκτείνεται, περιβάλλει:",
                    options: [
                        "Μόνο το ομφαλικό κυστίδιο",
                        "Τον συνδετικό μίσχο, τον ομφαλεντερικό πόρο και την αλλαντοΐδα",
                        "Μόνο την αρχέγονη καρδιά",
                        "Το νευρικό σωλήνα ραχιαία"
                    ],
                    correctIndex: 1,
                    feedback: "Το αμνίο επεκτείνεται και περιβάλλει τον συνδετικό μίσχο, τον ομφαλεντερικό πόρο και την αλλαντοΐδα, σχηματίζοντας την επιθηλιακή επένδυση του ομφάλιου λώρου."
                },
                {
                    q: "22. Το πρώτο και δεύτερο φαρυγγικό τόξο (γναθιαίο και υοειδές) εμφανίζονται την:",
                    options: [
                        "20η ημέρα",
                        "24η ημέρα",
                        "28η ημέρα",
                        "32η ημέρα"
                    ],
                    correctIndex: 1,
                    feedback: "Η 24η μέρα χαρακτηρίζεται από την εμφάνιση 2 φαρυγγικών τόξων (γναθιαίο και υοειδές)."
                },
                {
                    q: "23. Το ενδοεμβρυϊκό κοίλωμα, παρέχοντας χώρο για την ανάπτυξη των οργάνων, διαιρείται τελικά σε:",
                    options: [
                        "Πρόσθιο, μέσο και οπίσθιο έντερο",
                        "Αμνιακή κοιλότητα, λεκιθικό ασκό και αλλαντοΐδα",
                        "Περικαρδιακή κοιλότητα, περικαρδιοπεριτοναϊκούς πόρους και περιτοναϊκή κοιλότητα",
                        "Εξωεμβρυϊκό σπλαχνικό και σωματικό κοίλωμα"
                    ],
                    correctIndex: 2,
                    feedback: "Το ενδοεμβρυϊκό κοίλωμα διαιρείται σε 3 περιοχές: την περικαρδιακή κοιλότητα, τους δυο περικαρδιοπεριτοναϊκούς πόρους και την περιτοναϊκή κοιλότητα."
                },
                {
                    q: "24. Η αδαμαντίνη ουσία των δοντιών αναπτύσσεται από:",
                    options: [
                        "Το ενδόδερμα",
                        "Το μεσόδερμα",
                        "Το επιπολής εξώδερμα",
                        "Τη νευρική ακρολοφία"
                    ],
                    correctIndex: 2,
                    feedback: "Σε αντίθεση με την οδοντίνη (παράγωγο της νευρικής ακρολοφίας), η αδαμαντίνη ουσία του οδόντος είναι παράγωγο του επιπολής εξωδέρματος."
                },
                {
                    q: "25. Η οστεοποίηση του μηριαίου οστού αποτελεί κλινικό ορόσημο της:",
                    options: [
                        "5ης εβδομάδας",
                        "6ης εβδομάδας",
                        "7ης εβδομάδας",
                        "8ης εβδομάδας"
                    ],
                    correctIndex: 3,
                    feedback: "Η 8η εβδομάδα (τέλος της οργανογενετικής περιόδου) χαρακτηρίζεται μορφολογικά, μεταξύ άλλων, από την έναρξη οστεοποίησης στο μηριαίο οστό."
                }
            ];

            const container = document.getElementById('quiz-app');

            if (!container) {
                console.error("Δεν βρέθηκε το div με id 'quiz-app'.");
                return;
            }

            questionsData.forEach((item, qIndex) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-container';

                const title = document.createElement('div');
                title.className = 'question-text';
                title.innerText = item.q;
                questionDiv.appendChild(title);

                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.innerText = item.feedback;

                item.options.forEach((optText, oIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = optText;

                    btn.addEventListener('click', function() {
                        const allBtns = optionsGrid.querySelectorAll('button');
                        allBtns.forEach(b => b.disabled = true);

                        if (oIndex === item.correctIndex) {
                            this.classList.add('correct');
                        } else {
                            this.classList.add('incorrect');
                            allBtns[item.correctIndex].classList.add('correct');
                        }
                        
                        feedbackDiv.classList.add('show');
                    });

                    optionsGrid.appendChild(btn);
                });

                questionDiv.appendChild(optionsGrid);
                questionDiv.appendChild(feedbackDiv);
                container.appendChild(questionDiv);
            });
        });
    </script>
</body>
</html>
