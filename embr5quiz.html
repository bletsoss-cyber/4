                [span_123](start_span)feedback: "Το ενδοεμβρυϊκό κοίλωμα διαιρείται σε 3 περιοχές: την περικαρδιακή κοιλότητα, τους δυο περικαρδιοπεριτοναϊκούς πόρους και την περιτοναϊκή κοιλότητα[span_123](end_span)."
            },
            {
                q: "24. [span_124](start_span)[span_125](start_span)Η αδαμαντίνη ουσία των δοντιών αναπτύσσεται από:[span_124](end_span)[span_125](end_span)",
                options: [
                    "Το ενδόδερμα",
                    "Το μεσόδερμα",
                    "Το επιπολής εξώδερμα",
                    "Τη νευρική ακρολοφία"
                ],
                correctIndex: 2,
                [span_126](start_span)[span_127](start_span)feedback: "Σε αντίθεση με την οδοντίνη (παράγωγο της νευρικής ακρολοφίας), η αδαμαντίνη ουσία του οδόντος είναι παράγωγο του επιπολής εξωδέρματος[span_126](end_span)[span_127](end_span)."
            },
            {
                q: "25. [span_128](start_span)Η οστεοποίηση του μηριαίου οστού αποτελεί κλινικό ορόσημο της:[span_128](end_span)",
                options: [
                    "5ης εβδομάδας",
                    "6ης εβδομάδας",
                    "7ης εβδομάδας",
                    "8ης εβδομάδας"
                ],
                correctIndex: 3,
                [span_129](start_span)feedback: "Η 8η εβδομάδα (τέλος της οργανογενετικής περιόδου) χαρακτηρίζεται μορφολογικά, μεταξύ άλλων, από την έναρξη οστεοποίησης στο μηριαίο οστό[span_129](end_span)."
            }
        ];

        const container = document.getElementById('quiz-app');

        questionsData.forEach((item, qIndex) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-container';

            const title = document.createElement('div');
            title.className = 'question-text';
            title.innerText = item.q;
            questionDiv.appendChild(title);

            const optionsGrid = document.createElement('div');
            optionsGrid.className = 'options-grid';

            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';
            feedbackDiv.innerText = item.feedback;

            item.options.forEach((optText, oIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = optText;

                btn.addEventListener('click', function() {
                    const allBtns = optionsGrid.querySelectorAll('button');
                    allBtns.forEach(b => b.disabled = true); // Disable all options

                    if (oIndex === item.correctIndex) {
                        this.classList.add('correct');
                    } else {
                        this.classList.add('incorrect');
                        allBtns[item.correctIndex].classList.add('correct'); // Highlight correct answer
                    }
                    
                    feedbackDiv.classList.add('show');
                });

                optionsGrid.appendChild(btn);
            });

            questionDiv.appendChild(optionsGrid);
            questionDiv.appendChild(feedbackDiv);
            container.appendChild(questionDiv);
        });
    </script>
</body>
</html>
