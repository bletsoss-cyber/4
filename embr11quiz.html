            justify-content: center;
            padding: 2rem;
            margin: 0;
        }

            border-radius: 12px;

            width: 100%;

            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .option-btn {
            padding: 1rem 1.5rem;
            font-size: 1.05rem;
            text-align: left;
            background-color: var(--btn-bg);
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background-color: var(--btn-hover);
            border-color: var(--accent-color);
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .option-btn.correct {
            background-color: var(--correct-color);
            color: white;
            border-color: var(--correct-color);
        }
        .option-btn.wrong {
            background-color: var(--wrong-color);
            color: white;
            border-color: var(--wrong-color);
        }
        .feedback {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            background-color: #f8f9fa;
            border-left: 5px solid #bdc3c7;
            display: none;
            font-size: 1rem;
            line-height: 1.6;
        }
        .feedback strong { color: var(--primary-color); }
        .controls {
            margin-top: 2rem;
            text-align: right;
        }
        #next-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            display: none;
        }
        #next-btn:hover { background-color: #2980b9; }
        .score-display { font-size: 1.2rem; font-weight: bold; }
        
        /* CSS Rule to hide the citations from the reader inside the quiz */
        .hide-cite { display: none !important; }

</head>

    let currentQuestionIndex = 0;
    let score = 0;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const counterEl = document.getElementById('question-counter');
    const scoreEl = document.getElementById('score');

    function loadQuestion() {
        const currentQuizData = quizData[currentQuestionIndex];
        
        counterEl.innerText = `Ερώτηση ${currentQuestionIndex + 1} / ${quizData.length}`;
        questionEl.innerText = currentQuizData.q;
        optionsEl.innerHTML = '';
        feedbackEl.style.display = 'none';
        nextBtn.style.display = 'none';

        currentQuizData.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('option-btn');
            button.onclick = () => selectAnswer(index, button);
            optionsEl.appendChild(button);
        });
    }

    function selectAnswer(selectedIndex, selectedBtn) {
        const currentQuizData = quizData[currentQuestionIndex];
        const buttons = optionsEl.querySelectorAll('.option-btn');
        
        // Disable all buttons
        buttons.forEach(btn => btn.disabled = true);

        if (selectedIndex === currentQuizData.correct) {
            selectedBtn.classList.add('correct');
            score++;
            scoreEl.innerText = score;
        } else {
            selectedBtn.classList.add('wrong');
            buttons[currentQuizData.correct].classList.add('correct');
        }

        feedbackEl.innerHTML = `<strong>Επεξήγηση Καθηγητή:</strong><br>${currentQuizData.explanation}`;
        feedbackEl.style.display = 'block';
        nextBtn.style.display = 'inline-block';
        
        if (currentQuestionIndex === quizData.length - 1) {
            nextBtn.innerText = 'Ολοκλήρωση Αξιολόγησης';
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            quizContainer = document.querySelector('.quiz-container');
            let percentage = Math.round((score / quizData.length) * 100);
            quizContainer.innerHTML = `
                <div style="text-align: center; padding: 2rem;">
                    <h2>Η Αξιολόγηση Ολοκληρώθηκε</h2>
                    <p style="font-size: 1.5rem; margin: 2rem 0;">Το τελικό σας σκορ είναι: <strong>${score} / ${quizData.length}</strong> (${percentage}%)</p>
                    <p style="font-size: 1.1rem; color: #7f8c8d;">Ως Καθηγητής, σας προτρέπω να μελετήσετε ξανά τις σημειώσεις στα σημεία όπου υπήρξαν αστοχίες. Η εμβρυολογία απαιτεί ακρίβεια.</p>
                    <button onclick="location.reload()" style="margin-top: 2rem; padding: 1rem 2rem; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">Επανάληψη Αξιολόγησης</button>
                </div>
            `;
        }
    }

    // Initialize the quiz
    loadQuestion();
