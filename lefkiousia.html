<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Quiz Νευροανατομίας</title>
  <style>
    :root {
      --ink: #15202b;
      --muted: #667085;
      --paper: #ffffff;
      --bg: #eef2f6;
      --line: #d6dee8;
      --soft: #f6f8fb;
      --accent: #173f5f;
      --accent-dark: #0f2e45;
      --accent-2: #b56b21;
      --good: #147a3f;
      --good-bg: #e9f7ef;
      --bad: #b42318;
      --bad-bg: #fff0ed;
      --warn-bg: #fff7e6;
      --shadow: 0 10px 24px rgba(16, 24, 40, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at top left, #f9fbfd 0, var(--bg) 38%, #e8edf3 100%);
      font: 16px/1.55 "Segoe UI", Roboto, Arial, sans-serif;
    }
    .page {
      width: min(1040px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }
    header, .panel, .quiz-card, .results-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    header {
      border-top: 6px solid var(--accent);
      padding: 26px 28px;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 8px; font-size: clamp(1.45rem, 3vw, 2rem); line-height: 1.2; }
    h2 { margin: 0 0 14px; font-size: 1.18rem; }
    p { margin: 0 0 10px; }
    .muted { color: var(--muted); }
    .panel { padding: 18px; margin-bottom: 16px; }
    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }
    label { display: block; font-weight: 700; margin-bottom: 6px; color: var(--accent-dark); }
    select, input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
    }
    .checkrow { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
    .checkrow label { display: inline-flex; gap: 7px; align-items: center; margin: 0; font-weight: 600; color: var(--ink); }
    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: white;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
    }
    button:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    button:active { transform: translateY(1px); }
    button.secondary { background: white; color: var(--accent); }
    button.secondary:hover { background: var(--soft); }
    button.ghost { background: transparent; color: var(--accent); border-color: transparent; }
    button.ghost:hover { background: var(--soft); border-color: var(--line); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 14px 0 0;
    }
    .stat { background: var(--soft); border: 1px solid var(--line); border-radius: 12px; padding: 10px; }
    .stat b { display: block; font-size: 1.25rem; color: var(--accent); }
    .progress-wrap { margin-top: 14px; background: #dfe7f0; border-radius: 999px; overflow: hidden; height: 12px; }
    .progress-bar { width: 0%; height: 100%; background: var(--accent-2); transition: width .2s ease; }
    .quiz-card { padding: 22px; margin-top: 16px; }
    .qmeta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--muted);
      font-size: .92rem;
      font-weight: 650;
    }
    .qtext { font-size: 1.12rem; font-weight: 750; margin: 8px 0 18px; }
    .options { display: grid; gap: 10px; }
    .option {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 10px;
      align-items: stretch;
      text-align: left;
      width: 100%;
      color: var(--ink);
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0;
      overflow: hidden;
      font-weight: 600;
    }
    .option:hover { background: var(--soft); border-color: #b8c4d1; }
    .letter {
      display: grid;
      place-items: center;
      background: var(--soft);
      color: var(--accent-2);
      font-weight: 900;
      border-right: 1px solid var(--line);
    }
    .opt-text { padding: 12px 13px; }
    .option.selected { border-color: var(--accent-2); box-shadow: inset 0 0 0 1px var(--accent-2); }
    .option.correct { border-color: var(--good); background: var(--good-bg); }
    .option.correct .letter { background: rgba(20, 122, 63, .12); color: var(--good); border-color: rgba(20, 122, 63, .3); }
    .option.wrong { border-color: var(--bad); background: var(--bad-bg); }
    .option.wrong .letter { background: rgba(180, 35, 24, .10); color: var(--bad); border-color: rgba(180, 35, 24, .25); }
    .feedback { margin-top: 14px; padding: 13px 14px; border-radius: 12px; border: 1px solid var(--line); background: var(--soft); }
    .feedback.good { background: var(--good-bg); border-color: rgba(20, 122, 63, .25); }
    .feedback.bad { background: var(--bad-bg); border-color: rgba(180, 35, 24, .25); }
    .feedback.warn { background: var(--warn-bg); border-color: rgba(181, 107, 33, .25); }
    .navrow { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
    .navrow .left, .navrow .right { display: flex; gap: 8px; flex-wrap: wrap; }
    .hidden { display: none !important; }
    .results-card { padding: 22px; margin-top: 16px; }
    .score-big { font-size: clamp(2.2rem, 6vw, 4rem); line-height: 1; margin: 8px 0; color: var(--accent); font-weight: 900; }
    table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 12px; border: 1px solid var(--line); background: white; }
    th, td { padding: 10px 11px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { background: var(--soft); color: var(--accent); }
    tr:last-child td { border-bottom: 0; }
    details { border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin: 10px 0; background: white; }
    summary { cursor: pointer; font-weight: 800; color: var(--accent); }
    .answer-line { margin-top: 8px; }
    .empty { text-align: center; padding: 28px; color: var(--muted); }
    @media (max-width: 820px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 560px) {
      .controls, .stats { grid-template-columns: 1fr; }
      header, .quiz-card, .panel, .results-card { border-radius: 12px; }
      .page { width: min(100% - 18px, 1040px); padding-top: 14px; }
      .option { grid-template-columns: 36px 1fr; }
    }
    @media print {
      body { background: white; }
      .panel, .navrow, .progress-wrap { display: none; }
      header, .quiz-card, .results-card { box-shadow: none; border-color: #999; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Interactive Quiz Νευροανατομίας</h1>

    </header>

    <section class="panel" aria-label="Ρυθμίσεις quiz">
      <h2>Ρυθμίσεις</h2>
      <div class="controls">
        <div>
          <label for="category">Κατηγορία</label>
          <select id="category"></select>
        </div>
        <div>
          <label for="mode">Τρόπος</label>
          <select id="mode">
            <option value="study">Μελέτη: άμεση αιτιολόγηση</option>
            <option value="exam">Εξέταση: αιτιολόγηση στο τέλος</option>
          </select>
        </div>
        <div>
          <label for="search">Αναζήτηση ερώτησης</label>
          <input id="search" type="text" placeholder="π.χ. έσω κάψα">
        </div>
        <div>
          <button id="startBtn" type="button">Έναρξη / Εφαρμογή</button>
        </div>
      </div>
      <div class="checkrow">
        <label><input id="shuffleQ" type="checkbox" checked> Ανακάτεμα ερωτήσεων</label>
        <label><input id="shuffleO" type="checkbox"> Ανακάτεμα απαντήσεων</label>
      </div>
      <div class="stats" aria-live="polite">
        <div class="stat"><span>Ερώτηση</span><b id="statQuestion">0/0</b></div>
        <div class="stat"><span>Απαντημένες</span><b id="statAnswered">0</b></div>
        <div class="stat"><span>Σωστές</span><b id="statCorrect">0</b></div>
        <div class="stat"><span>Ποσοστό</span><b id="statPercent">0%</b></div>
      </div>
      <div class="progress-wrap" aria-label="Πρόοδος"><div class="progress-bar" id="progressBar"></div></div>
    </section>

    <section id="quiz" class="quiz-card"></section>
    <section id="results" class="results-card hidden"></section>
  </main>

    const state = {
      pool: [],
      index: 0,
      answers: new Map(),
      orderById: new Map(),
      lastWrongIds: [],
      finished: false
    };

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (str) => String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initCategories() {
      const counts = sourceQuestions.reduce((acc, q) => {
        acc[q.cat] = (acc[q.cat] || 0) + 1;
        return acc;
      }, {});
      const opts = [`<option value="__all__">Όλες οι κατηγορίες (${sourceQuestions.length})</option>`]
        .concat(Object.entries(counts).map(([cat, n]) => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)} (${n})</option>`));
      $("category").innerHTML = opts.join("");
    }

    function buildPool(idsOnly = null) {
      const category = $("category").value;
      const needle = $("search").value.trim().toLocaleLowerCase("el");
      let pool = sourceQuestions.map((q, i) => ({...q, id: i}));
      if (idsOnly) pool = pool.filter(q => idsOnly.includes(q.id));
      if (category !== "__all__") pool = pool.filter(q => q.cat === category);
      if (needle) {
        pool = pool.filter(q =>
          q.q.toLocaleLowerCase("el").includes(needle) ||
          q.e.toLocaleLowerCase("el").includes(needle) ||
          q.cat.toLocaleLowerCase("el").includes(needle) ||
          q.o.some(opt => opt.toLocaleLowerCase("el").includes(needle))
        );
      }
      if ($("shuffleQ").checked) pool = shuffle(pool);
      return pool;
    }

    function startQuiz(idsOnly = null) {
      state.pool = buildPool(idsOnly);
      state.index = 0;
      state.answers = new Map();
      state.orderById = new Map();
      state.finished = false;
      for (const q of state.pool) {
        const order = [...q.o.keys()];
        state.orderById.set(q.id, $("shuffleO").checked ? shuffle(order) : order);
      }
      $("results").classList.add("hidden");
      renderQuestion();
      updateStats();
    }

    function updateStats() {
      const total = state.pool.length;
      const answered = [...state.answers.values()].filter(a => a.selected !== null).length;
      const correct = [...state.answers.values()].filter(a => a.correct).length;
      const percent = answered ? Math.round((correct / answered) * 100) : 0;
      $("statQuestion").textContent = total ? `${Math.min(state.index + 1, total)}/${total}` : "0/0";
      $("statAnswered").textContent = answered;
      $("statCorrect").textContent = correct;
      $("statPercent").textContent = `${percent}%`;
      $("progressBar").style.width = total ? `${Math.round((answered / total) * 100)}%` : "0%";
    }

    function renderQuestion() {
      const total = state.pool.length;
      const quiz = $("quiz");
      if (!total) {
        quiz.innerHTML = `<div class="empty">Δεν βρέθηκαν ερωτήσεις με αυτά τα φίλτρα.</div>`;
        updateStats();
        return;
      }
      const q = state.pool[state.index];
      const order = state.orderById.get(q.id);
      const answer = state.answers.get(q.id) || {selected: null, correct: false};
      const reveal = $("mode").value === "study";
      const answered = answer.selected !== null;

      const optionsHtml = order.map((originalIndex, shownIndex) => {
        let cls = "option";
        if (answered) {
          if (reveal && originalIndex === q.a) cls += " correct";
          if (originalIndex === answer.selected) cls += answer.correct && reveal ? " correct" : reveal ? " wrong" : " selected";
        }
        return `
          <button class="${cls}" type="button" data-original="${originalIndex}" ${answered ? "disabled" : ""}>
            <span class="letter">${letters[shownIndex]}</span>
            <span class="opt-text">${escapeHtml(q.o[originalIndex])}</span>
          </button>
        `;
      }).join("");

      let feedback = "";
      if (answered && reveal) {
        feedback = `<div class="feedback ${answer.correct ? "good" : "bad"}">
          <strong>${answer.correct ? "Σωστό." : "Λάθος."}</strong>
          Σωστή απάντηση: <strong>${letters[order.indexOf(q.a)]}</strong>.
          <div class="answer-line">${escapeHtml(q.e)}</div>
        </div>`;
      } else if (answered) {
        feedback = `<div class="feedback warn"><strong>Η απάντηση καταχωρήθηκε.</strong> Θα δεις τη σωστή απάντηση και την αιτιολόγηση στα αποτελέσματα.</div>`;
      }

      quiz.innerHTML = `
        <div class="qmeta">
          <span class="pill">${escapeHtml(q.cat)}</span>
          <span class="pill">Ερώτηση ${state.index + 1} από ${total}</span>
        </div>
        <div class="qtext">${escapeHtml(q.q)}</div>
        <div class="options">${optionsHtml}</div>
        ${feedback}
        <div class="navrow">
          <div class="left">
            <button type="button" class="secondary" id="prevBtn" ${state.index === 0 ? "disabled" : ""}>Προηγούμενη</button>
            <button type="button" class="secondary" id="resetBtn">Επανεκκίνηση</button>
          </div>
          <div class="right">
            <button type="button" class="ghost" id="skipBtn" ${state.index === total - 1 ? "disabled" : ""}>Παράλειψη</button>
            <button type="button" id="nextBtn">${state.index === total - 1 ? "Αποτελέσματα" : "Επόμενη"}</button>
          </div>
        </div>
      `;

      quiz.querySelectorAll(".option").forEach(btn => {
        btn.addEventListener("click", () => chooseAnswer(Number(btn.dataset.original)));
      });
      $("prevBtn").addEventListener("click", () => { state.index--; renderQuestion(); updateStats(); });
      $("resetBtn").addEventListener("click", () => startQuiz());
      $("skipBtn").addEventListener("click", () => { state.index++; renderQuestion(); updateStats(); });
      $("nextBtn").addEventListener("click", () => {
        if (state.index === total - 1) showResults();
        else { state.index++; renderQuestion(); updateStats(); }
      });
      updateStats();
    }

    function chooseAnswer(originalIndex) {
      const q = state.pool[state.index];
      const correct = originalIndex === q.a;
      state.answers.set(q.id, {selected: originalIndex, correct});
      renderQuestion();
      updateStats();
    }

    function showResults() {
      const total = state.pool.length;
      const answered = [...state.answers.values()].filter(a => a.selected !== null).length;
      const correct = [...state.answers.values()].filter(a => a.correct).length;
      const wrongQuestions = state.pool.filter(q => {
        const a = state.answers.get(q.id);
        return !a || !a.correct;
      });
      state.lastWrongIds = wrongQuestions.map(q => q.id);
      const score = total ? Math.round((correct / total) * 100) : 0;
      const perCat = {};
      for (const q of state.pool) {
        perCat[q.cat] ||= {total: 0, correct: 0};
        perCat[q.cat].total++;
        if (state.answers.get(q.id)?.correct) perCat[q.cat].correct++;
      }
      const catRows = Object.entries(perCat).map(([cat, r]) => `
        <tr><td>${escapeHtml(cat)}</td><td>${r.correct}/${r.total}</td><td>${Math.round((r.correct / r.total) * 100)}%</td></tr>
      `).join("");
      const review = wrongQuestions.length ? wrongQuestions.map((q, i) => {
        const a = state.answers.get(q.id);
        const order = state.orderById.get(q.id) || [...q.o.keys()];
        const chosen = a ? q.o[a.selected] : "Δεν απαντήθηκε";
        return `
          <details>
            <summary>${i + 1}. ${escapeHtml(q.q)}</summary>
            <p class="answer-line"><strong>Η απάντησή σου:</strong> ${escapeHtml(chosen)}</p>
            <p><strong>Σωστή απάντηση:</strong> ${letters[order.indexOf(q.a)]}) ${escapeHtml(q.o[q.a])}</p>
            <p><strong>Αιτιολόγηση:</strong> ${escapeHtml(q.e)}</p>
          </details>
        `;
      }).join("") : `<div class="feedback good"><strong>Τέλειο.</strong> Δεν υπάρχουν λάθη για επανάληψη.</div>`;

      $("results").innerHTML = `
        <h2>Αποτελέσματα</h2>
        <div class="score-big">${score}%</div>
        <p><strong>${correct} σωστές</strong> σε ${total} ερωτήσεις. Απαντήθηκαν ${answered}/${total}.</p>
        <div style="margin: 16px 0;">
          <table>
            <thead><tr><th>Κατηγορία</th><th>Σκορ</th><th>Ποσοστό</th></tr></thead>
            <tbody>${catRows}</tbody>
          </table>
        </div>
        <div class="navrow">
          <div class="left">
            <button type="button" id="againBtn">Ξανά από την αρχή</button>
            <button type="button" class="secondary" id="wrongBtn" ${wrongQuestions.length ? "" : "disabled"}>Επανάληψη λαθών</button>
          </div>
          <div class="right">
            <button type="button" class="secondary" onclick="window.print()">Εκτύπωση</button>
          </div>
        </div>
        <h2 style="margin-top: 22px;">Επανάληψη λαθών / αναπάντητων</h2>
        ${review}
      `;
      $("results").classList.remove("hidden");
      $("results").scrollIntoView({behavior: "smooth", block: "start"});
      $("againBtn").addEventListener("click", () => startQuiz());
      $("wrongBtn").addEventListener("click", () => startQuiz(state.lastWrongIds));
      updateStats();
    }

    $("startBtn").addEventListener("click", () => startQuiz());
    $("category").addEventListener("change", () => startQuiz());
    $("mode").addEventListener("change", renderQuestion);
    $("search").addEventListener("keydown", (e) => { if (e.key === "Enter") startQuiz(); });

    initCategories();
    startQuiz();
  </script>
