let currentIndex = 0;
let correctCount = 0;
let answered = new Array(quizData.length).fill(false);

function renderQuestion() {
    const q = quizData[currentIndex];
    document.getElementById('q-num').innerText = `Ερώτηση ${currentIndex + 1} / ${quizData.length}`;
    document.getElementById('q-text').innerText = q.q;
    const optsCont = document.getElementById('q-opts');
    optsCont.innerHTML = '';
    
    q.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = `${String.fromCharCode(65+i)}. ${opt}`;
        btn.onclick = () => selectOption(i);
        if (answered[currentIndex]) btn.disabled = true;
        optsCont.appendChild(btn);
    });

    const fb = document.getElementById('q-feedback');
    if (answered[currentIndex]) {
        fb.style.display = 'block';
        fb.innerHTML = `<strong>Ακαδημαϊκή Τεκμηρίωση:</strong> ${q.f}`;
    } else {
        fb.style.display = 'none';
    }

    document.getElementById('prev').disabled = (currentIndex === 0);
    document.getElementById('next').disabled = (currentIndex === quizData.length - 1);
}

function selectOption(idx) {
    if (answered[currentIndex]) return;
    const q = quizData[currentIndex];
    const btns = document.querySelectorAll('.opt-btn');
    
    answered[currentIndex] = true;
    if (idx === q.a) {
        btns[idx].classList.add('correct');
        correctCount++;
    } else {
        btns[idx].classList.add('wrong');
        btns[q.a].classList.add('correct');
    }
    
    document.getElementById('score').innerText = `Σωστά: ${correctCount}`;
    renderQuestion();
}

document.getElementById('next').onclick = () => {
    if (currentIndex < quizData.length - 1) {
        currentIndex++;
        renderQuestion();
    }
};

document.getElementById('prev').onclick = () => {
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
    }
};

// Αρχική φόρτωση
renderQuestion();
</script>
