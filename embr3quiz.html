<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">

    <title>Quiz Εμβρυολογίας: 2η & 3η Εβδομάδα</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --correct-bg: #d4edda;
            --correct-border: #28a745;
            --correct-text: #155724;
            --incorrect-bg: #f8d7da;
            --incorrect-border: #dc3545;
            --incorrect-text: #721c24;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-color);
            margin: 0 0 10px 0;
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .question-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.2s ease;
        }

        .question-card:hover {
            transform: translateY(-2px);
        }

        .question-title {
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 12px 20px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1em;
            background: white;
        }

        .option:hover:not(.locked) {
            background-color: #f0f4f8;
            border-color: var(--accent-color);
        }

        .option.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: var(--correct-text);
            font-weight: 500;
        }

        .option.incorrect {
            background-color: var(--incorrect-bg);
            border-color: var(--incorrect-border);
            color: var(--incorrect-text);
            text-decoration: line-through;
        }

        .locked-card {
            pointer-events: none;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4fd;
            border-left: 5px solid var(--accent-color);
            border-radius: 4px;
            display: none;
            font-size: 0.95em;
            animation: fadeIn 0.5s ease;
        }

        .explanation strong {
            color: var(--accent-color);
            display: block;
            margin-bottom: 5px;
        }

        .tip {
            margin-top: 8px;
            font-style: italic;
            color: #555;
            font-size: 0.9em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .question-card { padding: 15px; }
            .option { padding: 10px 15px; }
        }
    </style>
</head>

            },
            {
                q: "22. Από ποια πηγή προέρχονται οι Σωμίτες;",
                options: ["Ενδόδερμα", "Διάμεσο μεσόδερμα", "Παραξονικό μεσόδερμα", "Πλάγιο μεσοδερμικό πέταλο"],
                correct: 2,
                exp: "Το παραξονικό μεσόδερμα (δίπλα ακριβώς στη νωτοχορδή) τμηματοποιείται και σχηματίζει τους σωμίτες.",
                tip: "Οι σωμίτες δίνουν το σκληροτόμιο (σπόνδυλοι), το μυοτόμιο (μύες κορμού) και το δερμοτόμιο (χόριο δέρματος ράχης)."
            },
            {
                q: "23. Ο 'Δίστιβος Δίσκος' που σχηματίζεται τη 2η εβδομάδα αποτελείται από:",
                options: ["Εξώδερμα και Ενδόδερμα", "Επιβλάστη και Υποβλάστη", "Κυτταροτροφοβλάστη και Συγκυτιοτροφοβλάστη", "Σωματικό και Σπλαχνικό μεσόδερμα"],
                correct: 1,
                exp: "Η Εμβρυοβλάστη διαχωρίζεται σε δύο στιβάδες κυττάρων: την ψηλή κυλινδρική Επιβλάστη και την κυβοειδή Υποβλάστη, δημιουργώντας τον δίστιβο δίσκο.",
                tip: "Εβδομάδα των 'Δύο' $\\rightarrow$ Εμβρυοβλάστη: Επιβλάστη & Υποβλάστη."
            },
            {
                q: "24. Σε τι διαφοροποιούνται τα μεσοδερμικά κύτταρα στις 'τριτογενείς' λάχνες;",
                options: ["Σε κύτταρα του αμνίου", "Σε φιαλόμορφα κύτταρα", "Σε μικρά αιμοφόρα, τριχοειδή αγγεία", "Σε νευροεξώδερμα"],
                correct: 2,
                exp: "Το σήμα κατατεθέν της μετάβασης από δευτερογενή σε τριτογενή λάχνη είναι η αγγειογένεση μέσα στον μεσεγχυματικό πυρήνα της λάχνης.",
                tip: "Τριτογενής = έτοιμη για αιματική λειτουργία, έχει τα δικά της αγγεία!"
            },
            {
                q: "25. Αν μια έγκυος γυναίκα ΔΕΝ πάρει βιταμίνη Β9 (φολικό οξύ) πριν και κατά τα πρώτα στάδια της κύησης, αυξάνεται δραματικά ο κίνδυνος για:",
                options: ["Ολική αναστροφή σπλάγχνων", "Ιεροκοκκυγικό τεράτωμα", "Ανωμαλίες του Νευρικού Σωλήνα (π.χ. ανεγκεφαλία, δισχιδής ράχη)", "Σειρηνομελία"],
                correct: 2,
                exp: "Το φολικό οξύ είναι απολύτως απαραίτητο για την ορθή σύγκλειση του νευρικού σωλήνα κατά την 3η-4η εβδομάδα.",
                tip: "SOS Κλινικό: Φολικό οξύ $\\rightarrow$ Πρόληψη NTDs (Neural Tube Defects)."
            }
        ];

        const quizContainer = document.getElementById('quiz');

        questions.forEach((qObj, index) => {
            // Δημιουργία κάρτας ερώτησης
            const card = document.createElement('div');
            card.className = 'question-card';
            
            // Τίτλος
            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerText = qObj.q;
            card.appendChild(title);

            // Επιλογές
            const optionsList = document.createElement('div');
            optionsList.className = 'options-list';
            
            qObj.options.forEach((optText, optIndex) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'option';
                optDiv.innerText = optText;
                optDiv.dataset.correct = (optIndex === qObj.correct).toString();
                
                optDiv.addEventListener('click', function() {
                    if (card.classList.contains('locked-card')) return;
                    
                    card.classList.add('locked-card');
                    
                    if (this.dataset.correct === "true") {
                        this.classList.add('correct');
                    } else {
                        this.classList.add('incorrect');
                        // Βρες και δείξε την σωστή
                        Array.from(optionsList.children).forEach(child => {
                            if (child.dataset.correct === "true") {
                                child.classList.add('correct');
                            }
                        });
                    }
                    
                    // Εμφάνιση επεξήγησης
                    const expDiv = card.querySelector('.explanation');
                    expDiv.style.display = 'block';
                });
                
                optionsList.appendChild(optDiv);
            });
            
            card.appendChild(optionsList);

            // Επεξήγηση
            const expDiv = document.createElement('div');
            expDiv.className = 'explanation';
            expDiv.innerHTML = `<strong>Επεξήγηση:</strong> ${qObj.exp} <div class="tip">💡 ${qObj.tip}</div>`;
            card.appendChild(expDiv);

            quizContainer.appendChild(card);
        });
    </script>
</body>
</html>
