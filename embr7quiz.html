<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moore's Clinical Embryology Quiz</title>
    <style>
        :root {
            --primary: #2c3e50;
            --btn-default: #ecf0f1;
            --btn-hover: #bdc3c7;
            --correct-bg: #d5f5e3;
            --correct-border: #27ae60;
            --incorrect-bg: #fadbd8;
            --incorrect-border: #c0392b;
        }
        body { font-family: 'Georgia', serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; color: var(--primary); }
        .question-container { border-bottom: 2px solid #eee; padding-bottom: 30px; margin-bottom: 30px; }
        h3 { font-size: 1.2em; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { 
            padding: 12px 15px; text-align: left; font-size: 1em; font-family: inherit;
            background-color: var(--btn-default); border: 1px solid #ccc; border-radius: 5px; cursor: pointer; transition: 0.2s;
        }
        button:hover:not(:disabled) { background-color: var(--btn-hover); }
        button:disabled { cursor: not-allowed; color: #555; }
        button.correct { background-color: var(--correct-bg); border-color: var(--correct-border); font-weight: bold; }
        button.incorrect { background-color: var(--incorrect-bg); border-color: var(--incorrect-border); }
        .feedback { 
            display: none; padding: 15px; margin-top: 20px; border-radius: 5px; background: #f9f9f9; 
            border-left: 5px solid #3498db; font-size: 0.95em;
        }
        .score-board { font-size: 1.5em; font-weight: bold; text-align: center; margin-bottom: 30px; padding: 10px; background: #eee; border-radius: 8px;}
    </style>
</head>
<body>

    <h1 style="text-align: center;">Advanced Clinical Embryology Quiz</h1>
    <div class="score-board">Σκορ: <span id="score">0</span> / 30</div>
    <div id="quiz-root"></div>

    <script>
        const quizData = [
            {
                q: "1. Νεογνό γεννιέται με σοβαρή υποπλασία πνευμόνων. Ο προγεννητικός υπέρηχος έδειξε σημαντικά μειωμένο όγκο αμνιακού υγρού. Ποια είναι η πιο πιθανή εμβρυολογική αιτία;",
                opt: ["Ατρησία οισοφάγου", "Ανεγκεφαλία", "Αμφοτερόπλευρη νεφρική αγενεσία", "Μητρικός διαβήτης"],
                ans: 2,
                exp: "Η αμφοτερόπλευρη νεφρική αγενεσία οδηγεί σε αδυναμία παραγωγής ούρων από το έμβρυο, τα οποία (μετά την 11η εβδομάδα) αποτελούν την κύρια πηγή αμνιακού υγρού. Το ολιγουδράμνιο (<400ml) περιορίζει τη διάταση των πνευμόνων, προκαλώντας πνευμονική υποπλασία. Η ατρησία οισοφάγου και η ανεγκεφαλία προκαλούν πολυυδράμνιο."
            },
            {
                q: "2. Σε υπερηχογράφημα ρουτίνας παρατηρείται ότι ο πλακούντας έχει έναν ομφάλιο λώρο που περιέχει μόνο ένα αγγείο με παχύ, μυϊκό τοίχωμα και ένα αγγείο με λεπτό τοίχωμα. Ποιος κλινικός κίνδυνος συσχετίζεται άμεσα με αυτό το εύρημα;",
                opt: ["Ανωμαλίες του καρδιαγγειακού συστήματος", "Σύνδρομο αμνιακής ταινίας", "Πρόωρη ρήξη μεμβρανών", "Διαχωρισμός επιβλάστης"],
                ans: 0,
                exp: "Το εύρημα περιγράφει Απουσία Ομφαλικής Αρτηρίας (Single Umbilical Artery - 1 αρτηρία αντί για 2, και 1 φλέβα). Αυτό παρατηρείται στο 1/200 των νεογνών και συσχετίζεται ισχυρά με ανωμαλίες του καρδιαγγειακού συστήματος."
            },
            {
                q: "3. Μια γυναίκα κυοφορεί μονοζυγωτικά δίδυμα. Ο υπέρηχος δείχνει έναν κοινό πλακούντα, μία κοινή χοριακή κοιλότητα, αλλά δύο ξεχωριστές αμνιακές κοιλότητες. Πότε συνέβη ο διαχωρισμός του ζυγώτη;",
                opt: ["Στάδιο 2 κυττάρων (Ημέρες 1-3)", "Στάδιο βλαστοκύστης (Ημέρες 4-8)", "Στάδιο εμφυτευμένης βλαστοκύστης (Ημέρες 8-13)", "Κατά τον σχηματισμό του εμβρυϊκού δίσκου (Ημέρες 13-15)"],
                ans: 1,
                exp: "Ο διαχωρισμός της εμβρυοβλάστης στο στάδιο της βλαστοκύστης (ημέρες 4-8) είναι η πιο κοινή αιτία μονοζυγωτικών διδύμων. Δημιουργεί Μονοχοριακά/Διαμνιακά δίδυμα (κοινός πλακούντας, ξεχωριστά άμνια)."
            },
            {
                q: "4. Ποια δομή του εμβρύου μεταφέρει το πλέον οξυγονωμένο αίμα;",
                opt: ["Ομφαλικές αρτηρίες", "Ομφαλική φλέβα", "Πνευμονική αρτηρία", "Κατιούσα αορτή"],
                ans: 1,
                exp: "Παρά το όνομά της (φλέβα), η ομφαλική φλέβα μεταφέρει το πλούσιο σε οξυγόνο και θρεπτικά συστατικά αίμα από τον πλακούντα (μητέρα) προς το έμβρυο. Οι ομφαλικές αρτηρίες επιστρέφουν το αποξυγονωμένο αίμα."
            },
            {
                q: "5. Έμβρυο διαγιγνώσκεται με δακτυλίους περίσφιξης στο δεξί άνω άκρο και εστιακή ισχαιμία. Η παθογένεια αυτού του φαινομένου σχετίζεται άμεσα με:",
                opt: ["Γνήσιο κόμβο του ομφάλιου λώρου", "Σύνδρομο εμβρυικής μετάγγισης (TTTS)", "Ρήξη και σχηματισμό ινωδών ταινιών του άμνιου", "Απουσία γέλης του Wharton"],
                ans: 2,
                exp: "Το Σύνδρομο Αμνιακής Ταινίας προκαλείται όταν ινώδεις ταινίες του ραγέντος αμνιακού σάκου τυλίγονται γύρω από μέρη του εμβρύου, προκαλώντας περίσφιξη και ενδεχομένως ακρωτηριασμούς in utero."
            },
            {
                q: "6. Η μέτρηση της α-εμβρυοπρωτεΐνης (AFP) στο αμνιακό υγρό λαμβάνει τη μέγιστη τιμή της φυσιολογικά κατά την:",
                opt: ["8η εβδομάδα", "14η εβδομάδα", "20η εβδομάδα", "37η εβδομάδα"],
                ans: 1,
                exp: "Η AFP κορυφώνεται γύρω στην 14η εβδομάδα (μεταξύ 13-16 εβδομάδων). Αυξημένα επίπεδα πέραν του φυσιολογικού υποδεικνύουν ανωμαλίες του νευρικού σωλήνα (π.χ. δισχιδής ράχη) ή του κοιλιακού τοιχώματος."
            },
            {
                q: "7. Στις πολύδυμες κυήσεις, η εμφάνιση Σιαμαίων (συνενωμένων) διδύμων οφείλεται σε διαχωρισμό που συμβαίνει:",
                opt: ["Κατά την πρώτη μιτωτική διαίρεση", "Πριν την εμφύτευση", "Μετά τη δημιουργία του δίστιβου εμβρυικού δίσκου (Ημέρες 13-15)", "Κατά την γονιμοποίηση 2 ωοκυττάρων"],
                ans: 2,
                exp: "Οι συνενωμένοι δίδυμοι προκύπτουν όταν ο διαχωρισμός του εμβρυϊκού άξονα συμβαίνει εξαιρετικά καθυστερημένα, κατά ή μετά το σχηματισμό του εμβρυικού δίσκου (ημέρες 13-15)."
            },
            {
                q: "8. Από ποια εμβρυϊκή δομή προέρχεται αρχικά η επένδυση του άμνιου την 8η ημέρα;",
                opt: ["Υποβλάστη", "Επιβλάστη", "Συγκυτιοτροφοβλάστη", "Εξωεμβρυϊκό μεσόδερμα"],
                ans: 1,
                exp: "Το άμνιο σχηματίζεται από κύτταρα της επιβλάστης (αμνιοβλάστες) που διαχωρίζονται δημιουργώντας την αμνιακή κοιλότητα την 8η ημέρα."
            },
            {
                q: "9. Κατά την 3η εβδομάδα της ανάπτυξης, ποιος είναι ο πρωταρχικός ρόλος του ομφαλικού κυστιδίου (λεκιθικός ασκός);",
                opt: ["Παραγωγή αμνιακού υγρού", "Εμφάνιση αρχέγονων γεννητικών κυττάρων και αιμοποίηση", "Σχηματισμός του πρωτογενούς ομφαλικού δακτυλίου", "Δημιουργία της γέλης του Wharton"],
                ans: 1,
                exp: "Το ομφαλικό κυστίδιο είναι καθοριστικό την 3η εβδομάδα για την εμφάνιση των αρχέγονων γεννητικών κυττάρων στο τοίχωμά του και για την πρώιμη αγγειογένεση/αιμοποίηση στο εξωεμβρυϊκό του μεσόδερμα."
            },
            {
                q: "10. Ένας 'νόθος' (ψευδής) κόμβος του ομφάλιου λώρου αποτελείται ανατομικά από:",
                opt: ["Συστροφή του ίδιου του εμβρύου γύρω από το λώρο", "Επιμήκυνση και συστροφή της ομφαλικής αρτηρίας μέσα στη γέλη του Wharton", "Πρόπτωση του εντέρου (ομφαλοκήλη)", "Σύμφυση του άμνιου με το χόριο"],
                ans: 1,
                exp: "Οι νόθοι κόμβοι δεν είναι πραγματικοί κόμβοι του λώρου (που θα απειλούσαν την κυκλοφορία). Είναι απλώς παχύνσεις λόγω της υπερβολικής επιμήκυνσης και τοπικής συστροφής των ομφαλικών αρτηριών εντός της γέλης του Wharton."
            },
            {
                q: "11. Το 50% της σύστασης του φυσιολογικού αμνιακού υγρού (εξαιρώντας το νερό) αποτελείται από:",
                opt: ["Αμινοξέα", "Υδατάνθρακες", "Ανόργανα άλατα", "Ορμόνες"],
                ans: 2,
                exp: "Η στερεή σύσταση του αμνιακού υγρού αποτελείται κατά 50% από ανόργανα άλατα, 25% από αμινοξέα και 25% από υδατάνθρακες, λιπίδια, ένζυμα και ορμόνες."
            },
            {
                q: "12. Ποια είναι η συχνότερη αιτία δημιουργίας πολυυδράμνιου;",
                opt: ["Νεφρική αγενεσία", "Ατρησία οισοφάγου ή ανωμαλίες ΚΝΣ", "Πρόωρη ρήξη μεμβρανών", "Έλλειψη πλακουντιακής κυκλοφορίας"],
                ans: 1,
                exp: "Το πολυυδράμνιο (1500-2000ml) προκαλείται συνήθως όταν το έμβρυο δεν καταπίνει φυσιολογικά το αμνιακό υγρό. Αυτό συμβαίνει σε ατρησία οισοφάγου (φυσικό εμπόδιο) ή ανωμαλίες του ΚΝΣ όπως ανεγκεφαλία (απουσία νευρικού ελέγχου κατάποσης)."
            },
            {
                q: "13. Σε περίπτωση Μονοχοριακής/Μονοαμνιακής (Mo-Mo) κύησης, ο διαχωρισμός του ζυγώτη συνέβη στις ημέρες:",
                opt: ["1-3", "4-8", "8-13", "13-15"],
                ans: 2,
                exp: "Ο διαχωρισμός της εμφυτευμένης βλαστοκύστης (ημέρες 8-13), δηλαδή αφότου έχει ήδη σχηματιστεί η αμνιακή και η χοριακή κοιλότητα, οδηγεί σε δίδυμα που μοιράζονται και τον πλακούντα και τον αμνιακό σάκο (Μο-Μο)."
            },
            {
                q: "14. Ο πρωτογενής ομφαλικός δακτύλιος περιέχει όλα τα παρακάτω ΕΚΤΟΣ ΑΠΟ:",
                opt: ["Αλλαντοΐδα", "Ομφαλικά αγγεία", "Λεκιθικό πόρο", "Αμνιοχοριακή μεμβράνη"],
                ans: 3,
                exp: "Ο πρωτογενής ομφαλικός δακτύλιος (5η εβδομάδα) περιλαμβάνει τον συνδετικό μίσχο (αλλαντοΐδα, ομφαλικά αγγεία) και το ομφαλικό κυστίδιο (λεκιθικός πόρος, ομφαλομεσεντερικά αγγεία). Η αμνιοχοριακή μεμβράνη σχηματίζεται αργότερα περιφερειακά."
            },
            {
                q: "15. Η αμνιοχοριακή μεμβράνη σχηματίζεται όταν:",
                opt: ["Η συγκυτιοτροφοβλάστη συγχωνεύεται με το ενδομήτριο", "Το αμνιακό υγρό πιέζει το άμνιο ώστε να συνενωθεί με το χόριο", "Ο λεκιθικός ασκός εκφυλίζεται", "Η αλλαντοΐδα αποφράσσεται"],
                ans: 1,
                exp: "Καθώς το έμβρυο και η αμνιακή κοιλότητα μεγαλώνουν ραγδαία, ο αμνιακός σάκος διευρύνεται, εξαλείφει την εξωεμβρυϊκή κοιλότητα (χοριακή κοιλότητα) και το άμνιο συγχωνεύεται με το χόριο, δημιουργώντας την αμνιοχοριακή μεμβράνη."
            },
            {
                q: "16. Ποια είναι η φυσιολογική ποσότητα αμνιακού υγρού κατά την 37η εβδομάδα;",
                opt: ["30 ml", "350 ml", "800-1000 ml", "2000 ml"],
                ans: 2,
                exp: "Ο φυσιολογικός όγκος αμνιακού υγρού κοντά στην τελειόμηνη κύηση (37 εβδομάδες) είναι 800-1000 ml. Όγκος >1500ml θεωρείται πολυυδράμνιο."
            },
            {
                q: "17. Οι διζυγωτικοί δίδυμοι είναι ΠΑΝΤΑ:",
                opt: ["Μονοχοριακοί/Διαμνιακοί", "Διχοριακοί/Διαμνιακοί", "Μονοχοριακοί/Μονοαμνιακοί", "Ταυτόσημοι γονιδιακά"],
                ans: 1,
                exp: "Εφόσον οι διζυγωτικοί δίδυμοι προκύπτουν από δύο διαφορετικά ωοκύτταρα/σπερματοζωάρια, εμφυτεύονται ξεχωριστά. Συνεπώς έχουν πάντα το δικό τους χόριο (πλακούντα) και το δικό τους άμνιο (Δι-Δι), αν και οι πλακούντες τους μπορεί οπτικά να συγχωνευτούν αν εμφυτευτούν κοντά."
            },
            {
                q: "18. Η γέλη του Wharton στον ομφάλιο λώρο λειτουργεί κυρίως για να:",
                opt: ["Μεταφέρει οξυγόνο στο έμβρυο", "Παράγει ερυθρά αιμοσφαίρια", "Προστατεύει τα ομφαλικά αγγεία από συμπίεση", "Εκκρίνει αμνιακό υγρό"],
                ans: 2,
                exp: "Η γέλη του Wharton (ένας εξειδικευμένος βλεννώδης συνδετικός ιστός) παρέχει ευελιξία και δομική υποστήριξη, αποτρέποντας την κάμψη και συμπίεση των κρίσιμων ομφαλικών αγγείων."
            },
            {
                q: "19. Σε θωρακοπαγή Σιαμαία δίδυμα, η αναλογία του φύλου τείνει να είναι:",
                opt: ["Αρσενικά προς Θηλυκά (3:1)", "Θηλυκά προς Αρσενικά (3:1)", "Απόλυτα ισοζυγισμένη (1:1)", "Αποκλειστικά αρσενικά"],
                ans: 1,
                exp: "Στα συνενωμένα (Σιαμαία) δίδυμα παρατηρείται σημαντική επικράτηση του θηλυκού φύλου, με την αναλογία θηλυκά/αρσενικά να φτάνει το 3:1."
            },
            {
                q: "20. Το αμνιακό υγρό ανανεώνεται με ταχύτατους ρυθμούς. Ο εκτιμώμενος χρόνος πλήρους ανανέωσης είναι:",

                ans: 0,
                exp: "Η ανανέωση του αμνιακού υγρού είναι εξαιρετικά δυναμική. Ο όγκος του ανανεώνεται πλήρως περίπου κάθε 3 ώρες (μέσω κατάποσης από το έμβρυο και αποβολής ως ούρα)."
            },
            {
                q: "21. Το 10% των περιπτώσεων ρήξης των εμβρυϊκών μεμβρανών αφορά:",
                opt: ["Γνήσιους κόμβους", "Πρόωρη ρήξη (PROM)", "Σύνδρομο αμνιακής ταινίας", "Πολυυδράμνιο αποκλειστικά"],
                ans: 1,
                exp: "Η πρόωρη ρήξη των εμβρυϊκών μεμβρανών (PROM) αποτελεί μια από τις συχνότερες κλινικές επιπλοκές, αντιπροσωπεύοντας περίπου το 10% των κυήσεων, οδηγώντας συχνά σε πρόωρο τοκετό."
            },
            {
                q: "22. Ο χοριακός σάκος καλύπτεται εξωτερικά από:",
                opt: ["Αμνιοβλάστες", "Συγκυτιοτροφοβλάστη και κυτταροτροφοβλάστη", "Μόνο ενδομήτριο", "Αλλαντοΐδα"],
                ans: 1,
                exp: "Το χόριο (εξωεμβρυϊκός σάκος) αποτελείται από το εξωεμβρυϊκό μεσόδερμα και τα δύο στρώματα της τροφοβλάστης (κυτταροτροφοβλάστη εσωτερικά και συγκυτιοτροφοβλάστη εξωτερικά, που εισδύει στο ενδομήτριο)."
            },
            {
                q: "23. Ποια λειτουργία ΔΕΝ ανήκει στο αμνιακό υγρό;",
                opt: ["Συμμετρική ανάπτυξη του εμβρύου", "Ανταλλαγή αερίων (οξυγόνωση)", "Προστασία από μηχανικούς κραδασμούς", "Θερμορύθμιση"],
                ans: 1,
                exp: "Η ανταλλαγή αερίων (οξυγόνο/διοξείδιο) γίνεται αποκλειστικά μέσω του πλακούντα (ομφαλικά αγγεία). Το αμνιακό υγρό προσφέρει μηχανική προστασία, χώρο για συμμετρική ανάπτυξη, θερμορύθμιση και ανάπτυξη πνευμόνων."
            },
            {
                q: "24. Πώς μεταφέρεται αρχικά το αμνιακό υγρό πριν την κερατινοποίηση του δέρματος του εμβρύου;",

                ans: 1,
                exp: "Πριν την κερατινοποίηση του εμβρυϊκού δέρματος (περίπου 20η εβδομάδα), το νερό και οι διαλυτές ουσίες του αμνιακού υγρού μπορούν να διαχέονται ελεύθερα διαμέσου του δέρματος του εμβρύου."
            },
            {
                q: "25. Ένα κοντός ομφάλιος λώρος κλινικά προδιαθέτει σε:",

                ans: 1,
                exp: "Ένας αφύσικα κοντός ομφάλιος λώρος δεν επιτρέπει την ελεύθερη κάθοδο του εμβρύου κατά τον τοκετό και μπορεί να προκαλέσει έλξη και πρόωρη αποκόλληση του πλακούντα ή ρήξη του λώρου."
            },
            {
                q: "26. Ο όρος 'Battledore insertion' (Ρακετοειδής έκφυση) αναφέρεται σε:",
                opt: ["Πολύ κοντό ομφάλιο λώρο", "Έκφυση του ομφάλιου λώρου στα χείλη/άκρα του πλακούντα", "Ύπαρξη μόνο μίας ομφαλικής αρτηρίας", "Έλλειψη γέλης του Wharton"],
                ans: 1,
                exp: "Φυσιολογικά ο λώρος εκφύεται στο κέντρο του πλακούντα. Η Battledore insertion είναι η έκφυση στο άκρο (χείλος) του πλακούντα (σαν ρακέτα)."
            },
            {
                q: "27. Κατά την 4η εβδομάδα, το ομφαλικό κυστίδιο (λεκιθικός ασκός):",
                opt: ["Μετατρέπεται πλήρως στο άμνιο", "Ενσωματώνεται στο έμβρυο ως το αρχέγονο έντερο", "Δημιουργεί τον πλακούντα", "Εκφυλίζεται αμέσως χωρίς ίχνη"],
                ans: 1,
                exp: "Κατά την αναδίπλωση του εμβρύου την 4η εβδομάδα, το ραχιαίο μέρος του ομφαλικού κυστιδίου ενσωματώνεται στο σώμα του εμβρύου και σχηματίζει το αρχέγονο έντερο (πρόσθιο, μέσο και οπίσθιο)."
            },
            {
                q: "28. Η εξωκοιλωματική μεμβράνη (Heuser) επενδύει εσωτερικά ποια δομή κατά την 8η ημέρα;",
                opt: ["Την αμνιακή κοιλότητα", "Την κυτταροτροφοβλάστη, σχηματίζοντας την εξωκοιλωματική κοιλότητα", "Τον εμβρυϊκό δίσκο", "Τον μητριαίο αδένα"],
                ans: 1,
                exp: "Η μεμβράνη του Heuser προέρχεται από την υποβλάστη και επενδύει την εσωτερική επιφάνεια της κυτταροτροφοβλάστης, σχηματίζοντας το πρωτογενές λεκιθικό κυστίδιο (εξωκοιλωματική κοιλότητα)."
            },
            {
                q: "29. Τα παρασιτικά δίδυμα (Parasitic twins) ανήκουν στην κατηγορία των:",
                opt: ["Διζυγωτικών διδύμων", "Μονοζυγωτικών διδύμων (ατελής διαχωρισμός)", "Ετεροζυγωτικών συνενωμένων", "Μονοχοριακών/Διαμνιακών"],
                ans: 1,
                exp: "Είναι μια ακραία, ασύμμετρη μορφή συνενωμένων μονοζυγωτικών διδύμων (ατελής διαχωρισμός ημέρες 13-15), όπου το ένα έμβρυο αναπτύσσεται ατελώς και εξαρτάται αιμοδυναμικά (ως 'παράσιτο') από το άλλο."
            },
            {
                q: "30. Ποιο από τα παρακάτω συστήματα βασίζεται στο αμνιακό υγρό για τη φυσιολογική του ανάπτυξη in utero, χρησιμοποιώντας το υγρό ως 'πρότυπο' (template) διάτασης;",
                opt: ["Κεντρικό Νευρικό Σύστημα", "Αναπνευστικό σύστημα (Πνεύμονες)", "Καρδιαγγειακό σύστημα", "Οπτικό σύστημα"],
                ans: 1,
                exp: "Το αναπνευστικό σύστημα. Το έμβρυο κάνει 'αναπνευστικές' κινήσεις εισπνέοντας αμνιακό υγρό. Το υγρό διατείνει τους αναπτυσσόμενους πνεύμονες (κυψελίδες), προσφέροντας την απαραίτητη μηχανική πίεση για την ωρίμανσή τους."
            }
        ];

        const root = document.getElementById('quiz-root');
        let score = 0;

        quizData.forEach((item, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-container';
            
            const qTitle = document.createElement('h3');
            qTitle.innerText = item.q;
            qDiv.appendChild(qTitle);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';
            feedbackDiv.innerHTML = `<strong>Ανατροφοδότηση Moore:</strong> <br>${item.exp}`;

            const buttons = [];
            item.opt.forEach((optText, optIndex) => {
                const btn = document.createElement('button');
                btn.innerText = `${String.fromCharCode(65 + optIndex)}. ${optText}`;
                btn.onclick = () => {
                    // Disable all buttons in this question
                    buttons.forEach(b => b.disabled = true);
                    feedbackDiv.style.display = 'block';

                    if (optIndex === item.ans) {
                        btn.classList.add('correct');
                        score++;
                        document.getElementById('score').innerText = score;
                    } else {
                        btn.classList.add('incorrect');
                        // Highlight the correct one
                        buttons[item.ans].classList.add('correct');
                    }
                };
                buttons.push(btn);
                optionsDiv.appendChild(btn);
            });

            qDiv.appendChild(optionsDiv);
            qDiv.appendChild(feedbackDiv);
            root.appendChild(qDiv);
        });
    </script>
</body>
</html>
