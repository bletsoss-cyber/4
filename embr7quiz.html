<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ακαδημαϊκή Εμβρυολογία - Quiz</title>
    <style>
        :root {
            --text-color: #2c3e50;
            --bg-color: #f9fbfd;
            --primary-accent: #2980b9;
            --button-bg: #ecf0f1;
            --button-hover: #d5dbdb;
            --correct-bg: #d4edda;
            --correct-border: #28a745;
            --wrong-bg: #f8d7da;
            --wrong-border: #dc3545;
            --font-main: 'Georgia', serif;
            --font-headings: 'Roboto', sans-serif;
        }

        body {
            font-family: var(--font-main);
            color: var(--text-color);
            background-color: var(--bg-color);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            background: #ffffff;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            font-family: var(--font-headings);
            text-align: center;
            color: var(--primary-accent);
            border-bottom: 2px solid var(--primary-accent);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .progress {
            text-align: right;
            font-family: var(--font-headings);
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background-color: var(--button-bg);
            border: 2px solid transparent;
            padding: 15px 20px;
            border-radius: 6px;
            font-family: var(--font-main);
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--button-hover);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-btn.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct-border);
            color: #155724;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: #721c24;
        }

        .feedback-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            animation: fadeIn 0.5s ease;
        }

        .feedback-box.show {
            display: block;
        }

        .feedback-correct {
            background-color: #e8f5e9;
            border-left: 5px solid var(--correct-border);
        }

        .feedback-wrong {
            background-color: #ffebee;
            border-left: 5px solid var(--wrong-border);
        }

        .next-btn {
            display: none;
            margin-top: 25px;
            background-color: var(--primary-accent);
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            font-family: var(--font-headings);
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        .next-btn:hover {
            background-color: #1f6391;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Εξονυχιστική Αξιολόγηση Εμβρυολογίας</h1>
    <div class="progress" id="progress-text">Ερώτηση 1 / 65</div>
    
    <div id="quiz-content">
        <div class="question-text" id="question-text">Loading...</div>
        <div class="options" id="options-container"></div>
        <div class="feedback-box" id="feedback-box"></div>
        <div class="clearfix">
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">Επόμενη Ερώτηση &raquo;</button>
        </div>
    </div>
</div>

<script>
    // JSON Data for 65 High-Level Academic Questions based STRICTLY on the source text
    const quizData = [
        { q: "Ποια ημέρα της εμβρυϊκής ανάπτυξης ξεκινά ο σχηματισμός του άμνιου;[cite: 1]", o: ["Την 4η ημέρα", "Την 8η ημέρα", "Την 13η ημέρα", "Την 21η ημέρα"], a: 1, f: "Ο σχηματισμός του άμνιου ξεκινά την 8η ημέρα, με την εμφάνιση αμνιακής κοιλότητας και τη διαφοροποίηση των αμνιοβλαστών." },
        { q: "Ποια είναι η κυτταρική προέλευση των αμνιοβλαστών;[cite: 1]", o: ["Η υποβλάστη", "Η συγκυτιοτροφοβλάστη", "Η επιβλάστη", "Το εξωεμβρυϊκό μεσόδερμα"], a: 2, f: "Το άμνιο (αμνιοβλάστες) αναπτύσσεται από τα κύτταρα της επιβλάστης, καθώς συσσωρεύεται υγρό μεταξύ τους." },
        { q: "Κατά την 21η ημέρα, πού εντοπίζεται η αμνιακή κοιλότητα σε σχέση με τον εμβρυϊκό δίσκο;[cite: 1]", o: ["Κοιλιακά", "Περιφερικά της τροφοβλάστης", "Μέσα στον συνδετικό μίσχο", "Ραχιαία (από την πλευρά της επιβλάστης)"], a: 3, f: "Βάσει του διαγράμματος της 21ης ημέρας, η αμνιακή κοιλότητα βρίσκεται ραχιαία του εμβρυϊκού δίσκου, ενώ ο λεκιθικός ασκός κοιλιακά." },
        { q: "Ποια δομή εξαλείφεται πλήρως καθώς η αμνιακή κοιλότητα διογκώνεται;[cite: 1]", o: ["Ο λεκιθικός ασκός", "Η εξωκοιλωματική (χοριακή) κοιλότητα", "Ο συνδετικός μίσχος", "Ο τροφοβλαστικός δακτύλιος"], a: 1, f: "Η δραματική διόγκωση της αμνιακής κοιλότητας καταργεί την εξωκοιλωματική (χοριακή) κοιλότητα, αναγκάζοντας το άμνιο να συγχωνευθεί με το χόριο." },
        { q: "Τι ονομάζουμε 'αμνιοχοριακή μεμβράνη';[cite: 1]", o: ["Την ένωση της υποβλάστης με την τροφοβλάστη", "Τη μεμβράνη του λεκιθικού ασκού", "Τη συγχώνευση του άμνιου με το λείο χόριο", "Τον υμένα που περιβάλλει τον ομφάλιο λώρο"], a: 2, f: "Σχηματίζεται από τη συγχώνευση του διευρυνόμενου αμνιακού σάκου με τον χοριακό σάκο (λείο χόριο)." },
        { q: "Ποια είναι η κύρια πηγή παραγωγής αμνιακού υγρού ΜΕΤΑ την 11η εβδομάδα;[cite: 1]", o: ["Οι αμνιοβλάστες", "Τα ούρα του εμβρύου", "Το χοριακό πέταλο", "Το εμβρυϊκό δέρμα"], a: 1, f: "Αν και αρχικά εκκρίνεται από τους αμνιοβλάστες, μετά την 11η εβδομάδα τα ούρα του εμβρύου αποτελούν τη βασική πηγή." },
        { q: "Από ποιες οδούς μεταφέρεται ελεύθερα το αμνιακό υγρό ΠΡΙΝ την κερατινοποίηση;[cite: 1]", o: ["Μέσω του ομφάλιου λώρου αποκλειστικά", "Μέσω του εμβρυϊκού δέρματος", "Από τον πλακούντα προς τη γέλη του Wharton", "Μέσω της αλλαντοΐδας"], a: 1, f: "Πριν την κερατινοποίηση, το υγρό μεταφέρεται ελεύθερα διαμέσου του μη κερατινοποιημένου εμβρυϊκού δέρματος." },
        { q: "Ποιος είναι ο φυσιολογικός όγκος του αμνιακού υγρού στις 10 εβδομάδες κύησης;[cite: 1]", o: ["30 ml", "100 ml", "350 ml", "800 ml"], a: 0, f: "Ο όγκος είναι 30ml στις 10 εβδομάδες, 350ml στις 20 εβδομάδες και 800-1000ml στις 37 εβδομάδες." },
        { q: "Ποιος είναι ο φυσιολογικός όγκος του αμνιακού υγρού στις 20 εβδομάδες κύησης;[cite: 1]", o: ["30 ml", "150 ml", "350 ml", "1000 ml"], a: 2, f: "Στις 20 εβδομάδες ο όγκος ανέρχεται περίπου στα 350 ml." },
        { q: "Ποιος είναι ο μέγιστος φυσιολογικός όγκος αμνιακού υγρού στις 37 εβδομάδες;[cite: 1]", o: ["400-500 ml", "800-1000 ml", "1500-2000 ml", "Πάνω από 2500 ml"], a: 1, f: "Ο φυσιολογικός όγκος είναι 800-1000 ml. Τιμές 1500-2000 ml υποδεικνύουν πολυυδράμνιο." },
        { q: "Κάθε πότε ανανεώνεται πλήρως το αμνιακό υγρό;[cite: 1]", o: ["Κάθε 1 ώρα", "Κάθε 3 ώρες", "Κάθε 12 ώρες", "Κάθε 24 ώρες"], a: 1, f: "Το αμνιακό υγρό είναι ένα δυναμικό περιβάλλον που ανανεώνεται πλήρως κάθε 3 ώρες." },
        { q: "Ποιο είναι το ποσοστό των ανόργανων αλάτων στο αμνιακό υγρό;[cite: 1]", o: ["10%", "25%", "50%", "75%"], a: 2, f: "Η σύσταση περιλαμβάνει 50% ανόργανα άλατα, 25% αμινοξέα και 25% υδατάνθρακες/λιπίδια/ένζυμα/ορμόνες." },
        { q: "Ποιο είναι το ποσοστό των αμινοξέων στο αμνιακό υγρό;[cite: 1]", o: ["10%", "25%", "50%", "90%"], a: 1, f: "Τα αμινοξέα αποτελούν το 25% της σύστασης του αμνιακού υγρού." },
        { q: "Ποια κύτταρα εντός του αμνιακού υγρού χρησιμοποιούνται για την αμνιοπαρακέντηση (προγεννητικό έλεγχο);[cite: 1]", o: ["Ερυθροκύτταρα του πλακούντα", "Εμβρυϊκά επιθηλιακά κύτταρα", "Κύτταρα της τροφοβλάστης", "Ανοσοκύτταρα της μητέρας"], a: 1, f: "Τα απολεπισμένα εμβρυϊκά επιθηλιακά κύτταρα που αιωρούνται στο υγρό χρησιμοποιούνται για τον γενετικό έλεγχο." },
        { q: "Ποια εβδομάδα κορυφώνεται η Α-Εμβρυοπρωτεΐνη (AFP) στο αμνιακό υγρό;[cite: 1]", o: ["Την 8η εβδομάδα", "Την 10η εβδομάδα", "Την 14η εβδομάδα", "Την 20η εβδομάδα"], a: 2, f: "Η AFP στο αμνιακό υγρό κάνει 'peak' γύρω στην 14η εβδομάδα (Peak around 14th week)." },
        { q: "Μεταξύ ποιων εβδομάδων κορυφώνεται η AFP στη μητρική κυκλοφορία;[cite: 1]", o: ["5 - 8 εβδομάδες", "10 - 12 εβδομάδες", "13 - 16 εβδομάδες", "20 - 24 εβδομάδες"], a: 2, f: "Στη μητρική κυκλοφορία (maternal circulation) η κορύφωση (peak) παρατηρείται μεταξύ 13 και 16 εβδομάδων." },
        { q: "Τι κλινική υποψία εγείρουν τα αυξημένα επίπεδα AFP στο αμνιακό υγρό;[cite: 1]", o: ["Σύνδρομο Down", "Ανωμαλίες του νευρικού σωλήνα", "Νεφρική αγενεσία", "Ατρησία οισοφάγου"], a: 1, f: "Η αυξημένη AFP σχετίζεται κυρίως με ανοιχτές ανωμαλίες του νευρικού σωλήνα (Neural tube defect)." },
        { q: "Ποια από τις παρακάτω ΔΕΝ αποτελεί λειτουργία του αμνιακού υγρού;[cite: 1]", o: ["Θερμορύθμιση", "Αντιμικροβιακός φραγμός", "Οξυγόνωση του εμβρυϊκού αίματος", "Προστασία από κραδασμούς"], a: 2, f: "Η οξυγόνωση του αίματος γίνεται μέσω του πλακούντα και της ομφαλικής φλέβας, όχι από το αμνιακό υγρό." },
        { q: "Πώς συμβάλλει το αμνιακό υγρό στην ανάπτυξη των πνευμόνων;[cite: 1]", o: ["Μέσω παραγωγής επιφανειοδραστικού παράγοντα", "Παρέχοντας οξυγόνο στις κυψελίδες", "Μέσω μηχανικής διάτασης (εισρόφηση υγρού)", "Μέσω καταστολής της φλεγμονής"], a: 2, f: "Το έμβρυο 'εισπνέει' το υγρό (lung fluid), γεγονός που προκαλεί τη μηχανική διάταση και ομαλή ανάπτυξη του αναπνευστικού δέντρου." },
        { q: "Ο όγκος του πολυυδράμνιου ορίζεται ως:[cite: 1]", o: ["Άνω των 500 mL", "800 έως 1000 mL", "1500 έως 2000 mL", "Άνω των 3000 mL αποκλειστικά"], a: 2, f: "Το πολυυδράμνιο αφορά όγκους που κυμαίνονται από 1.500 έως 2.000 mL." },
        { q: "Ποια παθολογία του Κεντρικού Νευρικού Συστήματος σχετίζεται συχνά με πολυυδράμνιο;[cite: 1]", o: ["Ανεγκεφαλία", "Δισχιδής ράχη", "Μηνιγγομυελοκήλη", "Μικροκεφαλία"], a: 0, f: "Η ανεγκεφαλία στερεί από το έμβρυο τα νευρολογικά αντανακλαστικά κατάποσης, οδηγώντας σε συσσώρευση του υγρού." },
        { q: "Ποια γαστρεντερική ανωμαλία είναι κλασικό αίτιο πολυυδράμνιου;[cite: 1]", o: ["Ατρησία οισοφάγου", "Γαστρόσχιση", "Ομφαλοκήλη", "Μεγάκολο"], a: 0, f: "Η ατρησία οισοφάγου δημιουργεί ανατομικό κώλυμα, εμποδίζοντας την κατάποση του υγρού και την απορρόφησή του από το έντερο." },
        { q: "Ο όγκος του ολιγουδράμνιου ορίζεται συνήθως ως:[cite: 1]", o: ["Μικρότερος από 800 mL", "Μικρότερος από 400 mL", "Μικρότερος από 100 mL", "Απόλυτη απουσία υγρού"], a: 1, f: "Ολιγουδράμνιο θεωρείται όταν η ποσότητα του υγρού είναι μικρότερη από 400 mL (<400 mL)." },
        { q: "Ποιο είναι το κύριο ανατομικό αίτιο του ολιγουδράμνιου;[cite: 1]", o: ["Ατρησία οισοφάγου", "Νεφρική αγενεσία", "Ανεγκεφαλία", "Ηπατική ανεπάρκεια"], a: 1, f: "Καθώς τα ούρα είναι η κύρια πηγή υγρού, η απουσία νεφρών (νεφρική αγενεσία) οδηγεί σε δραματική μείωση του αμνιακού υγρού." },
        { q: "Ποια είναι η πιο σοβαρή αναπτυξιακή συνέπεια του παρατεταμένου ολιγουδράμνιου;[cite: 1]", o: ["Υπερτροφία της καρδιάς", "Υποπλασία πνευμόνων", "Κώφωση", "Διαβήτης του εμβρύου"], a: 1, f: "Η απουσία αμνιακού υγρού αποτρέπει τη μηχανική διάταση των πνευμόνων, οδηγώντας σε πνευμονική υποπλασία (συχνά θανατηφόρα)." },
        { q: "Σε ποιο ποσοστό κυήσεων παρατηρείται Πρόωρη Ρήξη των Εμβρυϊκών Μεμβρανών (PROM);[cite: 1]", o: ["1%", "5%", "10%", "25%"], a: 2, f: "Η πρόωρη ρήξη των εμβρυϊκών μεμβρανών αφορά περίπου το 10% των κυήσεων." },
        { q: "Ποιος είναι ο μηχανισμός βλάβης στο Σύνδρομο Αμνιακής Ταινίας;[cite: 1]", o: ["Ομφάλιος λώρος που τυλίγεται στον λαιμό", "Ινώδεις ταινίες του σάκου που περιεσφίγγουν εμβρυϊκά μέρη", "Συμφύσεις της μήτρας με τον πλακούντα", "Θρόμβωση της ομφαλικής φλέβας"], a: 1, f: "Ινώδεις ταινίες του αμνιακού σάκου τυλίγονται γύρω από μέρη του εμβρύου, προκαλώντας δακτυλίους περίσφιξης και ακρωτηριασμούς." },
        { q: "Την ποια εβδομάδα διαμορφώνεται ο πρωτογενής ομφαλικός δακτύλιος;[cite: 1]", o: ["3η εβδομάδα", "5η εβδομάδα", "8η εβδομάδα", "12η εβδομάδα"], a: 1, f: "Ο πρωτογενής ομφαλικός δακτύλιος διαμορφώνεται την 5η εβδομάδα της κύησης." },
        { q: "Ποια δομή ΔΕΝ περιλαμβάνεται στον συνδετικό μίσχο κατά τον σχηματισμό του δακτυλίου;[cite: 1]", o: ["Ομφαλικά αγγεία", "Αλλαντοΐδα", "Λεκιθικός πόρος", "Εξωεμβρυϊκό μεσόδερμα"], a: 2, f: "Ο λεκιθικός πόρος (με τα αγγεία του) αποτελεί μέρος του ομφαλικού κυστιδίου, όχι του συνδετικού μίσχου καθεαυτού." },
        { q: "Μεταξύ ποιων εβδομάδων το ομφαλικό κυστίδιο (λεκιθικός ασκός) μεταφέρει θρεπτικά συστατικά στο έμβρυο;[cite: 1]", o: ["1η - 2η εβδομάδα", "2η - 3η εβδομάδα", "4η - 8η εβδομάδα", "Σε όλη την κύηση"], a: 1, f: "Η μεταφορά θρεπτικών συστατικών από το ομφαλικό κυστίδιο πραγματοποιείται κυρίως την 2η έως 3η εβδομάδα." },
        { q: "Την ποια εβδομάδα εμφανίζονται τα αρχέγονα γεννητικά κύτταρα στο ομφαλικό κυστίδιο;[cite: 1]", o: ["2η εβδομάδα", "3η εβδομάδα", "5η εβδομάδα", "7η εβδομάδα"], a: 1, f: "Η εμφάνιση των αρχέγονων γεννητικών κυττάρων στο τοίχωμα του λεκιθικού ασκού λαμβάνει χώρα την 3η εβδομάδα." },
        { q: "Από πού προέρχονται αρχικά τα κύτταρα του αίματος του εμβρύου;[cite: 1]", o: ["Από το εμβρυϊκό ήπαρ", "Από τον εμβρυϊκό μυελό των οστών", "Από το εξωεμβρυϊκό μεσόδερμα του τοιχώματος του ομφαλικού κυστιδίου", "Από τη συγκυτιοτροφοβλάστη"], a: 2, f: "Η αιμοποίηση ξεκινά πρώιμα στο εξωεμβρυϊκό μεσόδερμα του τοιχώματος του ομφαλικού κυστιδίου." },
        { q: "Την ποια εβδομάδα το ομφαλικό κυστίδιο ενσωματώνεται στο έμβρυο ως αρχέγονο έντερο;[cite: 1]", o: ["3η εβδομάδα", "4η εβδομάδα", "6η εβδομάδα", "8η εβδομάδα"], a: 1, f: "Η ενσωμάτωση ως αρχέγονο έντερο συντελείται την 4η εβδομάδα με την αναδίπλωση του εμβρύου." },
        { q: "Ποιο είναι το φυσιολογικό μήκος του ώριμου ομφάλιου λώρου;[cite: 1]", o: ["30-50 cm", "70-90 cm", "100-120 cm", "150 cm"], a: 1, f: "Ο ομφάλιος λώρος έχει φυσιολογικό μήκος 70-90 cm." },
        { q: "Ποια είναι η φυσιολογική αγγειακή σύσταση του ομφάλιου λώρου;[cite: 1]", o: ["2 φλέβες και 1 αρτηρία", "1 φλέβα και 1 αρτηρία", "1 φλέβα και 2 αρτηρίες", "2 φλέβες και 2 αρτηρίες"], a: 2, f: "Ο λώρος περιέχει δύο (2) αρτηρίες (μεταφέρουν αποξυγονωμένο αίμα) και μία (1) φλέβα (μεταφέρει οξυγονωμένο αίμα)." },
        { q: "Πώς ονομάζεται η ουσία που προστατεύει τα ομφαλικά αγγεία από συμπίεση;[cite: 1]", o: ["Γέλη του Wharton", "Αμνιακή βλέννα", "Λεκιθική ουσία", "Ομφαλική μήτρα"], a: 0, f: "Η γέλη του Wharton (Wharton's jelly) είναι ένας βλεννώδης συνδετικός ιστός που προστατεύει τα αγγεία." },

        { q: "Ποια είναι η αναλογία φύλου στα Σιαμαία δίδυμα;[cite: 1]", o: ["Αρσενικά/Θηλυκά 1:1", "Αρσενικά/Θηλυκά 3:1", "Θηλυκά/Αρσενικά 3:1", "Μόνο Θηλυκά"], a: 2, f: "Παρατηρείται εντυπωσιακή υπεροχή στα θηλυκά με αναλογία Θηλυκά/Αρσενικά 3:1." },
        { q: "Πώς ονομάζονται τα σιαμαία δίδυμα που είναι ενωμένα στην κοιλιά/ομφαλό;[cite: 1]", o: ["Θωρακοπαγείς", "Κρανιοπαγείς", "Ισχιοπαγείς", "Ομφαλοπαγείς"], a: 3, f: "Ομφαλοπαγείς (Omphalopagus) είναι η ιατρική ορολογία για την ένωση στο επίπεδο του ομφαλού/κοιλιακού τοιχώματος." },
        { q: "Πώς ονομάζονται τα σιαμαία δίδυμα που είναι ενωμένα στον θώρακα;[cite: 1]", o: ["Θωρακοπαγείς", "Κρανιοπαγείς", "Ισχιοπαγείς", "Ομφαλοπαγείς"], a: 0, f: "Θωρακοπαγείς (Thoracopagus) ονομάζονται όταν η ανατομική γέφυρα εντοπίζεται στον θώρακα." },
        { q: "Τι ονομάζουμε 'Παρασιτικά δίδυμα' (Parasitic twins);[cite: 1]", o: ["Έμβρυα που απορροφώνται πλήρως από τη μητέρα", "Μια ακραία ασύμμετρη μορφή συνενωμένων διδύμων", "Δίδυμα με ξεχωριστούς πλακούντες που ανταγωνίζονται για αίμα", "Διζυγωτικά δίδυμα με διαφορές βάρους >50%"], a: 1, f: "Τα παρασιτικά δίδυμα είναι μια μορφή σιαμαίων όπου το ένα έμβρυο σταματά την ανάπτυξή του και παραμένει ανατομικά προσκολλημένο (ως 'παράσιτο') στο υγιές (host)." },
        { q: "Αν μια τρίδυμη κύηση προέρχεται από δύο (2) ζυγώτες, ποια είναι η γενετική της σύνθεση;[cite: 1]", o: ["3 ταυτόσημα έμβρυα", "2 όμοια (μονοζυγωτικά) και 1 ανόμοιο", "3 εντελώς διαφορετικά έμβρυα", "Όλα σιαμαία"], a: 1, f: "Όταν υπάρχουν δύο ζυγώτες, ο ένας διαχωρίζεται σε μονοζυγωτικά δίδυμα (2 όμοια) και ο άλλος αναπτύσσεται μόνος του (1 ανόμοιο)." },
        { q: "Πόσα χόρια υπάρχουν σε μια μονοζυγωτική κύηση που διαχωρίστηκε την 5η ημέρα;[cite: 1]", o: ["Κανένα", "Ένα (Μονοχοριακή)", "Δύο (Διχοριακή)", "Τρία"], a: 1, f: "Ο διαχωρισμός τις ημέρες 4-8 (βλαστοκύστη) δίνει πάντα 1 χόριο (Κοινός πλακούντας) και 2 άμνια." },
        { q: "Ποια είναι η λειτουργική διαφορά στον πλακούντα μεταξύ Δι-Δι (ημέρες 1-3) και Μονο-Δι (ημέρες 4-8);[cite: 1]", o: ["Στη Μονο-Δι υπάρχει 1 κοινός πλακούντας, ενώ στη Δι-Δι υπάρχουν 2 πλακούντες", "Στη Δι-Δι υπάρχει κοινός πλακούντας", "Δεν υπάρχει διαφορά, και οι δύο έχουν 2 πλακούντες", "Στη Μονο-Δι δεν υπάρχει πλακούντας"], a: 0, f: "Τα Δι-Δι έχουν δύο ανεξάρτητους πλακούντες (διχοριακά), ενώ τα Μονο-Δι μοιράζονται τον ίδιο (μονοχοριακά)." },
        { q: "Κατά την εμβρυογένεση, πότε ο όγκος του αμνιακού υγρού φτάνει τα 350ml;[cite: 1]", o: ["Στις 10 εβδομάδες", "Στις 20 εβδομάδες", "Στις 30 εβδομάδες", "Στις 37 εβδομάδες"], a: 1, f: "Τα 350ml αποτελούν τον τυπικό όγκο για το μέσο της κύησης (20 εβδομάδες)." },
        { q: "Η παρουσία ενζύμων και ορμονών στο αμνιακό υγρό σε ποιο ποσοστιαίο κλάσμα της σύστασης ανήκει;[cite: 1]", o: ["Στο 50% των αλάτων", "Στο 25% των αμινοξέων", "Στο 25% (μαζί με υδατάνθρακες και λιπίδια)", "Αποτελούν ίχνη <1%"], a: 2, f: "Ανήκουν στο 25% που περιλαμβάνει υδατάνθρακες, λιπίδια, ένζυμα και ορμόνες." },
        { q: "Ποια εμβρυϊκή κίνηση είναι θεμελιώδης για την αποτροπή του πολυυδράμνιου;[cite: 1]", o: ["Η κάμψη των άκρων", "Η εισρόφηση (εισπνοή)", "Η κατάποση (swallowing)", "Η ούρηση"], a: 2, f: "Η κατάποση είναι ο κύριος μηχανισμός απορρόφησης (απομάκρυνσης) του υγρού. Η αδυναμία της προκαλεί συσσώρευση." },
        { q: "Γιατί η Πρόωρη Ρήξη των Εμβρυϊκών Μεμβρανών (PROM) θεωρείται επικίνδυνη;[cite: 1]", o: ["Μειώνει την AFP", "Αυξάνει τις ομφαλικές αρτηρίες", "Καταστρέφει τον αντιμικροβιακό φραγμό, επιτρέποντας μολύνσεις", "Προκαλεί σιαμαία δίδυμα"], a: 2, f: "Το άμνιο είναι φυσικός φραγμός. Η ρήξη του επιτρέπει την άνοδο μικροβίων (χοριοαμνιονίτιδα)." },
        { q: "Στον σχηματισμό του ομφάλιου λώρου, η αλλαντοΐδα περιέχεται μέσα:[cite: 1]", o: ["Στον λεκιθικό πόρο", "Στον συνδετικό μίσχο", "Στην εξωκοιλωματική κοιλότητα", "Στο άμνιο"], a: 1, f: "Ο συνδετικός μίσχος περιέχει την αλλαντοΐδα και τα ομφαλικά αγγεία." },
        { q: "Τι σημαίνει η ένδειξη 'Μονοχοριακή / Μονοαμνιακή' ανατομικά για το κλινικό ρίσκο;[cite: 1]", o: ["Μηδενικό ρίσκο, είναι η ασφαλέστερη κύηση", "Υψηλό ρίσκο για περιέλιξη των δύο λώρων μεταξύ τους", "Εγγυημένος σχηματισμός σιαμαίων", "Κίνδυνος ανωμαλιών νευρικού σωλήνα"], a: 1, f: "Επειδή και τα δύο έμβρυα κολυμπούν στον ΙΔΙΟ σάκο (μονοαμνιακή), οι ομφάλιοι λώροι τους μπορούν εύκολα να μπερδευτούν και να δημιουργήσουν θανατηφόρους κόμβους." },
        { q: "Γιατί τα έμβρυα με αμφοτερόπλευρη νεφρική αγενεσία συχνά δεν επιβιώνουν μετά τη γέννηση;[cite: 1]", o: ["Λόγω τοξικότητας της ουρίας στο αίμα", "Λόγω υποπλασίας των πνευμόνων (ελλείψει αμνιακού υγρού)", "Λόγω απουσίας ομφαλικής αρτηρίας", "Λόγω πολυυδράμνιου"], a: 1, f: "Η αγενεσία προκαλεί ολιγουδράμνιο. Χωρίς υγρό δεν διατείνονται οι πνεύμονες (υποπλασία) και το νεογνό αδυνατεί να αναπνεύσει." },
        { q: "Στις πολύδυμες κυήσεις, πώς εξηγείται η μακροσκοπική συνένωση πλακούντων στους Διζυγωτικούς;[cite: 1]", o: ["Κοινό DNA", "Λάθος της μειωτικής διαίρεσης", "Εμφύτευση των βλαστοκύστεων σε πολύ κοντινή απόσταση", "Πρώιμος διαχωρισμός"], a: 2, f: "Αν και είναι εντελώς διαφορετικά έμβρυα, αν εμφυτευθούν δίπλα-δίπλα, τα χόρια και οι πλακούντες τους αναπτύσσονται και συμπλέκονται ανατομικά, χωρίς απαραίτητα να ενώνουν την κυκλοφορία τους." },
        { q: "Η παρουσία ομφαλικής φλέβας στο έμβρυο αναλαμβάνει τον λειτουργικό ρόλο που στον ενήλικα έχει:[cite: 1]", o: ["Η πνευμονική φλέβα (μεταφορά οξυγονωμένου αίματος στην καρδιά)", "Η πνευμονική αρτηρία (μεταφορά αποξυγονωμένου αίματος)", "Η αορτή", "Η κάτω κοίλη φλέβα"], a: 0, f: "Στην εμβρυϊκή κυκλοφορία (όπως και στην πνευμονική του ενήλικα), η φλέβα (από τον πλακούντα) φέρει το οξυγονωμένο αίμα." },
        { q: "Πότε ενσωματώνεται πλήρως ο λεκιθικός ασκός στο αρχέγονο έντερο;[cite: 1]", o: ["Την 2η εβδομάδα", "Την 3η εβδομάδα", "Την 4η εβδομάδα", "Την 8η εβδομάδα"], a: 2, f: "Η ενσωμάτωση συντελείται την 4η εβδομάδα κατά τη διάρκεια της αναδίπλωσης (folding) του εμβρύου." }
    ];

    let currentQuestionIndex = 0;
    let selectedOption = -1;

    const questionText = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options-container");
    const feedbackBox = document.getElementById("feedback-box");
    const nextBtn = document.getElementById("next-btn");
    const progressText = document.getElementById("progress-text");

    function loadQuestion() {
        const qData = quizData[currentQuestionIndex];
        questionText.innerHTML = `${currentQuestionIndex + 1}. ${qData.q}`;
        progressText.innerHTML = `Ερώτηση ${currentQuestionIndex + 1} / ${quizData.length}`;
        
        optionsContainer.innerHTML = "";
        feedbackBox.className = "feedback-box";
        feedbackBox.innerHTML = "";
        nextBtn.style.display = "none";
        selectedOption = -1;

        qData.o.forEach((optText, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = String.fromCharCode(65 + index) + ". " + optText; // A, B, C, D
            btn.onclick = () => selectOption(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(index, btn) {
        if (selectedOption !== -1) return; // Prevent multiple clicks
        selectedOption = index;
        
        const qData = quizData[currentQuestionIndex];
        const isCorrect = (index === qData.a);
        
        // Disable all buttons
        const allBtns = optionsContainer.querySelectorAll(".option-btn");
        allBtns.forEach((b, i) => {
            b.disabled = true;
            if (i === qData.a) {
                b.classList.add("correct"); // Always highlight the correct one
            } else if (i === index && !isCorrect) {
                b.classList.add("wrong"); // Highlight the wrongly selected one
            }
        });

        // Show feedback
        feedbackBox.innerHTML = `<strong>${isCorrect ? '✓ Σωστά!' : '✗ Λάθος.'}</strong><br>${qData.f}`;
        feedbackBox.classList.add("show");
        feedbackBox.classList.add(isCorrect ? "feedback-correct" : "feedback-wrong");

        // Show next button
        nextBtn.style.display = "block";
        if (currentQuestionIndex === quizData.length - 1) {
            nextBtn.innerHTML = "Τέλος Αξιολόγησης";
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            // End of quiz
            document.getElementById("quiz-content").innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h2 style="color: var(--primary-accent); font-family: var(--font-headings);">Η Αξιολόγηση Ολοκληρώθηκε!</h2>
                    <p>Συγχαρητήρια για την ολοκλήρωση αυτού του εξονυχιστικού ακαδημαϊκού quiz εμβρυολογίας.</p>
                    <button class="next-btn" style="display:inline-block; float:none; margin-top:20px;" onclick="location.reload()">Επανεκκίνηση</button>
                </div>
            `;
            progressText.innerHTML = "Ολοκληρώθηκε";
        }
    }

    // Init
    loadQuestion();
</script>
