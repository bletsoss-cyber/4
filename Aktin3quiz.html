<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κουίζ: Ακτινογραφικό Μηχάνημα</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --success: #10b981;
            --success-light: #d1fae5;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .question-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background-color: #f9fafb;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: var(--success-light);
            border-color: var(--success);
            color: #065f46;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: var(--danger-light);
            border-color: var(--danger);
            color: #991b1b;
        }

        .feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.95rem;
            border-left: 4px solid var(--primary);
            background-color: #f8fafc;
        }

        .feedback-box strong {
            display: block;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        #score-container {
            text-align: center;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            margin-top: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #score-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Ακτινογραφικό Μηχάνημα - Κλινική Εξέταση</h1>
        <p>25 Ερωτήσεις Πολλαπλής Επιλογής (Υψηλού Επιπέδου)</p>
    </div>

    <div id="quiz-body">
        </div>

    <div id="score-container" style="display: none;">
        <h2>Αποτέλεσμα</h2>
        <p id="score-text"></p>
        <p>Κάνε ανανέωση (Refresh) τη σελίδα για να προσπαθήσεις ξανά.</p>
    </div>
</div>

<script>
    const quizData = [

                "Οι οδοντιατρικές χρησιμοποιούν στατική άνοδο, ενώ οι ιατρικές περιστρεφόμενη, για να αντέχουν σε πολύ υψηλότερες θερμοκρασίες.",

            ],

        },
        {

                "Τον χρωματισμό της δέσμης για καλύτερη αντίληψη από το γυμνό μάτι.",

            ],

        },
        {

        {
            question: "19. Αν ένα μηχάνημα λειτουργεί στα 15 mA και η έκθεση διαρκεί 0.1 δευτερόλεπτα, πόσο είναι το mAs;",

                "1.5 mAs",
                "15 mAs",
                "150 mAs"
            ],
            correct: 1,
            explanation: "Ο υπολογισμός είναι απλός πολλαπλασιασμός: 15 mA * 0.1 sec = 1.5 mAs. (Το κείμενο δίνει ακριβώς αυτό το παράδειγμα)."
        },
        {
            question: "20. Ποιο είναι το πλεονέκτημα του ορθογώνιου κατευθυντήρα σε σύγκριση με τον στρογγυλό;",
            options: [
                "Παράγει ακτίνες-Χ με μεγαλύτερη διεισδυτικότητα.",
                "Προσφέρει αυξημένη ακτινοπροστασία, περιορίζοντας το μέγεθος της δέσμης στα όρια του ακτινογραφικού πλακιδίου.",
                "Απαιτεί μικρότερο χρόνο έκθεσης για την ίδια περιοχή.",
                "Μειώνει τη θερμοκρασία που αναπτύσσεται στην άνοδο."
            ],
            correct: 1,
            explanation: "Το ορθογώνιο κολιματέρ (διάφραγμα) μορφοποιεί τη δέσμη ώστε να ταιριάζει ακριβώς με το σχήμα και το μέγεθος του ενδοστοματικού φιλμ/αισθητήρα. Έτσι μειώνεται δραστικά ο περιφερειακός ιστός του ασθενούς που λαμβάνει άσκοπη ακτινοβολία σε σχέση με έναν ευρύτερο στρογγυλό κώνο."
        },
        {
            question: "21. Ποια είναι η ιδανική απόσταση από την εστιακή κηλίδα στο δέρμα του ασθενούς για μηχανήματα που λειτουργούν κάτω από 60 kVp;",
            options: [
                "Περίπου 5 cm",
                "Περίπου 10 cm",
                "Περίπου 20 cm",
                "Περίπου 40 cm"
            ],
            correct: 1,
            explanation: "Όπως αναφέρει ρητά η σελίδα με τα διαφράγματα και τους κώνους, η ιδανική απόσταση είναι 10 cm για μηχανήματα που λειτουργούν με τάση χαμηλότερη των 60 kVp (ενώ είναι 20 cm για μηχανήματα > 60kVp)."
        },
        {
            question: "22. Τι καθορίζει η διαφορά δυναμικού (kV) μέσα στη λυχνία κατά τη λειτουργία;",
            options: [
                "Την ποσότητα του λαδιού που απαιτείται για ψύξη.",
                "Το μέγεθος του νέφους των ηλεκτρονίων γύρω από το νήμα.",
                "Τη δύναμη έλξης/επιτάχυνσης των ηλεκτρονίων από την αρνητική κάθοδο προς τη θετική άνοδο.",
                "Τον βαθμό αντίστασης του χάλκινου στελέχους."
            ],
            correct: 2,
            explanation: "Η διαφορά δυναμικού (τάση) δημιουργεί το ισχυρό ηλεκτρικό πεδίο. Όσο μεγαλύτερη είναι (υψηλότερο kV), τόσο ισχυρότερη η έλξη και ταχύτερα κινούνται τα αρνητικά φορτισμένα ηλεκτρόνια προς τη θετικά φορτισμένη άνοδο."
        },
        {
            question: "23. Στα σύγχρονα ακτινογραφικά μηχανήματα, αναφέρεται ο όρος 'DC' (Direct Current). Ποιο είναι το αποτέλεσμά του στη δέσμη;",
            options: [
                "Προκαλεί τη διακοπτόμενη παραγωγή ακτινοβολίας.",
                "Παράγει ακτινογραφική εικόνα υψηλής ευκρίνειας, με σταθερό συνεχές ρεύμα (constant) και μειωμένη δόση ασθενούς.",
                "Χρησιμοποιείται μόνο για την προθέρμανση της λυχνίας πριν την έκθεση.",
                "Ακυρώνει την ανάγκη για ενυπάρχουσα διήθηση."
            ],
            correct: 1,
            explanation: "Τα σύγχρονα μηχανήματα εναλλασσόμενου ρεύματος υψηλής συχνότητας λειτουργούν πρακτικά με συνεχές ρεύμα λυχνίας (DC, σταθερό kV). Αυτό εξαλείφει τις διακυμάνσεις χαμηλής τάσης του AC ρεύματος, παρέχοντας μια πιο ομοιογενή δέσμη υψηλής ενέργειας, καλύτερη ευκρίνεια και μικρότερη απορροφούμενη δόση."
        },
        {
            question: "24. Σε περίπτωση που οι ακτίνες-Χ έχουν μεγαλύτερη συχνότητα, ποιο από τα παρακάτω αληθεύει;",
            options: [
                "Έχουν ταυτόχρονα και μεγαλύτερο μήκος κύματος.",
                "Είναι λιγότερο διεισδυτικές.",
                "Προέρχονται από μηχάνημα που δουλεύει σε χαμηλότερο kVp.",
                "Έχουν μικρότερο μήκος κύματος και υψηλότερα επίπεδα ενέργειας, άρα είναι περισσότερο διεισδυτικές."
            ],
            correct: 3,
            explanation: "Στην ηλεκτρομαγνητική ακτινοβολία, η συχνότητα και το μήκος κύματος είναι αντιστρόφως ανάλογα. Μεγαλύτερη συχνότητα σημαίνει μικρότερο μήκος κύματος και συνεπώς φωτόνια μεγαλύτερης ενέργειας (πιο 'σκληρά' και διεισδυτικά)."
        },
        {
            question: "25. Αν αυξήσουμε τον χρόνο έκθεσης, χωρίς να αλλάξουμε τα mA και τα kVp, τι θα συμβεί στην παραγόμενη δέσμη ακτινοβολίας;",
            options: [
                "Η δέσμη θα αποκτήσει μεγαλύτερη διεισδυτικότητα.",
                "Θα αυξηθεί η συνολική ποσότητα των φωτονίων (περισσότερες ακτίνες) που παράγονται.",
                "Τα ηλεκτρόνια θα προσκρούουν με μεγαλύτερη ταχύτητα στο στόχο.",
                "Θα μειωθεί το μέγεθος της εστιακής κηλίδας."
            ],
            correct: 1,
            explanation: "Ο χρόνος έκθεσης ελέγχει αποκλειστικά τη διάρκεια παραγωγής ακτίνων, άρα επηρεάζει μόνο τη ΣΥΝΟΛΙΚΗ ΠΟΣΟΤΗΤΑ (αριθμό φωτονίων). Η ενέργεια/ταχύτητα/διεισδυτικότητα (ελεγχόμενη από το kVp) και η σταθερή ροή ηλεκτρονίων ανά δευτερόλεπτο (ελεγχόμενη από τα mA) μένουν αμετάβλητες."
        }
    ];

    const quizBody = document.getElementById('quiz-body');
    let userScore = 0;
    let questionsAnswered = 0;

    quizData.forEach((item, index) => {
        // Create question container
        const questionDiv = document.createElement('div');
        questionDiv.className = 'question-card';

        // Add question text
        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.textContent = item.question;
        questionDiv.appendChild(qText);

        // Add options container
        const optionsGrid = document.createElement('div');
        optionsGrid.className = 'options-grid';

        // Create feedback box
        const feedbackBox = document.createElement('div');
        feedbackBox.className = 'feedback-box';
        feedbackBox.id = `feedback-${index}`;

        // Create options buttons
        item.options.forEach((optText, optIndex) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = optText;
            
            btn.onclick = () => handleAnswer(btn, optIndex, item.correct, index, optionsGrid, feedbackBox, item.explanation);
            optionsGrid.appendChild(btn);
        });

        questionDiv.appendChild(optionsGrid);
        questionDiv.appendChild(feedbackBox);
        quizBody.appendChild(questionDiv);
    });

    function handleAnswer(clickedBtn, selectedIndex, correctIndex, qIndex, gridContainer, feedbackEl, explanationText) {
        // Disable all buttons in this question to prevent multiple clicks
        const allButtons = gridContainer.querySelectorAll('.option-btn');
        allButtons.forEach(btn => btn.disabled = true);

        // Highlight correct and wrong answers
        if (selectedIndex === correctIndex) {
            clickedBtn.classList.add('correct');
            userScore++;
            feedbackEl.style.borderLeftColor = "var(--success)";
            feedbackEl.innerHTML = `<strong>Σωστή Απάντηση!</strong> ${explanationText}`;
        } else {
            clickedBtn.classList.add('wrong');
            // Highlight the correct one as well
            allButtons[correctIndex].classList.add('correct');
            feedbackEl.style.borderLeftColor = "var(--danger)";
            feedbackEl.innerHTML = `<strong>Λάθος Επιλογή.</strong> ${explanationText}`;
        }

        // Show feedback
        feedbackEl.style.display = 'block';
        questionsAnswered++;

        // Check if quiz is finished
        if (questionsAnswered === quizData.length) {
            showFinalScore();
        }
    }

    function showFinalScore() {
        const scoreContainer = document.getElementById('score-container');
        const scoreText = document.getElementById('score-text');
        
        let percentage = Math.round((userScore / quizData.length) * 100);
        let feedbackStr = "";

        if(percentage >= 80) feedbackStr = "Άριστα! Έχεις κατανοήσει πλήρως τη φυσική της ακτινολογίας.";
        else if(percentage >= 60) feedbackStr = "Πολύ καλά. Υπάρχουν κάποιες μικρές λεπτομέρειες για επανάληψη.";
        else feedbackStr = "Χρειάζεται λίγο διάβασμα ακόμα στους μηχανισμούς (kVp, mA, διαφράγματα).";

        scoreText.innerHTML = `Σκόραρες: ${userScore} / ${quizData.length} (${percentage}%)<br><span style="font-size: 1.1rem; color: var(--text-muted); font-weight: normal; margin-top: 10px; display: block;">${feedbackStr}</span>`;
        scoreContainer.style.display = 'block';

        // Scroll to bottom gently
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</html>
