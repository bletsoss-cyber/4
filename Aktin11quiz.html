<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz: Πανοραμική Ακτινογραφία (Academic Edition)</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --text-color: #333333;
            --expl-bg: #e8f4f8;
            --expl-border: #3498db;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 25px 0;
            margin-bottom: 30px;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 1.8rem; }
        header p { margin: 5px 0 0 0; opacity: 0.9; font-size: 0.95rem; }
        .quiz-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            border-left: 5px solid var(--accent-color);
        }
        .question-number {
            font-weight: bold;
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 18px;
            color: var(--primary-color);
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 14px 18px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            font-size: 1rem;
        }
        .option-item:hover {
            background: #e9ecef;
            border-color: #ced4da;
        }
        .option-item.correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
            font-weight: 600;
        }
        .option-item.correct::after {
            content: " ✓ Σωστό";
            position: absolute;
            right: 15px;
            font-size: 0.9rem;
        }
        .option-item.incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24;
        }
        .option-item.incorrect::after {
            content: " ✗ Λάθος";
            position: absolute;
            right: 15px;
            font-size: 0.9rem;
        }
        .disabled {
            pointer-events: none;
        }
        .explanation-box {
            display: none;
            margin-top: 20px;
            padding: 15px 20px;
            background-color: var(--expl-bg);
            border-left: 4px solid var(--expl-border);
            border-radius: 4px;
            font-size: 0.95rem;
            color: var(--primary-color);
            animation: fadeIn 0.4s ease;
        }
        .explanation-box strong {
            color: var(--expl-border);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #result-panel {
            background: var(--primary-color);
            color: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            margin-top: 30px;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .score-big {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 15px 0;
            color: var(--success-color);
        }
        button.submit-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 16px 35px;
            font-size: 1.15rem;
            border-radius: 6px;
            cursor: pointer;
            display: block;
            width: 100%;
            font-weight: bold;
            margin-top: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        button.submit-btn:hover { background: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Πανοραμική Ακτινογραφία: Κλινική & Γεωμετρία</h1>
        <p>Με άμεση ανατροφοδότηση, ακαδημαϊκή εξήγηση & τυχαία σειρά απαντήσεων</p>
    </header>

    <div id="quiz-wrapper"></div>

    <button class="submit-btn" onclick="calculateScore()">Ολοκλήρωση & Έλεγχος Τελικού Αποτελέσματος</button>

    <div id="result-panel">
        <h2>Αποτελέσματα Εξέτασης</h2>
        <div class="score-big" id="score-display">0 / 60</div>
        <p id="feedback-message"></p>
    </div>
</div>

<script>
// Το σύστημα εγγυάται ότι η πρώτη απάντηση (index 0) είναι η σωστή ΣΤΑ ΔΕΔΟΜΕΝΑ, 
// αλλά η συνάρτηση shuffle() παρακάτω ανακατεύει τη σειρά στην οθόνη.
const rawQuizData = [
    {
        q: "Ποια είναι η βασική διαφορά στη συλλογή δεδομένων μεταξύ της συμβατικής πανοραμικής και της ψηφιακής με αισθητήρα CCD;",

    },
    {

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// Δημιουργία τελικού πίνακα με τυχαίες επιλογές
const quizData = rawQuizData.map((item) => {
    const correctText = item.options[0]; // Αρχικά, η [0] είναι η σωστή
    const shuffledOptions = shuffle([...item.options]); // Ανακάτεμα!
    const correctIndex = shuffledOptions.indexOf(correctText); // Βρίσκουμε τη νέα θέση της
    return {
        q: item.q,
        a: shuffledOptions,
        correct: correctIndex,
        expl: item.explanation
    };
});

const quizWrapper = document.getElementById('quiz-wrapper');

quizData.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = `q-card-${index}`;
    
    const qNum = document.createElement('div');
    qNum.className = 'question-number';
    qNum.innerText = `Ερώτηση ${index + 1} από ${quizData.length}`;
    
    const qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerText = item.q;
    
    const optionsList = document.createElement('ul');
    optionsList.className = 'options-list';
    
    item.a.forEach((optText, optIndex) => {
        const li = document.createElement('li');
        li.className = 'option-item';
        li.innerText = optText;
        li.onclick = () => selectOption(index, li, optIndex === item.correct);
        optionsList.appendChild(li);
    });

    const explanationBox = document.createElement('div');
    explanationBox.className = 'explanation-box';
    explanationBox.id = `expl-${index}`;
    explanationBox.innerHTML = `<strong>Ακαδημαϊκή Εξήγηση:</strong> ${item.expl}`;
    
    card.appendChild(qNum);
    card.appendChild(qText);
    card.appendChild(optionsList);
    card.appendChild(explanationBox);
    quizWrapper.appendChild(card);
});

const userAnswers = new Array(quizData.length).fill(null);

function selectOption(qIndex, element, isCorrect) {
    const card = document.getElementById(`q-card-${qIndex}`);
    const items = card.getElementsByClassName('option-item');
    
    // Επαναφορά χρωμάτων
    for(let item of items) {
        item.classList.remove('correct', 'incorrect');
    }
    
    if(isCorrect) {
        element.classList.add('correct');
        userAnswers[qIndex] = true;
    } else {
        element.classList.add('incorrect');
        userAnswers[qIndex] = false;
        
        // Βρίσκουμε και χρωματίζουμε την πραγματικά σωστή απάντηση
        for(let item of items) {
            if(item.innerText === quizData[qIndex].a[quizData[qIndex].correct]) {
                item.classList.add('correct');
            }
        }
    }
    
    // Απενεργοποίηση περαιτέρω κλικ
    for(let item of items) {
        item.classList.add('disabled');
    }

    // Εμφάνιση της ακαδημαϊκής εξήγησης
    document.getElementById(`expl-${qIndex}`).style.display = 'block';
}

function calculateScore() {
    let correctCount = 0;
    let answeredCount = 0;
    
    userAnswers.forEach(ans => {
        if(ans !== null) answeredCount++;
        if(ans === true) correctCount++;
    });
    
    if(answeredCount < quizData.length) {
        alert(`Έχεις απαντήσει μόνο σε ${answeredCount} από τις ${quizData.length} ερωτήσεις. Παρακαλώ ολοκλήρωσε το κουίζ!`);
        return;
    }
    
    const scoreDisplay = document.getElementById('score-display');
    const resultPanel = document.getElementById('result-panel');
    const feedbackMessage = document.getElementById('feedback-message');
    
    scoreDisplay.innerText = `${correctCount} / ${quizData.length}`;
    resultPanel.style.display = 'block';
    
    const percentage = (correctCount / quizData.length) * 100;
    
    if(percentage >= 90) {
        feedbackMessage.innerText = `Άριστα! Η θεωρητική και κλινική σου κατανόηση βρίσκεται σε κορυφαίο επίπεδο.`;
        feedbackMessage.style.color = '#2ecc71';
    } else if(percentage >= 70) {
        feedbackMessage.innerText = `Πολύ καλά! Διάβασε προσεκτικά τις εξηγήσεις (rationales) στα λάθη σου για να καλύψεις τα κενά.`;
        feedbackMessage.style.color = '#3498db';
    } else {
        feedbackMessage.innerText = `Χρειάζεται επανάληψη. Η γεωμετρία της πανοραμικής θέλει προσοχή. Μελέτησε τις εξηγήσεις και δοκίμασε ξανά.`;
        feedbackMessage.style.color = '#e74c3c';
    }
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
