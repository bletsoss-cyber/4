    },
    {
        q: "Το ειδικό πρόγραμμα για την Κροταφογναθική Διάρθρωση (ΚΓΔ) περιλαμβάνει συνήθως:",
        a: ["Πλάγιες ακτινογραφήσεις της ΚΓΔ με το στόμα ανοικτό και κλειστό στην ίδια πλάκα.", "Κατακόρυφες τομές εύρους 1 mm σε όλο το μήκος του κονδύλου.", "Τρισδιάστατη ανακατασκευή του βόθρου και του διάρθριου δίσκου.", "Απεικόνιση των μετωπιαίων κόλπων και των ηθμοειδών κυψελών."],
        correct: 0
    },
    {
        q: "Ποιο είναι το κύριο μειονέκτημα των κάθετων τομών (cross-sections) της ακρολοφίας που προσφέρουν κάποια πανοραμικά μηχανήματα;",
        a: ["Παρουσιάζουν σταθερή μεγέθυνση και αδυναμία απόλυτης αποτύπωσης των πραγματικών διαστάσεων (όχι 1:1).", "Απαιτούν διπλάσια δόση ακτινοβολίας σε σχέση με το full-mouth status.", "Δεν μπορούν να απεικονίσουν τη θέση του πόρου του κάτω φατνιακού νεύρου.", "Μπορούν να χρησιμοποιηθούν μόνο σε πλήρως νωδούς ασθενείς."],
        correct: 0
    },
    {
        q: "Όταν συγκρίνουμε την πανοραμική με τις οπισθοφατνιακές ακτινογραφίες, η πανοραμική υπερέχει ξεκάθαρα στην:",
        a: ["Απεικόνιση μεγάλων παθολογικών αλλοιώσεων που εκτείνονται πέρα από τα όρια ενός ημιμορίου.", "Διακριτική ικανότητα και αποτύπωση των λεπτομερειών του περιοδοντικού συνδέσμου.", "Ακριβή μέτρηση του ύψους του φατνιακού οστού χωρίς καμία παραμόρφωση.", "Ανίχνευση αρχόμενης τερηδόνας της αδαμαντίνης."],
        correct: 0
    }
];

const quizWrapper = document.getElementById('quiz-wrapper');

// Render Quiz
quizData.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = `q-card-${index}`;
    
    const qNum = document.createElement('div');
    qNum.className = 'question-number';
    qNum.innerText = `Ερώτηση ${index + 1} από 60`;
    
    const qText = document.createElement('div');
    qText.className = 'question-text';
    qText.innerText = item.q;
    
    const optionsList = document.createElement('ul');
    optionsList.className = 'options-list';
    
    // Shuffle options array keeping track of correct one
    const optionsWithIndex = item.a.map((text, i) => ({ text, isCorrect: i === item.correct }));
    // Simple determinisitic-like placement or order as provided
    
    optionsWithIndex.forEach((opt, optIndex) => {
        const li = document.createElement('li');
        li.className = 'option-item';
        li.innerText = opt.text;
        li.onclick = () => selectOption(index, li, opt.isCorrect);
        optionsList.appendChild(li);
    });
    
    card.appendChild(qNum);
    card.appendChild(qText);
    card.appendChild(optionsList);
    quizWrapper.appendChild(card);
});

const userAnswers = new Array(quizData.length).fill(null);

function selectOption(qIndex, element, isCorrect) {
    const card = document.getElementById(`q-card-${qIndex}`);
    const items = card.getElementsByClassName('option-item');
    
    // Remove previous selections for this question
    for(let item of items) {
        item.classList.remove('correct', 'incorrect');
    }
    
    // Add class based on selection
    if(isCorrect) {
        element.classList.add('correct');
        userAnswers[qIndex] = true;
    } else {
        element.classList.add('incorrect');
        userAnswers[qIndex] = false;
        
        // Highlight the correct one too
        for(let item of items) {
            // Find correct item text match
            if(item.innerText.includes(quizData[qIndex].a[quizData[qIndex].correct])) {
                item.classList.add('correct');
            }
        }
    }
    
    // Disable further clicking on this question card
    for(let item of items) {
        item.classList.add('disabled');
    }
}

function calculateScore() {
    let correctCount = 0;
    let answeredCount = 0;
    
    userAnswers.forEach(ans => {
        if(ans !== null) answeredCount++;
        if(ans === true) correctCount++;
    });
    
    if(answeredCount < quizData.length) {
        alert(`Έχεις απαντήσει μόνο σε ${answeredCount} από τις 60 ερωτήσεις. Παρακαλώ απάντησε σε όλες πριν την υποβολή!`);
        return;
    }
    
    const scoreDisplay = document.getElementById('score-display');
    const resultPanel = document.getElementById('result-panel');
    const feedbackMessage = document.getElementById('feedback-message');
    
    scoreDisplay.innerText = `${correctCount} / 60`;
    resultPanel.style.display = 'block';
    
    const percentage = (correctCount / quizData.length) * 100;
    
    if(percentage >= 90) {
        feedbackMessage.innerText = `Εξαιρετικά! Έχεις άριστη κατανόηση της γεωμετρίας και της κλινικής αναγνώρισης σφαλμάτων στην Πανοραμική Ακτινογραφία. (Ποσοστό: ${percentage.toFixed(1)}%)`;
        feedbackMessage.style.color = '#2ecc71';
    } else if(percentage >= 70) {
        feedbackMessage.innerText = `Πολύ καλά! Έχεις γερές βάσεις, αλλά πρόσεξε τις λεπτομέρειες και τις παραπλανητικές ορολογίες του βιβλίου. (Ποσοστό: ${percentage.toFixed(1)}%)`;
        feedbackMessage.style.color = '#3498db';
    } else {
        feedbackMessage.innerText = `Χρειάζεται περισσότερη μελέτη. Δώσε ιδιαίτερη προσοχή στις μετατοπίσεις της εστιακής ζώνης (μπρος/πίσω, πάνω/κάτω) και στον σχηματισμό των ειδώλων-φαντασμάτων. (Ποσοστό: ${percentage.toFixed(1)}%)`;
        feedbackMessage.style.color = '#e74c3c';
    }
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
