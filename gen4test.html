<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Αξιολόγηση Κατανόησης - 45 Ερωτήσεις</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #2c2c2c;
            --btn-bg: #ffffff;
            --btn-border: #cccccc;
            --btn-hover: #e6e6e6;
            --correct-color: #d4edda;
            --correct-border: #c3e6cb;
            --wrong-color: #f8d7da;
            --wrong-border: #f5c6cb;
            --feedback-bg: #f8f9fa;
        }
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        h1 { text-align: center; border-bottom: 2px solid #333; padding-bottom: 1rem; margin-bottom: 2rem; }
        .progress { text-align: right; font-weight: bold; margin-bottom: 1rem; color: #555; }
        .question-container { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid #eaeaea; }
        .question-text { font-size: 1.15rem; font-weight: bold; margin-bottom: 1.5rem; }
        .options { display: flex; flex-direction: column; gap: 0.8rem; }
        .option-btn {
            font-family: inherit; font-size: 1rem; padding: 1rem; background-color: var(--btn-bg);
            border: 1px solid var(--btn-border); border-radius: 4px; text-align: left; cursor: pointer;
            transition: background-color 0.2s;
        }
        .option-btn:hover:not(:disabled) { background-color: var(--btn-hover); }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
        .option-btn.correct { background-color: var(--correct-color); border-color: var(--correct-border); color: #155724; font-weight: bold;}
        .option-btn.wrong { background-color: var(--wrong-color); border-color: var(--wrong-border); color: #721c24; text-decoration: line-through;}
        .feedback {
            display: none; margin-top: 1.5rem; padding: 1.5rem; background-color: var(--feedback-bg);
            border-left: 4px solid #333; border-radius: 0 4px 4px 0; font-family: Georgia, serif; font-size: 0.95rem;
        }
        .feedback.visible { display: block; }
    </style>
</head>
<body>

    <h1>Αξιολόγηση: Γενετική Ποικιλότητα</h1>
    <div id="quiz-root"></div>

    <script>
        // Δεδομένα 45 απαιτητικών ερωτήσεων αυστηρά από το PDF
        const questions = [
            { q: "1. Ποια χρονολογία δημοσιεύθηκε το πρώτο προσχέδιο (first draft) του ανθρώπινου γονιδιώματος;", o: ["1990", "2001", "2003", "2005"], a: 1, r: "Το 2001 δημοσιεύθηκαν οι δύο κομβικές μελέτες με το πρώτο προσχέδιο, ενώ το ουσιαστικά πλήρες αναφοράς το 2003." },
            { q: "2. Ποιος ήταν ο σκοπός του International HapMap Project (2005);", o: ["Η αλληλούχηση μικροβιακών γονιδιωμάτων.", "Η δημιουργία ενός χάρτη κοινών προτύπων (haplotype map) γενετικής ποικιλότητας.", "Η δημιουργία εργαλείων για RNA splicing.", "Η καταγραφή αποκλειστικά σπάνιων μεταλλάξεων (MAF <1%)."], a: 1, r: "Το HapMap στόχευε στην περιγραφή των κοινών προτύπων ποικιλομορφίας, προετοιμάζοντας το έδαφος για το 1000 Genomes Project." },
            { q: "3. Η βάση δεδομένων ClinVar παρέχει πρωτίστως πληροφορίες για:", o: ["Αποκλειστικά δομικές παραλλαγές >3Mb.", "Σχέσεις μεταξύ παραλλαγών και φαινοτύπων του ανθρώπου.", "Τη συχνότητα παραλλαγών αποκλειστικά σε υγιείς πληθυσμούς (όπως η gnomAD).", "Τον αριθμό των RNA μεταγράφων."], a: 1, r: "Η ClinVar είναι δημόσιο αρχείο αναφορών για τις σχέσεις μεταξύ παραλλαγών και ανθρώπινων φαινοτύπων." },
            { q: "4. Βάσει του κειμένου, ποιο ποσοστό της αλληλουχίας του DNA ταυτίζεται μεταξύ των ανθρώπων;", o: ["90%", "95%", "99%", "99.9%"], a: 2, r: "Σύμφωνα με την παρουσίαση, 99% της αλληλουχίας DNA είναι ίδια με άλλους ανθρώπους. Το 1% οδηγεί στις διαφορές μας." },
            { q: "5. Ποιος είναι ο ορισμός της 'κοινής παραλλαγής' (common variant);", o: ["Συχνότητα εμφάνισης >1% στον πληθυσμό.", "Συχνότητα εμφάνισης >5% στον πληθυσμό.", "Συχνότητα εμφάνισης <1% στον πληθυσμό.", "Παραλλαγή που δεν προκαλεί ποτέ νόσο."], a: 0, r: "Κοινές θεωρούνται οι παραλλαγές με συχνότητα υψηλότερη του 1% (>1%)." },
            { q: "6. Τι περιγράφει η Ανισορροπία Σύνδεσης (Linkage Disequilibrium - LD);", o: ["Το ποσοστό μεταλλάξεων που οδηγούν σε πρόωρο κωδικόνιο λήξης.", "Τη συχνότητα εμφάνισης συνδυασμών αλληλομόρφων σε φάση σύζευξης, η οποία είναι μεγαλύτερη από την τυχαία αναμενόμενη.", "Τον διαχωρισμό ομόλογων χρωμοσωμάτων στη Μείωση Ι.", "Το άνισο crossing over μεταξύ επαναλήψεων Alu."], a: 1, r: "Ο ορισμός της LD είναι ακριβώς η υψηλότερη από την τυχαία αναμενόμενη συχνότητα εμφάνισης συγκεκριμένων συνδυασμών αλληλομόρφων." },
            { q: "7. Ποιο είναι το μέγεθος των παραλλαγών ελλείμματος/ένθεσης (indels) όταν δεν πρόκειται για CNVs;", o: ["1 bp έως 1 Kbp", "Ακριβώς 1 bp (Single nucleotide)", "1 Kbp έως 3 Mbp", ">3 Mbp"], a: 0, r: "Σύμφωνα με τον πίνακα της παρουσίασης, οι παραλλαγές Ένθεσης/Έλλειμματος (indels) καταλαμβάνουν συνήθως 1 bp έως 1 Kbp." },
            { q: "8. Στους μικροδορυφόρους (STRs), τι μέγεθος έχει η βασική επαναλαμβανόμενη μονάδα;", o: ["1-5 νουκλεοτίδια (δι/τρι/τετρα/πεντα-νουκλεοτίδια)", "10-100 νουκλεοτίδια", "Εκατοντάδες Kbp", "1 ολόκληρο γονίδιο"], a: 0, r: "Οι μικροδορυφόροι αποτελούνται από βραχείες επαναλήψεις 1 έως μερικών δεκάδων δι/τρι/τετρα/πεντα-νουκλεοτιδίων." },
            { q: "9. Ποια από τις παρακάτω παραλλαγές διαθέτει 2 αλληλόμορφα που αντιστοιχούν σε αντίθετους προσανατολισμούς ενός τμήματος DNA;", o: ["Μικροδορυφόρος", "Πολυμορφισμός Ένθεσης Alu", "Αναστροφή", "Μινιδορυφόρος"], a: 2, r: "Οι αναστροφές (inversions) έχουν δύο αλληλόμορφα που αντιστοιχούν στους δύο δυνατούς προσανατολισμούς του γονιδιωματικού τμήματος." },
            { q: "10. Σε ποιο ποσοστό των SNPs υπάρχουν συνήθως μόνο 2 αλληλόμορφα;", o: ["50%", "75%", "90%", "99%"], a: 2, r: "Σύμφωνα με τη διαφάνεια, στο 90% των γνωστών παραλλαγών στα SNPs υπάρχουν μόνο δύο αλληλόμορφα." },
            { q: "11. Ποια είναι η ακαδημαϊκά 'σωστή' χρήση ορολογίας σύμφωνα με την παρουσίαση;", o: ["'Αυτή είναι μια disease-causing mutation'", "'Αυτός είναι ένας πολυμορφισμός'", "'Σπάνια παραλλαγή' έναντι 'disease-causing mutation'", "Και τα δύο παραπάνω θεωρούνται ορθά."], a: 2, r: "Οι όροι 'disease-causing mutation' και 'polymorphism' επισημαίνονται ως 'Common but incorrect usage'. Το σωστό είναι να αναφερόμαστε σε σπάνια ή κοινή παραλλαγή (variant)." },
            { q: "12. Ποια είναι η συχνότητα των χρωμοσωμικών μεταλλάξεων ανά κυτταρική διαίρεση;", o: ["1/25-50", "1/1700", "10^-5 έως 10^-6", "10^-10"], a: 1, r: "Οι χρωμοσωμικές μεταλλάξεις (χρωμοσωματική αναδιάταξη) συμβαίνουν με συχνότητα περίπου 1/1700 ή 6x10^-4 ανά κυτταρική διαίρεση." },
            { q: "13. Ποια είναι η συχνότητα των γονιδιωματικών μεταλλάξεων (ανευπλοειδία) ανά κυτταρική διαίρεση;", o: ["1/25-50", "1/1700", "10^-5", "10^-10"], a: 0, r: "Οι γονιδιωματικές μεταλλάξεις, όπως ο λανθασμένος διαχωρισμός χρωμοσωμάτων, συμβαίνουν με συχνότητα 1/25-50 (2.4x10^-2) ανά κυτταρική διαίρεση." },
            { q: "14. Σε ποιο θερμό σημείο μεταλλαξιγένεσης προκύπτει άνω του 30% των νουκλεοτιδικών αντικαταστάσεων;", o: ["Διμερή πυριμιδινών", "Δινουκλεοτίδια 5'-CG-3'", "Επαναλήψεις Alu", "Σημεία Splicing"], a: 1, r: "Η απαμίνωση της 5-μεθυλοκυτοσίνης στα δινουκλεοτίδια 5'-CG-3' προκαλεί >30% των αντικαταστάσεων." },
            { q: "15. Ποιο είναι το αποτέλεσμα της απαμίνωσης της 5-μεθυλοκυτοσίνης;", o: ["Ουρακίλη", "Αδενίνη", "Θυμίνη", "Γουανίνη"], a: 2, r: "Η 5-μεθυλοκυτοσίνη όταν απαμινωθεί μετατρέπεται σε Θυμίνη, οδηγώντας σε μετάπτωση 5'-TG-3'." },
            { q: "16. Η έκθεση σε υπεριώδη (UV) ακτινοβολία προκαλεί κυρίως:", o: ["Απαμίνωση της Γουανίνης", "Θραύσεις της διπλής αλυσίδας (ds break)", "Σχηματισμό διμερών πυριμιδινών (π.χ. Thymidine dimer)", "Ενθέσεις μεταθετών στοιχείων (LINE)"], a: 2, r: "Η UV ακτινοβολία προκαλεί κυρίως συνένωση γειτονικών βάσεων Τ ή C, σχηματίζοντας διμερή πυριμιδινών." },
            { q: "17. Τι ποσοστό των παραλλαγών που ευθύνονται για νοσήματα είναι Παρανοηματικές (missense);", o: ["10%", "25%", "40%", "75%"], a: 2, r: "Βάσει του Πίνακα 4.4, οι παρανοηματικές μεταλλάξεις αποτελούν το 40% των παραλλαγών που ευθύνονται για νοσήματα." },
            { q: "18. Τι προκαλεί η μετάλλαξη της δρεπανοκυτταρικής αναιμίας (Hb S);", o: ["Glu6Lys στην β-αλυσίδα", "Glu6Val στην β-αλυσίδα", "His92Tyr στην β-αλυσίδα", "Glu26Lys στην β-αλυσίδα"], a: 1, r: "Στην Hb S, η σημειακή μετάλλαξη αντικαθιστά το Γλουταμινικό οξύ (Glu) με Βαλίνη (Val) στη θέση 6 της β-αλυσίδας." },
            { q: "19. Η μετάλλαξη της Hb Kempsey (Asp99Asn) έχει ως αποτέλεσμα:", o: ["Αιμολυτική αναιμία λόγω κρυστάλλωσης (όπως η Hb C)", "Μειωμένη συγγένεια για το οξυγόνο", "Διατήρηση της Hb σε μορφή υψηλής συγγένειας για το οξυγόνο, οδηγώντας σε πολυκυτταραιμία", "Σοβαρή β-θαλασσαιμία λόγω splicing"], a: 2, r: "Η Hb Kempsey διατηρεί την αιμοσφαιρίνη σε υψηλής συγγένειας μορφή, προκαλώντας πολυκυτταραιμία (polycythemia)." },
            { q: "20. Στην παραλλαγή της Hb E (Glu26Lys), γιατί αναπτύσσεται ήπια θαλασσαιμία;", o: ["Λόγω εισαγωγής πρόωρου κωδικονίου λήξης.", "Λόγω ενεργοποίησης ενός κρυφού σημείου-δότη στο κωδικόνιο 25 που τροποποιεί εν μέρει τη συναρμογή (splicing).", "Λόγω πλήρους απαλοιφής του γονιδίου της β-σφαιρίνης.", "Λόγω απώλειας του υποκινητή."], a: 1, r: "Η παρερμηνεύσιμη μετάλλαξη (Glu26Lys) ενεργοποιεί ένα κρυφό σημείο-δότη στο κωδικόνιο 25, το οποίο ανταγωνίζεται το φυσιολογικό σημείο." },
            { q: "21. Ποια νόσος συνδέεται ισχυρά με άνισο επιχιασμό λόγω ομολογίας αλληλουχίας >95% στο χρωμόσωμα Χ;", o: ["Μυοτονική δυστροφία", "Αιμορροφιλία Α", "Δυσχρωματοψία/Αχρωματοψία κόκκινου-πράσινου", "Οικογενής υπερχοληστερολαιμία"], a: 2, r: "Τα γονίδια για την κόκκινη και πράσινη οψίνη στο χρωμόσωμα Χ έχουν >95% ταύτιση, προκαλώντας συχνά άνισο επιχιασμό και αχρωματοψία." },
            { q: "22. Στην Αιμορροφιλία Α, ένας συχνός μηχανισμός μετάλλαξης στο χρωμόσωμα Χ είναι:", o: ["Επέκταση τρινουκλεοτιδίων (CAG).", "Λανθασμένη στοίχιση ομόλογων αλληλουχιών (απέχουν 500kb) στην ΙΔΙΑ αλυσίδα, προκαλώντας αναστροφή εξονίων 1-22.", "Άνισος επιχιασμός λόγω Alu επαναλήψεων.", "Απαμίνωση της κυτοσίνης στο ιντρόνιο 22."], a: 1, r: "Στην Αιμορροφιλία Α, ομόλογες αλληλουχίες που απέχουν 500kb υφίστανται ανασυνδυασμό, προκαλώντας αναστροφή του τμήματος από το 1ο έως το 22ο εξόνιο." },
            { q: "23. Στην Οικογενή Υπερχοληστερολαιμία, ποιο δομικό στοιχείο προκαλεί συχνά άνισο επιχιασμό με αποτέλεσμα διαγραφή εξονίου (π.χ. εξόνιο 5);", o: ["Επαναλήψεις CAG", "Στοιχεία L1", "Επαναλήψεις Alu εντός των ιντρονίων", "Σημεία Splicing δότη/δέκτη"], a: 2, r: "Στο γονίδιο LDLR, οι επαναλήψεις Alu στα ιντρόνια μπορούν να στοιχηθούν λανθασμένα, προκαλώντας άνισο επιχιασμό και έλλειμμα (π.χ. του εξονίου 5)." },
            { q: "24. Ποια δυναμική μετάλλαξη αφορά την επέκταση του τρινουκλεοτιδίου GAA (>200 επαναλήψεις);", o: ["Νόσος Huntington", "Σύνδρομο Εύθραυστου Χ", "Μυοτονική δυστροφία", "Αταξία Friedreich"], a: 3, r: "Σύμφωνα με τον πίνακα των δυναμικών μεταλλάξεων, η επέκταση GAA προκαλεί Αταξία Friedreich." },
            { q: "25. Η επέκταση του τρινουκλεοτιδίου CAG (>40 επαναλήψεις) σχετίζεται με:", o: ["Αταξία Friedreich", "Νόσο Huntington", "Μυοτονική δυστροφία", "Αχονδροπλασία"], a: 1, r: "Η Νόσος Huntington προκαλείται από επέκταση CAG (πολυγλουταμίνη) που προσδίδει νέες τοξικές ιδιότητες στην πρωτεΐνη." },
            { q: "26. Τι ποσοστό του ανθρώπινου γονιδιώματος καταλαμβάνουν τα μεταθετά στοιχεία LINE-1 και Alu αντίστοιχα;", o: ["17% και 11%", "55% και 8%", "3% και 6%", "1% και 1%"], a: 0, r: "Στο γράφημα 'Composition of the Human Genome', το Line-1 καταλαμβάνει 17% και το Alu 11%." },
            { q: "27. Βάσει των ACMG κριτηρίων, πού κατατάσσεται το κριτήριο 'BA1' (MAF >= 0.5% AR / 0.1% AD);", o: ["Pathogenic - Very Strong", "Benign - Stand alone", "Benign - Supporting", "Pathogenic - Supporting"], a: 1, r: "Το κριτήριο BA1 (υψηλή συχνότητα) είναι 'Stand alone' για τον χαρακτηρισμό μιας παραλλαγής ως Καλοήθη (Benign)." },
            { q: "28. Ποιο κριτήριο ACMG αντιστοιχεί σε μία παραλλαγή Loss of Function (LOF);", o: ["PVS1 (Pathogenic Very Strong)", "PS1 (Pathogenic Strong)", "PM4 (Pathogenic Moderate)", "PP3 (Pathogenic Supporting)"], a: 0, r: "Στον πίνακα ACMG, το 'LOF' (Loss of function) αποτελεί το μοναδικό κριτήριο PVS1 (Very strong)." },
            { q: "29. Ποια είναι η φυσιολογική επίπτωση του πολυμορφισμού CCR5 Delta 32 σε ομόζυγη κατάσταση;", o: ["Ενισχυμένη μυϊκή δυστροφία.", "Αδυναμία εισόδου του ιού HIV στα κύτταρα, άρα προστασία/αντοχή.", "Αυξημένος κίνδυνος αιμορροφιλίας.", "Αδυναμία μεταφοράς χοληστερόλης στο λυσοσωμάτιο."], a: 1, r: "Ο πολυμορφισμός CCR5 Delta 32 αποτρέπει την είσοδο του ιού HIV στα CD4 κύτταρα." },
            { q: "30. Πόσοι μικροδορυφορικοί δείκτες STR (Core STR Loci) περιλαμβάνονται παραδοσιακά στο σύστημα CODIS για εγκληματολογική χρήση;", o: ["3", "8", "13", "23"], a: 2, r: "Στην παρουσίαση αναφέρεται ξεκάθαρα το '13 CODIS Core STR Loci with Chromosomal Positions'." },
            { q: "31. Κατά τον υπολογισμό του Probability of Paternity (π.χ. 99.9998%), ποια είναι η prior probability που χρησιμοποιείται (assumes prior probability equals...);", o: ["0.10", "0.50", "0.99", "1.00"], a: 1, r: "Στην αναφορά αποτελεσμάτων αναγράφεται: 'assumes prior probability equals 0.50'." },
            { q: "32. Ποιος μηχανισμός επιδιόρθωσης DNA στοχεύει αποκλειστικά στα διμερή πυριμιδινών και τα ογκώδη πρόσθετα (bulky adducts);", o: ["Base Excision Repair (BER)", "Nucleotide Excision Repair (NER)", "Mismatch Repair (MMR)", "Homologous Recombination (HR)"], a: 1, r: "Σύμφωνα με το σχήμα βλαβών/επιδιόρθωσης, τα 6-4 photoproducts και τα διμερή πυριμιδινών επιδιορθώνονται από το NER." },
            { q: "33. Τι επιδιορθώνει κυρίως το Base Excision Repair (BER);", o: ["Ουρακίλη, αβασικές θέσεις, και 8-Oxoguanine", "A-G mismatch", "Διμερή Θυμίνης από UV", "Θραύσεις διπλής αλυσίδας (DSB)"], a: 0, r: "Το BER εμπλέκεται στην επιδιόρθωση αλλοιώσεων των βάσεων όπως ουρακίλη, αβασικές θέσεις (abasic site) και 8-Οξογουανίνη." },
            { q: "34. Η θραύση της ΜΙΑΣ αλυσίδας του DNA (ss break) οδηγεί συνήθως σε:", o: ["Καταστροφικές χρωμοσωμικές αλλοιώσεις και αστάθεια.", "Μεταλλάξεις μέσω translesion synthesis.", "Ανευπλοειδίες στη μείωση.", "Άμεση απόπτωση του κυττάρου."], a: 1, r: "Σύμφωνα με τη διαφάνεια, οι θραύσεις μονής αλυσίδας (ss break) οδηγούν σε μεταλλάξεις, ενώ της διπλής (ds break) οδηγούν σε καταστροφικές χρωμοσωμικές αλλοιώσεις." },
            { q: "35. Πώς χαρακτηρίζεται μια μετάλλαξη στην οποία το κωδικόνιο λήξης εμφανίζεται στα τελευταία 50 bp του προτελευταίου εξονίου ή στο τελευταίο εξόνιο;", o: ["Μη νοηματική (Nonsense) που ΔΕΝ υφίσταται NMD, δίνοντας κολοβωμένη πρωτεΐνη.", "Σιωπηλή (Silent) χωρίς επιπτώσεις.", "Αλλαγή πλαισίου (Frameshift) που καταστρέφει το NMD.", "Missense μετάλλαξη (conservative)."], a: 0, r: "Οι ανερμηνεύσιμες μεταλλάξεις στο τελευταίο εξόνιο ή <50bp από την τελευταία θέση ματίσματος διαφεύγουν του μηχανισμού NMD (Nonsense-mediated decay) και παράγουν μικρότερη, κολοβωμένη πρωτεΐνη." },
            { q: "36. Σε μια μετάλλαξη Splicing που καταστρέφει το σημείο δέκτη (acceptor-splice site) ενός ιντρονίου, τι παρατηρείται συχνότερα;", o: ["Το ιντρόνιο μεταφράζεται πάντα ολόκληρο.", "Γίνεται χρήση ενός 'κρυφού' σημείου (cryptic site) που ταιριάζει με τη συναινετική αλληλουχία.", "Γίνεται πλήρης απαλοιφή ολόκληρου του γονιδίου.", "Η πρωτεΐνη είναι πάντα 100% λειτουργική."], a: 1, r: "Η καταστροφή ενός σημείου ματίσματος συνήθως οδηγεί το σπλησόσωμα στη χρήση ενός 'κρυφού' (cryptic) σημείου που μοιάζει με την αλληλουχία του." },
            { q: "37. Η αναστροφή 17q21.31 αφορά:", o: ["Μετάλλαξη του γονιδίου της δυστροφίνης (DMD).", "Μορφολογικές διαφορές του ανθρώπινου εγκεφάλου και κίνδυνο νευροψυχιατρικών διαταραχών.", "Διαταραχές πήξης (Αιμορροφιλία).", "Τον πολυμερισμό της αιμοσφαιρίνης S."], a: 1, r: "Στη διαφάνεια για τις αναστροφές, η 17q21.31 ρητά αναφέρεται ότι συνδέεται με τη μορφολογία του εγκεφάλου και νευροψυχιατρικές διαταραχές." },
            { q: "38. Βάσει του πίνακα μεταλλαξιγένεσης (Πίνακας 4.3), το γονίδιο DMD (Δυστροφίνη) έχει ρυθμό μεταλλαξιγένεσης περίπου:", o: ["3.5-10.5 x 10^-5", "2-3 x 10^-6", "1.4 x 10^-5", "10^-10"], a: 0, r: "Στον Πίνακα 4.3, ο ρυθμός για τη μυϊκή δυστροφία Duchenne (DMD) είναι 3.5-10.5 x 10^-5." },
            { q: "39. Ποια είναι η επίπτωση των μεγάλων ενθέσεων (large insertions) ενός L1 ρετροτρανσποζονίου σε ένα γονίδιο-στόχο;", o: ["Μικρή (minor) αναστολή της επιμήκυνσης της μεταγραφής.", "Ισχυρή (strong) αναστολή της επιμήκυνσης της μεταγραφής, με σοβαρή μείωση του επιπέδου του γονιδίου.", "Κανένα απολύτως φαινοτυπικό αποτέλεσμα.", "Υπερέκφραση (overexpression) του γονιδίου."], a: 1, r: "Η εικόνα δείχνει ότι μια 'Large insertion' προκαλεί 'Strong inhibition of transcription elongation' και σοβαρή μείωση της έκφρασης, όντας εξαιρετικά επιβλαβής (deleterious)." },
            { q: "40. Στο σύστημα ταξινόμησης ACMG, πώς υπολογίζεται ο χαρακτηρισμός 'Likely pathogenic' (Πιθανώς Παθογόνο);", o: ["Μόνο με 1 PVS1.", "Π.χ. 1 PS1-PS4 + 1-2 PM1-PM6, ή 3+ PM1-PM6 (βάσει κανόνων).", "Όταν υπάρχουν αντικρουόμενα κριτήρια Pathogenic και Benign.", "Μόνο με δεδομένα in silico."], a: 1, r: "Στον πίνακα συνδυασμών, το 'Likely pathogenic' προκύπτει από συνδυασμούς όπως 1 Strong + 1-2 Moderate, ή >=3 Moderate, κλπ." },
            { q: "41. Ο όρος 'VUS' σημαίνει:", o: ["Variant Under Selection", "Very Unusual Sequence", "Variant of Uncertain Significance", "Variable Unit Satellite"], a: 2, r: "VUS = Variant of Unknown / Uncertain Significance (Παραλλαγή άγνωστης/αβέβαιης σημασίας)." },
            { q: "42. Το κριτήριο 'De novo' στο σύστημα ACMG τι βαρύτητα έχει τυπικά όταν αφορά την ίδια αμινοξική αλλαγή με ήδη γνωστή παθογόνο (PS2);", o: ["Stand alone", "Very Strong", "Strong", "Supporting"], a: 2, r: "Το PS2 (De novo) συγκαταλέγεται στα 'Strong' (Ισχυρά) κριτήρια." },
            { q: "43. Οι μινιδορυφόροι (VNTRs) χρησιμοποιούνται ιστορικά για:", o: ["Αλληλούχηση επόμενης γενιάς (NGS).", "Το γενετικό αποτύπωμα (DNA fingerprinting) λόγω του ποικίλου αριθμού επαναλήψεων.", "Τον εντοπισμό ανευπλοειδιών.", "Την επιδιόρθωση του DNA."], a: 1, r: "Οι VNTRs και οι μικροδορυφόροι χρησιμοποιούνται για το γενετικό αποτύπωμα." },
            { q: "44. Ο αλγόριθμος ταξινόμησης παραλλαγών (variants) του ACMG είναι συμβατός με ποιο μαθηματικό/στατιστικό μοντέλο;", o: ["Μοντέλο Markov (HMM)", "Ποσοτικό αφελή Μπεϋζιανό ταξινομητή (Quantitative naive Bayesian classifier)", "Νευρωνικά δίκτυα βαθιάς μάθησης (Deep Learning)", "Γραμμική παλινδρόμηση"], a: 1, r: "Το slide αναφέρει: 'a heuristic system for variant classification that is compatible with a formal, quantitative, naive Bayesian classifier'." },
            { q: "45. Τι αφορά η 'γαμετική' (germline) μετάλλαξη σε σχέση με τη 'σωματική' (somatic);", o: ["Η γαμετική συμβαίνει μόνο στο 10% των κυττάρων (μωσαϊκισμός).", "Η γαμετική εντοπίζεται στα πρόδρομα γαμετικά κύτταρα και μεταβιβάζεται, ενώ η σωματική δεν μεταβιβάζεται (προκαλεί μωσαϊκισμό).", "Η γαμετική προκαλείται αποκλειστικά από ρετροτρανσποζόνια.", "Δεν υπάρχει καμία διαφορά, και οι δύο κληρονομούνται."], a: 1, r: "Οι γαμετικές μεταλλάξεις μεταβιβάζονται στους απογόνους, ενώ οι σωματικές παραμένουν στο άτομο που τις εμφάνισε (μωσαϊκισμός)." }
        ];

        let html = '';
        questions.forEach((q, index) => {
            html += `
            <div class="question-container" id="q${index}">
                <div class="question-text">${q.q}</div>
                <div class="options">
            `;
            q.o.forEach((opt, oIndex) => {
                const isCorrect = (oIndex === q.a) ? 'true' : 'false';
                html += `<button class="option-btn" data-correct="${isCorrect}">${String.fromCharCode(65 + oIndex)}) ${opt}</button>`;
            });
            html += `
                </div>
                <div class="feedback"><strong>Επιστημονική Αιτιολόγηση:</strong> ${q.r}</div>
            </div>
            `;
        });
        
        document.getElementById('quiz-root').innerHTML = html;

        // Λογική Κουίζ
        document.querySelectorAll('.question-container').forEach(container => {
            const buttons = container.querySelectorAll('.option-btn');
            const feedback = container.querySelector('.feedback');

            buttons.forEach(button => {
                button.addEventListener('click', function() {
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    
                    buttons.forEach(btn => {
                        btn.disabled = true;
                        if (btn.getAttribute('data-correct') === 'true') {
                            btn.classList.add('correct');
                        }
                    });

                    if (!isCorrect) {
                        this.classList.add('wrong');
                    }
                    feedback.classList.add('visible');
                });
            });
        });
    </script>
</body>
</html>
