<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Advanced Exam Simulator: Σύνθετες Ρητίνες (30 MCQs)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 40px; color: #1c1e21; }
        .quiz-container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; shadow: 0 4px 12px rgba(0,0,0,0.15); }
        h1 { color: #1877f2; text-align: center; border-bottom: 2px solid #e4e6eb; padding-bottom: 20px; }
        .q-card { margin-bottom: 30px; padding: 20px; border: 1px solid #e4e6eb; border-radius: 8px; transition: 0.3s; }
        .q-text { font-weight: 600; font-size: 1.1em; margin-bottom: 15px; }
        .option { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccd0d5; border-radius: 6px; text-align: left; cursor: pointer; background: #f0f2f5; font-size: 1em; transition: 0.2s; }
        .option:hover { background: #e4e6eb; }
        .correct { background-color: #45bd62 !important; color: white; border-color: #36a420; }
        .wrong { background-color: #f02849 !important; color: white; border-color: #d22832; }
        .feedback { display: none; margin-top: 15px; padding: 15px; background-color: #ebf5ff; border-left: 5px solid #1877f2; border-radius: 4px; font-size: 0.95em; line-height: 1.5; }
        .sos-tag { color: #d22832; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Προσομοίωση Εξετάσεων: Σύνθετες Ρητίνες</h1>
    <div id="quiz"></div>
</div>

<script>
const quizData = [
    {

        correct: 1,
        why: "Το TEGDMA δρά ως αραιωτικό μονομερές. Λόγω του χαμηλού μοριακού του βάρους, μειώνει το ιξώδες του BisGMA, επιτρέποντας την ενσωμάτωση περισσότερων ενισχυτικών κόκκων."
    },
    {
        q: "Η καμφοροκινόνη παρουσιάζει μέγιστη απορρόφηση στα:",
        options: ["380 nm", "410 nm", "468 nm", "520 nm"],

        why: "Η CQ είναι μια δικετόνη που απορροφά στο ορατό μπλε φως με κορυφή στα 468 nm."
    },

        correct: 3,
        why: "Στις κοιλότητες 1ης ομάδας έχουμε 5 συγκολλημένες επιφάνειες (τοιχώματα + πυθμένας) και 1 ελεύθερη (μασητική). Άρα 5/1 = 5."

    {
        q: "Ποιο υλικό χρησιμοποιεί τον κατιονικό πολυμερισμό με άνοιγμα δακτυλίου;",

        correct: 1,
        why: "Οι Siloranes χρησιμοποιούν δακτυλίους οξιρανίου που ανοίγουν κατά την πήξη, αντισταθμίζοντας τη συστολή πλησίασης των μορίων."
    },
    {
        q: "Ποια είναι η ελάχιστη αποδεκτή αντοχή σε κάμψη για ρητίνες οπισθίων δοντιών κατά ISO 4049;",

        correct: 1,
        why: "Το ISO 4049 ορίζει τα 80 MPa ως το ελάχιστο όριο για αποκαταστάσεις που δέχονται μασητικά φορτία."
    },
    {
        q: "Η προσθήκη τριφθοριούχου υττερβίου ($YbF_3$) αποσκοπεί στην:",
        options: ["Αύξηση της σκληρότητας", "Βελτίωση της λείανσης", "Ακτινοσκιερότητα και απελευθέρωση φθορίου", "Μείωση του C-factor"],
        correct: 2,
        why: "Το $YbF_3$ προσφέρει τόσο ακτινογραφική αντίθεση όσο και αντιτερηδονογόνο δράση."
    },
    {
        q: "Το 'Gel Point' ορίζεται ως η στιγμή που:",
        options: ["Ξεκινά η φωτοβολία", "Το υλικό μετατρέπεται από ρευστό σε ελαστικό στερεό", "Ολοκληρώνεται ο πολυμερισμός", "Απορροφάται το πρώτο φωτόνιο"],
        correct: 1,
        why: "Μετά το Gel Point, το υλικό δεν μπορεί πλέον να ρεύσει για να εκτονώσει τις εσωτερικές τάσεις συστολής."
    },
    {
        q: "Ποιο από τα παρακάτω ΔΕΝ περιλαμβάνεται στα βασικά μονομερή υψηλού μοριακού βάρους;",
        options: ["BisGMA", "UDMA", "TEGDMA", "BisEMA"],
        correct: 2,
        why: "Το TEGDMA είναι συμμονομερές χαμηλού μοριακού βάρους (αραιωτικό)."
    },
    {
        q: "Η 'ζώνη αναστολής οξυγόνου' είναι απαραίτητη για:",
        options: ["Την αύξηση της σκληρότητας", "Τη σύνδεση διαδοχικών στρωμάτων ρητίνης", "Την προστασία από την αποτριβή", "Την αποφυγή του C-factor"],
        correct: 1,
        why: "Το απολυμέριστο επιφανειακό στρώμα περιέχει ελεύθερες ρίζες που αντιδρούν με το επόμενο στρώμα ρητίνης."
    },
    {
        q: "Το σιλάνιο ($\gamma$-MPTMS) συνδέεται με τους κόκκους υάλου μέσω:",
        options: ["Ιοντικών δεσμών", "Δεσμών υδρογόνου", "Δεσμών σιλοξάνης ($Si-O-Si$)", "Μεταλλικών δεσμών"],
        correct: 2,

    },
    {
        q: "Η προθέρμανση της ρητίνης στους 54°C οδηγεί σε:",

    },
    {
        q: "Οι 'Giomers' διαφοροποιούνται από τις 'RMGIC' επειδή:",
        options: ["Δεν περιέχουν ρητίνη", "Περιέχουν προ-αντιδράσασα ύαλο (S-PRG)", "Πολυμερίζονται μόνο χημικά", "Είναι υδατοδιαλυτές"],
        correct: 1,
        why: "Στις Giomers η οξεοβασική αντίδραση έχει ολοκληρωθεί πριν την ενσωμάτωση των κόκκων στη ρητίνη."
    },
    {
        q: "Ο φωτοεναρκτήρας Ivocerin είναι αποτελεσματικός επειδή:",
        options: ["Είναι φθηνότερος", "Έχει υψηλή απόδοση σε μεγάλα πάχη υλικού", "Δεν μυρίζει", "Είναι υδρόφοβος"],
        correct: 1,
        why: "Το Ivocerin επιτρέπει τον πολυμερισμό στρωμάτων έως 4-5mm (Bulk-fill τεχνολογία)."
    },
    {
        q: "Η αποτριβή των ανταγωνιστών δοντιών προκαλείται κυρίως από:",
        options: ["Την οργανική μήτρα", "Τη συστολή", "Την υψηλή σκληρότητα των ενισχυτικών κόκκων", "Το σιλάνιο"],
        correct: 2,
        why: "Οι ανόργανοι κόκκοι (π.χ. χαλαζίας) είναι σκληρότεροι από την αδαμαντίνη και δρουν λειαντικά."
    },
    {
        q: "Ποια ιδιότητα βελτιώνεται με τη χρήση 'Bulk-fill' ρητινών;",
        options: ["Ο χρόνος τοποθέτησης", "Η αισθητική", "Ο C-factor", "Η αντοχή σε οξέα"],
        correct: 0,
        why: "Η δυνατότητα φωτοπολυμερισμού σε μεγάλα στρώματα μειώνει τον κλινικό χρόνο."
    },
    {
        q: "Το μέτρο ελαστικότητας των ρητινών πρέπει να προσεγγίζει αυτό της:",
        options: ["Αδαμαντίνης", "Οδοντίνης", "Πορσελάνης", "Αμαλγάματος"],
        correct: 1,
        why: "Για την ομοιόμορφη κατανομή των τάσεων, η ρητίνη πρέπει να συμπεριφέρεται ελαστικά όπως η οδοντίνη."
    },
    {
        q: "Η υδρολυτική αποδόμηση των σιλανίων επιταχύνεται από:",
        options: ["Το κρύο", "Το ξηρό περιβάλλον", "Το στοματικό υγρό και τις θερμικές εναλλαγές", "Την ακτινοσκιερότητα"],
        correct: 2,
        why: "Η υγρασία εισχωρεί στη διεπιφάνεια και διασπά τους δεσμούς σιλοξάνης."
    },
    {
        q: "Ποια είναι η τυπική τιμή συστολής πολυμερισμού ($%$ κ.ο.);",
        options: ["0.1 - 0.5%", "2 - 6%", "10 - 15%", "20 - 25%"],
        correct: 1,
        why: "Αυτή είναι η τυπική τιμή για τις σύγχρονες σύνθετες ρητίνες."
    },
    {
        q: "Ο 'χαμαιλεοντισμός' επιτυγχάνεται μέσω:",
        options: ["Της υψηλής αδιαφάνειας", "Της ημιδιαφάνειας και της σκέδασης του φωτός", "Του χρυσού", "Της αμίνης"],
        correct: 1,
        why: "Η ικανότητα του υλικού να προσλαμβάνει το χρώμα των παρακείμενων ιστών."
    },
    {
        q: "Η δυσθραυστότητα ($K_{Ic}$) μετρά την αντίσταση του υλικού σε:",
        options: ["Σύνθλιψη", "Διάδοση ρωγμών", "Απορρόφηση νερού", "Θερμική διάχυση"],
        correct: 1,
        why: "Εκφράζει την ικανότητα του υλικού να σταματά την επέκταση μιας υπάρχουσας ρωγμής."
    },
    {
        q: "Το BisGMA περιέχει ομάδες υδροξυλίου (-OH) οι οποίες:",
        options: ["Αυξάνουν το ιξώδες λόγω δεσμών υδρογόνου", "Μειώνουν την αντοχή", "Είναι τοξικές", "Προκαλούν φθορισμό"],
        correct: 0,
        why: "Οι δεσμοί υδρογόνου μεταξύ των αλυσίδων καθιστούν το BisGMA εξαιρετικά παχύρρευστο."
    },
    {
        q: "Ποιο από τα παρακάτω ΔΕΝ είναι στάδιο του πολυμερισμού;",
        options: ["Ενεργοποίηση", "Πολλαπλασιασμός", "Εξάχνωση", "Τερματισμός"],
        correct: 2,
        why: "Η εξάχνωση αφορά τη μετάβαση από στερεό σε αέριο, όχι χημική αντίδραση."
    },
    {
        q: "Η χρήση 'Soft-start' φωτοπολυμερισμού αποσκοπεί στη:",
        options: ["Μείωση του χρόνου εργασίας", "Παράταση της φάσης ροής για μείωση των τάσεων", "Αύξηση της θερμότητας", "Αλλαγή του χρώματος"],
        correct: 1,
        why: "Η αργή έναρξη επιτρέπει στο υλικό να 'ρέει' και να εκτονώνει τις τάσεις πριν το Gel Point."
    },
    {
        q: "Η απορρόφηση νερού προκαλεί:",
        options: ["Συστολή", "Διόγκωση που αντισταθμίζει τη συστολή", "Εξάτμιση", "Αύξηση της σκληρότητας"],
        correct: 1,
        why: "Η υγροσκοπική διαστολή μπορεί να βελτιώσει την οριακή απόφραξη αλλά μειώνει τις μηχανικές ιδιότητες."
    },
    {
        q: "Οι 'Nanofills' διαφοροποιούνται από τις 'Nanohybrids' επειδή:",
        options: ["Είναι φθηνότερες", "Περιέχουν αποκλειστικά νανοκόκκους χωρίς μεγαλύτερα σωματίδια", "Δεν γυαλίζουν", "Είναι μόνο flowable"],
        correct: 1,
        why: "Οι νανοϋβριδικές περιέχουν και μεγαλύτερους κόκκους υάλου για ενίσχυση."
    },
    {
        q: "Ποιο συστατικό προκαλεί 'κιτρίνισμα' σε αυτοπολυμεριζόμενες ρητίνες;",
        options: ["Το BisGMA", "Η αρωματική τριτοταγής αμίνη", "Ο χαλαζίας", "Το σιλάνιο"],
        correct: 1,
        why: "Η χημική αστάθεια του αρωματικού δακτυλίου της αμίνης οδηγεί σε χρωματική αλλοίωση."
    },
    {
        q: "Η ακτινοσκιερότητα μιας έμφραξης πρέπει να είναι:",
        options: ["Μικρότερη της οδοντίνης", "Ίση ή μεγαλύτερη της αδαμαντίνης", "Μηδενική", "Ίση με του αέρα"],
        correct: 1,
        why: "Για να είναι ορατά τα όρια της έμφραξης και η τυχόν δευτερογενής τερηδόνα."
    },
    {
        q: "Το UDMA (Urethane Dimethacrylate) σε σχέση με το BisGMA:",
        options: ["Είναι πιο παχύρρευστο", "Είναι πιο εύκαμπτο και λιγότερο παχύρρευστο", "Είναι υδατοδιαλυτό", "Δεν πολυμερίζεται"],
        correct: 1,
        why: "Η δομή της ουρεθάνης προσφέρει μεγαλύτερη κινητικότητα και χαμηλότερο ιξώδες."
    },
    {
        q: "Η παρουσία πορώδους στη μάζα της ρητίνης οδηγεί σε:",
        options: ["Αύξηση της αντοχής", "Μείωση της αισθητικής και των μηχανικών ιδιοτήτων", "Βελτίωση της λείανσης", "Αύξηση του βαθμού μετατροπής"],
        correct: 1,
        why: "Οι πόροι δρουν ως σημεία συγκέντρωσης τάσεων και εγκλωβίζουν οξυγόνο που αναστέλλει τον πολυμερισμό."
    }
];

function initQuiz() {
    const quizContainer = document.getElementById('quiz');
    quizData.forEach((data, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-text">${i + 1}. ${data.q}</div>`;
        
        data.options.forEach((opt, j) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = function() {
                const buttons = card.querySelectorAll('.option');
                buttons.forEach(b => b.disabled = true);
                if (j === data.correct) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    buttons[data.correct].classList.add('correct');
                }
                card.querySelector('.feedback').style.display = 'block';
            };
            card.appendChild(btn);
        });
        
        const feedback = document.createElement('div');
        feedback.className = 'feedback';
        feedback.innerHTML = `<span class="sos-tag">Επιστημονική Αιτιολόγηση:</span> ${data.why}`;
        card.appendChild(feedback);
        quizContainer.appendChild(card);
    });
}
initQuiz();
</script>

</body>
</html>
