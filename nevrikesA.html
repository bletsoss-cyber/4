<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Αγγεία του Εγκεφάλου - MCQ Quiz</title>
  <style>
    :root {
      --bg: #f4f7f8;
      --surface: #ffffff;
      --ink: #17212b;
      --muted: #5f6d78;
      --line: #d9e1e6;
      --teal: #0b7f7a;
      --teal-dark: #075b58;
      --gold: #b7831c;
      --red: #b84242;
      --green: #247a52;
      --blue: #2e5f91;
      --shadow: 0 16px 34px rgba(24, 39, 51, .10);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }
    header {
      background: #102934;
      color: #f7fbfc;
      border-bottom: 5px solid var(--teal);
    }
    .wrap { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .topbar { padding: 24px 0 20px; display: grid; gap: 10px; }
    h1 { margin: 0; font-size: clamp(1.35rem, 2.6vw, 2.15rem); letter-spacing: 0; }
    .subtitle { margin: 0; color: #c6d6dc; max-width: 820px; }
    main { padding: 22px 0 46px; }
    .panel, .card, .results { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .panel { padding: 16px; margin-bottom: 18px; }
    .controls { display: grid; grid-template-columns: 1fr 1.4fr auto; gap: 12px; align-items: end; }
    .field { display: grid; gap: 6px; }
    label { font-weight: 700; font-size: .9rem; color: #263642; }
    select, input[type="search"] {
      width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 10px 11px;
      font-size: 1rem; background: #fff; color: var(--ink);
    }
    .checks { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
    .check { display: inline-flex; align-items: center; gap: 7px; color: var(--muted); font-weight: 600; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      border: 1px solid transparent; border-radius: 6px; padding: 10px 14px; font-weight: 800;
      cursor: pointer; background: var(--teal); color: white; font-size: .96rem;
    }
    button:hover:not(:disabled) { background: var(--teal-dark); }
    button.secondary { background: #eef4f5; color: #18313b; border-color: var(--line); }
    button.secondary:hover:not(:disabled) { background: #e0ebee; }
    button.warn { background: #f7eddd; color: #6a4610; border-color: #e8d2aa; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
    .metric { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px; }
    .metric span { display: block; color: var(--muted); font-size: .78rem; font-weight: 800; text-transform: uppercase; }
    .metric strong { display: block; margin-top: 2px; font-size: 1.05rem; }
    .progress { height: 10px; background: #dce7ea; border-radius: 999px; overflow: hidden; margin-bottom: 18px; }
    .bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--teal), var(--blue)); transition: width .2s ease; }
    .card { padding: 22px; }
    .q-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    .tag { display: inline-flex; align-items: center; border: 1px solid #c7dfe0; background: #eef8f7; color: var(--teal-dark); border-radius: 999px; padding: 4px 9px; font-size: .82rem; font-weight: 800; }
    .source { color: var(--muted); font-size: .88rem; font-weight: 700; }
    .question { font-size: clamp(1.08rem, 2vw, 1.36rem); font-weight: 800; margin: 8px 0 18px; }
    .options { display: grid; gap: 10px; }
    .option {
      width: 100%; text-align: left; color: var(--ink); background: #f9fbfc; border: 1px solid var(--line);
      padding: 12px 13px; border-radius: 8px; display: grid; grid-template-columns: 34px 1fr; gap: 8px; align-items: start;
      font-weight: 650;
    }
    .option:hover:not(:disabled) { background: #edf6f6; border-color: #a9ced0; }
    .option .letter { font-weight: 900; color: var(--teal-dark); }
    .option.correct { background: #e8f5ee; border-color: #7eb99a; color: #123e2a; }
    .option.wrong { background: #faeaea; border-color: #d79393; color: #581d1d; }
    .option:disabled { opacity: 1; cursor: default; }
    .feedback { display: none; margin-top: 16px; border-radius: 8px; border: 1px solid var(--line); padding: 13px 14px; background: #fbfcfd; }
    .feedback.show { display: block; }
    .feedback.correct { border-color: #7eb99a; background: #edf8f2; }
    .feedback.wrong { border-color: #d79393; background: #fff0f0; }
    .feedback-title { font-weight: 900; margin-bottom: 4px; }
    .next-row { display: flex; justify-content: flex-end; margin-top: 16px; }
    .hidden { display: none !important; }
    .empty { padding: 22px; text-align: center; color: var(--muted); }
    .results { padding: 22px; }
    .result-head { display: grid; gap: 6px; margin-bottom: 18px; }
    .scoreline { font-size: clamp(1.25rem, 2.6vw, 2rem); font-weight: 900; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0 18px; font-size: .95rem; }
    th, td { border-bottom: 1px solid var(--line); padding: 9px 8px; text-align: left; vertical-align: top; }
    th { color: #28414b; background: #f1f6f7; }
    .wrong-list { display: grid; gap: 10px; margin-top: 10px; }
    .wrong-item { border: 1px solid var(--line); border-radius: 8px; padding: 11px; background: #fff; }
    .wrong-item strong { display: block; margin-bottom: 4px; }
    .print-section { display: none; }
    @media (max-width: 820px) {
      .controls { grid-template-columns: 1fr; }
      .meta-grid { grid-template-columns: repeat(2, 1fr); }
      .q-head { display: grid; }
      .actions { width: 100%; }
      .actions button { flex: 1 1 auto; }
    }
    @media (max-width: 520px) {
      .wrap { width: min(100% - 20px, 1120px); }
      .panel, .card, .results { border-radius: 6px; }
      .card, .results { padding: 16px; }
      .meta-grid { grid-template-columns: 1fr; }
      .option { grid-template-columns: 28px 1fr; }
    }
    @media print {
      body { background: #fff; color: #000; }
      header, .panel, #quizArea, #resultsArea { display: none !important; }
      .print-section { display: block; padding: 0; }
      .wrap { width: 100%; margin: 0; }
      .print-section h1 { font-size: 18pt; margin: 0 0 8pt; }
      .print-q { break-inside: avoid; border-bottom: 1px solid #bbb; padding: 9pt 0; }
      .print-q h2 { font-size: 11pt; margin: 0 0 4pt; }
      .print-q ol { margin: 4pt 0 0 18pt; padding: 0; }
      .print-q li { margin: 2pt 0; }
      .print-answer { margin-top: 4pt; font-size: 9pt; color: #222; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <h1>Αγγεία του Εγκεφάλου - Διαδραστικό MCQ Quiz</h1>
      <p class="subtitle">Δύσκολες ερωτήσεις Ανατομίας βασισμένες στις διαφάνειες: αρτηρίες, φλέβες, φλεβώδεις κόλποι και τοπογραφικές σχέσεις.</p>
    </div>
  </header>
  <main class="wrap">
    <section class="panel" aria-label="Ρυθμίσεις quiz">
      <div class="controls">
        <div class="field">
          <label for="categoryFilter">Κατηγορία</label>
          <select id="categoryFilter"></select>
        </div>
        <div class="field">
          <label for="searchBox">Αναζήτηση</label>
          <input id="searchBox" type="search" placeholder="Αναζήτηση σε εκφωνήσεις, επιλογές, αιτιολογήσεις">
        </div>
        <div class="actions">
          <button id="startBtn">Έναρξη</button>
          <button id="resumeBtn" class="secondary hidden">Συνέχεια</button>
          <button id="printBtn" class="secondary">Εκτύπωση</button>
        </div>
      </div>
      <div class="checks">
        <label class="check"><input id="shuffleQuestions" type="checkbox" checked> Ανακάτεμα ερωτήσεων</label>
        <label class="check"><input id="shuffleOptions" type="checkbox" checked> Ανακάτεμα απαντήσεων</label>
        <button id="clearBtn" class="warn" type="button">Καθαρισμός προόδου</button>
      </div>
      <table id="distributionTable" aria-label="Κατανομή ερωτήσεων ανά κατηγορία"></table>
    </section>

    <section id="quizArea">
      <div id="emptyState" class="panel empty">Διάλεξε ρυθμίσεις και πάτησε «Έναρξη».</div>
      <div id="quizBox" class="hidden">
        <div class="meta-grid">
          <div class="metric"><span>Σκορ</span><strong id="scoreMetric">0</strong></div>
          <div class="metric"><span>Πρόοδος</span><strong id="progressMetric">0 / 0</strong></div>
          <div class="metric"><span>Ποσοστό</span><strong id="percentMetric">0%</strong></div>
          <div class="metric"><span>Κατηγορία</span><strong id="categoryMetric">-</strong></div>
        </div>
        <div class="progress" aria-hidden="true"><div id="progressBar" class="bar"></div></div>
        <article class="card">
          <div class="q-head">
            <span id="categoryTag" class="tag"></span>
            <span id="sourceText" class="source"></span>
          </div>
          <div id="questionText" class="question"></div>
          <div id="optionsBox" class="options"></div>
          <div id="feedbackBox" class="feedback"></div>
          <div class="next-row"><button id="nextBtn" class="hidden">Επόμενη ερώτηση</button></div>
        </article>
      </div>
    </section>

    <section id="resultsArea" class="hidden results"></section>
    <section id="printArea" class="print-section"></section>
  </main>

    const STORAGE_KEY = 'neurovascular_mcqs_progress_v1';
    const letters = ['α', 'β', 'γ', 'δ'];
    let state = {
      active: false,
      mode: 'all',
      currentIds: [],
      currentIndex: 0,
      answers: [],
      score: 0,
      optionOrders: {},
      settings: { category: 'all', search: '', shuffleQuestions: true, shuffleOptions: true }
    };

    const byId = new Map(questions.map(q => [q.id, q]));
    const $ = id => document.getElementById(id);

    function shuffle(items) {
      const arr = items.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
    }

    function getSettings() {
      return {
        category: $('categoryFilter').value,
        search: $('searchBox').value.trim(),
        shuffleQuestions: $('shuffleQuestions').checked,
        shuffleOptions: $('shuffleOptions').checked
      };
    }

    function filteredQuestions(settings = getSettings()) {
      const needle = settings.search.toLocaleLowerCase('el');
      return questions.filter(q => {
        const categoryOk = settings.category === 'all' || q.category === settings.category;
        if (!categoryOk) return false;
        if (!needle) return true;
        const haystack = [q.category, q.source, q.question, q.explanation, ...q.options.map(o => o.text)].join(' ').toLocaleLowerCase('el');
        return haystack.includes(needle);
      });
    }

    function populateCategories() {
      const categories = [...new Set(questions.map(q => q.category))];
      $('categoryFilter').innerHTML = '<option value="all">Όλες οι κατηγορίες</option>' + categories.map(c => `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`).join('');
      const counts = categories.map(c => [c, questions.filter(q => q.category === c).length]);
      $('distributionTable').innerHTML = '<thead><tr><th>Κατηγορία</th><th>Ερωτήσεις</th></tr></thead><tbody>' + counts.map(([c,n]) => `<tr><td>${escapeHTML(c)}</td><td>${n}</td></tr>`).join('') + '</tbody>';
    }

    function startQuiz(ids = null, mode = 'all') {
      const settings = getSettings();
      let pool = ids ? ids.map(id => byId.get(id)).filter(Boolean) : filteredQuestions(settings);
      if (!pool.length) {
        $('emptyState').textContent = 'Δεν βρέθηκαν ερωτήσεις με αυτά τα φίλτρα.';
        $('emptyState').classList.remove('hidden');
        $('quizBox').classList.add('hidden');
        $('resultsArea').classList.add('hidden');
        return;
      }
      if (!ids && settings.shuffleQuestions) pool = shuffle(pool);
      state = { active: true, mode, currentIds: pool.map(q => q.id), currentIndex: 0, answers: [], score: 0, optionOrders: {}, settings };
      $('emptyState').classList.add('hidden');
      $('resultsArea').classList.add('hidden');
      $('quizBox').classList.remove('hidden');
      saveState();
      renderQuestion();
    }

    function getDisplayOptions(q) {
      if (!state.optionOrders[q.id]) {
        const ordered = state.settings.shuffleOptions ? shuffle(q.options) : q.options.slice();
        state.optionOrders[q.id] = ordered.map(o => o.oid);
      }
      return state.optionOrders[q.id].map(oid => q.options.find(o => o.oid === oid));
    }

    function renderQuestion() {
      const q = byId.get(state.currentIds[state.currentIndex]);
      const total = state.currentIds.length;
      const answered = state.answers.find(a => a.id === q.id);
      $('categoryTag').textContent = q.category;
      $('sourceText').textContent = q.source || '';
      $('questionText').textContent = `${state.currentIndex + 1}. ${q.question}`;
      $('categoryMetric').textContent = q.category;
      updateMetrics();
      const opts = getDisplayOptions(q);
      $('optionsBox').innerHTML = opts.map((o, i) => `<button class="option" data-oid="${o.oid}" type="button"><span class="letter">${letters[i]})</span><span>${escapeHTML(o.text)}</span></button>`).join('');
      $('feedbackBox').className = 'feedback';
      $('feedbackBox').innerHTML = '';
      $('nextBtn').classList.add('hidden');
      document.querySelectorAll('.option').forEach(btn => btn.addEventListener('click', () => chooseOption(q, btn.dataset.oid)));
      if (answered) showAnswered(q, answered);
    }

    function chooseOption(q, oid) {
      if (state.answers.some(a => a.id === q.id)) return;
      const selected = q.options.find(o => o.oid === oid);
      const correct = Boolean(selected && selected.correct);
      state.answers.push({ id: q.id, selectedOid: oid, correct });
      if (correct) state.score += 1;
      showAnswered(q, state.answers[state.answers.length - 1]);
      saveState();
    }

    function showAnswered(q, answer) {
      const selected = q.options.find(o => o.oid === answer.selectedOid);
      document.querySelectorAll('.option').forEach(btn => {
        btn.disabled = true;
        const opt = q.options.find(o => o.oid === btn.dataset.oid);
        if (opt.correct) btn.classList.add('correct');
        if (btn.dataset.oid === answer.selectedOid && !opt.correct) btn.classList.add('wrong');
      });
      const correctOpt = q.options.find(o => o.correct);
      $('feedbackBox').className = `feedback show ${answer.correct ? 'correct' : 'wrong'}`;
      $('feedbackBox').innerHTML = `<div class="feedback-title">${answer.correct ? 'Σωστό.' : 'Λάθος.'}</div><div><strong>Σωστή απάντηση:</strong> ${escapeHTML(correctOpt.text)}</div><div>${escapeHTML(q.explanation)}</div>`;
      $('nextBtn').textContent = state.currentIndex + 1 >= state.currentIds.length ? 'Αποτελέσματα' : 'Επόμενη ερώτηση';
      $('nextBtn').classList.remove('hidden');
      updateMetrics();
    }

    function updateMetrics() {
      const total = state.currentIds.length || 0;
      const answered = state.answers.length;
      const percent = answered ? Math.round((state.score / answered) * 100) : 0;
      $('scoreMetric').textContent = String(state.score);
      $('progressMetric').textContent = `${Math.min(state.currentIndex + 1, total)} / ${total}`;
      $('percentMetric').textContent = `${percent}%`;
      $('progressBar').style.width = total ? `${(answered / total) * 100}%` : '0%';
    }

    function nextQuestion() {
      if (state.currentIndex + 1 >= state.currentIds.length) {
        showResults();
        return;
      }
      state.currentIndex += 1;
      saveState();
      renderQuestion();
    }

    function showResults() {
      state.active = false;
      saveState();
      $('quizBox').classList.add('hidden');
      const total = state.currentIds.length;
      const wrong = state.answers.filter(a => !a.correct);
      const percent = total ? Math.round((state.score / total) * 100) : 0;
      const rows = [...new Set(state.currentIds.map(id => byId.get(id).category))].map(cat => {
        const ids = state.currentIds.filter(id => byId.get(id).category === cat);
        const ans = state.answers.filter(a => ids.includes(a.id));
        const ok = ans.filter(a => a.correct).length;
        return `<tr><td>${escapeHTML(cat)}</td><td>${ok} / ${ids.length}</td><td>${ids.length ? Math.round(ok / ids.length * 100) : 0}%</td></tr>`;
      }).join('');
      const wrongList = wrong.length ? wrong.map(a => {
        const q = byId.get(a.id);
        const selected = q.options.find(o => o.oid === a.selectedOid);
        const correct = q.options.find(o => o.correct);
        return `<div class="wrong-item"><strong>${q.id}. ${escapeHTML(q.question)}</strong><div><b>Επιλογή σου:</b> ${escapeHTML(selected ? selected.text : '-')}</div><div><b>Σωστό:</b> ${escapeHTML(correct.text)}</div><div>${escapeHTML(q.explanation)}</div></div>`;
      }).join('') : '<p>Δεν υπάρχουν λανθασμένες απαντήσεις.</p>';
      $('resultsArea').innerHTML = `
        <div class="result-head">
          <div class="scoreline">Τελικό σκορ: ${state.score} / ${total} (${percent}%)</div>
          <div>Σωστές: ${state.score} · Λανθασμένες: ${wrong.length} · Σύνολο: ${total}</div>
        </div>
        <h2>Απόδοση ανά κατηγορία</h2>
        <table><thead><tr><th>Κατηγορία</th><th>Σκορ</th><th>Ποσοστό</th></tr></thead><tbody>${rows}</tbody></table>
        <h2>Ανασκόπηση λανθασμένων</h2>
        <div class="wrong-list">${wrongList}</div>
        <div class="actions" style="margin-top:18px">
          <button id="restartBtn">Επανεκκίνηση</button>
          <button id="retryWrongBtn" class="secondary" ${wrong.length ? '' : 'disabled'}>Επανάληψη λανθασμένων</button>
        </div>`;
      $('resultsArea').classList.remove('hidden');
      $('restartBtn').addEventListener('click', () => startQuiz());
      $('retryWrongBtn').addEventListener('click', () => { if (wrong.length) startQuiz(wrong.map(a => a.id), 'wrong'); });
    }

    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateResumeButton(); } catch (e) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const saved = JSON.parse(raw);
        if (!saved || !Array.isArray(saved.currentIds)) return null;
        return saved;
      } catch (e) { return null; }
    }

    function resumeQuiz() {
      const saved = loadState();
      if (!saved) return;
      state = saved;
      $('categoryFilter').value = state.settings.category || 'all';
      $('searchBox').value = state.settings.search || '';
      $('shuffleQuestions').checked = Boolean(state.settings.shuffleQuestions);
      $('shuffleOptions').checked = Boolean(state.settings.shuffleOptions);
      $('emptyState').classList.add('hidden');
      $('resultsArea').classList.add('hidden');
      $('quizBox').classList.remove('hidden');
      renderQuestion();
    }

    function updateResumeButton() {
      const saved = loadState();
      $('resumeBtn').classList.toggle('hidden', !(saved && saved.active && saved.currentIds && saved.currentIds.length));
    }

    function clearProgress() {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      updateResumeButton();
      $('emptyState').textContent = 'Η πρόοδος καθαρίστηκε. Διάλεξε ρυθμίσεις και πάτησε «Έναρξη».';
      $('emptyState').classList.remove('hidden');
      $('quizBox').classList.add('hidden');
      $('resultsArea').classList.add('hidden');
    }

    function renderPrintArea() {
      $('printArea').innerHTML = `<h1>Αγγεία του Εγκεφάλου - MCQs</h1>` + questions.map(q => {
        const opts = q.options.map(o => `<li>${escapeHTML(o.text)}</li>`).join('');
        const correct = q.options.find(o => o.correct);
        return `<div class="print-q"><h2>${q.id}. ${escapeHTML(q.question)} <small>(${escapeHTML(q.category)}, ${escapeHTML(q.source)})</small></h2><ol type="a">${opts}</ol><div class="print-answer"><strong>Απάντηση:</strong> ${escapeHTML(correct.key)}) ${escapeHTML(correct.text)}<br><strong>Αιτιολόγηση:</strong> ${escapeHTML(q.explanation)}</div></div>`;
      }).join('');
    }

    $('startBtn').addEventListener('click', () => startQuiz());
    $('resumeBtn').addEventListener('click', resumeQuiz);
    $('clearBtn').addEventListener('click', clearProgress);
    $('printBtn').addEventListener('click', () => { renderPrintArea(); window.print(); });
    $('nextBtn').addEventListener('click', nextQuestion);
    $('categoryFilter').addEventListener('change', () => { $('emptyState').textContent = `${filteredQuestions().length} διαθέσιμες ερωτήσεις με τα τρέχοντα φίλτρα.`; });
    $('searchBox').addEventListener('input', () => { $('emptyState').textContent = `${filteredQuestions().length} διαθέσιμες ερωτήσεις με τα τρέχοντα φίλτρα.`; });

    populateCategories();
    renderPrintArea();
    updateResumeButton();
  </script>
