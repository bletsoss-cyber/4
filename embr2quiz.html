<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Εμβρυολογίας - Γονιμοποίηση & 1η Εβδομάδα</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --correct: #27ae60;
            --correct-bg: #e8f8f5;
            --wrong: #e74c3c;
            --wrong-bg: #fdedec;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
            --text-light: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 30px auto;
        }

        .header h1 {
            color: var(--primary);
            border-bottom: 3px solid var(--secondary);
            display: inline-block;
            padding-bottom: 10px;
        }

        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .question-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .question-card:hover {
            transform: translateY(-2px);
        }

        .question-number {
            font-size: 0.9em;
            color: var(--secondary);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .question-text {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 1em;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
            font-family: inherit;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e2eef9;
            border-color: var(--secondary);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .option-btn.correct {
            background-color: var(--correct-bg);
            border-color: var(--correct);
            color: #1e8449;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: var(--wrong-bg);
            border-color: var(--wrong);
            color: #c0392b;
            text-decoration: line-through;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #fdfae6;
            border-left: 5px solid #f1c40f;
            border-radius: 4px;
            display: none;
            animation: fadeIn 0.5s;
        }

        .explanation h4 {
            margin: 0 0 10px 0;
            color: #d35400;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .question-card { padding: 15px; }
            .question-text { font-size: 1.1em; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Εξεταστική Προετοιμασία: Εμβρυολογία</h1>
        <p>Γονιμοποίηση & 1η Εβδομάδα Ανάπτυξης - 25 Ερωτήσεις SOS</p>
    </div>

    <div class="quiz-container" id="quiz-container">
        </div>

    <script>
        const quizData = [
            {
                question: "Πού λαμβάνει χώρα κυρίως η ωρίμανση των σπερματοζωαρίων πριν τη γονιμοποίηση και πόσο διαρκεί;",
                options: [
                    "Στους όρχεις, διαρκεί 1 εβδομάδα",

                    "Στις σπερματοδόχους κύστεις, διαρκεί 1 μήνα"
                ],
                correctIndex: 1,
                explanation: "Τα σπερματοζωάρια μεταφέρονται παθητικά στην επιδιδυμίδα μέσω του ορχικού υγρού, όπου και υφίστανται ωρίμανση που μπορεί να διαρκέσει έως και 2 εβδομάδες. Στις επόμενες δομές προστίθενται απλώς υγρά."
            },
            {
                question: "Τι ακριβώς περιλαμβάνει η 'ενεργοποίηση' των σπερματοζωαρίων κατά τη διέλευσή τους προς την άνω μοίρα του ωαγωγού;",

                    "Την έκλυση υαλουρονιδάσης",

                ],
                correctIndex: 2,
                explanation: "Η ενεργοποίηση (capacitation) συμβαίνει στον ωαγωγό και συνίσταται στην αφαίρεση χοληστερόλης και γλυκοπρωτεϊνών από την πλασματική μεμβράνη της κεφαλής του σπερματοζωαρίου, γεγονός απαραίτητο για την ακροσωματική αντίδραση."
            },
            {
                question: "Ποιο ένζυμο είναι κυρίως υπεύθυνο για τη διείσδυση του σπερματοζωαρίου στον ακτινωτό στέφανο (1η φάση γονιμοποίησης);",
                options: [
                    "Ακροσίνη",
                    "Λυσοζύμη",
                    "Βλεννίνη Ι",
                    "Υαλουρονιδάση"
                ],
                correctIndex: 3,
                explanation: "Η έκλυση υαλουρονιδάσης βοηθά το σπερματοζωάριο να διαχωρίσει τα ωοθυλακικά κύτταρα του ακτινωτού στέφανου (1η φάση). Η ακροσίνη απελευθερώνεται αργότερα, για τη διαυγή ζώνη."
            },
            {
                question: "Στη 2η φάση της γονιμοποίησης, πού γίνεται ακριβώς η πρόσδεση του σπερματοζωαρίου;",
                options: [
                    "Στους υποδοχείς ZP1-4 της διαυγούς ζώνης",
                    "Στην πλασματική μεμβράνη του ωαρίου",
                    "Στους κροσσούς του ωαγωγού",
                    "Στα φλοιώδη κοκκία"
                ],
                correctIndex: 0,
                explanation: "Η πρόσδεση γίνεται στους υποδοχείς της διαυγούς ζώνης (ειδικά ο ZP3 είναι πολύ σημαντικός), η οποία πυροδοτεί την ακροσωματική αντίδραση και την απελευθέρωση υδρολυτικών ενζύμων."
            },
            {
                question: "Ποιος είναι ο ακριβής μηχανισμός της 'Αντίδρασης ζώνης' για τον αποκλεισμό της πολυσπερμίας;",

                    "Δημιουργία ασπίδας από ασβέστιο (Ca++)",

                    "Υδρόλυση των υποδοχέων ZP3 από τα εκκριτικά προϊόντα των φλοιωδών κοκκίων",

            },
            {
                question: "Πότε ολοκληρώνεται η δεύτερη μειωτική διαίρεση του ωαρίου;",

            {

            {

                correctIndex: 2,
                explanation: "ΠΡΟΣΟΧΗ στην παγίδα: Η *εμβρυοβλάστη* διαφοροποιείται σε επιβλάστη και υποβλάστη. Η *τροφοβλάστη* είναι αυτή που διαφοροποιείται σε κυτταρο- και συγκυτιοτροφοβλάστη."

                    "Συντήκεται με τον άρρενα προπυρήνα"
                ],
                correctIndex: 1,
                explanation: "Η πλασματική μεμβράνη του σπερματοζωαρίου μένει έξω, αλλά η κεφαλή και η ουρά εισέρχονται στο κυτταρόπλασμα του ωαρίου. Στη συνέχεια η ουρά εκφυλίζεται."
            },
            {
                question: "Τα 'φθαρτικά κύτταρα' (decidual cells) του ενδομητρίου προέρχονται από διαφοροποίηση ποιων κυττάρων;",
                options: [
                    "Των κυττάρων της συγκυτιοτροφοβλάστης",
                    "Των κυττάρων του στρώματος του ενδομητρίου (της μητέρας)",
                    "Των κυττάρων της υποβλάστης",
                    "Των ωοθυλακικών κυττάρων"
                ],
                correctIndex: 1,
                explanation: "Κατά την εμφύτευση (6-7η μέρα), τα κύτταρα του στρώματος του ενδομητρίου (μητρικός ιστός) συσσωρεύουν γλυκογόνο και λιπίδια και μετατρέπονται σε φθαρτικά, διευκολύνοντας τη θρέψη του εμβρύου."
            },
            {
                question: "Ποιο έτος αναφέρεται η πρώτη επιτυχής γέννηση μέσω Κλασικής Εξωσωματικής Γονιμοποίησης (IVF) (Louise Brown);",
                options: [
                    "1968",
                    "1978",
                    "1992",
                    "2001"
                ],
                correctIndex: 1,
                explanation: "Σύμφωνα με το υλικό, η πρώτη γέννηση (Louise Brown) με IVF καταγράφεται το 1978. Η ICSI αναφέρεται το 1992 και η PGD το 2001."
            },
            {
                question: "Η παραγωγή προγεστερόνης κατά τη διάρκεια της 1ης εβδομάδας ανάπτυξης προκαλεί:",
                options: [
                    "Αύξηση του πάχους του ενδομητρίου και χαλάρωση της μήτρας",
                    "Μείωση του πάχους του ενδομητρίου",
                    "Συσπάσεις της μήτρας για γρήγορη εμφύτευση",
                    "Την εκκόλαψη του εμβρύου από τη διαυγή ζώνη"
                ],
                correctIndex: 0,
                explanation: "Η προγεστερόνη (που εκκρίνεται από το ωχρό σωμάτιο) έχει ως ρόλο να προετοιμάσει και να διατηρήσει το ενδομήτριο παχύ, ενώ ταυτόχρονα προκαλεί χαλάρωση του μυομητρίου για να μην αποβληθεί το έμβρυο."
            }
        ];

        const quizContainer = document.getElementById('quiz-container');

        quizData.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${index}`;

            const qNumber = document.createElement('span');
            qNumber.className = 'question-number';
            qNumber.textContent = `Ερωτηση ${index + 1} από ${quizData.length}`;

            const qText = document.createElement('div');
            qText.className = 'question-text';
            qText.textContent = q.question;

            const optionsGrid = document.createElement('div');
            optionsGrid.className = 'options-grid';

            q.options.forEach((optText, optIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = optText;
                btn.onclick = () => checkAnswer(index, optIndex, q.correctIndex, btn, optionsGrid);
                optionsGrid.appendChild(btn);
            });

            const explanationBox = document.createElement('div');
            explanationBox.className = 'explanation';
            explanationBox.id = `exp-${index}`;
            explanationBox.innerHTML = `<h4>💡 Επεξήγηση</h4><p>${q.explanation}</p>`;

            card.appendChild(qNumber);
            card.appendChild(qText);
            card.appendChild(optionsGrid);
            card.appendChild(explanationBox);

            quizContainer.appendChild(card);
        });

        function checkAnswer(questionIndex, selectedIndex, correctIndex, clickedBtn, optionsGrid) {
            const allButtons = optionsGrid.querySelectorAll('.option-btn');
            
            // Lock all buttons
            allButtons.forEach(btn => {
                btn.disabled = true;
            });

            // Color the selected and correct ones
            if (selectedIndex === correctIndex) {
                clickedBtn.classList.add('correct');
            } else {
                clickedBtn.classList.add('wrong');
                // Reveal the correct one
                allButtons[correctIndex].classList.add('correct');
            }

            // Show explanation
            document.getElementById(`exp-${questionIndex}`).style.display = 'block';
        }
    </script>
</body>
</html>
