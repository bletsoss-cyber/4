<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Νευροανατομία - Μήνιγγες, ΕΝΥ και κοιλιακό σύστημα</title>
  <style>
    :root {
      --bg: #f4f7f8;
      --surface: #ffffff;
      --text: #162126;
      --muted: #5c6b73;
      --line: #d8e0e4;
      --primary: #0f6b6e;
      --primary-2: #0a4e55;
      --accent: #c58a1b;
      --good: #146c43;
      --good-bg: #dff3e7;
      --bad: #a52828;
      --bad-bg: #f7dddd;
      --warn-bg: #fff4d8;
      --shadow: 0 16px 44px rgba(23, 44, 51, 0.10);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    header {
      background: #10282d;
      color: #f7fbfc;
      padding: 22px 18px;
      border-bottom: 4px solid var(--accent);
    }

    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.2vw, 2rem);
      letter-spacing: 0;
      font-weight: 760;
    }

    .subtitle {
      margin: 6px 0 0;
      color: #c9d8dc;
      max-width: 760px;
      font-size: 0.98rem;
    }

    main { padding: 18px 0 34px; }

    .panel, .card, .results {
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 8px;
    }

    .panel {
      padding: 16px;
      margin-bottom: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.2fr 1.5fr repeat(2, minmax(155px, 0.8fr));
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    select, input[type="search"] {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfdfd;
      color: var(--text);
      padding: 9px 11px;
      font: inherit;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 4px;
      color: var(--text);
      font-weight: 650;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 7px;
      min-height: 40px;
      padding: 9px 13px;
      font: inherit;
      font-weight: 760;
      cursor: pointer;
      background: var(--primary);
      color: white;
    }

    button.secondary {
      color: var(--primary-2);
      background: #edf6f6;
      border-color: #b9d7d9;
    }

    button.ghost {
      color: #314449;
      background: #f7fafb;
      border-color: var(--line);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      background: #fbfdfd;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 12px;
      min-height: 72px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 750;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 1.15rem;
    }

    .progress {
      height: 10px;
      background: #dce6e8;
      overflow: hidden;
      border-radius: 99px;
      margin-bottom: 16px;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.25s ease;
    }

    .card {
      padding: clamp(16px, 2.6vw, 26px);
    }

    .q-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-weight: 750;
      font-size: 0.86rem;
      margin-bottom: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 9px;
      border-radius: 99px;
      background: #eef4f5;
      color: #29484e;
      border: 1px solid #d5e2e4;
    }

    .question {
      font-size: clamp(1.08rem, 1.5vw, 1.32rem);
      font-weight: 780;
      margin: 0 0 16px;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      background: #fbfdfd;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 13px 14px;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 8px;
      align-items: start;
      min-height: 58px;
      font-weight: 650;
    }

    .option:hover:not(:disabled) {
      border-color: #8bbdc1;
      background: #f1f8f8;
    }

    .option.correct {
      border-color: #75b88f;
      background: var(--good-bg);
      color: #0c3b25;
    }

    .option.wrong {
      border-color: #e0a0a0;
      background: var(--bad-bg);
      color: #581c1c;
    }

    .key {
      font-weight: 850;
      color: var(--primary-2);
    }

    .feedback {
      margin-top: 16px;
      padding: 14px 15px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #f7fafb;
      display: none;
    }

    .feedback.good {
      display: block;
      border-color: #9fcfb2;
      background: var(--good-bg);
    }

    .feedback.bad {
      display: block;
      border-color: #e0a0a0;
      background: var(--bad-bg);
    }

    .feedback strong { display: block; margin-bottom: 4px; }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }

    .hint {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .results {
      padding: clamp(16px, 2.6vw, 26px);
      display: none;
    }

    .results h2, .print-sheet h2 {
      margin: 0 0 12px;
      font-size: 1.45rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      background: white;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #edf4f5;
      font-size: 0.88rem;
    }

    .wrong-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .wrong-item {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 11px 12px;
      background: #fbfdfd;
    }

    .empty {
      padding: 18px;
      border: 1px dashed #afc2c7;
      background: #fbfdfd;
      border-radius: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .print-sheet { display: none; }

    @media (max-width: 820px) {
      .topbar, .nav-row { flex-direction: column; align-items: stretch; }
      .controls, .status-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 560px) {
      .controls, .status-grid { grid-template-columns: 1fr; }
      .option { grid-template-columns: 28px 1fr; }
      .actions button, .nav-row button { width: 100%; }
    }

    @media print {
      body { background: white; color: black; }
      header, .panel, .status-grid, .progress, #quizCard, #results, .actions, .nav-row { display: none !important; }
      main { padding: 0; }
      .wrap { width: 100%; }
      .print-sheet { display: block; }
      .print-question { break-inside: avoid; margin: 0 0 16px; padding-bottom: 12px; border-bottom: 1px solid #bbb; }
      .print-question h3 { margin: 0 0 6px; font-size: 12pt; }
      .print-question p { margin: 4px 0; }
      .print-answer { margin-top: 6px; font-size: 10.5pt; }
      @page { margin: 14mm; }
    }
  </style>
</head>

  <header>
    <div class="wrap topbar">
      <div>
        <h1>Νευροανατομία: Μήνιγγες, ΕΝΥ και κοιλιακό σύστημα</h1>
        <p class="subtitle">Διαδραστικό quiz υψηλής δυσκολίας, βασισμένο στις διαφάνειες του PDF.</p>
      </div>
      <button class="secondary" id="printBtn" type="button">Εκτύπωση</button>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="controls">
        <div>
          <label for="categoryFilter">Κατηγορία</label>
          <select id="categoryFilter"></select>
        </div>
        <div>
          <label for="searchBox">Αναζήτηση</label>
          <input id="searchBox" type="search" placeholder="Όρος, δομή, τρήμα, κόλπος, αιτιολόγηση">
        </div>
        <div class="toggle-row">
          <input id="shuffleQuestions" type="checkbox" checked>
          <span>Ανακάτεμα ερωτήσεων</span>
        </div>
        <div class="toggle-row">
          <input id="shuffleAnswers" type="checkbox" checked>
          <span>Ανακάτεμα απαντήσεων</span>
        </div>
      </div>
      <div class="actions">
        <button id="applyBtn" type="button">Νέο quiz</button>
        <button id="restartBtn" class="secondary" type="button">Επανεκκίνηση</button>
        <button id="clearProgressBtn" class="ghost" type="button">Καθαρισμός προόδου</button>
      </div>
    </section>

    <section class="status-grid" aria-live="polite">
      <div class="stat"><span>Σκορ</span><strong id="scoreStat">0</strong></div>
      <div class="stat"><span>Πρόοδος</span><strong id="progressStat">0 / 0</strong></div>
      <div class="stat"><span>Ποσοστό</span><strong id="percentStat">0%</strong></div>
      <div class="stat"><span>Κατηγορία</span><strong id="categoryStat">-</strong></div>
    </section>

    <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>

    <section id="quizCard" class="card"></section>
    <section id="results" class="results"></section>
    <section id="printSheet" class="print-sheet"></section>
  </main>

                        "text": "Είναι πυρήνες της κεντρικής φαιάς ουσίας.",
                        "correct": false
                  }
            ],
            "explanation": "Η διαφάνεια 14 ορίζει τις δεξαμενές ως διευρυσμένες θέσεις του υπαραχνοειδούς χώρου."
      }
];

    const STORAGE_KEY = "neuroanatomy_mcqs_progress_v1";
    let state = {
      pool: [],
      currentIndex: 0,
      score: 0,
      answers: {},
      wrongIds: [],
      completed: false,
      settings: {
        category: "all",
        search: "",
        shuffleQuestions: true,
        shuffleAnswers: true
      }
    };

    const els = {
      categoryFilter: document.getElementById("categoryFilter"),
      searchBox: document.getElementById("searchBox"),
      shuffleQuestions: document.getElementById("shuffleQuestions"),
      shuffleAnswers: document.getElementById("shuffleAnswers"),
      applyBtn: document.getElementById("applyBtn"),
      restartBtn: document.getElementById("restartBtn"),
      clearProgressBtn: document.getElementById("clearProgressBtn"),
      printBtn: document.getElementById("printBtn"),
      scoreStat: document.getElementById("scoreStat"),
      progressStat: document.getElementById("progressStat"),
      percentStat: document.getElementById("percentStat"),
      categoryStat: document.getElementById("categoryStat"),
      progressBar: document.getElementById("progressBar"),
      quizCard: document.getElementById("quizCard"),
      results: document.getElementById("results"),
      printSheet: document.getElementById("printSheet")
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function shuffle(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildCategories() {
      const categories = [...new Set(questions.map(q => q.category))].sort((a, b) => a.localeCompare(b, "el"));
      els.categoryFilter.innerHTML = `<option value="all">Όλες οι κατηγορίες</option>` +
        categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
    }

    function questionMatches(q, settings) {
      const byCategory = settings.category === "all" || q.category === settings.category;
      const term = settings.search.trim().toLowerCase();
      if (!byCategory) return false;
      if (!term) return true;
      const haystack = [
        q.category, q.source, q.question, q.explanation,
        ...q.options.map(o => o.text)
      ].join(" ").toLowerCase();
      return haystack.includes(term);
    }

    function makePool(settings, explicitIds = null) {
      let pool = questions.filter(q => explicitIds ? explicitIds.includes(q.id) : questionMatches(q, settings));
      if (settings.shuffleQuestions) pool = shuffle(pool);
      return pool.map(q => ({
        id: q.id,
        optionOrder: settings.shuffleAnswers ? shuffle(q.options.map((_, i) => i)) : q.options.map((_, i) => i)
      }));
    }

    function getQuestion(poolItem) {
      return questions.find(q => q.id === poolItem.id);
    }

    function readSettingsFromControls() {
      return {
        category: els.categoryFilter.value,
        search: els.searchBox.value,
        shuffleQuestions: els.shuffleQuestions.checked,
        shuffleAnswers: els.shuffleAnswers.checked
      };
    }

    function applySettingsToControls(settings) {
      els.categoryFilter.value = settings.category || "all";
      els.searchBox.value = settings.search || "";
      els.shuffleQuestions.checked = Boolean(settings.shuffleQuestions);
      els.shuffleAnswers.checked = Boolean(settings.shuffleAnswers);
    }

    function startQuiz(explicitIds = null) {
      state.settings = readSettingsFromControls();
      state.pool = makePool(state.settings, explicitIds);
      state.currentIndex = 0;
      state.score = 0;
      state.answers = {};
      state.wrongIds = [];
      state.completed = false;
      els.results.style.display = "none";
      els.quizCard.style.display = "block";
      render();
      saveProgress();
    }

    function restartCurrentPool() {
      const ids = state.pool.map(item => item.id);
      state.pool = makePool(state.settings, ids);
      state.currentIndex = 0;
      state.score = 0;
      state.answers = {};
      state.wrongIds = [];
      state.completed = false;
      els.results.style.display = "none";
      els.quizCard.style.display = "block";
      render();
      saveProgress();
    }

    function currentAnsweredCount() {
      return Object.keys(state.answers).length;
    }

    function renderStats() {
      const total = state.pool.length;
      const answered = currentAnsweredCount();
      const percent = answered ? Math.round((state.score / answered) * 100) : 0;
      els.scoreStat.textContent = state.score;
      const currentPosition = state.completed ? total : Math.min(state.currentIndex + 1, total);
      els.progressStat.textContent = `${currentPosition} / ${total}`;
      els.percentStat.textContent = `${percent}%`;
      const q = total && !state.completed ? getQuestion(state.pool[state.currentIndex]) : null;
      els.categoryStat.textContent = q ? q.category : "-";
      els.progressBar.style.width = total ? `${Math.round((answered / total) * 100)}%` : "0%";
    }

    function render() {
      renderStats();
      renderPrintSheet();

      if (!state.pool.length) {
        els.quizCard.innerHTML = `<div class="empty">Δεν βρέθηκαν ερωτήσεις με τα τρέχοντα φίλτρα.</div>`;
        els.results.style.display = "none";
        return;
      }

      if (state.completed || state.currentIndex >= state.pool.length) {
        showResults();
        return;
      }

      const poolItem = state.pool[state.currentIndex];
      const q = getQuestion(poolItem);
      const answer = state.answers[q.id];
      const answered = Boolean(answer);
      const optionsHtml = poolItem.optionOrder.map(idx => {
        const opt = q.options[idx];
        const isSelected = answer && answer.selectedIndex === idx;
        const cls = answered && opt.correct ? " correct" : answered && isSelected ? " wrong" : "";
        return `<button type="button" class="option${cls}" data-option-index="${idx}" ${answered ? "disabled" : ""}>
          <span class="key">${escapeHtml(opt.key)})</span>
          <span>${escapeHtml(opt.text)}</span>
        </button>`;
      }).join("");
      const feedbackClass = answered ? (answer.correct ? "good" : "bad") : "";
      const feedbackTitle = answered ? (answer.correct ? "Σωστή απάντηση" : "Λάθος απάντηση") : "";
      const feedbackHtml = answered ? `<strong>${feedbackTitle}</strong>${escapeHtml(q.explanation)} <span class="hint">(${escapeHtml(q.source)})</span>` : "";

      els.quizCard.innerHTML = `
        <div class="q-meta">
          <span class="pill">Ερώτηση ${state.currentIndex + 1} / ${state.pool.length}</span>
          <span class="pill">${escapeHtml(q.category)}</span>
          <span class="pill">${escapeHtml(q.source)}</span>
        </div>
        <p class="question">${escapeHtml(q.question)}</p>
        <div class="options">${optionsHtml}</div>
        <div class="feedback ${feedbackClass}">${feedbackHtml}</div>
        <div class="nav-row">
          <span class="hint">${answered ? "Η απάντηση κλειδώθηκε." : "Επίλεξε μία απάντηση για να εμφανιστεί η αιτιολόγηση."}</span>
          <button id="nextBtn" type="button" ${answered ? "" : "disabled"}>${state.currentIndex === state.pool.length - 1 ? "Αποτελέσματα" : "Επόμενη ερώτηση"}</button>
        </div>
      `;

      els.quizCard.querySelectorAll(".option").forEach(btn => {
        btn.addEventListener("click", () => handleAnswer(Number(btn.dataset.optionIndex)));
      });
      document.getElementById("nextBtn").addEventListener("click", nextQuestion);
    }

    function handleAnswer(optionIndex) {
      const poolItem = state.pool[state.currentIndex];
      const q = getQuestion(poolItem);
      if (state.answers[q.id]) return;
      const selected = q.options[optionIndex];
      state.answers[q.id] = { selectedIndex: optionIndex, correct: selected.correct };
      if (selected.correct) {
        state.score += 1;
      } else {
        state.wrongIds.push(q.id);
      }
      saveProgress();
      render();
    }

    function nextQuestion() {
      if (state.currentIndex < state.pool.length - 1) {
        state.currentIndex += 1;
      } else {
        state.completed = true;
      }
      saveProgress();
      render();
    }

    function categoryStats() {
      const rows = {};
      state.pool.forEach(item => {
        const q = getQuestion(item);
        if (!rows[q.category]) rows[q.category] = { total: 0, correct: 0, wrong: 0 };
        rows[q.category].total += 1;
        const ans = state.answers[q.id];
        if (ans && ans.correct) rows[q.category].correct += 1;
        if (ans && !ans.correct) rows[q.category].wrong += 1;
      });
      return rows;
    }

    function allCategoryDistribution() {
      const rows = {};
      questions.forEach(q => {
        rows[q.category] = (rows[q.category] || 0) + 1;
      });
      return rows;
    }

    function showResults() {
      state.completed = true;
      els.quizCard.style.display = "none";
      els.results.style.display = "block";
      renderStats();
      const total = state.pool.length;
      const wrong = state.wrongIds.length;
      const percent = total ? Math.round((state.score / total) * 100) : 0;
      const rows = categoryStats();
      const statsRows = Object.entries(rows).map(([cat, s]) => {
        const pct = s.total ? Math.round((s.correct / s.total) * 100) : 0;
        return `<tr><td>${escapeHtml(cat)}</td><td>${s.total}</td><td>${s.correct}</td><td>${s.wrong}</td><td>${pct}%</td></tr>`;
      }).join("");
      const wrongHtml = state.wrongIds.length
        ? state.wrongIds.map(id => {
            const q = questions.find(item => item.id === id);
            const correct = q.options.find(o => o.correct);
            return `<div class="wrong-item">
              <strong>#${q.id} - ${escapeHtml(q.category)}</strong>
              <div>${escapeHtml(q.question)}</div>
              <div class="hint">Σωστό: ${escapeHtml(correct.key)}) ${escapeHtml(correct.text)}</div>
            </div>`;
          }).join("")
        : `<div class="empty">Δεν υπάρχουν λανθασμένες ερωτήσεις για επανάληψη.</div>`;

      els.results.innerHTML = `
        <h2>Τελικό αποτέλεσμα</h2>
        <div class="status-grid">
          <div class="stat"><span>Συνολικό σκορ</span><strong>${state.score} / ${total}</strong></div>
          <div class="stat"><span>Ποσοστό επιτυχίας</span><strong>${percent}%</strong></div>
          <div class="stat"><span>Σωστές</span><strong>${state.score}</strong></div>
          <div class="stat"><span>Λανθασμένες</span><strong>${wrong}</strong></div>
        </div>
        <h2>Απόδοση ανά κατηγορία</h2>
        <table>
          <thead><tr><th>Κατηγορία</th><th>Σύνολο</th><th>Σωστές</th><th>Λάθος</th><th>Ποσοστό</th></tr></thead>
          <tbody>${statsRows}</tbody>
        </table>
        <h2>Ανασκόπηση λανθασμένων</h2>
        <div class="wrong-list">${wrongHtml}</div>
        <div class="actions">
          <button id="resultRestart" type="button">Επανεκκίνηση</button>
          <button id="retryWrong" class="secondary" type="button" ${wrong ? "" : "disabled"}>Επανάληψη λανθασμένων</button>
        </div>
      `;
      document.getElementById("resultRestart").addEventListener("click", restartCurrentPool);
      document.getElementById("retryWrong").addEventListener("click", () => {
        if (!state.wrongIds.length) return;
        const wrongIds = [...new Set(state.wrongIds)];
        state.settings = { ...state.settings, category: "all", search: "" };
        applySettingsToControls(state.settings);
        startQuiz(wrongIds);
      });
      saveProgress();
    }

    function renderPrintSheet() {
      const distribution = allCategoryDistribution();
      const distRows = Object.entries(distribution)
        .sort(([a], [b]) => a.localeCompare(b, "el"))
        .map(([cat, count]) => `<tr><td>${escapeHtml(cat)}</td><td>${count}</td></tr>`).join("");
      const allQuestions = questions.map(q => {
        const opts = q.options.map(o => `<p>${escapeHtml(o.key)}) ${escapeHtml(o.text)}</p>`).join("");
        const correct = q.options.find(o => o.correct);
        return `<article class="print-question">
          <h3>${q.id}. ${escapeHtml(q.question)}</h3>
          <p><strong>${escapeHtml(q.category)}</strong> - ${escapeHtml(q.source)}</p>
          ${opts}
          <p class="print-answer"><strong>Απάντηση:</strong> ${escapeHtml(correct.key)}) ${escapeHtml(correct.text)}</p>
          <p class="print-answer"><strong>Αιτιολόγηση:</strong> ${escapeHtml(q.explanation)}</p>
        </article>`;
      }).join("");
      els.printSheet.innerHTML = `
        <h2>Νευροανατομία - Εκτυπώσιμη μορφή</h2>
        <table><thead><tr><th>Κατηγορία</th><th>Αριθμός ερωτήσεων</th></tr></thead><tbody>${distRows}</tbody></table>
        ${allQuestions}
      `;
    }

    function saveProgress() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        // Η εφαρμογή παραμένει πλήρως λειτουργική χωρίς αποθήκευση.
      }
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const saved = JSON.parse(raw);
        if (!saved || !Array.isArray(saved.pool)) return false;
        const validIds = new Set(questions.map(q => q.id));
        if (!saved.pool.every(item => validIds.has(item.id) && Array.isArray(item.optionOrder))) return false;
        state = saved;
        applySettingsToControls(state.settings);
        return true;
      } catch (e) {
        return false;
      }
    }

    function clearProgress() {
      localStorage.removeItem(STORAGE_KEY);
      startQuiz();
    }

    function init() {
      buildCategories();
      els.applyBtn.addEventListener("click", () => startQuiz());
      els.restartBtn.addEventListener("click", restartCurrentPool);
      els.clearProgressBtn.addEventListener("click", clearProgress);
      els.printBtn.addEventListener("click", () => window.print());
      const restored = loadProgress();
      if (!restored) startQuiz();
      else render();
    }

    init();
  </script>
</body>
</html>
