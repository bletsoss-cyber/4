<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Νευροανατομία - MCQs Ρινικού και Μεταιχμιακού Συστήματος</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --panel: #ffffff;
      --ink: #182027;
      --muted: #66737f;
      --line: #d9e0e6;
      --accent: #295f73;
      --accent-2: #7b5b2f;
      --good: #187044;
      --good-bg: #e7f5ed;
      --bad: #9b2f2f;
      --bad-bg: #f9e7e7;
      --warn: #8a6419;
      --shadow: 0 18px 45px rgba(27, 39, 48, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(41, 95, 115, 0.08), transparent 310px),
        var(--bg);
      line-height: 1.55;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 6px;
      font-size: clamp(1.55rem, 2.6vw, 2.4rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }

    .top-actions, .controls-grid, .quiz-actions, .result-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button, select, input[type="search"] {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 7px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #9fb0bc;
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .secondary {
      background: #eef3f5;
    }

    .danger {
      color: #7f2828;
      border-color: #e0b8b8;
      background: #fff8f8;
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(217, 224, 230, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 16px;
      margin-bottom: 16px;
    }

    .controls-grid {
      align-items: end;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 210px;
      flex: 1 1 210px;
    }

    .field.compact {
      min-width: 0;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      color: var(--muted);
    }

    label {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 650;
    }

    select, input[type="search"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 12px;
      background: #fff;
      color: var(--ink);
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
    }

    .stat b {
      display: block;
      font-size: 1.18rem;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.87rem;
    }

    .progress-wrap {
      height: 10px;
      background: #e5ebef;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #4f8799);
      transition: width 0.2s ease;
    }

    .question-card {
      padding: clamp(18px, 3vw, 30px);
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #cdd8df;
      color: #31515e;
      background: #eef5f7;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .question-text {
      font-size: clamp(1.08rem, 2vw, 1.38rem);
      line-height: 1.42;
      margin-bottom: 18px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .option {
      width: 100%;
      display: grid;
      grid-template-columns: 42px 1fr;
      text-align: left;
      align-items: start;
      gap: 10px;
      padding: 13px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      min-height: 58px;
    }

    .option .key {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      font-weight: 800;
      background: #edf2f4;
      color: #38515d;
    }

    .option.correct {
      background: var(--good-bg);
      border-color: #8cc9a8;
      color: #0f5633;
    }

    .option.correct .key {
      background: var(--good);
      color: #fff;
    }

    .option.wrong {
      background: var(--bad-bg);
      border-color: #e2a0a0;
      color: #762222;
    }

    .option.wrong .key {
      background: var(--bad);
      color: #fff;
    }

    .feedback {
      display: none;
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: #fbfcfd;
      margin-bottom: 16px;
    }

    .feedback.show { display: block; }
    .feedback.good { border-color: #8cc9a8; background: var(--good-bg); }
    .feedback.bad { border-color: #e2a0a0; background: var(--bad-bg); }

    .feedback-title {
      font-weight: 800;
      margin-bottom: 4px;
    }

    .quiz-actions {
      justify-content: space-between;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .results {
      display: none;
      padding: clamp(18px, 3vw, 30px);
    }

    .results.show { display: block; }
    .quiz.hide { display: none; }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0 20px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      background: #eef3f5;
      font-size: 0.9rem;
      color: #41525d;
    }

    tr:last-child td { border-bottom: 0; }

    .wrong-list {
      display: grid;
      gap: 10px;
    }

    .wrong-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fff;
    }

    .wrong-item b { display: block; margin-bottom: 5px; }
    .muted { color: var(--muted); }
    .print-bank { display: none; }

    @media (max-width: 760px) {
      .shell { width: min(100% - 20px, 1120px); padding-top: 18px; }
      header { grid-template-columns: 1fr; align-items: start; }
      .stats-strip, .result-grid { grid-template-columns: repeat(2, 1fr); }
      .option { grid-template-columns: 36px 1fr; padding: 12px; }
      .top-actions { justify-content: stretch; }
      .top-actions button { flex: 1 1 auto; }
    }

    @media print {
      body {
        background: #fff;
        color: #000;
      }

      .shell > header,
      .controls,
      .stats-strip,
      .quiz,
      .results,
      .progress-wrap,
      .top-actions {
        display: none !important;
      }

      .shell {
        width: 100%;
        padding: 0;
      }

      .print-bank {
        display: block;
      }

      .print-question {
        break-inside: avoid;
        page-break-inside: avoid;
        margin: 0 0 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #ccc;
      }

      .print-question h3 {
        font-size: 12pt;
        margin-bottom: 5px;
      }

      .print-question ol {
        margin-top: 5px;
      }

      .print-answer {
        display: none;
        margin-top: 6px;
        font-size: 10pt;
      }

      body.print-answers .print-answer {
        display: block;
      }
    }
  </style>
</head>

      </div>
      <div class="top-actions">
        <button id="printBtn" class="secondary" type="button">Εκτύπωση</button>
        <button id="clearProgressBtn" class="danger" type="button">Καθαρισμός προόδου</button>
      </div>
    </header>

    <section class="controls panel" aria-label="Ρυθμίσεις quiz">
      <div class="controls-grid">
        <div class="field">
          <label for="categoryFilter">Κατηγορία</label>
          <select id="categoryFilter"></select>
        </div>
        <div class="field">

          <input id="searchInput" type="search" placeholder="Όρος, δομή, σχέση, διαφάνεια">
        </div>
        <label class="field compact">
          <input id="shuffleQuestions" type="checkbox" checked>
          Ανακάτεμα ερωτήσεων
        </label>
        <label class="field compact">
          <input id="shuffleAnswers" type="checkbox" checked>
          Ανακάτεμα απαντήσεων
        </label>
        <label class="field compact">
          <input id="printAnswers" type="checkbox">
          Απαντήσεις στην εκτύπωση
        </label>
        <button id="startBtn" class="primary" type="button">Έναρξη / Εφαρμογή</button>
      </div>
    </section>

    <section class="stats-strip" aria-label="Στατιστικά προόδου">
      <div class="stat"><b id="scoreStat">0</b><span>Σκορ</span></div>
      <div class="stat"><b id="progressStat">0 / 0</b><span>Πρόοδος</span></div>
      <div class="stat"><b id="percentStat">0%</b><span>Επιτυχία</span></div>
      <div class="stat"><b id="categoryStat">-</b><span>Τρέχουσα κατηγορία</span></div>
    </section>

    <div class="progress-wrap" aria-hidden="true">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <section id="quiz" class="quiz panel"></section>
    <section id="results" class="results panel"></section>
    <section id="printBank" class="print-bank"></section>
  </main>

      version: QUIZ_VERSION,

      },

    };

    const els = {
      categoryFilter: document.getElementById("categoryFilter"),
      searchInput: document.getElementById("searchInput"),
      shuffleQuestions: document.getElementById("shuffleQuestions"),
      shuffleAnswers: document.getElementById("shuffleAnswers"),
      printAnswers: document.getElementById("printAnswers"),

      printBank: document.getElementById("printBank"),
      scoreStat: document.getElementById("scoreStat"),
      progressStat: document.getElementById("progressStat"),
      percentStat: document.getElementById("percentStat"),
      categoryStat: document.getElementById("categoryStat"),
      progressBar: document.getElementById("progressBar")
    };

    function shuffleArray(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getQuestion(id) {
      return questions.find(q => q.id === id);
    }

    function normalize(text) {
      return String(text || "").toLocaleLowerCase("el-GR").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function questionMatches(q, category, search) {
      const categoryOk = category === "all" || q.category === category;
      if (!categoryOk) return false;
      const s = normalize(search).trim();
      if (!s) return true;
      const haystack = normalize([
        q.category,
        q.source,
        q.question,
        q.explanation,
        ...q.options.map(o => o.text)
      ].join(" "));
      return haystack.includes(s);
    }

    function getFilteredIds() {
      return questions
        .filter(q => questionMatches(q, els.categoryFilter.value, els.searchInput.value))
        .map(q => q.id);
    }

    function ensureOptionOrder(q) {
      if (!state.optionOrders[q.id]) {
        const indices = q.options.map((_, i) => i);
        state.optionOrders[q.id] = state.settings.shuffleAnswers ? shuffleArray(indices) : indices;
      }
      return state.optionOrders[q.id];
    }

    function score() {
      return Object.values(state.answers).filter(a => a.correct).length;
    }

    function answeredCount() {
      return Object.keys(state.answers).length;
    }

    function percent(correct, total) {
      return total ? Math.round((correct / total) * 100) : 0;
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        if (parsed.version !== QUIZ_VERSION || !Array.isArray(parsed.activeIds)) return false;
        state = parsed;
        els.categoryFilter.value = state.settings.category || "all";
        els.searchInput.value = state.settings.search || "";
        els.shuffleQuestions.checked = Boolean(state.settings.shuffleQuestions);
        els.shuffleAnswers.checked = Boolean(state.settings.shuffleAnswers);
        return true;
      } catch {
        return false;
      }
    }

    function clearProgress() {
      localStorage.removeItem(STORAGE_KEY);
      state = {
        version: QUIZ_VERSION,
        activeIds: [],
        index: 0,
        answers: {},
        optionOrders: {},
        settings: {
          category: els.categoryFilter.value,
          search: els.searchInput.value,
          shuffleQuestions: els.shuffleQuestions.checked,
          shuffleAnswers: els.shuffleAnswers.checked
        },
        completed: false,
        lastWrongIds: []
      };
      startQuiz();
    }

    function updateStats() {
      const total = state.activeIds.length;
      const done = answeredCount();
      const correct = score();
      const current = getQuestion(state.activeIds[state.index]);
      els.scoreStat.textContent = String(correct);
      els.progressStat.textContent = `${Math.min(done + (state.completed ? 0 : 1), total)} / ${total}`;
      els.percentStat.textContent = `${percent(correct, done)}%`;
      els.categoryStat.textContent = current ? current.category : "-";
      els.progressBar.style.width = total ? `${Math.round((done / total) * 100)}%` : "0%";
    }

    function renderQuestion() {
      els.results.classList.remove("show");
      els.quiz.classList.remove("hide");
      const total = state.activeIds.length;
      if (!total) {
        els.quiz.innerHTML = `<div class="empty">Δεν βρέθηκαν ερωτήσεις για το τρέχον φίλτρο ή την αναζήτηση.</div>`;
        updateStats();
        renderPrintBank();
        return;
      }
      if (state.index >= total) {
        showResults();
        return;
      }

      const q = getQuestion(state.activeIds[state.index]);
      const answer = state.answers[q.id];
      const order = ensureOptionOrder(q);
      const optionsHtml = order.map((optionIndex, displayIndex) => {
        const opt = q.options[optionIndex];
        let cls = "";
        if (answer) {
          if (opt.correct) cls = " correct";
          if (answer.selectedIndex === optionIndex && !opt.correct) cls = " wrong";
        }
        return `
          <button class="option${cls}" type="button" data-option-index="${optionIndex}" ${answer ? "disabled" : ""}>
            <span class="key">${LETTERS[displayIndex]})</span>
            <span>${opt.text}</span>
          </button>
        `;
      }).join("");

      els.quiz.innerHTML = `
        <article class="question-card">
          <div class="question-meta">
            <span class="pill">${q.category}</span>
            <span>${q.source}</span>
          </div>
          <div class="question-text">${q.question}</div>
          <div class="options">${optionsHtml}</div>
          <div id="feedback" class="feedback ${answer ? "show " + (answer.correct ? "good" : "bad") : ""}">
            ${answer ? `<div class="feedback-title">${answer.correct ? "Σωστό." : "Λάθος."}</div><div>${q.explanation}</div>` : ""}
          </div>
          <div class="quiz-actions">
            <span class="muted">Ερώτηση ${state.index + 1} από ${total}</span>
            <button id="nextBtn" class="primary" type="button" ${answer ? "" : "disabled"}>${state.index + 1 === total ? "Αποτελέσματα" : "Επόμενη ερώτηση"}</button>
          </div>
        </article>
      `;

      els.quiz.querySelectorAll(".option").forEach(btn => {
        btn.addEventListener("click", () => answerQuestion(q.id, Number(btn.dataset.optionIndex)));
      });
      document.getElementById("nextBtn").addEventListener("click", nextQuestion);
      updateStats();
      renderPrintBank();
      saveProgress();
    }

    function answerQuestion(questionId, optionIndex) {
      const q = getQuestion(questionId);
      const opt = q.options[optionIndex];
      const correctOption = q.options.find(o => o.correct);
      state.answers[questionId] = {
        selectedIndex: optionIndex,
        selectedText: opt.text,
        correctText: correctOption.text,
        correct: Boolean(opt.correct)
      };
      saveProgress();
      renderQuestion();
    }

    function nextQuestion() {
      if (state.index < state.activeIds.length - 1) {
        state.index += 1;
        renderQuestion();
      } else {
        state.completed = true;
        saveProgress();
        showResults();
      }
    }

    function categoryRows(ids) {
      const map = new Map();
      ids.forEach(id => {
        const q = getQuestion(id);
        if (!map.has(q.category)) map.set(q.category, { total: 0, correct: 0, answered: 0 });
        const row = map.get(q.category);
        row.total += 1;
        if (state.answers[id]) {
          row.answered += 1;
          if (state.answers[id].correct) row.correct += 1;
        }
      });
      return [...map.entries()].sort((a, b) => a[0].localeCompare(b[0], "el"));
    }

    function showResults() {
      const ids = state.activeIds;
      const total = ids.length;
      const correct = score();
      const wrongIds = ids.filter(id => state.answers[id] && !state.answers[id].correct);
      state.lastWrongIds = wrongIds;
      state.completed = true;
      els.quiz.classList.add("hide");
      els.results.classList.add("show");
      els.progressBar.style.width = "100%";

      const rows = categoryRows(ids).map(([cat, r]) => `
        <tr>
          <td>${cat}</td>
          <td>${r.total}</td>
          <td>${r.correct}</td>
          <td>${r.total - r.correct}</td>
          <td>${percent(r.correct, r.total)}%</td>
        </tr>
      `).join("");

      const wrongList = wrongIds.length ? wrongIds.map(id => {
        const q = getQuestion(id);
        const a = state.answers[id];
        return `
          <div class="wrong-item">
            <b>${q.id}. ${q.question}</b>
            <div class="muted">${q.category} - ${q.source}</div>
            <div>Απάντησες: ${a.selectedText}</div>
            <div>Σωστό: ${a.correctText}</div>
          </div>
        `;
      }).join("") : `<p class="muted">Δεν υπάρχουν λανθασμένες απαντήσεις για επανάληψη.</p>`;

      els.results.innerHTML = `
        <h2>Τελική επίδοση</h2>
        <div class="result-grid">
          <div class="stat"><b>${correct} / ${total}</b><span>Συνολικό σκορ</span></div>
          <div class="stat"><b>${percent(correct, total)}%</b><span>Ποσοστό επιτυχίας</span></div>
          <div class="stat"><b>${correct}</b><span>Σωστές</span></div>
          <div class="stat"><b>${total - correct}</b><span>Λανθασμένες</span></div>
        </div>
        <h3>Απόδοση ανά κατηγορία</h3>
        <table>
          <thead><tr><th>Κατηγορία</th><th>Ερωτήσεις</th><th>Σωστές</th><th>Λάθος</th><th>Ποσοστό</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <h3>Λανθασμένες ερωτήσεις</h3>
        <div class="wrong-list">${wrongList}</div>
        <div class="result-actions">
          <button class="primary" type="button" id="restartBtn">Επανεκκίνηση</button>
          <button class="secondary" type="button" id="retryWrongBtn" ${wrongIds.length ? "" : "disabled"}>Επανάληψη λανθασμένων</button>
        </div>
      `;
      document.getElementById("restartBtn").addEventListener("click", () => startQuiz());
      document.getElementById("retryWrongBtn").addEventListener("click", () => startQuiz(wrongIds));
      updateStats();
      saveProgress();
    }

    function startQuiz(forcedIds) {
      state.settings = {
        category: els.categoryFilter.value,
        search: els.searchInput.value,
        shuffleQuestions: els.shuffleQuestions.checked,
        shuffleAnswers: els.shuffleAnswers.checked
      };
      let ids = Array.isArray(forcedIds) ? [...forcedIds] : getFilteredIds();
      if (state.settings.shuffleQuestions) ids = shuffleArray(ids);
      state.activeIds = ids;
      state.index = 0;
      state.answers = {};
      state.optionOrders = {};
      state.completed = false;
      if (!Array.isArray(forcedIds)) state.lastWrongIds = [];
      renderQuestion();
    }

    function renderPrintBank() {
      const ids = state.activeIds.length ? state.activeIds : getFilteredIds();
      const html = ids.map((id, idx) => {
        const q = getQuestion(id);
        const correctIndex = q.options.findIndex(o => o.correct);
        const opts = q.options.map((o, i) => `<li>${LETTERS[i]}) ${o.text}</li>`).join("");
        return `
          <article class="print-question">
            <h3>${idx + 1}. ${q.question}</h3>
            <div>${q.category} - ${q.source}</div>
            <ol style="list-style:none; padding-left:0;">${opts}</ol>
            <div class="print-answer"><b>Απάντηση:</b> ${LETTERS[correctIndex]}) ${q.options[correctIndex].text}<br><b>Αιτιολόγηση:</b> ${q.explanation}</div>
          </article>
        `;
      }).join("");
      els.printBank.innerHTML = `<h1>Νευροανατομία - MCQs</h1>${html}`;
    }

    function populateCategories() {
      const counts = questions.reduce((acc, q) => {
        acc[q.category] = (acc[q.category] || 0) + 1;
        return acc;
      }, {});
      const options = [`<option value="all">Όλες οι κατηγορίες (${questions.length})</option>`]
        .concat(Object.keys(counts).sort((a, b) => a.localeCompare(b, "el")).map(cat => `<option value="${cat}">${cat} (${counts[cat]})</option>`));
      els.categoryFilter.innerHTML = options.join("");
    }

    function wireEvents() {
      els.startBtn.addEventListener("click", () => startQuiz());
      els.clearProgressBtn.addEventListener("click", clearProgress);
      els.printBtn.addEventListener("click", () => {
        document.body.classList.toggle("print-answers", els.printAnswers.checked);
        renderPrintBank();
        window.print();
      });
      els.searchInput.addEventListener("keydown", event => {
        if (event.key === "Enter") startQuiz();
      });
    }

    populateCategories();
    wireEvents();
    if (!loadProgress()) {
      startQuiz();
    } else if (state.completed) {
      showResults();
    } else {
      renderQuestion();
    }
  </script>
</body>
</html>
