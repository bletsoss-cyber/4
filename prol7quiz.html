            "Δ. Δεν συνιστάται ποτέ καμία προφύλαξη για ορθοπεδικά εμφυτεύματα"
        ],
        "correct": 2,
        "rationale": "Οι λοιμώξεις μηριαίων εμφυτευμάτων από στοματική χλωρίδα είναι σπάνιες (20%). Η αναγκαιότητα αμφισβητείται, και συστήνεται προφύλαξη μόνο αν η αρθροπλαστική έγινε πρόσφατα (μικρότερο των 2 ετών).<br><b>ΣΟΣ: Στα ορθοπεδικά εμφυτεύματα, χημειοπροφύλαξη δίνεται ΜΟΝΟ την πρώτη διετία (&lt;2 ετών) μετά το χειρουργείο.</b>"
    },
    {
        "q": "18. Πώς πρέπει να λαμβάνονται οι αποφάσεις για οδοντιατρική θεραπεία σε ανοσοκατασταλμένους ασθενείς;",
        "options": [
            "Α. Με αυθαίρετη χορήγηση 3g Αμοξυκιλλίνης σε κάθε ραντεβού",
            "Β. Ανάλογα με την διάρκεια και ένταση της καταστολής, και πάντα σε συνεννόηση με τους θεράποντες ιατρούς",
            "Γ. Αποφεύγονται πλήρως οι οδοντιατρικές πράξεις εφ' όρου ζωής",
            "Δ. Θεωρούνται χαμηλού κινδύνου και δεν απαιτείται ειδική μέριμνα"
        ],
        "correct": 1,
        "rationale": "Στους ανοσοκατασταλμένους, η αντιμετώπιση εξαρτάται από τη διάρκεια και την ένταση της καταστολής, και επιβάλλεται η συνεννόηση με τους θεράποντες ιατρούς.<br><b>ΣΟΣ: Η επικοινωνία με τον θεράποντα ιατρό είναι απόλυτη προτεραιότητα στους ανοσοκατασταλμένους.</b>"
    },
    {
        "q": "19. Σύμφωνα με τη γενική αρχή του μαθήματος, ποια είναι η 'καλύτερη πρόληψη' για τις επιπλοκές της μικροβιαιμίας;",
        "options": [
            "Α. Η δια βίου λήψη χαμηλών δόσεων αντιβίωσης",
            "Β. Η χρήση αποκλειστικά χλωρεξιδίνης",
            "Γ. Η αποφυγή του βουρτσίσματος",
            "Δ. Η καλή οδοντιατρική περίθαλψη (έλεγχος πλάκας, διόρθωση κακότεχνων εργασιών)"
        ],
        "correct": 3,
        "rationale": "Η διαφάνεια καταλήγει στο συμπέρασμα ότι 'Η καλύτερη πρόληψη είναι η καλή οδοντιατρική περίθαλψη', μέσω του ελέγχου της οδοντικής πλάκας και της εξάλειψης σημείων κατακράτησης (όπως κακότεχνες εμφράξεις).<br><b>ΣΟΣ: Η καλή οδοντιατρική υγεία και τα σωστά όρια των αποκαταστάσεων είναι η ρίζα της πρόληψης!</b>"
    }
];
        const container = document.getElementById('quiz-container');

        questions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const title = document.createElement('div');
            title.className = 'question-title';
            title.textContent = `${index + 1}. ${q.q}`;
            card.appendChild(title);
            
            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options';
            
            const rationaleDiv = document.createElement('div');
            rationaleDiv.className = 'rationale';
            rationaleDiv.innerHTML = q.rationale;

            q.options.forEach((optText, optIndex) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = optText;
                
                btn.onclick = () => {
                    // Κλείδωμα επιλογών
                    const allBtns = optionsContainer.querySelectorAll('button');
                    allBtns.forEach(b => b.disabled = true);
                    
                    // Έλεγχος σωστού/λάθους
                    if (optIndex === q.correct) {
                        btn.classList.add('correct');
                    } else {
                        btn.classList.add('wrong');
                        // Υπόδειξη της σωστής
                        allBtns[q.correct].classList.add('correct');
                    }
                    
                    // Εμφάνιση επεξήγησης και ΣΟΣ
                    rationaleDiv.style.display = 'block';
                };
                optionsContainer.appendChild(btn);
            });
            
            card.appendChild(optionsContainer);
            card.appendChild(rationaleDiv);
            container.appendChild(card);
        });
    </script>
</body>
</html>
