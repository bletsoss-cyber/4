let score = 0;
const answeredQuestions = new Set();

function initQuiz() {
    const container = document.getElementById('quiz-container');
    
    quizData.forEach((q, qIndex) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        
        const title = document.createElement('h3');
        title.className = 'question-title';
        title.innerText = q.question;
        card.appendChild(title);
        
        const optionsList = document.createElement('ul');
        optionsList.className = 'options-list';
        
        q.options.forEach((opt, oIndex) => {
            const li = document.createElement('li');
            li.className = 'option-item';
            
            // Κείμενο επιλογής
            const textSpan = document.createElement('div');
            textSpan.innerText = opt.text;
            li.appendChild(textSpan);
            
            // Στοιχείο Rationale (κρυφό αρχικά μέσω CSS)
            const rationaleDiv = document.createElement('div');
            rationaleDiv.className = 'rationale';
            rationaleDiv.innerHTML = `<strong>Επεξήγηση:</strong> ${opt.rationale}`;
            li.appendChild(rationaleDiv);
            
            // Click Handler
            li.addEventListener('click', () => handleOptionClick(qIndex, oIndex, li, card, opt.isCorrect));
            
            optionsList.appendChild(li);
        });
        
        card.appendChild(optionsList);
        container.appendChild(card);
    });
}

function handleOptionClick(qIndex, oIndex, selectedLi, cardElement, isCorrect) {
    // Αν έχει ήδη απαντηθεί η συγκεκριμένη ερώτηση, μην κάνεις τίποτα
    if (answeredQuestions.has(qIndex)) return;
    
    answeredQuestions.add(qIndex);
    
    const items = cardElement.querySelectorAll('.option-item');
    
    // Απενεργοποίηση όλων των επιλογών της συγκεκριμένης κάρτας
    items.forEach(item => item.classList.add('disabled'));
    
    if (isCorrect) {
        selectedLi.classList.add('correct');
        score++;
        document.getElementById('score-display').innerText = score;
    } else {
        selectedLi.classList.add('incorrect');
        // Επισήμανση της σωστής απάντησης για άμεση ανατροφοδότηση
        items.forEach((item, index) => {
            if (quizData[qIndex].options[index].isCorrect) {
                item.classList.add('correct');
            }
        });
    }
}

// Εκκίνηση του Quiz μόλις φορτωθεί το DOM
document.addEventListener('DOMContentLoaded', initQuiz);
</script>
