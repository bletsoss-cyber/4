<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κουίζ Ακτινολογίας: Φιλμ & Πινακίδες (Strictly Book-Based)</title>
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #2b6cb0;
            --accent: #c53030;
            --success: #2f855a;
            --bg-color: #edf2f7;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .quiz-container {
            background: var(--card-bg);
            max-width: 850px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
            position: relative;
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-top: 0;
            font-size: 1.8rem;
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .progress-bar-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 8px;
            height: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--secondary);
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-text {
            text-align: right;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            line-height: 1.4;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--secondary);
            background: #ebf8ff;
        }

        .option-btn.correct {
            background-color: #f0fdf4;
            border-color: var(--success);
            color: #166534;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fef2f2;
            border-color: var(--accent);
            color: #991b1b;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .feedback-container {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.4s ease-in-out;
            line-height: 1.6;
            font-size: 1rem;
        }

        .feedback-container.show {
            display: block;
        }

        .feedback-container.success {
            background-color: #eafaf1;
            border-left: 5px solid var(--success);
        }

        .feedback-container.error {
            background-color: #fdedec;
            border-left: 5px solid var(--accent);
        }

        .feedback-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.15rem;
        }

        .next-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            float: right;
            display: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .next-btn:hover {
            background-color: #2b6cb0;
        }

        .next-btn:active {
            transform: scale(0.98);
        }

        .result-screen {
            text-align: center;
            display: none;
            padding: 20px 0;
        }

        .result-screen h2 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: bold;
            color: var(--secondary);
            margin: 20px 0;
        }

        .result-message {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .restart-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .restart-btn:hover {
            background-color: #276749;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>

    <div class="quiz-container clearfix">
        <div id="quiz-screen">
            <h1>Κλινική Ακτινολογία: Αυστηρή Επανάληψη 6ου Κεφαλαίου</h1>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-text" id="progress-text">Ερώτηση 1 από 20</div>
            
            <div class="question-text" id="question">Loading...</div>
            
            <div class="options-wrapper" id="options">
                </div>

            <div class="feedback-container" id="feedback">
                <div class="feedback-title" id="feedback-title"></div>
                <div id="feedback-text"></div>
            </div>

            <button class="next-btn" id="next-btn">Επόμενη Ερώτηση &rarr;</button>
        </div>

        <div class="result-screen" id="result-screen">
            <h2>Ολοκλήρωση Κουίζ!</h2>
            <div class="score-display" id="final-score-number">0/20</div>
            <div class="result-message" id="final-message"></div>
            <button class="restart-btn" onclick="restartQuiz()">Επανεκκίνηση Κουίζ</button>
        </div>
    </div>

    <script>
        // ΟΛΕΣ οι ερωτήσεις προέρχονται ΑΠΟΚΛΕΙΣΤΙΚΑ από το κείμενο των 6 εικόνων.
        const quizData = [
            {
                question: "1. Ποιο είναι το πάχος της βάσης του ακτινογραφικού φιλμ (η οποία αποτελείται από οξική κυτταρίνη ή πολυεστέρα πολυαιθυλενίου);",
                options: [
                    "Περίπου 0,7 mm.",
                    "Περίπου 0,2 mm.",
                    "Περίπου 1 pm (μικρόμετρο).",
                    "Περίπου 0,25 mm."

                correct: 1,
                explanation: "Σύμφωνα με το κείμενο (σελίδα κατασκευής), η βάση έχει πάχος 0,2 mm περίπου, ώστε να προσδίδει ικανοποιητική συγκράτηση στο γαλάκτωμα. Το 0,7 mm αφορά το μέγεθος των κρυστάλλων στο φιλμ D."
            },
            {
                question: "2. Ποια είναι η χημική σύσταση των κρυστάλλων που αιωρούνται στη ζελατίνη του γαλακτώματος;",
                options: [
                    "Αποτελούνται αποκλειστικά από ιωδιούχα άλατα του αργύρου.",

                correct: 1,
                explanation: "Το κείμενο αναφέρει ρητά: «Οι κρύσταλλοι αυτοί αποτελούνται κατά κύριο λόγο από βρωμιούχα άλατα του αργύρου και σε μικρότερο βαθμό από ιωδιούχο άργυρο»."
            },
            {
                question: "3. Ποιος είναι ο ακριβής ρόλος του «επιστρώματος» στο ακτινογραφικό φιλμ;",

                    "Τα φιλμ Ε έχουν κρυστάλλους διαμέτρου 0,7 μm, ενώ τα D έχουν 1 μm.",
                    "Τα φιλμ Ε έχουν κρυστάλλους διαμέτρου περίπου 1 μm, ενώ στα D οι κρύσταλλοι είναι κατά τι μικρότεροι, περίπου 0,7 μm.",
                    "Και τα δύο έχουν μέγεθος 1 μm, απλώς τα Ε έχουν περισσότερους κρυστάλλους.",
                    "Τα D έχουν διάμετρο 1,5 μm και τα Ε 0,2 mm."
                ],
                correct: 1,
                explanation: "Στην ενότητα για την κατασκευή αναφέρεται: «...στα οδοντιατρικά φιλμ ευαισθησίας E η διάμετρός τους είναι περίπου 1 μm ενώ στα ευαισθησίας D οι κρύσταλλοι είναι κατά τι μικρότεροι, περίπου 0,7 μm»."
            },
            {
                question: "18. Ποια είναι η σχέση του χρόνου έκθεσης ανάμεσα στα φιλμ ευαισθησίας D (Ultraspeed) και στα φιλμ ευαισθησίας E (Ektaspeed);",
                options: [
                    "Τα φιλμ Ε απαιτούν διπλάσιο χρόνο έκθεσης από τα φιλμ D.",
                    "Τα φιλμ Ε απαιτούν ακριβώς τον ίδιο χρόνο έκθεσης με τα D, αλλά δίνουν καλύτερη λεπτομέρεια.",
                    "Τα φιλμ Ε απαιτούν ακριβώς τον μισό χρόνο έκθεσης από τα φιλμ D για να πετύχουν ικανοποιητική πυκνότητα.",
                    "Τα φιλμ D δεν χρησιμοποιούνται πλέον λόγω απαιτήσεων τεράστιων χρόνων έκθεσης."
                ],
                correct: 2,
                explanation: "Αναφέρεται ρητά στη σελ. 208: «Τα φιλμ ευαισθησίας E... απαιτούν ακριβώς το μισό χρόνο έκθεσης από τα φιλμ με ευαισθησία D...»."
            },
            {
                question: "19. Ποια είναι η θεωρητική σχέση μεταξύ του μεγέθους των κρυστάλλων και της λεπτομέρειας ενός φιλμ;",
                options: [
                    "Τα αδρόκοκκα φιλμ (μεγάλοι κρύσταλλοι) αποδίδουν τη μεγαλύτερη δυνατή λεπτομέρεια.",
                    "Τα λεπτόκοκκα φιλμ (μικροί κρύσταλλοι) έχουν θεωρητικά καλύτερη λεπτομέρεια εικόνας από τα αδρόκοκκα.",
                    "Το μέγεθος των κρυστάλλων δεν επηρεάζει καθόλου τη λεπτομέρεια, παρά μόνο την αντίθεση.",
                    "Όσο πιο μεγάλοι οι κρύσταλλοι, τόσο μειώνεται η ταχύτητα και αυξάνεται η λεπτομέρεια."
                ],
                correct: 1,
                explanation: "Το κείμενο εξηγεί (ενότητα Λεπτομέρεια): «...έτσι τα λεπτόκοκκα φιλμ έχουν θεωρητικά καλύτερη λεπτομέρεια της εικόνας από τα αδρόκοκκα φιλμ»."
            },
            {
                question: "20. Ποιες είναι οι διαστάσεις των φιλμ που χρησιμοποιούνται συνήθως για την πανοραμική ακτινογραφία;",
                options: [
                    "18 x 24 εκ. ή 24 x 30 εκ.",
                    "15 x 7 εκ.",
                    "24 x 40 mm ή 32 x 41 mm.",
                    "12,5 x 30 εκ. ή 15 x 30 εκ."
                ],
                correct: 3,
                explanation: "Στην ενότητα 'Εξωστοματικά Φιλμ' στη σελίδα 205 γράφει ξεκάθαρα: «Για την πανοραμική ακτινογραφία χρησιμοποιούνται φιλμ διαστάσεων 12,5x30 εκ. ή 15x30 εκ.»."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const progressTextEl = document.getElementById('progress-text');
        const progressBarEl = document.getElementById('progress-bar');
        const feedbackEl = document.getElementById('feedback');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const nextBtn = document.getElementById('next-btn');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreNumber = document.getElementById('final-score-number');
        const finalMessage = document.getElementById('final-message');

        function loadQuestion() {
            answered = false;
            feedbackEl.classList.remove('show', 'success', 'error');
            nextBtn.style.display = 'none';
            
            const q = quizData[currentQuestion];
            
            progressTextEl.innerText = `Ερώτηση ${currentQuestion + 1} από ${quizData.length}`;
            const progressPercent = ((currentQuestion) / quizData.length) * 100;
            progressBarEl.style.width = `${progressPercent}%`;
            
            questionEl.innerText = q.question;
            
            optionsEl.innerHTML = '';
            q.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option;
                button.onclick = () => checkAnswer(index, button);
                optionsEl.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex, buttonClicked) {
            if (answered) return;
            answered = true;

            const q = quizData[currentQuestion];
            const allButtons = optionsEl.querySelectorAll('.option-btn');
            
            allButtons.forEach(btn => btn.disabled = true);

            if (selectedIndex === q.correct) {
                buttonClicked.classList.add('correct');
                score++;
                showFeedback(true, q.explanation);
            } else {
                buttonClicked.classList.add('wrong');
                allButtons[q.correct].classList.add('correct');
                showFeedback(false, q.explanation);
            }

            if (currentQuestion === quizData.length - 1) {
                nextBtn.innerText = "Ολοκλήρωση Κουίζ";
            } else {
                nextBtn.innerHTML = "Επόμενη Ερώτηση &rarr;";
            }
            
            nextBtn.style.display = 'block';
        }

        function showFeedback(isCorrect, text) {
            feedbackEl.classList.add(isCorrect ? 'success' : 'error', 'show');
            feedbackTitle.innerText = isCorrect ? 'Σωστή Απάντηση!' : 'Λάθος Απάντηση.';
            feedbackTitle.style.color = isCorrect ? '#166534' : '#991b1b';
            feedbackText.innerText = text;
        }

        nextBtn.addEventListener('click', () => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function showResults() {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            
            progressBarEl.style.width = '100%';
            
            let message = '';
            const percentage = (score / quizData.length) * 100;
            
            if(percentage === 100) {
                message = "<strong>Άριστα!</strong> Γνωρίζεις το κεφάλαιο λέξη προς λέξη.";
            } else if (percentage >= 75) {
                message = "<strong>Πάρα πολύ καλά!</strong> Ελάχιστες λεπτομέρειες σου ξέφυγαν.";
            } else if (percentage >= 50) {
                message = "<strong>Καλή προσπάθεια.</strong> Θέλεις λίγη επανάληψη στα νούμερα και τους ορισμούς.";
            } else {
                message = "<strong>Χρειάζεται παραπάνω διάβασμα στις σελίδες αυτές.</strong> Ξαναδιάβασε το κείμενο προσεκτικά.";
            }

            finalScoreNumber.innerText = `${score} / ${quizData.length}`;
            finalMessage.innerHTML = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
