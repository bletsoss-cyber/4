<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κουίζ Ακτινολογίας: Φιλμ & Πινακίδες (20 Ερωτήσεις)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --success: #27ae60;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .quiz-container {
            background: var(--card-bg);
            max-width: 850px;
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
            position: relative;
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-top: 0;
            font-size: 1.8rem;
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .progress-bar-container {
            width: 100%;
            background-color: #e2e8f0;
            border-radius: 8px;
            height: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--secondary);
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-text {
            text-align: right;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 1.05rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            line-height: 1.4;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--secondary);
            background: #ebf8ff;
        }

        .option-btn.correct {
            background-color: #f0fdf4;
            border-color: var(--success);
            color: #166534;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: #fef2f2;
            border-color: var(--accent);
            color: #991b1b;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .feedback-container {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.4s ease-in-out;
            line-height: 1.6;
            font-size: 1rem;
        }

        .feedback-container.show {
            display: block;
        }

        .feedback-container.success {
            background-color: #eafaf1;
            border-left: 5px solid var(--success);
        }

        .feedback-container.error {
            background-color: #fdedec;
            border-left: 5px solid var(--accent);
        }

        .feedback-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.15rem;
        }

        .next-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            float: right;
            display: none;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .next-btn:hover {
            background-color: #2980b9;
        }

        .next-btn:active {
            transform: scale(0.98);
        }

        .result-screen {
            text-align: center;
            display: none;
            padding: 20px 0;
        }

        .result-screen h2 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: bold;
            color: var(--secondary);
            margin: 20px 0;
        }

        .result-message {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .restart-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .restart-btn:hover {
            background-color: #219a52;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>

    <div class="quiz-container clearfix">
        <div id="quiz-screen">
            <h1>Κλινική Ακτινολογία: Φιλμ & Ενισχυτικές Πινακίδες</h1>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-text" id="progress-text">Ερώτηση 1 από 20</div>
            
            <div class="question-text" id="question">Loading...</div>
            
            <div class="options-wrapper" id="options">
                </div>

            <div class="feedback-container" id="feedback">
                <div class="feedback-title" id="feedback-title"></div>
                <div id="feedback-text"></div>
            </div>

            <button class="next-btn" id="next-btn">Επόμενη Ερώτηση &rarr;</button>
        </div>

        <div class="result-screen" id="result-screen">
            <h2>Ολοκλήρωση Κουίζ!</h2>
            <div class="score-display" id="final-score-number">0/20</div>
            <div class="result-message" id="final-message"></div>
            <button class="restart-btn" onclick="restartQuiz()">Επανεκκίνηση Κουίζ</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "1. Ποιο είναι το κύριο πλεονέκτημα του πολυεστέρα έναντι της οξικής κυτταρίνης στην κατασκευή της βάσης του φιλμ;",
                options: [
                    "Μεγαλύτερη διαπερατότητα στις ακτίνες Χ.",
                    "Αυξημένη σταθερότητα διαστάσεων, αντοχή στην υγρασία και μηχανική αντοχή.",
                    "Καλύτερη χημική πρόσφυση των κρυστάλλων ιωδιούχου αργύρου.",
                    "Μείωση της «μπλε χροιάς» για πιο καθαρή εικόνα στο διαφανοσκόπιο."
                ],
                correct: 1,
                explanation: "Ο πολυεστέρας επιλέχθηκε επειδή δεν συρρικνώνεται, δεν παραμορφώνεται στο εμφανιστήριο και έχει εξαιρετική μηχανική αντοχή. Η «μπλε χροιά» προστίθεται επίτηδες για να ξεκουράζει το μάτι, δεν μειώνεται."
            },
            {
                question: "2. Η προσθήκη ιωδιούχου αργύρου (AgI) σε ποσοστό 1-10% στους κρυστάλλους βρωμιούχου αργύρου (AgBr) του γαλακτώματος εξυπηρετεί:",
                options: [
                    "Την αύξηση της σκληρότητας της ζελατίνης κατά την εμφάνιση.",
                    "Την παραγωγή μπλε φωτός κατά τον φθορισμό.",
                    "Τη δημιουργία ατελειών στο κρυσταλλικό πλέγμα, αυξάνοντας την ευαισθησία.",
                    "Την επιτάχυνση της δράσης της υδροκινόνης."
                ],
                correct: 2,
                explanation: "Τα ιόντα ιωδίου έχουν μεγαλύτερη διάμετρο από τα ιόντα βρωμίου. Αυτό προκαλεί «διαταραχή» (structural defects) στο κρυσταλλικό πλέγμα, διευκολύνοντας την παγίδευση ηλεκτρονίων (κέντρα ευαισθησίας) και άρα τον σχηματισμό της λανθάνουσας εικόνας."
            },
            {
                question: "3. Σύμφωνα με τη θεωρία Gurney-Mott, η λανθάνουσα εικόνα σχηματίζεται όταν:",
                options: [
                    "Η ζελατίνη μετατρέπεται από gel σε sol λόγω της ακτινοβολίας.",
                    "Τα ελεύθερα ηλεκτρόνια παγιδεύονται στα «κέντρα ευαισθησίας» και έλκουν θετικά ιόντα αργύρου.",
                    "Οι κρύσταλλοι βρωμίου διαλύονται στο στερεοποιητικό διάλυμα.",
                    "Το φιλμ εκτίθεται σε υπεριώδη ακτινοβολία που διασπά τους δεσμούς άνθρακα."
                ],
                correct: 1,
                explanation: "Η ακτινοβολία απελευθερώνει ηλεκτρόνια από τα ιόντα βρωμίου. Αυτά παγιδεύονται στα κέντρα ευαισθησίας, φορτίζοντάς τα αρνητικά. Στη συνέχεια, τα ελεύθερα θετικά ιόντα αργύρου (Ag+) έλκονται εκεί και μετατρέπονται σε ουδέτερα άτομα μεταλλικού αργύρου."
            },
            {
                question: "4. Τα φιλμ ταχύτητας F (π.χ. Insight) χρησιμοποιούν «πλακοειδείς» κρυστάλλους (tabular grains). Ποιο είναι το φυσικό τους πλεονέκτημα;",
                options: [
                    "Απαιτούν μικρότερο πάχος γαλακτώματος, διευκολύνοντας την κάμψη.",
                    "Προσφέρουν μεγαλύτερη επιφάνεια προβολής προς την ακτινοβολία χωρίς να αυξάνουν τον όγκο τους.",
                    "Αυξάνουν την απορρόφηση της δευτερογενούς ακτινοβολίας από τους ιστούς.",
                    "Μειώνουν δραστικά τον απαιτούμενο χρόνο πλύσης στο νερό."
                ],
                correct: 1,
                explanation: "Λόγω του επίπεδου σχήματός τους, προσφέρουν μεγάλη επιφάνεια 'στόχου' στα φωτόνια, αυξάνοντας την ταχύτητα του φιλμ. Επειδή όμως είναι λεπτοί, ο συνολικός τους όγκος μένει μικρός, διατηρώντας ικανοποιητική τη λεπτομέρεια της εικόνας."
            },
            {
                question: "5. Η χρήση ενδοστοματικού φιλμ ταχύτητας F αντί για ταχύτητας D επιτυγχάνει μείωση της δόσης ακτινοβολίας στον ασθενή κατά περίπου:",
                options: [
                    "20%",
                    "40%",
                    "60%",
                    "80%"
                ],
                correct: 2,
                explanation: "Το φιλμ ταχύτητας F απαιτεί περίπου το 40% του χρόνου έκθεσης (και άρα της δόσης) σε σχέση με το D-speed. Επομένως, η *μείωση* της δόσης είναι 60%."
            },
            {
                question: "6. Γιατί η ζελατίνη θεωρείται ιδανικό υλικό για τη συγκράτηση των κρυστάλλων στο γαλάκτωμα;",
                options: [
                    "Επειδή κρυσταλλώνει γρήγορα σε υψηλές θερμοκρασίες (άνω των 30°C).",
                    "Δρα ως ηλεκτρικός αγωγός, διευκολύνοντας την κίνηση των ηλεκτρονίων.",
                    "Διογκώνεται στο εμφανιστήριο, επιτρέποντας τη δίοδο των χημικών στους κρυστάλλους, χωρίς να διαλύεται.",
                    "Αντιδρά με τα χημικά για να δώσει το τελικό μαύρο χρώμα."
                ],
                correct: 2,
                explanation: "Η ιδιότητα της ζελατίνης να διογκώνεται (απορροφώντας νερό/χημικά) χωρίς να χάνει τη δομική της συνοχή είναι κρίσιμη, ώστε το εμφανιστικό και το στερεοποιητικό να φτάσουν στους κρυστάλλους του αργύρου."
            },
            {
                question: "7. Στις εξωστοματικές τεχνικές, ο κύριος ρόλος της ενισχυτικής πινακίδας είναι:",
                options: [
                    "Η απορρόφηση της σκεδαζόμενης ακτινοβολίας από την κασέτα.",
                    "Ο μετασχηματισμός των φωτονίων των ακτίνων Χ σε ορατό φως (φθορισμός) που εκθέτει το φιλμ.",
                    "Η μηχανική συμπίεση του εξωστοματικού φιλμ για αποφυγή artifacts.",
                    "Η αύξηση της διεισδυτικότητας της πρωτογενούς δέσμης."
                ],
                correct: 1,
                explanation: "Η ενισχυτική πινακίδα απορροφά τα φωτόνια Χ και εκπέμπει χιλιάδες φωτόνια ορατού φωτός. Αυτό το ορατό φως είναι που εκθέτει κυρίως το φιλμ, μειώνοντας τεράστια την απαιτούμενη δόση ακτινοβολίας."
            },
            {
                question: "8. Οι ενισχυτικές πινακίδες με σπάνιες γαίες που περιέχουν οξυσουλφίδιο του γαδολινίου (Gadolinium oxysulfide) εκπέμπουν φως κυρίως χρώματος:",
                options: [
                    "Μπλε",
                    "Κίτρινο",
                    "Πράσινο",
                    "Υπέρυθρο"
                ],
                correct: 2,
                explanation: "Το γαδολίνιο παράγει πράσινο φως. Είναι κρίσιμο να γνωρίζουμε το χρώμα, διότι πρέπει να το συνδυάσουμε αυστηρά με ορθοχρωματικό φιλμ (orthochromatic), το οποίο είναι ευαίσθητο στο πράσινο."
            },
            {
                question: "9. Ένα ακτινογράφημα με «χαμηλή αντίθεση» (low contrast - μεγάλη διαβάθμιση του γκρι) παράγεται όταν:",
                options: [
                    "Χρησιμοποιούμε χαμηλό kVp (π.χ. 60-65 kVp).",
                    "Χρησιμοποιούμε υψηλό kVp (π.χ. 90 kVp).",
                    "Μειώνουμε δραστικά τον χρόνο εμφάνισης.",
                    "Χρησιμοποιούμε φιλμ ταχύτητας D."
                ],
                correct: 1,
                explanation: "Τα υψηλά kVp (π.χ. 90) παράγουν δέσμη υψηλής ενέργειας/διεισδυτικότητας. Αυτό μειώνει τις διαφορές απορρόφησης μεταξύ των ιστών, άρα προκύπτουν πολλές, λεπτές αποχρώσεις του γκρι (ιδανικό για περιοδοντολογία)."
            },
            {
                question: "10. Η εμφάνιση του ανάγλυφου σχεδίου (herringbone pattern / «ψαροκόκκαλο») σε ένα ενδοστοματικό ακτινογράφημα υποδηλώνει:",
                options: [
                    "Υπερβολική δόση δευτερογενούς ακτινοβολίας από τον ασθενή.",
                    "Τοποθέτηση του πλακιδίου με την ανάποδη πλευρά (πλευρά του φύλλου μολύβδου) στραμμένη προς τη λυχνία.",
                    "Κακή επαφή του φιλμ με το χαρτί της συσκευασίας.",
                    "Λήξη της ημερομηνίας του γαλακτώματος."
                ],
                correct: 1,
                explanation: "Αν το φιλμ μπει ανάποδα, η δέσμη περνάει πρώτα από το φύλλο μολύβδου. Το μόλυβδο απορροφά μέρος της δέσμης (άρα το φιλμ βγαίνει ανοιχτόχρωμο) και αποτυπώνει το ανάγλυφο 'ψαροκόκκαλο' που έχει επάνω του."
            },
            {
                question: "11. Ποιος συνδυασμός παραγόντων ελαχιστοποιεί την ημιφωταύγεια (penumbra), αυξάνοντας την ευκρίνεια της εικόνας;",
                options: [
                    "Μεγάλη εστιακή κηλίδα, μικρή απόσταση αντικειμένου-φιλμ.",
                    "Μικρή εστιακή κηλίδα, μικρή απόσταση αντικειμένου-φιλμ.",
                    "Μικρή εστιακή κηλίδα, μεγάλη απόσταση αντικειμένου-φιλμ.",
                    "Χρήση ενισχυτικών πινακίδων υψηλής ταχύτητας."
                ],
                correct: 1,
                explanation: "Για μέγιστη ευκρίνεια θέλουμε: όσο το δυνατόν μικρότερη εστία (πηγή) και το φιλμ να βρίσκεται σε στενή επαφή με το δόντι (ελάχιστη απόσταση αντικειμένου-φιλμ)."
            },
            {
                question: "12. Ο «λόγος διαφράγματος» (grid ratio) στις εξωστοματικές τεχνικές καθορίζεται από:",
                options: [
                    "Το συνολικό πάχος της κασέτας σε χιλιοστά.",
                    "Τη σχέση του ύψους των λωρίδων μολύβδου προς την απόσταση (κενό) μεταξύ τους (h/d).",
                    "Το ποσοστό της πρωτογενούς ακτινοβολίας που περνάει.",
                    "Τον πολλαπλασιαστή των mAs που απαιτείται."
                ],
                correct: 1,
                explanation: "Ο λόγος r = h/d. Όσο μεγαλύτερο είναι το ύψος (h) των λωρίδων σε σχέση με το μεταξύ τους κενό (d), τόσο πιο 'αυστηρό' είναι το διάφραγμα στο να 'κόβει' τις λοξές, σκεδαζόμενες ακτίνες."
            },
            {
                question: "13. Στο εμφανιστικό διάλυμα, ο χημικός παράγοντας που δρα αργά και είναι υπεύθυνος για την παραγωγή των 'μαύρων' περιοχών (υψηλή αντίθεση) είναι:",
                options: [
                    "Η Ελόν (Elon) ή Μετόλη.",
                    "Η Υδροκινόνη (Hydroquinone).",
                    "Το Θειώδες Νάτριο (Συντηρητικό).",
                    "Το Βρωμιούχο Κάλιο (Ανασταλτικό)."
                ],
                correct: 1,
                explanation: "Η Υδροκινόνη δρα αργά και χτίζει τη μαύρη πυκνότητα (contrast). Αντίθετα, η Ελόν δρα γρήγορα και αναδεικνύει τις γκριζωπές αποχρώσεις (λεπτομέρεια)."
            },
            {
                question: "14. Ποια είναι η κύρια λειτουργία του θειοθειικού αμμωνίου στο στερεοποιητικό διάλυμα (fixer);",
                options: [
                    "Να μαυρίσει περαιτέρω τους εκτεθειμένους κρυστάλλους.",
                    "Να διαλύσει και να απομακρύνει τους μη εκτεθειμένους (μη ανηγμένους) κρυστάλλους αλογονούχου αργύρου.",
                    "Να σκληρύνει τη ζελατίνη πριν το τελικό πλύσιμο.",
                    "Να εξουδετερώσει την αλκαλικότητα του εμφανιστηρίου."
                ],
                correct: 1,
                explanation: "Αν οι αχρησιμοποίητοι (μη εκτεθειμένοι) κρύσταλλοι δεν απομακρυνθούν από το θειοθειικό αμμώνιο (clearing agent), το φιλμ θα παραμείνει γαλακτώδες-θολό και με τον καιρό θα μαυρίσει ολοκληρωτικά από το φως."
            },
            {
                question: "15. Στο ειδικό φιλμ αντιγραφής (duplicating film), η αύξηση του χρόνου έκθεσης στην πηγή φωτός έχει ως αποτέλεσμα:",
                options: [
                    "Πιο σκούρο (μαύρο) αντίγραφο.",
                    "Πιο ανοιχτόχρωμο (διάφανο) αντίγραφο.",
                    "Αύξηση του κοντράστ στα ενδιάμεσα γκρι.",
                    "Καμία μεταβολή, λόγω αντιγραφικής οροφής."
                ],
                correct: 1,
                explanation: "Το duplicating film λειτουργεί αντίστροφα από τα κοινά φιλμ (φαινόμενο ηλιασμού - solarization). Επειδή είναι 'προ-εκτεθειμένο', όσο περισσότερο φως δέχεται κατά την αντιγραφή, τόσο πιο *ανοιχτόχρωμο* (άσπρο) γίνεται."
            },
            {
                question: "16. Κατά την ταξινόμηση (mounting) με την «χειλική» μέθοδο (labial mounting), η κυρτή πλευρά του επάρματος (dot) είναι στραμμένη:",
                options: [
                    "Προς τη γλώσσα του ασθενούς.",
                    "Προς τον εξεταστή (οδοντίατρο).",
                    "Πάντα προς την άνω γνάθο.",
                    "Προς την πλευρά του χάρτινου πλαισίου που αναγράφει το όνομα."
                ],
                correct: 1,
                explanation: "Στο labial mounting κοιτάμε το φιλμ σαν να στεκόμαστε μπροστά και απέναντι από τον ασθενή (τα δεξιά του ασθενούς είναι αριστερά μας). Για να ισχύει αυτό, η κυρτή επιφάνεια του dot πρέπει να κοιτάζει προς εμάς."
            },
            {
                question: "17. Ποιος από τους παρακάτω παράγοντες ΔΕΝ προκαλεί γενικευμένο θόλωμα (fog) στο ακτινογραφικό φιλμ;",
                options: [
                    "Αποθήκευση σε χώρο με υψηλή θερμοκρασία (άνω των 21°C).",
                    "Διαρροή λευκού φωτός στο σκοτεινό θάλαμο.",
                    "Χρήση του ενδεδειγμένου φίλτρου ασφαλείας GBX-2 στη σωστή απόσταση.",
                    "Χρήση πολύ παλαιών (οξειδωμένων) χημικών διαλυμάτων."
                ],
                correct: 2,
                explanation: "Το φίλτρο ασφαλείας GBX-2 (αν χρησιμοποιηθεί σωστά) δεν εκθέτει το φιλμ. Αντίθετα, η ζέστη, το τυχαίο φως, τα ληγμένα χημικά ή η ακτινοβολία υποβάθρου προκαλούν film fog."
            },
            {
                question: "18. Η κακή επαφή (κενό) μεταξύ του εξωστοματικού φιλμ και της ενισχυτικής πινακίδας προκαλεί συνήθως:",
                options: [
                    "Υπερβολική γενικευμένη αμαύρωση.",
                    "Τοπική ασάφεια (unsharpness) και θολούρα στην αντίστοιχη περιοχή.",
                    "Εμφάνιση δενδριτικών γραμμών (στατικός ηλεκτρισμός).",
                    "Αύξηση του contrast του οστού."
                ],
                correct: 1,
                explanation: "Εάν υπάρχει κενό αέρα, το ορατό φως που εκπέμπει η πινακίδα έχει το χώρο να 'απλώσει' (διασπαρεί) πριν χτυπήσει το φιλμ, προκαλώντας τοπικό θόλωμα της εικόνας."
            },
            {
                question: "19. Η ταχύτητα (συντελεστής ενίσχυσης) μιας ενισχυτικής πινακίδας ΑΥΞΑΝΕΤΑΙ όταν:",
                options: [
                    "Μειώνεται το μέγεθος των κρυστάλλων του φωσφόρου.",
                    "Αυξάνεται το πάχος της φθορίζουσας στοιβάδας.",
                    "Προστίθεται χρωστική ουσία απορρόφησης (dye) στη στοιβάδα.",
                    "Μειώνεται η ενέργεια (kVp) της ακτινοβολίας."
                ],
                correct: 1,
                explanation: "Παχύτερη στοιβάδα φωσφόρου ή μεγαλύτεροι κρύσταλλοι σημαίνει ότι παράγεται περισσότερο φως για κάθε φωτόνιο Χ (άρα πιο 'γρήγορη' πινακίδα). Το τίμημα είναι φυσικά η απώλεια λεπτομέρειας."
            },
            {
                question: "20. Εάν ένα ακτινογραφικό φιλμ υποστεί μεγάλη μηχανική πίεση (π.χ. καμπύλωση με το νύχι) ΠΡΙΝ την εμφάνιση, το αποτέλεσμα θα είναι:",
                options: [
                    "Η πλήρης καταστροφή (σβήσιμο) της λανθάνουσας εικόνας στην περιοχή.",
                    "Η εμφάνιση τεχνημάτων με μορφή μαύρων γραμμών ή στιγμάτων (πίεσης).",
                    "Το φιλμ να μην απορροφά καθόλου τα χημικά του εμφανιστηρίου.",
                    "Η εμφάνιση λευκών (διαυγών) κηλίδων στο σημείο πίεσης."
                ],
                correct: 1,
                explanation: "Η μηχανική πίεση μπορεί να λειτουργήσει παρόμοια με την ακτινοβολία (διέγερση κρυστάλλων), 'εκθέτοντας' ψευδώς το γαλάκτωμα στο σημείο της πίεσης, οδηγώντας σε μαύρα σημάδια (pressure artifacts) μετά την εμφάνιση."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const progressTextEl = document.getElementById('progress-text');
        const progressBarEl = document.getElementById('progress-bar');
        const feedbackEl = document.getElementById('feedback');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const nextBtn = document.getElementById('next-btn');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const finalScoreNumber = document.getElementById('final-score-number');
        const finalMessage = document.getElementById('final-message');

        function loadQuestion() {
            answered = false;
            feedbackEl.classList.remove('show', 'success', 'error');
            nextBtn.style.display = 'none';
            
            const q = quizData[currentQuestion];
            
            // Ενημέρωση Προόδου
            progressTextEl.innerText = `Ερώτηση ${currentQuestion + 1} από ${quizData.length}`;
            const progressPercent = ((currentQuestion) / quizData.length) * 100;
            progressBarEl.style.width = `${progressPercent}%`;
            
            // Ενημέρωση Ερώτησης
            questionEl.innerText = q.question;
            
            // Δημιουργία Επιλογών
            optionsEl.innerHTML = '';
            q.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option;
                button.onclick = () => checkAnswer(index, button);
                optionsEl.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex, buttonClicked) {
            if (answered) return;
            answered = true;

            const q = quizData[currentQuestion];
            const allButtons = optionsEl.querySelectorAll('.option-btn');
            
            allButtons.forEach(btn => btn.disabled = true);

            if (selectedIndex === q.correct) {
                buttonClicked.classList.add('correct');
                score++;
                showFeedback(true, q.explanation);
            } else {
                buttonClicked.classList.add('wrong');
                allButtons[q.correct].classList.add('correct');
                showFeedback(false, q.explanation);
            }

            // Αλλαγή κειμένου κουμπιού για την τελευταία ερώτηση
            if (currentQuestion === quizData.length - 1) {
                nextBtn.innerText = "Ολοκλήρωση Κουίζ";
            } else {
                nextBtn.innerHTML = "Επόμενη Ερώτηση &rarr;";
            }
            
            nextBtn.style.display = 'block';
        }

        function showFeedback(isCorrect, text) {
            feedbackEl.classList.add(isCorrect ? 'success' : 'error', 'show');
            feedbackTitle.innerText = isCorrect ? 'Σωστή Απάντηση!' : 'Λάθος Απάντηση.';
            feedbackTitle.style.color = isCorrect ? '#166534' : '#991b1b';
            feedbackText.innerText = text;
        }

        nextBtn.addEventListener('click', () => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function showResults() {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            
            // Τελικό γέμισμα μπάρας
            progressBarEl.style.width = '100%';
            
            let message = '';
            const percentage = (score / quizData.length) * 100;
            
            if(percentage === 100) {
                message = "<strong>Άριστα!</strong> Έχεις εμπεδώσει πλήρως ακόμα και τις πιο απαιτητικές λεπτομέρειες των ακτινογραφικών φιλμ. Είσαι πανέτοιμος!";
            } else if (percentage >= 75) {
                message = "<strong>Πάρα πολύ καλά!</strong> Ελάχιστες παγίδες σου ξέφυγαν. Το επίπεδο γνώσεών σου στο κεφάλαιο είναι πολύ υψηλό.";
            } else if (percentage >= 50) {
                message = "<strong>Καλή προσπάθεια.</strong> Έχεις πιάσει τα βασικά νοήματα, αλλά κάποιες θεωρητικές λεπτομέρειες (όπως η χημεία της εμφάνισης) θέλουν μια επανάληψη.";
            } else {
                message = "<strong>Χρειάζεται παραπάνω μελέτη.</strong> Το κουίζ είναι επίτηδες δύσκολο. Διάβασε ξανά προσεκτικά την ανατροφοδότηση της κάθε ερώτησης.";
            }

            finalScoreNumber.innerText = `${score} / ${quizData.length}`;
            finalMessage.innerHTML = message;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
        }

        // Αρχικοποίηση
        loadQuestion();
    </script>
</body>
</html>
