<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Νευρικές Οδοί Β - MCQs Νευροανατομίας</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6f8;
      --surface: #ffffff;
      --surface-2: #eaf0f3;
      --text: #1d2830;
      --muted: #63717c;
      --border: #cfd9df;
      --accent: #0f6f78;
      --accent-2: #7c5f22;
      --ok: #177245;
      --ok-bg: #e4f4ec;
      --bad: #a83a34;
      --bad-bg: #f8e7e5;
      --warn: #835a12;
      --shadow: 0 16px 40px rgba(35, 55, 70, 0.12);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #edf3f5 0%, var(--bg) 38%, #f7f5ef 100%);
      color: var(--text);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0.72rem 0.95rem;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    button:hover:not(:disabled) { transform: translateY(-1px); background: #0b5962; }
    button:disabled { opacity: 0.48; cursor: not-allowed; }

    button.secondary {
      background: #ffffff;
      color: var(--text);
      border-color: var(--border);
    }

    button.secondary:hover:not(:disabled) { background: var(--surface-2); }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.55rem, 3vw, 2.55rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
      line-height: 1.55;
    }

    .status-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .stat {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 14px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .stat strong {
      font-size: 1.05rem;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 240px) minmax(220px, 1fr) auto auto auto;
      gap: 10px;
      align-items: end;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    select, input[type="search"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      min-height: 42px;
      padding: 0.62rem 0.7rem;
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .checkline input { width: 18px; height: 18px; accent-color: var(--accent); }

    .progress {
      height: 10px;
      background: #d9e2e7;
      overflow: hidden;
      border-radius: 999px;
      margin: 12px 0 18px;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #1d8f6f);
      transition: width 220ms ease;
    }

    .quiz-card, .results-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 30px);
    }

    .question-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      background: #e7f1f2;
      color: #124e55;
      border: 1px solid #c4dde1;
      padding: 0.25rem 0.66rem;
      font-size: 0.8rem;
      font-weight: 800;
    }

    .pill.source {
      background: #f3eee1;
      color: #6b4c13;
      border-color: #e2d4b7;
    }

    .question {
      margin: 0 0 20px;
      font-size: clamp(1.14rem, 2.3vw, 1.55rem);
      line-height: 1.38;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 12px;
      align-items: start;
      text-align: left;
      color: var(--text);
      background: #fff;
      border-color: var(--border);
      font-weight: 650;
      line-height: 1.45;
      padding: 0.85rem 0.95rem;
      min-height: 58px;
    }

    .option:hover:not(:disabled) {
      background: #f0f7f7;
      border-color: #8bbbc1;
    }

    .option .key {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--surface-2);
      color: var(--accent);
      font-weight: 900;
    }

    .option.correct {
      background: var(--ok-bg);
      border-color: #7fc19b;
      color: #123b25;
    }

    .option.wrong {
      background: var(--bad-bg);
      border-color: #d69994;
      color: #611f1b;
    }

    .feedback {
      display: none;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-top: 16px;
      line-height: 1.5;
      border: 1px solid var(--border);
      background: #f9fbfb;
    }

    .feedback.show { display: block; }
    .feedback.ok { border-color: #88c8a2; background: var(--ok-bg); }
    .feedback.bad { border-color: #d69b96; background: var(--bad-bg); }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      margin-top: 18px;
    }

    .distribution {
      margin-top: 18px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .distribution h2, .results-card h2 {
      margin: 0 0 12px;
      font-size: 1.08rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 9px 7px;
      text-align: left;
      vertical-align: top;
    }

    th { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0 18px;
    }

    .review-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .review-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      background: #fff;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      background: #fff;
      color: var(--muted);
      text-align: center;
    }

    .print-section { display: none; }

    @media (max-width: 900px) {
      header, .controls, .status-strip, .results-grid {
        grid-template-columns: 1fr 1fr;
      }
      .controls label:first-child, .controls label:nth-child(2) {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 620px) {
      .app { width: min(100% - 20px, 1120px); padding-top: 16px; }
      header, .controls, .status-strip, .results-grid {
        grid-template-columns: 1fr;
      }
      .quiz-card, .results-card { padding: 16px; }
      .option { grid-template-columns: 34px 1fr; padding: 0.78rem; }
      .actions { display: grid; grid-template-columns: 1fr; }
      button { width: 100%; }
    }

    @media print {
      body { background: #fff; color: #000; }
      .app { display: none; }
      .print-section {
        display: block;
        padding: 18px;
        font-family: Arial, sans-serif;
      }
      .print-question {
        break-inside: avoid;
        margin: 0 0 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #bbb;
      }
      .print-question h3 { margin: 0 0 8px; font-size: 14pt; }
      .print-question p, .print-question li { font-size: 11pt; line-height: 1.38; }
      .print-answer { display: none; margin-top: 6px; color: #222; }
      body.show-print-answers .print-answer { display: block; }
    }
  </style>
</head>

      <button class="secondary" id="printBtn" type="button">Εκτύπωση</button>

      <label class="checkline"><input id="printAnswers" type="checkbox"> Απαντήσεις στην εκτύπωση</label>
      <button id="applyBtn" type="button">Νέο quiz</button>
      <button class="secondary" id="clearProgressBtn" type="button">Καθαρισμός προόδου</button>
    </section>

    <section class="status-strip" aria-label="Στατιστικά προόδου">
      <div class="stat"><span>Σκορ</span><strong id="scoreText">0</strong></div>
      <div class="stat"><span>Πρόοδος</span><strong id="progressText">0 / 0</strong></div>

      <div class="stat"><span>Κατηγορία</span><strong id="currentCategoryText">-</strong></div>
    </section>

    <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

    <section id="quizCard" class="quiz-card"></section>
    <section id="resultsCard" class="results-card" hidden></section>
    <section id="distribution" class="distribution"></section>
  </main>

    const keys = ["α", "β", "γ", "δ"];
    const storageKey = "neuroanatomy_mcqs_progress_v1";
    const state = {
      activeIds: [],
      current: 0,
      answers: {},
      optionOrders: {},
      score: 0,
      settings: {
        category: "Όλες",
        search: "",
        shuffleQuestions: true,
        shuffleAnswers: true
      },
      mode: "all"
    };

    const $ = (id) => document.getElementById(id);
    const byId = new Map(questions.map((q) => [q.id, q]));

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalize(text) {
      return String(text).toLocaleLowerCase("el-GR").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function filteredQuestions() {
      const category = $("categoryFilter").value;
      const query = normalize($("searchInput").value.trim());
      return questions.filter((q) => {
        const categoryOk = category === "Όλες" || q.category === category;
        const haystack = normalize([
          q.category,
          q.source,
          q.question,
          q.explanation,
          ...q.options.map((o) => o.text)
        ].join(" "));
        return categoryOk && (!query || haystack.includes(query));
      });
    }

    function populateCategories() {
      const categories = ["Όλες", ...Array.from(new Set(questions.map((q) => q.category))).sort((a, b) => a.localeCompare(b, "el"))];
      $("categoryFilter").innerHTML = categories.map((c) => `<option value="${c}">${c}</option>`).join("");
    }

    function buildOptionOrders() {
      state.optionOrders = {};
      state.activeIds.forEach((id) => {
        const base = [0, 1, 2, 3];
        state.optionOrders[id] = state.settings.shuffleAnswers ? shuffle(base) : base;
      });
    }

    function startQuiz(ids = null, mode = "all") {
      state.settings = {
        category: $("categoryFilter").value,
        search: $("searchInput").value.trim(),
        shuffleQuestions: $("shuffleQuestions").checked,
        shuffleAnswers: $("shuffleAnswers").checked
      };
      const selected = ids ? ids.map((id) => byId.get(id)).filter(Boolean) : filteredQuestions();
      let active = selected.map((q) => q.id);
      if (state.settings.shuffleQuestions) active = shuffle(active);
      state.activeIds = active;
      state.current = 0;
      state.answers = {};
      state.score = 0;
      state.mode = mode;
      buildOptionOrders();
      saveProgress();
      render();
      renderDistribution();
      renderPrintSection();
    }

    function answerCurrent(optionIndex) {
      const q = byId.get(state.activeIds[state.current]);
      if (!q || state.answers[q.id]) return;
      const option = q.options[optionIndex];
      state.answers[q.id] = { selected: optionIndex, correct: option.correct };
      if (option.correct) state.score += 1;
      saveProgress();
      render();
    }

    function nextQuestion() {
      if (state.current < state.activeIds.length - 1) {
        state.current += 1;
        saveProgress();
        render();
      } else {
        showResults();
      }
    }

    function restartSame() {
      startQuiz(state.mode === "wrong" ? state.activeIds : null, state.mode);
    }

    function wrongIds() {
      return Object.entries(state.answers)
        .filter(([, a]) => !a.correct)
        .map(([id]) => Number(id));
    }

    function updateStats() {
      const answered = Object.keys(state.answers).length;
      const total = state.activeIds.length;
      const percent = answered ? Math.round((state.score / answered) * 100) : 0;
      const currentQuestion = byId.get(state.activeIds[state.current]);
      $("scoreText").textContent = `${state.score} / ${answered}`;
      $("progressText").textContent = `${Math.min(answered + 1, total)} / ${total}`;
      $("percentText").textContent = `${percent}%`;
      $("currentCategoryText").textContent = currentQuestion ? currentQuestion.category : "-";
      $("progressBar").style.width = total ? `${Math.round((answered / total) * 100)}%` : "0%";
    }

    function render() {
      $("resultsCard").hidden = true;
      $("quizCard").hidden = false;
      updateStats();
      const card = $("quizCard");
      if (!state.activeIds.length) {
        card.innerHTML = `<div class="empty">Δεν βρέθηκαν ερωτήσεις με τα τρέχοντα φίλτρα.</div>`;
        return;
      }
      const q = byId.get(state.activeIds[state.current]);
      const saved = state.answers[q.id];
      const order = state.optionOrders[q.id] || [0, 1, 2, 3];
      const optionsHtml = order.map((optionIndex, displayIndex) => {
        const option = q.options[optionIndex];
        const isSelected = saved && saved.selected === optionIndex;
        const cls = saved
          ? option.correct ? " correct" : isSelected ? " wrong" : ""
          : "";
        return `
          <button class="option${cls}" type="button" ${saved ? "disabled" : ""} data-option-index="${optionIndex}">
            <span class="key">${keys[displayIndex]})</span>
            <span>${option.text}</span>
          </button>
        `;
      }).join("");
      const feedbackClass = saved ? (saved.correct ? "ok" : "bad") : "";
      const feedbackTitle = saved ? (saved.correct ? "Σωστό." : "Λάθος.") : "";
      card.innerHTML = `
        <div class="question-meta">
          <span class="pill">${q.category}</span>
          <span class="pill source">${q.source}</span>
          <span class="pill">ID ${q.id}</span>
        </div>
        <h2 class="question">${q.question}</h2>
        <div class="options">${optionsHtml}</div>
        <div class="feedback ${saved ? "show" : ""} ${feedbackClass}">
          <strong>${feedbackTitle}</strong> ${saved ? q.explanation : ""}
        </div>
        <div class="actions">
          <button class="secondary" type="button" id="restartBtn">Επανεκκίνηση</button>
          <button type="button" id="nextBtn" ${saved ? "" : "disabled"}>${state.current === state.activeIds.length - 1 ? "Αποτελέσματα" : "Επόμενη ερώτηση"}</button>
        </div>
      `;
      card.querySelectorAll(".option").forEach((button) => {
        button.addEventListener("click", () => answerCurrent(Number(button.dataset.optionIndex)));
      });
      $("nextBtn").addEventListener("click", nextQuestion);
      $("restartBtn").addEventListener("click", restartSame);
    }

    function showResults() {
      $("quizCard").hidden = true;
      $("resultsCard").hidden = false;
      const total = state.activeIds.length;
      const answered = Object.keys(state.answers).length;
      const wrong = wrongIds();
      const percent = total ? Math.round((state.score / total) * 100) : 0;
      $("progressBar").style.width = "100%";
      $("progressText").textContent = `${total} / ${total}`;
      $("scoreText").textContent = `${state.score} / ${total}`;
      $("percentText").textContent = `${percent}%`;
      $("currentCategoryText").textContent = "Τελικό";

      const perCategory = {};
      state.activeIds.forEach((id) => {
        const q = byId.get(id);
        perCategory[q.category] ??= { total: 0, correct: 0 };
        perCategory[q.category].total += 1;
        if (state.answers[id]?.correct) perCategory[q.category].correct += 1;
      });
      const categoryRows = Object.entries(perCategory)
        .sort(([a], [b]) => a.localeCompare(b, "el"))
        .map(([category, s]) => `<tr><td>${category}</td><td>${s.correct} / ${s.total}</td><td>${Math.round((s.correct / s.total) * 100)}%</td></tr>`)
        .join("");
      const review = wrong.length
        ? wrong.map((id) => {
            const q = byId.get(id);
            const answer = state.answers[id];
            const correct = q.options.find((o) => o.correct);
            const selected = q.options[answer.selected];
            return `<article class="review-item">
              <strong>ID ${q.id} · ${q.category}</strong>
              <p>${q.question}</p>
              <p><strong>Επέλεξες:</strong> ${selected.text}</p>
              <p><strong>Σωστό:</strong> ${correct.text}</p>
              <p>${q.explanation}</p>
            </article>`;
          }).join("")
        : `<div class="empty">Δεν υπάρχουν λανθασμένες απαντήσεις.</div>`;

      $("resultsCard").innerHTML = `
        <h2>Τελική επίδοση</h2>
        <div class="results-grid">
          <div class="stat"><span>Συνολικό σκορ</span><strong>${state.score} / ${total}</strong></div>
          <div class="stat"><span>Ποσοστό</span><strong>${percent}%</strong></div>
          <div class="stat"><span>Σωστές</span><strong>${state.score}</strong></div>
          <div class="stat"><span>Λανθασμένες</span><strong>${Math.max(0, answered - state.score)}</strong></div>
        </div>
        <h2>Απόδοση ανά κατηγορία</h2>
        <table>
          <thead><tr><th>Κατηγορία</th><th>Σκορ</th><th>Ποσοστό</th></tr></thead>
          <tbody>${categoryRows}</tbody>
        </table>
        <div class="actions">
          <button type="button" id="restartResultsBtn">Επανεκκίνηση</button>
          <button type="button" id="wrongOnlyBtn" ${wrong.length ? "" : "disabled"}>Επανάληψη λανθασμένων</button>
        </div>
        <h2>Ανασκόπηση λανθασμένων</h2>
        <div class="review-list">${review}</div>
      `;
      $("restartResultsBtn").addEventListener("click", () => startQuiz(null, "all"));
      $("wrongOnlyBtn").addEventListener("click", () => {
        if (wrong.length) startQuiz(wrong, "wrong");
      });
      saveProgress();
    }

    function renderDistribution() {
      const counts = questions.reduce((acc, q) => {
        acc[q.category] = (acc[q.category] || 0) + 1;
        return acc;
      }, {});
      const rows = Object.entries(counts)
        .sort(([a], [b]) => a.localeCompare(b, "el"))
        .map(([category, count]) => `<tr><td>${category}</td><td>${count}</td></tr>`)
        .join("");
      $("distribution").innerHTML = `
        <h2>Κατανομή ερωτήσεων ανά κατηγορία</h2>
        <table>
          <thead><tr><th>Κατηγορία</th><th>Αριθμός ερωτήσεων</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderPrintSection() {
      const items = questions.map((q, idx) => {
        const answer = q.options.find((o) => o.correct);
        return `
          <article class="print-question">
            <h3>${idx + 1}. ${q.question}</h3>
            <p><strong>${q.category}</strong> · ${q.source}</p>
            <ol type="a">
              ${q.options.map((o) => `<li>${o.text}</li>`).join("")}
            </ol>
            <p class="print-answer"><strong>Απάντηση:</strong> ${answer.text}<br><strong>Αιτιολόγηση:</strong> ${q.explanation}</p>
          </article>
        `;
      }).join("");
      $("printSection").innerHTML = `<h1>Νευρικές Οδοί Β - MCQs</h1>${items}`;
    }

    function saveProgress() {
      const payload = {
        activeIds: state.activeIds,
        current: state.current,
        answers: state.answers,
        optionOrders: state.optionOrders,
        score: state.score,
        settings: state.settings,
        mode: state.mode
      };
      localStorage.setItem(storageKey, JSON.stringify(payload));
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return false;
        const saved = JSON.parse(raw);
        if (!Array.isArray(saved.activeIds) || !saved.activeIds.length) return false;
        if (!saved.activeIds.every((id) => byId.has(id))) return false;
        Object.assign(state, saved);
        $("categoryFilter").value = saved.settings?.category || "Όλες";
        $("searchInput").value = saved.settings?.search || "";
        $("shuffleQuestions").checked = Boolean(saved.settings?.shuffleQuestions);
        $("shuffleAnswers").checked = Boolean(saved.settings?.shuffleAnswers);
        return true;
      } catch {
        return false;
      }
    }

    $("applyBtn").addEventListener("click", () => startQuiz(null, "all"));
    $("clearProgressBtn").addEventListener("click", () => {
      localStorage.removeItem(storageKey);
      startQuiz(null, "all");
    });
    $("printBtn").addEventListener("click", () => window.print());
    $("printAnswers").addEventListener("change", (event) => {
      document.body.classList.toggle("show-print-answers", event.target.checked);
    });

    populateCategories();
    renderDistribution();
    renderPrintSection();
    if (!loadProgress()) {
      startQuiz(null, "all");
    } else {
      render();
    }
  </script>
</body>
</html>
