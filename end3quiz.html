<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ακαδημαϊκό Κουίζ: Μορφολογία & Ενδοδοντία</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --correct-color: #27ae60;
            --incorrect-color: #e74c3c;
            --bg-color: #f8f9fa;
            --text-color: #333;
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .quiz-container {
            background: #ffffff;
            max-width: 800px;
            width: 100%;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }

        .quiz-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
        }

        .question-counter {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
        }

        .options-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #e2e8f0;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-color);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            background-color: #f1f8ff;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .option-btn.correct {
            background-color: #f0fdf4;
            border-color: var(--correct-color);
            color: #166534;
            font-weight: 600;
        }

        .option-btn.incorrect {
            background-color: #fef2f2;
            border-color: var(--incorrect-color);
            color: #991b1b;
        }

        .explanation-box {
            display: none;
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #f8fafc;
            border-left: 4px solid var(--accent-color);
            border-radius: 0 8px 8px 0;
            animation: fadeIn 0.4s ease-in-out;
        }

        .explanation-title {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            display: block;
        }

        .next-btn {
            display: none;
            margin-top: 2rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            float: right;
        }

        .next-btn:hover {
            background-color: var(--secondary-color);
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

            <div class="explanation-box" id="explanation">

            </div>
        </div>

        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Επόμενη Ερώτηση &rarr;</button>
    </div>

        // === ΛΟΓΙΚΗ ΕΦΑΡΜΟΓΗΣ (Μην τροποποιείς τον κώδικα κάτω από αυτό το σημείο) ===
        let currentQuestionIndex = 0;

        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const explanationBox = document.getElementById('explanation');
        const explanationText = document.getElementById('explanation-text');
        const nextBtn = document.getElementById('next-btn');
        const counterEl = document.getElementById('counter');

        function loadQuestion() {
            const currentQuizData = quizData[currentQuestionIndex];
            
            // Reset UI
            explanationBox.style.display = 'none';
            nextBtn.style.display = 'none';
            optionsEl.innerHTML = '';
            
            counterEl.innerText = `Ερώτηση ${currentQuestionIndex + 1} από ${quizData.length}`;
            questionEl.innerText = currentQuizData.question;

            // Generate options dynamically
            currentQuizData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.onclick = () => selectAnswer(index, currentQuizData.correctIndex, currentQuizData.explanation);
                optionsEl.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex, correctIndex, explanation) {
            const buttons = optionsEl.children;
            
            // Disable all buttons to prevent multiple clicks
            Array.from(buttons).forEach(btn => {
                btn.disabled = true;
            });

            // Mark chosen answer and correct answer
            if (selectedIndex === correctIndex) {
                buttons[selectedIndex].classList.add('correct');
            } else {
                buttons[selectedIndex].classList.add('incorrect');
                // Always show the correct one as well
                buttons[correctIndex].classList.add('correct');
            }

            // Show academic explanation
            explanationText.innerText = explanation;
            explanationBox.style.display = 'block';

            // Show "Next" button if not the last question
            if (currentQuestionIndex < quizData.length - 1) {
                nextBtn.style.display = 'block';
                nextBtn.innerText = "Επόμενη Ερώτηση \u2192";
            } else {
                nextBtn.style.display = 'block';
                nextBtn.innerText = "Ολοκλήρωση Κουίζ";
                nextBtn.onclick = () => alert("Το κουίζ ολοκληρώθηκε! (Φάση δοκιμής)");
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            }
        }

        // Initialize App
        loadQuestion();
    </script>
