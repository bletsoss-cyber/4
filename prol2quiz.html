<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Εξαντλητική Ακαδημαϊκή Αξιολόγηση: Μικροβιακή Ενδοκαρδίτιδα</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Georgia&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #27ae60;
            --error-color: #c0392b;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--primary-color);
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-family: 'Roboto', sans-serif;
            text-transform: uppercase;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .score-display {
            position: sticky;
            top: 10px;
            background: var(--primary-color);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            margin-bottom: 30px;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        #quiz-container {
            width: 100%;
            max-width: 900px;
        }

        .question-card {
            background: white;
            padding: 30px;
            margin-bottom: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
        }

        .question-text {
            font-weight: bold;
            font-size: 1.15em;
            margin-bottom: 25px;
            color: var(--primary-color);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .options-container {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: #fff;
            border: 1px solid #d1d1d1;
            padding: 15px 20px;
            text-align: left;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: all 0.2s ease;
            border-radius: 6px;
            font-size: 1em;
        }

        .option-btn:hover:not(:disabled) {
            background: #f8f9fa;
            border-color: var(--primary-color);
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            color: white;
            border-color: var(--success-color);
        }

        .option-btn.wrong {
            background-color: var(--error-color) !important;
            color: white;
            border-color: var(--error-color);
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 6px;
            display: none;
            font-size: 0.95em;
            border-left: 6px solid var(--primary-color);
            background: #f1f4f6;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Ακαδημαϊκή Αξιολόγηση ΜΕ</h1>
        <p>Πλήρης Έλεγχος Γνώσεων βάσει του "ΧΗΜΕΙΟΠΡΟΦΥΛΑΞΗ.pdf"</p>
    </header>

    <div class="score-display">Πρόοδος: <span id="current-score">0</span> / 65</div>

    <div id="quiz-container"></div>

    <script>
        const quizData = [
            // Η πλήρης λίστα των 65 ερωτήσεων
            { q: "Ποια είναι η κύρια τάση των πρωτοκόλλων μετά το 2006;", options: ["Αύξηση δόσεων", "Δραστικός περιορισμός χρήσης αντιβιοτικών", "Καθολική προφύλαξη", "Μόνο ενδοφλέβια χρήση"], correct: 1, feedback: "Όλα τα σύγχρονα πρωτόκολλα χαρακτηρίζονται από την τάση περιορισμού των αντιβιοτικών λόγω κινδύνου αναφυλαξίας και ανθεκτικότητας." },
            { q: "Τι πρότεινε το NICE στη Μεγάλη Βρετανία το 2008;", options: ["3g Αμοξυκιλλίνη σε όλους", "Περιορισμό σε τεχνητές βαλβίδες", "Διακοπή κάθε αντιβιοτικού για όλες τις ομάδες", "Χρήση μόνο χλωρεξιδίνης"], correct: 2, feedback: "Το NICE πρότεινε τη διακοπή χορήγησης κάθε αντιβιοτικού πριν από οποιαδήποτε οδοντιατρική εργασία για όλες τις ομάδες ασθενών." },
            { q: "Ποια είναι η σταθερή θνησιμότητα της ΜΕ τα τελευταία 30 χρόνια;", options: ["1-2%", "5-15%", "25%", "40%"], correct: 1, feedback: "Η θνησιμότητα παραμένει σημαντικά υψηλή και σχεδόν σταθερή στο 5-15% των περιπτώσεων." },
            { q: "Ποιο είναι το αποτελεσματικότερο μέτρο πρόληψης κατά το άρθρο;", options: ["Η εφάπαξ αντιβίωση", "Η στοματόπλυση", "Η διατήρηση πολύ καλής υγείας του περιοδοντίου", "Η αποφυγή εξαγωγών"], correct: 2, feedback: "Η εξασφάλιση και διατήρηση πολύ καλής υγείας του περιοδοντίου θεωρείται ο καλύτερος τρόπος πρόληψης." },
            { q: "Πότε δημοσιεύτηκε το πρώτο πρωτόκολλο της AHA;", options: ["1955", "1977", "1997", "2007"], correct: 0, feedback: "Το πρώτο πρωτόκολλο της AHA δημοσιεύτηκε το 1955 και έκτοτε άλλαξε 9 φορές." },
            { q: "Ποια είναι η δόση Αμοξυκιλλίνης για ενήλικες κατά BSAC (2006);", options: ["1g", "2g", "3g", "500mg"], correct: 2, feedback: "Η BSAC το 2006 πρότεινε αύξηση της εφάπαξ δόσης στα 3g για τους ενήλικες." },
            { q: "Ποια είναι η δόση Αμοξυκιλλίνης για παιδιά (AHA 2007);", options: ["20mg/kg", "50mg/kg", "100mg/kg", "15mg/kg"], correct: 1, feedback: "Η δόση είναι 50 mg ανά κιλό βάρους σώματος, με μέγιστη τα 2g." },
            { q: "Ποια είναι η δόση Κλινδαμυκίνης για παιδιά (από στόματος);", options: ["10mg/kg", "20mg/kg", "50mg/kg", "15mg/kg"], correct: 1, feedback: "Η δόση είναι 20 mg/kg με μέγιστη τα 600mg." },
            { q: "Ποια είναι η δόση Αμπικιλλίνης για ενήλικες (παρεντερικά);", options: ["1g", "2g", "3g", "600mg"], correct: 1, feedback: "Προτείνεται Αμπικιλλίνη 2g, μισή ώρα πριν την οδοντιατρική θεραπεία." },
            { q: "Ποια είναι η δόση Κλινδαμυκίνης για ενήλικες (παρεντερικά);", options: ["300mg", "600mg", "900mg", "150mg"], correct: 1, feedback: "Σε περίπτωση αλλεργίας στην πενικιλλίνη, χορηγείται κλινδαμυκίνη 600mg παρεντερικά." },
            { q: "Ποια ομάδα ανήκει στον ΥΨΗΛΟ κίνδυνο κατά AHA;", options: ["Πρόπτωση μιτροειδούς", "Εμφυτεύματα βαλβίδων", "Ιστορικό ρευματικού πυρετού", "Υπερτροφική μυοκαρδιοπάθεια"], correct: 1, feedback: "Ο υψηλός κίνδυνος περιλαμβάνει ασθενείς με εμφυτεύματα βαλβίδων (τεχνητών ή ζωικών)." },
            { q: "Ποια συγγενής καρδιοπάθεια απαιτεί προφύλαξη;", options: ["ASD", "VSD", "Τετραλογία Fallot", "Στένωση πνευμονικής"], correct: 2, feedback: "Η Τετραλογία του Fallot ανήκει στις συγγενείς κυανωτικές καρδιοπάθειες υψηλού κινδύνου." },
            { q: "Τι ισχύει για την πρόπτωση μιτροειδούς κατά AHA 2007;", options: ["Υψηλός κίνδυνος", "Μέτριος κίνδυνος", "Δεν απαιτεί πλέον προφύλαξη", "Απαιτεί διπλή δόση"], correct: 2, feedback: "Η πρόπτωση μιτροειδούς δεν περιλαμβάνεται πλέον στις περιπτώσεις που απαιτούν προληπτική αντιβίωση." },
            { q: "Ποιο είναι το μεσοδιάστημα μεταξύ συνεδριών;", options: ["2 ημέρες", "7 ημέρες", "14 ημέρες", "1 μήνας"], correct: 2, feedback: "Προτείνεται μεσοδιάστημα 14 ημερών για μείωση του κινδύνου ανάπτυξης ανθεκτικών μικροβίων." },
            { q: "Τι ισχύει για την τοπική αναισθησία σε υγιείς ιστούς;", options: ["Απαιτεί προφύλαξη", "Εξαιρείται της προφύλαξης", "Μόνο σε παιδιά απαιτείται", "Απαγορεύεται"], correct: 1, feedback: "Η τοπική αναισθησία σε υγιείς ιστούς εξαιρείται ρητά από τη χημειοπροφύλαξη." },
            { q: "Ποιο είναι το ποσοστό μείωσης μικροβιαιμίας από Χλωρεξιδίνη 0,2%;", options: ["100%", "50%", "15-20%", "0%"], correct: 2, feedback: "Η πρόληψη της μικροβιαιμίας μέσω στοματόπλυσης είναι περιορισμένη (15-20%)." },
            { q: "Ποιο φάρμακο προτείνουν οι συγγραφείς ως εναλλακτική της Κλινδαμυκίνης (ενήλικες);", options: ["Μοξιφλοξασίνη 400mg", "Σιπροφλοξασίνη 500mg", "Ερυθρομυκίνη 1g", "Τετρακυκλίνη"], correct: 0, feedback: "Η μοξιφλοξασίνη θεωρείται πιο αποτελεσματική από την κλινδαμυκίνη στην πρόληψη μικροβιαιμίας." },
            { q: "Ποια είναι η δόση Σιπροφλοξασίνης για παιδιά (κατά συγγραφείς);", options: ["10mg/kg", "20-30mg/kg", "50mg/kg", "15mg/kg"], correct: 1, feedback: "Προτείνεται εφάπαξ χορήγηση 20-30 mg/kg με μέγιστο τα 500mg." },
            { q: "Τι ισχύει για τη χορήγηση αντιβιοτικού ΜΕΤΑ την επέμβαση;", options: ["Υποχρεωτική", "Έχει καταργηθεί από το 1997", "Μόνο σε εξαγωγές", "Μόνο σε IV"], correct: 1, feedback: "Η πρακτική χορήγησης αντιβιοτικού μετά τη θεραπεία έχει αναθεωρηθεί και δεν συστήνεται." },
            { q: "Ποια ομάδα μικροβίων στοχεύεται κυρίως;", options: ["Σταφυλόκοκκοι", "Πρασινίζοντες στρεπτόκοκκοι και HACEK", "Μύκητες", "Ιοί"], correct: 1, feedback: "Στόχος είναι η αναστολή πρασινίζοντων στρεπτόκοκκων και βακτηριδίων της ομάδας HACEK." },
            { q: "Τι προτείνεται για οξείες λοιμώξεις (π.χ. απόστημα);", options: ["Άμεση εξαγωγή", "Χορήγηση αντιβίωσης για ύφεση πριν την παρέμβαση", "Μόνο στοματόπλυση", "Όχι παρέμβαση"], correct: 1, feedback: "Προτείνεται άμεση χορήγηση αντιβίωσης για ύφεση της λοίμωξης πριν τη χειρουργική αντιμετώπιση." },
            { q: "Ποια είναι η δόση Augmentin/Amoxil για παιδί 20kg (κατά συγγραφείς);", options: ["1000mg Amoxil", "300mg Augmentin + 700mg Amoxil", "500mg Augmentin", "200mg Amoxil"], correct: 1, feedback: "Προτείνεται 1/3 Augmentin και 2/3 Amoxil της συνολικής δόσης (50mg/kg)." },
            { q: "Ποιο είναι το μέγιστο όριο δόσης Αμοξυκιλλίνης για παιδιά;", options: ["1g", "2g", "3g", "500mg"], correct: 1, feedback: "Η μέγιστη δόση για παιδιά δεν πρέπει να υπερβαίνει αυτή των ενηλίκων (2g)." },
            { q: "Τι ισχύει για τους χρόνιους χρήστες ενδοφλέβιων ναρκωτικών;", options: ["Όχι προφύλαξη", "Θεωρούνται αυξημένου κινδύνου", "Μόνο αν έχουν AIDS", "Μόνο αν έχουν πυρετό"], correct: 1, feedback: "Θεωρούνται αυξημένου κινδύνου λόγω καρδιακών ανωμαλιών από τη χρήση." },
            { q: "Τι αναφέρεται για την αφαίρεση ραμμάτων;", options: ["Απαιτεί αντιβίωση", "Μπορεί να βοηθήσει η αντιμικροβιακή στοματόπλυση", "Απαγορεύεται", "Υψηλός κίνδυνος"], correct: 1, feedback: "Στην αφαίρεση ραμμάτων μπορεί να βοηθήσει η χρήση αντιμικροβιακού διαλύματος." },
            { q: "Ποιο είναι το 'χρυσό' standard τεκμηρίωσης;", options: ["Μελέτες σε ζώα", "Διπλά τυφλές μελέτες", "Case reports", "Γνώμες ειδικών"], correct: 1, feedback: "Η απόλυτη τεκμηρίωση επιτυγχάνεται μόνο με διπλά τυφλές μελέτες, αν και είναι δύσκολες ηθικά." },
            { q: "Ποια είναι η αποτελεσματικότητα της Κλινδαμυκίνης στην πρόληψη μικροβιαιμίας;", options: ["90%", "60%", "Αμφίβολη/Χαμηλή", "100%"], correct: 2, feedback: "Μελέτες δείχνουν ότι η κλινδαμυκίνη είναι αναποτελεσματική στην πρόληψη μικροβιαιμίας." },
            { q: "Τι ισχύει για την αιμορραγία από τραύμα στα χείλη;", options: ["Απαιτεί αντιβίωση", "Εξαιρείται της προφύλαξης", "Μόνο αν υπάρχουν ράμματα", "Υψηλός κίνδυνος"], correct: 1, feedback: "Η αιμορραγία από τραύμα στα χείλη εξαιρείται από την προληπτική χορήγηση αντιβιοτικών." },
            { q: "Ποιος έχει την τελική ηθική/νομική ευθύνη απόφασης;", options: ["Ο καρδιολόγος", "Ο οδοντίατρος", "Ο ασθενής", "Ο φαρμακοποιός"], correct: 1, feedback: "Ο οδοντίατρος είναι ηθικά και νομικά υπεύθυνος ως θεράπων στη συγκεκριμένη πράξη." },
            { q: "Τι ισχύει για τα τατουάζ/piercing σε ασθενείς υψηλού κινδύνου;", options: ["Επιτρέπονται", "Ενέχουν κίνδυνο ΜΕ", "Όχι κίνδυνος", "Μόνο αν είναι στο στόμα"], correct: 1, feedback: "Ενέχουν κίνδυνο ανάπτυξης ΜΕ και οι ασθενείς πρέπει να ενημερώνονται." },
            { q: "Ποια αλλαγή στη διατύπωση της ADA υποδηλώνει αναθεώρηση;", options: ["Από 'Recommended' σε 'Is Reasonable'", "Από 'Must' σε 'Can'", "Κατάργηση λέξεων", "Όχι αλλαγή"], correct: 0, feedback: "Η αλλαγή της λέξης 'Recommended' σε 'Is Reasonable' υποδηλώνει μελλοντικές εξελίξεις." },
            { q: "Τι αναφέρεται για την κολπική μαρμαρυγή;", options: ["Υψηλός κίνδυνος", "Δεν αποτελεί πλέον ένδειξη προφύλαξης", "Μόνο σε εξαγωγές", "Απαιτεί IV"], correct: 1, feedback: "Πολλές προγενέστερες ενδείξεις, όπως η κολπική μαρμαρυγή, δεν περιλαμβάνονται πλέον." },
            { q: "Ποια είναι η δόση Αμοξυκιλλίνης για ενήλικες (AHA 2007);", options: ["1g", "2g", "3g", "500mg"], correct: 1, feedback: "Η AHA εμμένει στη δοσολογία των 2g για τους ενήλικες." },
            { q: "Τι ισχύει για τη λήψη ακτινογραφιών;", options: ["Προφύλαξη", "Εξαίρεση", "Μόνο πανοραμική", "Υψηλός κίνδυνος"], correct: 1, feedback: "Η λήψη ενδοστοματικών ακτινογραφιών εξαιρείται από τη χημειοπροφύλαξη." },
            { q: "Ποια είναι η δόση Αμπικιλλίνης για παιδιά (παρεντερικά);", options: ["20mg/kg", "50mg/kg", "100mg/kg", "10mg/kg"], correct: 1, feedback: "Η δόση είναι 50 mg/kg βάρους σώματος παρεντερικά." },
            { q: "Τι αναφέρεται για το βούρτσισμα των δοντιών;", options: ["Προκαλεί ΜΕ", "Προκαλεί συχνότερη μικροβιαιμία από οδοντιατρικές πράξεις", "Είναι ακίνδυνο", "Απαιτεί αντιβίωση"], correct: 1, feedback: "Η καθημερινή μικροβιαιμία από το βούρτσισμα είναι πολύ πιο πιθανή αιτία ΜΕ." },
            { q: "Ποια είναι η δόση Κλινδαμυκίνης για παιδιά (παρεντερικά);", options: ["10mg/kg", "15mg/kg", "20mg/kg", "5mg/kg"], correct: 1, feedback: "Η παρεντερική δόση για παιδιά είναι 15 mg/kg." },
            { q: "Τι ισχύει για τις κινητές προσθετικές συσκευές;", options: ["Προφύλαξη", "Εξαίρεση", "Μόνο την πρώτη μέρα", "Υψηλός κίνδυνος"], correct: 1, feedback: "Η τοποθέτηση κινητών προσθετικών συσκευών εξαιρείται από τη χημειοπροφύλαξη." },
            { q: "Ποιο είναι το 'όριο' θνησιμότητας ΜΕ χωρίς αντιμετώπιση;", options: ["50%", "80%", "100%", "20%"], correct: 2, feedback: "Πριν την ανακάλυψη των αντιβιοτικών, η κατάληξη της ΜΕ ήταν μοιραία (100%)." },
            { q: "Τι αναφέρεται για την ενδοδοντική θεραπεία πέραν του ακρορριζίου;", options: ["Όχι προφύλαξη", "Απαιτεί προφύλαξη", "Μόνο σε παιδιά", "Εξαίρεση"], correct: 1, feedback: "Η διεργασία που διαπερνά το ακρορρίζιο απαιτούσε προφύλαξη κατά παλαιότερα πρωτόκολλα." },
            { q: "Ποια είναι η δόση Αμοξυκιλλίνης για ενήλικες (BSAC 2006);", options: ["2g", "3g", "1.5g", "500mg"], correct: 1, feedback: "Η BSAC πρότεινε 3g για ενήλικες σε εφάπαξ δόση." },
            { q: "Τι ισχύει για την απόπτωση νεογιλών δοντιών;", options: ["Προφύλαξη", "Εξαίρεση", "Υψηλός κίνδυνος", "Απαιτεί ράμματα"], correct: 1, feedback: "Η απόπτωση νεογιλών δοντιών εξαιρείται από τη χημειοπροφύλαξη." },
            { q: "Ποια είναι η θέση της Ελληνικής Καρδιολογικής Εταιρείας (2009);", options: ["Πρωτόκολλο NICE", "Πρωτόκολλο AHA/ESC", "Δικό της πρωτόκολλο", "Όχι θέση"], correct: 1, feedback: "Υιοθετεί τις οδηγίες της Ευρωπαϊκής Καρδιολογικής Εταιρείας (παρόμοιες με AHA)." },
            { q: "Τι αναφέρεται για τη μάσηση τροφής;", options: ["Προκαλεί ΜΕ", "Προκαλεί καθημερινή μικροβιαιμία", "Ακίνδυνη", "Μόνο σκληρές τροφές"], correct: 1, feedback: "Η μάσηση είναι καθημερινή δραστηριότητα που προκαλεί μικροβιαιμία." },
            { q: "Ποια είναι η αποτελεσματικότητα του Augmentin στις β-λακταμάσες;", options: ["Μηδενική", "Υψηλή (τις αναστέλλει)", "Μόνο σε αερόβια", "Μόνο σε IV"], correct: 1, feedback: "Το κλαβουλανικό οξύ αναστέλλει αποτελεσματικά τις β-λακταμάσες." },
            { q: "Τι ισχύει για την ορθοδοντική θεραπεία (αγκύλια);", options: ["Προφύλαξη", "Εξαίρεση", "Μόνο την πρώτη μέρα", "Υψηλός κίνδυνος"], correct: 1, feedback: "Η τοποθέτηση ορθοδοντικών αγκυλίων εξαιρείται από τη χημειοπροφύλαξη." },
            { q: "Ποια είναι η δόση Αμπικιλλίνης για ενήλικες (IM/IV);", options: ["1g", "2g", "500mg", "3g"], correct: 1, feedback: "Η δόση είναι 2g παρεντερικά μισή ώρα πριν την επέμβαση." },
            { q: "Τι αναφέρεται για την περιοδοντίτιδα;", options: ["Όχι κίνδυνος", "Αυξάνει τη μικροβιαιμία", "Μόνο σε ηλικιωμένους", "Απαιτεί IV"], correct: 1, feedback: "Η βαρύτητα της φλεγμονής στα ούλα σχετίζεται με την έκταση της μικροβιαιμίας." },
            { q: "Ποια είναι η δόση Κλινδαμυκίνης για παιδιά (από στόματος);", options: ["10mg/kg", "20mg/kg", "5mg/kg", "30mg/kg"], correct: 1, feedback: "Η δόση είναι 20 mg/kg με μέγιστο τα 600mg." },
            { q: "Τι ισχύει για τις οδοντιατρικές επεμβάσεις κατά NICE;", options: ["Προφύλαξη μόνο IV", "Καμία προφύλαξη για καμία ομάδα", "Προφύλαξη μόνο σε παιδιά", "Μόνο εξαγωγές"], correct: 1, feedback: "Το NICE πρότεινε μη χορήγηση αντιβίωσης για καμία ομάδα ασθενών." },
            { q: "Ποια είναι η δόση Μοξιφλοξασίνης για ενήλικες (κατά συγγραφείς);", options: ["200mg", "400mg", "600mg", "800mg"], correct: 1, feedback: "Προτείνεται εφάπαξ λήψη 400mg μία ώρα πριν την επέμβαση." },
            { q: "Τι αναφέρεται για την ουλίτιδα;", options: ["Όχι κίνδυνος", "Πρέπει να θεραπεύεται έγκαιρα", "Μόνο σε παιδιά", "Απαιτεί IV"], correct: 1, feedback: "Κάθε φλεγμονή πρέπει να θεραπεύεται έγκαιρα για μείωση του κινδύνου ΜΕ." },
            { q: "Ποια είναι η δόση Αμοξυκιλλίνης για παιδί 20kg;", options: ["500mg", "1000mg", "2000mg", "1500mg"], correct: 1, feedback: "20kg x 50mg/kg = 1000mg συνολική δόση." },
            { q: "Τι ισχύει για την ενδοστοματική ακτινογραφία;", options: ["Προφύλαξη", "Εξαίρεση", "Μόνο αν ματώνει", "Υψηλός κίνδυνος"], correct: 1, feedback: "Η λήψη ενδοστοματικών ακτινογραφιών εξαιρείται της χημειοπροφύλαξης." },
            { q: "Ποια είναι η δόση Κλινδαμυκίνης για ενήλικα (από στόματος);", options: ["150mg", "600mg", "300mg", "1g"], correct: 1, feedback: "Προτείνεται 600mg μία ώρα πριν την επέμβαση." },
            { q: "Τι αναφέρεται για την αλλεργία στην πενικιλλίνη;", options: ["Όχι προφύλαξη", "Χρήση Κλινδαμυκίνης", "Χρήση Αμπικιλλίνης", "Χρήση Αμοξυκιλλίνης"], correct: 1, feedback: "Σε αλλεργικούς χορηγείται Κλινδαμυκίνη ή εναλλακτικά Μοξιφλοξασίνη." },
            { q: "Ποια είναι η δόση Σιπροφλοξασίνης για παιδί (Max);", options: ["200mg", "500mg", "1g", "300mg"], correct: 1, feedback: "Η μέγιστη ποσότητα δεν πρέπει να υπερβαίνει τα 500mg." },
            { q: "Τι ισχύει για την περιοδοντική απόξεση;", options: ["Εξαίρεση", "Απαιτεί προφύλαξη", "Μόνο σε ενήλικες", "Μόνο IV"], correct: 1, feedback: "Οι περιοδοντικές επεμβάσεις απαιτούν προφύλαξη σε ασθενείς υψηλού κινδύνου." },
            { q: "Ποια είναι η δόση Αμοξυκιλλίνης για ενήλικα (AHA 2007);", options: ["1g", "2g", "3g", "4g"], correct: 1, feedback: "Η AHA προτείνει εφάπαξ δόση 2g από το στόμα." },
            { q: "Τι αναφέρεται για τη διατήρηση στοματικής υγιεινής;", options: ["Δευτερεύον μέτρο", "Πιο σημαντικό από την αντιβίωση", "Μόνο για αισθητική", "Όχι σημασία"], correct: 1, feedback: "Είναι το πιο σημαντικό μέτρο πρόληψης της ΜΕ." },
            { q: "Ποια είναι η δόση Κλινδαμυκίνης για παιδί (IM/IV);", options: ["5mg/kg", "15mg/kg", "25mg/kg", "10mg/kg"], correct: 1, feedback: "Η παρεντερική δόση είναι 15 mg/kg βάρους σώματος." },
            { q: "Τι ισχύει για την εξαγωγή δοντιού;", options: ["Εξαίρεση", "Απαιτεί προφύλαξη", "Μόνο σε παιδιά", "Μόνο IV"], correct: 1, feedback: "Η εξαγωγή αποτελεί τραυματικό χειρισμό που απαιτεί προφύλαξη." },
            { q: "Ποια είναι η δόση Αμπικιλλίνης για παιδί (IM/IV);", options: ["10mg/kg", "50mg/kg", "20mg/kg", "100mg/kg"], correct: 1, feedback: "Η δόση είναι 50 mg ανά κιλό βάρους σώματος." },
            { q: "Τι αναφέρεται για την πενικιλλίνη G;", options: ["Χρήση σε ΜΕ", "Όχι πλέον χρήση στην οδοντιατρική προφύλαξη", "Μόνο IV", "Υψηλή δόση"], correct: 1, feedback: "Δεν χρησιμοποιείται πλέον στα τρέχοντα οδοντιατρικά πρωτόκολλα προφύλαξης." },
            { q: "Ποια είναι η δόση Κλινδαμυκίνης για ενήλικα (IM/IV);", options: ["150mg", "600mg", "300mg", "900mg"], correct: 1, feedback: "Προτείνεται δόση 600mg παρεντερικά πριν τη θεραπεία." }
        ];

        let score = 0;
        const container = document.getElementById('quiz-container');
        const scoreElement = document.getElementById('current-score');

        function initQuiz() {
            quizData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerHTML = `${index + 1}. ${item.q}`;
                card.appendChild(qText);

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                item.options.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = () => checkAnswer(btn, index, optIndex, optionsDiv, feedbackDiv);
                    optionsDiv.appendChild(btn);
                });

                card.appendChild(optionsDiv);

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.innerHTML = `<strong>Ακαδημαϊκή Τεκμηρίωση:</strong> ${item.feedback}`;
                card.appendChild(feedbackDiv);

                container.appendChild(card);
            });
        }

        function checkAnswer(selectedBtn, qIndex, optIndex, optionsDiv, feedbackDiv) {
            const correctIndex = quizData[qIndex].correct;
            const buttons = optionsDiv.querySelectorAll('.option-btn');
            
            buttons.forEach(btn => btn.disabled = true);

            if (optIndex === correctIndex) {
                selectedBtn.classList.add('correct');
                score++;
                scoreElement.textContent = score;
            } else {
                selectedBtn.classList.add('wrong');
                buttons[correctIndex].classList.add('correct');
            }

            feedbackDiv.style.display = 'block';
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
