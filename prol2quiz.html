<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Αξιολόγηση Κατανόησης: Μικροβιακή Ενδοκαρδίτιδα</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Georgia&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #27ae60;
            --error-color: #c0392b;
            --bg-color: #f9f9f9;
            --text-color: #333;
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--primary-color);
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-family: 'Roboto', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-color);
        }

        #quiz-container {
            width: 100%;
            max-width: 800px;
        }

        .question-card {
            background: white;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .question-text {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .options-container {
            display: grid;
            gap: 10px;
        }

        .option-btn {
            background: #fff;
            border: 1px solid #ccc;
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: all 0.2s ease;
            border-radius: 4px;
            font-size: 1em;
        }

        .option-btn:hover:not(:disabled) {
            background: #f0f0f0;
            border-color: var(--primary-color);
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            color: white;
            border-color: var(--success-color);
        }

        .option-btn.wrong {
            background-color: var(--error-color) !important;
            color: white;
            border-color: var(--error-color);
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 4px;
            display: none;
            font-size: 0.95em;
            border-left: 5px solid var(--primary-color);
            background: #f1f4f6;
        }

        .score-display {
            position: sticky;
            top: 10px;
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-family: 'Roboto', sans-serif;
            z-index: 100;
        }
    </style>
</head>
<body>

    <header>
        <h1>Εξονυχιστική Ακαδημαϊκή Αξιολόγηση</h1>
        <p>Πρωτόκολλα Πρόληψης Μικροβιακής Ενδοκαρδίτιδας</p>
    </header>

    <div class="score-display">Σκορ: <span id="current-score">0</span> / 65</div>

    <div id="quiz-container"></div>

    <script>
        const quizData = [
            {
                q: "Ποια είναι η κύρια τάση που χαρακτηρίζει όλα τα σύγχρονα πρωτόκολλα πρόληψης Μικροβιακής Ενδοκαρδίτιδας (ΜΕ) μετά το 2006;",
                options: [
                    "Αύξηση της δόσης των αντιβιοτικών για πλήρη κάλυψη.",

                    "Καθολική χορήγηση χημειοπροφύλαξης σε κάθε οδοντιατρική πράξη.",
                    "Αποκλειστική χρήση ενδοφλέβιων σχημάτων."
                ],
                correct: 1,
                feedback: "Σωστό. Μετά το 2006 (BSAC) και το 2007 (AHA), παρατηρείται διεθνώς μια στροφή προς τον περιορισμό των αντιβιοτικών λόγω κινδύνου αναφυλαξίας και ανάπτυξης ανθεκτικών στελεχών."
            },
            {
                q: "Τι πρότεινε το NICE στη Μεγάλη Βρετανία το 2008;",

                ],
                correct: 2,
                feedback: "Σωστό. Το NICE (2008) έκανε το τολμηρό βήμα να προτείνει πλήρη διακοπή της χημειοπροφύλαξης, θεωρώντας την καθημερινή υγιεινή κρισιμότερη."
            },
            {

            {

        let score = 0;
        const container = document.getElementById('quiz-container');
        const scoreElement = document.getElementById('current-score');

        function initQuiz() {
            quizData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerHTML = `${index + 1}. ${item.q}`;
                card.appendChild(qText);

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                item.options.forEach((opt, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = () => checkAnswer(btn, index, optIndex, optionsDiv, feedbackDiv);
                    optionsDiv.appendChild(btn);
                });

                card.appendChild(optionsDiv);

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.innerHTML = `<strong>Ακαδημαϊκή Τεκμηρίωση:</strong> ${item.feedback}`;
                card.appendChild(feedbackDiv);

                container.appendChild(card);
            });
        }

        function checkAnswer(selectedBtn, qIndex, optIndex, optionsDiv, feedbackDiv) {
            const correctIndex = quizData[qIndex].correct;
            const buttons = optionsDiv.querySelectorAll('.option-btn');
            
            buttons.forEach(btn => btn.disabled = true);

            if (optIndex === correctIndex) {
                selectedBtn.classList.add('correct');
                score++;
                scoreElement.textContent = score;
            } else {
                selectedBtn.classList.add('wrong');
                buttons[correctIndex].classList.add('correct');
            }

            feedbackDiv.style.display = 'block';
        }

        initQuiz();
    </script>
